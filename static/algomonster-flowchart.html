<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AlgoMonster Decision Flowchart — interactive</title>
<style>
  :root{ --bg:#0d1117; --fg:#e6edf3; --muted:#8b949e; --panel:#161b22; --border:#30363d; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; overflow:hidden; }
  #toolbar{ position:fixed; top:12px; left:12px; z-index:20; display:flex; gap:6px; align-items:center;
    background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:7px 9px;
    box-shadow:0 6px 22px rgba(0,0,0,.45); }
  #toolbar .title{ font-weight:600; font-size:13px; margin:0 6px 0 2px; white-space:nowrap; }
  #toolbar button{ background:#21262d; color:var(--fg); border:1px solid var(--border); border-radius:8px;
    padding:6px 11px; font-size:13px; line-height:1; cursor:pointer; }
  #toolbar button:hover{ background:#2d333b; }
  #toolbar button.active{ background:#3b3170; border-color:#6366f1; }
  #toolbar .sep{ width:1px; height:20px; background:var(--border); margin:0 3px; }
  #legend{ position:fixed; top:12px; right:12px; z-index:20; background:var(--panel);
    border:1px solid var(--border); border-radius:12px; padding:9px 11px; font-size:12px; }
  #legend .row{ display:flex; align-items:center; gap:7px; margin:3px 0; }
  #legend .sw{ width:14px; height:14px; border-radius:3px; display:inline-block; border:1px solid rgba(255,255,255,.15); }
  #legend .dia{ transform:rotate(45deg); border-radius:2px; }
  #hint{ position:fixed; bottom:12px; left:12px; z-index:20; color:var(--muted); font-size:12px;
    background:var(--panel); border:1px solid var(--border); border-radius:9px; padding:6px 10px; }
  #src{ position:fixed; bottom:12px; right:12px; z-index:20; color:var(--muted); font-size:11px;
    background:var(--panel); border:1px solid var(--border); border-radius:9px; padding:6px 10px; }
  #src a{ color:#8ab4f8; text-decoration:none; }
  #viewport{ position:fixed; inset:0; cursor:grab; touch-action:none; }
  #viewport.grabbing{ cursor:grabbing; }
  .canvas{ position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform; }
  .canvas svg{ display:block; max-width:none !important; }
  #canvas-lr{ display:none; }
</style>
</head>
<body>
  <div id="toolbar">
    <span class="title">AlgoMonster Flowchart</span>
    <button id="zin" title="Zoom in">&#xFF0B;</button>
    <button id="zout" title="Zoom out">&#x2212;</button>
    <button id="fit" title="Fit to screen">Fit</button>
    <span class="sep"></span>
    <button id="btd" class="active" title="Top-down layout">Top&#8209;down</button>
    <button id="blr" title="Left-to-right layout">Left&#8209;right</button>
  </div>
  <div id="legend">
    <div class="row"><span class="sw dia" style="background:#f59e0b"></span> question (yes / no)</div>
    <div class="row"><span class="sw" style="background:#6366f1"></span> technique to use</div>
  </div>
  <div id="hint">Scroll / pinch to zoom &middot; drag to pan &middot; &ldquo;Fit&rdquo; to recenter</div>
  <div id="src">Source: <a href="https://algo.monster/flowchart" target="_blank" rel="noopener">algo.monster/flowchart</a></div>

  <script>
    const vp = document.getElementById('viewport');
    const canvases = { td: document.getElementById('canvas-td'), lr: document.getElementById('canvas-lr') };
    const state = { td:{s:1,x:0,y:0,W:0,H:0}, lr:{s:1,x:0,y:0,W:0,H:0} };
    let cur = 'td';

    function prepSvg(key){
      const svg = canvases[key].querySelector('svg');
      const vb = svg.getAttribute('viewBox');
      let W, H;
      if(vb){ const p = vb.split(/[ ,]+/).map(Number); W = p[2]; H = p[3]; }
      else { W = parseFloat(svg.getAttribute('width'))||1000; H = parseFloat(svg.getAttribute('height'))||1000; }
      svg.removeAttribute('width'); svg.removeAttribute('height');
      svg.style.width = W + 'px'; svg.style.height = H + 'px';
      state[key].W = W; state[key].H = H;
    }
    prepSvg('td'); prepSvg('lr');

    function apply(){ const st = state[cur];
      canvases[cur].style.transform = 'translate(' + st.x + 'px,' + st.y + 'px) scale(' + st.s + ')'; }
    function fit(){ const st = state[cur]; const m = 56;
      const k = Math.min((vp.clientWidth - m)/st.W, (vp.clientHeight - m)/st.H);
      st.s = k; st.x = (vp.clientWidth - st.W*k)/2; st.y = (vp.clientHeight - st.H*k)/2; apply(); }
    function zoomAt(cx, cy, f){ const st = state[cur];
      const nx = (cx - st.x)/st.s, ny = (cy - st.y)/st.s;
      st.s = Math.min(24, Math.max(0.04, st.s * f));
      st.x = cx - nx*st.s; st.y = cy - ny*st.s; apply(); }

    vp.addEventListener('wheel', e => { e.preventDefault();
      zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.12 : 1/1.12); }, { passive:false });
    let drag = false, lx = 0, ly = 0;
    vp.addEventListener('pointerdown', e => { drag = true; lx = e.clientX; ly = e.clientY;
      vp.classList.add('grabbing'); vp.setPointerCapture(e.pointerId); });
    vp.addEventListener('pointermove', e => { if(!drag) return; const st = state[cur];
      st.x += e.clientX - lx; st.y += e.clientY - ly; lx = e.clientX; ly = e.clientY; apply(); });
    const endDrag = () => { drag = false; vp.classList.remove('grabbing'); };
    vp.addEventListener('pointerup', endDrag); vp.addEventListener('pointercancel', endDrag);

    document.getElementById('zin').onclick  = () => zoomAt(vp.clientWidth/2, vp.clientHeight/2, 1.25);
    document.getElementById('zout').onclick = () => zoomAt(vp.clientWidth/2, vp.clientHeight/2, 1/1.25);
    document.getElementById('fit').onclick  = fit;

    function setLayout(key){ if(key === cur && canvases[key].style.display !== 'none') return;
      cur = key;
      canvases.td.style.display = key === 'td' ? 'block' : 'none';
      canvases.lr.style.display = key === 'lr' ? 'block' : 'none';
      document.getElementById('btd').classList.toggle('active', key === 'td');
      document.getElementById('blr').classList.toggle('active', key === 'lr');
      fit(); }
    document.getElementById('btd').onclick = () => setLayout('td');
    document.getElementById('blr').onclick = () => setLayout('lr');

    let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(fit, 120); });
    fit();
  </script>
