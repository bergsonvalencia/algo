 1 way and Version B counts 3 ways, because Version B also counts the empty-plus-padding sequences from `dp[0]`."],"answer":0,"explanation":"The source says items-outside counts unordered combinations (each multiset once) and target-outside counts ordered permutations — that latter case is exactly LC 377 Combination Sum IV, where 1+2 and 2+1 are distinct. So Version A (nums outer) yields the single combination {1,2}, and Version B (target outer) yields both orderings, 2 ways. The swapped option reverses the two roles. The 'same thing' option is wrong because loop order is precisely the ordered-vs-unordered switch, not just a runtime detail. The '3 ways' option invents a phantom count; dp[0]=1 represents only the single empty sequence and does not inflate the total."},{"id":"dynamic-programming-m04","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"medium","tags":["trace","invariant"],"question":"Using the patience/tails method for LIS with lower-bound replacement (first `tails` entry `>= x`), process `nums = [3, 4, 1, 2]` one element at a time. What is the final `tails` array, and what does it tell you?","code":"tails = []\nx=3 : append              -> [3]\nx=4 : append              -> [3, 4]\nx=1 : first >=1 is idx0   -> replace -> [1, 4]\nx=2 : first >=2 is idx1   -> replace -> [1, 2]","codeLang":"text","options":["`tails = [1, 2]`, so the LIS length is 2, but `[1, 2]` is not guaranteed to be an actual increasing subsequence in order — only its length is meaningful.","`tails = [3, 4]`, because once an entry is appended it is never overwritten by a smaller later value.","`tails = [1, 2, 4]`, so the LIS length is 3, because replaced values stay appended at the end.","`tails = [1, 2]`, so `[1, 2]` is the actual longest increasing subsequence of the input, read directly off the array."],"answer":0,"explanation":"The trace ends at tails = [1, 2], giving LIS length 2 (a real LIS here is [3,4] or [1,2]), and the source warns that tails is NOT guaranteed to be a real subsequence — only its length is the answer, since reconstructing the true LIS needs parent pointers. The second option wrongly treats tails as a guaranteed literal subsequence. The [1,2,4] option misunderstands the algorithm: replacement overwrites in place, it does not append, so tails never grows to length 3 here. The [3,4] option contradicts the method's core mechanic — replacement deliberately lowers existing tails so future elements can extend chains."},{"id":"dynamic-programming-m05","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"medium","tags":["base-case","pitfall"],"question":"A candidate codes Edit Distance (LC 72) with `dp[i][j]` = edits to turn `a[0..i-1]` into `b[0..j-1]`, fills the interior with the standard match/three-way-min recurrence, but leaves the first row and first column as the default-initialized zeros. For `a = \"abc\"`, `b = \"\"`, what does the code return, and what is the correct answer?","code":"","codeLang":"","options":["It returns 3, which is correct, because the interior recurrence reconstructs the deletion cost even without explicit base cases.","It throws an index-out-of-bounds exception, because `dp[0][j]` is never a valid cell in a prefix-based table.","It returns 0, but the correct answer is 3; the missing base cases `dp[i][0] = i` and `dp[0][j] = j` are required so the recurrence never reads uninitialized zeros.","It returns 0, which is correct, because converting any string to the empty string costs nothing once duplicates are removed."],"answer":2,"explanation":"With b empty, the answer column j=0 must hold dp[i][0] = i (delete all i chars), so the true cost for 'abc' is 3; leaving it as zeros makes dp[3][0] read 0. The source flags exactly this: Edit Distance needs dp[i][0]=i and dp[0][j]=j or the three-way min reads uninitialized zeros and undercounts. The 'returns 3 correctly' option is wrong because with b empty the interior loop never runs, so nothing recovers the deletion ladder. The 'returns 0 correctly' option is false because deleting 3 characters costs 3. The exception option is false because dp[0][j] is a valid, intentional cell (the empty-prefix base row), so no exception occurs."},{"id":"dynamic-programming-m06","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"medium","tags":["trace","pitfall"],"question":"Consider `NumDecodings` for Decode Ways (LC 91), where `1..26` map to `A..Z`. What does `NumDecodings(\"230\")` return, and what causes that result?","code":"","codeLang":"","options":["0, because the standalone '0' cannot stand alone and the pair '30' is outside the valid 10..26 range, so no decoding completes.","3, because '0' is silently skipped and the count matches NumDecodings(\"23\").","2, because '2','3','0' and '23','0' are both valid full decodings.","1, because only '2 30' decodes, treating '30' as a single valid symbol."],"answer":0,"explanation":"The source names standalone '0' (as in '30') as a trap that yields 0: a single '0' is not 1..9 so it contributes nothing, and the pair '30' is not in 10..26, so the '0' can be neither a solo symbol nor part of a valid pair, leaving no complete decoding. The '2' option is wrong because a lone trailing '0' is never a valid standalone symbol. The '1' option invents a '30' symbol; the map only covers 1..26. The '3' option is wrong because a '0' is never skipped — an unusable '0' forces the count to 0, it does not inherit the prefix's count."},{"id":"dynamic-programming-m07","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"medium","tags":["complexity"],"question":"Partition Equal Subset Sum (LC 416) runs in O(n × sum) time, where `n` is the number of items and `sum` is the total. Why does the source label this 'pseudo-polynomial' rather than polynomial?","code":"","codeLang":"","options":["The algorithm is only polynomial on average; its worst case is exponential because the boolean table can degrade to a full subset enumeration.","The cost is polynomial in the numeric value of `sum`, but doubling `sum` adds only one input bit while doubling runtime, so it is exponential in the input's bit-length.","It is pseudo-polynomial because the descending capacity sweep recomputes each item O(sum) times, hiding an extra logarithmic factor.","It is pseudo-polynomial because the O(n × sum) bound ignores the O(n) cost of computing `sum`, which dominates for large arrays."],"answer":1,"explanation":"The source defines pseudo-polynomial precisely: O(n × sum) is polynomial in the numeric value of the sum, not in the number of bits needed to write the input; a sum that doubles adds just one input bit but doubles the runtime, so it is exponential in input size. The average-case option misstates it; the O(n × sum) bound is a firm worst case, the issue is how 'size' is measured. The 'ignores computing sum' option is wrong — computing sum is O(n) and does not change the asymptotic class or explain the term. The 'logarithmic factor' option invents a nonexistent factor; the sweep is plain O(n × sum) with no hidden log."},{"id":"dynamic-programming-h01","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"hard","tags":["pitfall","template"],"question":"You have a 0/1 subset-sum DP using a 1D boolean `dp` array where `dp[s]` means \"sum `s` is reachable using each item at most once.\" A colleague wants to convert it to an UNBOUNDED version (each item reusable any number of times) while keeping the same 1D array and the same `dp[s] = dp[s] || dp[s - x]` transition. What single change makes it correctly unbounded, and why?","code":"foreach (int x in items)\n    for (int s = ???; ???; ???)   // capacity sweep\n        dp[s] = dp[s] || dp[s - x];","codeLang":"csharp","options":["Sweep the capacity `s` DESCENDING (from `target` down to `x`), because reading a not-yet-updated `dp[s - x]` is what allows reuse of the item","Sweep the capacity `s` ASCENDING (from `x` up to `target`), so that within the same item's pass a freshly updated `dp[s - x]` can be read again, letting `x` contribute multiple times","Keep the descending sweep but run the entire `foreach` over items twice, since two passes simulate unbounded reuse","Move the item loop inside the capacity loop without changing the descending direction, because swapping loop nesting alone converts 0/1 into unbounded"],"answer":1,"explanation":"For unbounded items you sweep capacity ascending: when filling `dp[s]` you read `dp[s - x]`, which was already updated earlier in the SAME item's pass, so `x` can be counted again — that is exactly what unbounded reuse means (source: 'for unbounded items iterate capacity ascending so a just-updated dp[a-c] can be reused within the same item'). The descending option is the 0/1 rule, not unbounded — descending reads the OLD value so each item contributes at most once. The 'run twice' option is wrong: two passes of a descending 0/1 sweep allow at most two uses, not unlimited. The 'swap nesting' option is wrong because loop nesting changes ordered-vs-unordered COUNTING, not the 0/1-vs-unbounded reuse property, which is controlled by capacity sweep direction."},{"id":"dynamic-programming-h02","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"hard","tags":["complexity","when-to-apply"],"question":"Partition Equal Subset Sum runs in `O(n × sum)` time. An interviewer claims this proves the subset-sum problem is solvable in polynomial time. Which statement is the precise, correct rebuttal?","code":"","codeLang":"","options":["The bound is polynomial only when all numbers are distinct; with duplicates the descending sweep degrades to `O(n × sum^2)`","The bound is wrong; the true complexity is `O(2^n)` because every subset must be enumerated, and the `O(n × sum)` figure ignores the subset count","The bound is genuinely polynomial, so subset-sum is in P; the interviewer is simply mistaken about it being NP-complete","The bound is pseudo-polynomial: it is polynomial in the numeric VALUE of `sum`, but `sum` needs only about `log(sum)` bits to encode, so the runtime is exponential in the input's bit-length"],"answer":3,"explanation":"`O(n × sum)` is pseudo-polynomial: it is polynomial in the magnitude of the target sum, not in the number of bits used to write the input. Since a sum that doubles adds only one input bit but doubles runtime, the algorithm is exponential in input size (source: 'pseudo-polynomial... polynomial in the numeric value of the sum, not in the input's bit-length'). The `O(2^n)` option is wrong because the 1D DP does NOT enumerate all subsets; it runs in O(n × sum) by reusing the reachability table. The 'genuinely polynomial' option is wrong: a pseudo-polynomial algorithm does not place subset-sum in P, and subset-sum is NP-complete. The 'distinct numbers' option is fabricated — duplicate values do not change the O(n × sum) bound; the descending sweep handles repeats correctly in a single linear pass per item."},{"id":"dynamic-programming-h03","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"hard","tags":["template","pitfall"],"question":"This routine is meant to COUNT the number of distinct UNORDERED ways to make `amount` using unbounded coins (so `1+1+2` and `2+1+1` count as one way). The loop nesting determines whether it counts unordered combinations or ordered permutations. Which fix makes it count unordered combinations correctly?","code":"long[] dp = new long[amount + 1];\ndp[0] = 1;\nfor (int a = 1; a \u003c= amount; a++)        // capacity OUTER\n    foreach (int c in coins)               // coins INNER\n        if (c \u003c= a)\n            dp[a] += dp[a - c];\nreturn dp[amount];","codeLang":"csharp","options":["Swap the loops so coins are OUTER and capacity is INNER (ascending), so each coin's contribution is folded in once and orderings are not double-counted","Keep the loop order but change `+=` to `= Math.Max(dp[a], dp[a - c] + 1)`, since combinations require a max not a sum","Add a visited set keyed by `(a, c)` so each coin is only used once per amount, eliminating permutations","Keep the loop order but sweep capacity DESCENDING, which removes the ordering duplication"],"answer":0,"explanation":"With capacity on the outer loop and coins inner, every coin is available at every amount, so `1+2` and `2+1` are both counted — that is the ORDERED permutation count (LC 377 Combination Sum IV). Putting coins on the OUTER loop and capacity inner folds each coin in exactly once across the whole table, counting each multiset (unordered combination) a single time (source: 'items-outside counts unordered combinations; target-outside counts ordered permutations'). The max/+1 option is wrong: that transition computes MIN-coins, not a count of ways. The descending option is wrong because descending capacity controls 0/1-vs-unbounded reuse, not ordered-vs-unordered counting, and would also break the unbounded reuse here. The visited-set option is wrong: restricting each coin to one use per amount changes the problem rather than deduplicating orderings."},{"id":"dynamic-programming-h04","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"hard","tags":["invariant","pitfall"],"question":"In the O(n log n) patience method for Longest Increasing Subsequence, `tails[k]` holds the smallest possible tail of an increasing subsequence of length `k+1`, and the answer is `tails.Count`. A candidate proposes reconstructing the actual LIS by simply returning the final `tails` array as the subsequence. Why is this incorrect, and what additional fact about the binary-search predicate must hold for a STRICTLY increasing LIS?","code":"","codeLang":"","options":["`tails` is a valid LIS only if the input has no duplicates; with duplicates lower-bound and upper-bound coincide, so reconstruction works either way","`tails` always equals one valid LIS, but the search must use upper-bound (first entry `> x`) for strict increase, so the candidate is right about reconstruction and wrong about the predicate","`tails` is not a valid subsequence, and a strictly increasing LIS requires upper-bound (first entry `> x`) so equal values can extend the chain","`tails` is not guaranteed to be an actual subsequence of the input in order (only its LENGTH is meaningful), and the search must use lower-bound (first entry `>= x`) so an equal value REPLACES rather than extends"],"answer":3,"explanation":"`tails` is built by replacing entries as new values arrive, so its contents need not appear in the input in that left-to-right order — only its length equals the LIS length, and reconstructing the real LIS needs separate parent pointers (source: 'tails is not an actual LIS — only its length is meaningful'). For a STRICTLY increasing LIS the search uses lower-bound, the first entry `>= x`, so an equal value replaces an existing tail rather than extending the chain (source). The second option wrongly claims tails is always a valid LIS and assigns upper-bound to strict increase. The fourth option names the wrong predicate: upper-bound (`> x`) yields the NON-decreasing subsequence, not strict. The third option is false: with duplicates lower-bound and upper-bound differ precisely on equal values, which is the whole point of choosing between strict and non-strict."},{"id":"dynamic-programming-h05","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"hard","tags":["trace","pitfall"],"question":"This is the standard O(1)-space Decode Ways routine (1..26 map to A..Z). What does `NumDecodings(\"100\")` return, and which structural feature of the loop produces that result?","code":"if (s.Length == 0 || s[0] == '0') return 0;\nint prev2 = 1, prev1 = 1;          // dp[0]=1, dp[1]=1\nfor (int i = 1; i \u003c s.Length; i++)\n{\n    int cur = 0;\n    if (s[i] != '0') cur += prev1;                       // single digit 1..9\n    int two = (s[i-1]-'0')*10 + (s[i]-'0');\n    if (two >= 10 && two \u003c= 26) cur += prev2;            // pair 10..26\n    prev2 = prev1;\n    prev1 = cur;\n}\nreturn prev1;","codeLang":"csharp","options":["`3`, matching `NumDecodings(\"226\")` since any 3-digit string yields three decodings","`0`, because at `i=2` the digit `s[2]='0'` blocks the single-digit term and the pair `\"00\"` is below 10, so `cur` becomes 0 and propagates to the result","`2`, because both `\"1 0 0\"` and `\"10 0\"` are counted once the pair branch fires at `i=1`","`1`, because `\"10\"` decodes as `J` and the trailing `0` is silently dropped by the single-digit branch"],"answer":1,"explanation":"Trace: `prev2=1, prev1=1`. At `i=1`, `s[1]='0'` so the single-digit term is skipped; the pair `\"10\"` is in 10..26 so `cur=prev2=1`; now `prev2=1, prev1=1`. At `i=2`, `s[2]='0'` skips the single-digit term, and the pair `\"00\"=0` is below 10 so it is also skipped, making `cur=0`; `prev1` becomes 0 and is returned. A standalone `'0'` that cannot pair with the previous digit kills all decodings — the trap the source highlights ('standalone 0 (e.g. \"30\") are the trap cases that yield 0'). The '1' option is wrong: the trailing `'0'` is not droppable; `\"100\"` has no valid decoding. The '2' option fabricates `\"10 0\"` as valid, but a trailing `0` can never stand alone. The '3' option wrongly assumes all 3-digit strings behave like `\"226\"`, ignoring the zero handling."},{"id":"graphs-e01","topic":"Graphs","slug":"graphs","difficulty":"easy","tags":["representation","complexity"],"question":"For a typical sparse interview graph with `V` vertices and `E` edges, what is the space complexity of an adjacency-list representation, and why is it the default choice?","code":"","codeLang":"","options":["O(V²), because you must reserve a slot for every possible pair of vertices","O(V log V), because neighbor lists are kept sorted for binary search","O(V + E), because each vertex stores only a list of its actual neighbors, which is efficient when E is much smaller than V²","O(E), because only edges consume memory and isolated vertices cost nothing"],"answer":2,"explanation":"The reviewer states an adjacency list uses O(V + E) space (one entry per vertex plus one stored neighbor per edge endpoint) and is the default because real graphs are sparse (E much smaller than V²). Option 1 (O(V²)) is the adjacency-matrix cost, not the adjacency list. Option 2 (O(E)) ignores the per-vertex storage and would lose isolated vertices that have no edges. Option 3 (O(V log V)) is invented; adjacency lists are not required to be sorted and that term does not describe their space."},{"id":"graphs-e02","topic":"Graphs","slug":"graphs","difficulty":"easy","tags":["when-to-apply","shortest-path"],"question":"You need the shortest path (fewest edges) from a source to every other vertex in an unweighted graph. Which traversal gives this directly, and what property guarantees it?","code":"","codeLang":"","options":["BFS, because its FIFO queue processes vertices in nondecreasing distance order, so the first time it reaches a vertex is via a minimum-edge path","DFS, because diving down one branch fully reaches every vertex by its shortest path first","Topological sort, because ordering the vertices also reveals their distances from the source","Dijkstra, because BFS cannot compute distances without edge weights"],"answer":0,"explanation":"The reviewer states BFS discovers each vertex by a shortest (fewest-edges) path because its FIFO queue yields vertices in nondecreasing distance order, so first contact is a minimum-edge path. DFS explicitly does not find shortest paths; it may reach a vertex by a long branch first. Dijkstra works but is overkill for unit weights (the reviewer says plain BFS is the right tool for unweighted graphs). Topological sort orders a DAG by dependencies, not by distance from a source, and does not apply to general unweighted reachability."},{"id":"graphs-e03","topic":"Graphs","slug":"graphs","difficulty":"easy","tags":["template","pitfall"],"question":"In the standard BFS template, at what moment should a vertex be marked visited to keep the traversal correct and efficient?","code":"","codeLang":"","options":["When it is dequeued, so it is only marked at the moment it is actually processed","When it is enqueued, so it can never enter the queue more than once","After all of its neighbors have been fully processed","Never; BFS does not need a visited set because the queue prevents repeats automatically"],"answer":1,"explanation":"The reviewer says to mark visited on enqueue, not on dequeue: marking on dequeue lets the same vertex be enqueued several times before it is processed, bloating the queue and doing redundant work. Option 1 (mark on dequeue) is the named pitfall. Option 2 (after neighbors finish) describes a DFS-style finish state, not BFS visited-marking. Option 3 is false; without a visited set BFS revisits and re-enqueues vertices through cycles and shared neighbors."},{"id":"graphs-e04","topic":"Graphs","slug":"graphs","difficulty":"easy","tags":["when-to-apply","complexity"],"question":"Dijkstra's algorithm computes single-source shortest paths under which restriction on edge weights, and what is its time complexity with a binary heap?","code":"","codeLang":"","options":["Only weights equal to 1, in O(E log V) time","Non-negative weights only, in O(E log V) time","Non-negative weights only, in O(V²) time regardless of representation","Any weights including negative ones, in O(V + E) time"],"answer":1,"explanation":"The reviewer states Dijkstra requires non-negative edge weights and runs in O(E log V) with a binary heap. Option 1 is wrong because Dijkstra cannot handle negative edges (a negative edge can invalidate an already-settled vertex); Bellman-Ford is used for negatives, at O(V·E). Option 2 names the wrong complexity and ignores the heap-based bound. Option 3 (weights all 1) describes the case where plain BFS suffices; Dijkstra handles any non-negative weights, not just unit weights."},{"id":"graphs-e05","topic":"Graphs","slug":"graphs","difficulty":"easy","tags":["complexity","union-find"],"question":"With both path compression and union by rank/size, what is the amortized per-operation cost of union-find's `Find` and `Union`?","code":"","codeLang":"","options":["O(α(n)) amortized, where α is the inverse Ackermann function (≤ 4 for any realistic n) — near constant, but not literally O(1)","O(n) in the worst case, because Find may have to traverse a chain of all n elements","O(log n) per operation, because each Find still walks down a balanced tree","O(1) exactly, with a strict constant-time guarantee for every individual operation"],"answer":0,"explanation":"The reviewer states that with both optimizations Find/Union run in O(α(n)) amortized, where α is the inverse Ackermann function (≤ 4 in practice) — near constant but explicitly not literally O(1) and not O(log n). Option 1 (O(log n)) is the cost with only one optimization, which the reviewer calls out as wrong for the both-optimizations case. Option 2 (exact O(1)) overstates the guarantee; it is amortized near-constant, not a strict per-op constant. Option 3 (O(n)) is the unoptimized degenerate chain, which path compression and union by size prevent."},{"id":"graphs-m01","topic":"Graphs","slug":"graphs","difficulty":"medium","tags":["pitfall","invariant"],"question":"A candidate writes BFS over an unweighted graph but marks a vertex visited only when it is **dequeued** (popped from the front), not when it is enqueued. The traversal still eventually visits every reachable vertex. What is the concrete problem this introduces?","code":"","codeLang":"","options":["Distances are computed correctly but the algorithm degrades to O(V^2) space because of the matrix","The same vertex can be enqueued multiple times before it is processed, bloating the queue and doing redundant work","BFS will silently skip some reachable vertices, so the visited set ends up incomplete","The queue stops being FIFO, so vertices are processed in depth-first order instead"],"answer":1,"explanation":"The reviewer states the rule 'mark visited when you enqueue, not when you dequeue,' because marking on dequeue lets a vertex enter the queue several times before it is processed, bloating the queue and doing redundant work. Option B is wrong: every reachable vertex is still visited, just inefficiently. Option C is wrong: the queue remains FIFO; dequeue order is unchanged, so it does not become DFS. Option D is wrong: marking timing has nothing to do with using an adjacency matrix, and the blowup is in queue size, not O(V^2)."},{"id":"graphs-m02","topic":"Graphs","slug":"graphs","difficulty":"medium","tags":["when-to-apply","pitfall"],"question":"You must detect whether a **directed** graph contains a cycle. A teammate proposes a single boolean `visited[]` array: run DFS, and if you ever reach a vertex already in `visited`, report a cycle. Why is this approach incorrect?","code":"","codeLang":"","options":["A boolean array uses too much memory; directed cycle detection requires union-find instead","DFS cannot detect cycles at all in directed graphs; only BFS with in-degrees can","It works, but only if the graph is also connected; on a disconnected directed graph it misses cycles","A two-state visited check cannot distinguish a back edge (into a vertex still on the recursion stack) from an edge into an already-finished vertex, so it reports false cycles"],"answer":3,"explanation":"The reviewer explains directed-cycle detection needs three colors: white (unvisited), gray (on the current recursion stack), black (finished). An edge into a gray vertex is a back edge (a real cycle), while an edge into a black vertex is a cross/forward edge (not a cycle). A plain visited set cannot tell these apart, so it would flag a finished-vertex edge as a cycle. Option B is wrong: memory is not the issue, and union-find is for undirected cycles. Option C is wrong: white/gray/black DFS is exactly the standard directed-cycle method. Option D is wrong: looping over all start vertices handles disconnected graphs; the flaw is the two-state check itself."},{"id":"graphs-m03","topic":"Graphs","slug":"graphs","difficulty":"medium","tags":["trace","template"],"question":"This Dijkstra trace from source `0` is partially filled. After popping `(2,1)` and relaxing its edges, which `dist` array is correct?","code":"edges (directed, weighted):\n  0->1 (4), 0->2 (1), 2->1 (2), 1->3 (1), 2->3 (5)\n\ndist init: [0, inf, inf, inf]\n\npop (0,0): relax 0->1 -> dist[1]=4; 0->2 -> dist[2]=1\n           dist = [0, 4, 1, inf]\npop (2,1): relax 2->1 -> ? ; relax 2->3 -> ?\n           dist = ?","codeLang":"text","options":["[0, 3, 1, 4]","[0, 4, 1, 5]","[0, 3, 1, 6]","[0, 4, 1, 6]"],"answer":2,"explanation":"Popping (2,1) means dist[2]=1. Relax 2->1: 1+2=3 \u003c 4, so dist[1] becomes 3. Relax 2->3: 1+5=6 \u003c inf, so dist[3] becomes 6. The array is [0, 3, 1, 6], matching the reviewer's worked trace at that step. Option B keeps dist[1]=4 and fails to apply the improving relaxation 0->2->1. Option C ([0,3,1,4]) is the FINAL answer after later popping (1,3) and relaxing 1->3, not the state right after popping (2,1). Option D miscomputes dist[1] (leaves it 4) while updating dist[3]=5 from a nonexistent shorter path."},{"id":"graphs-m04","topic":"Graphs","slug":"graphs","difficulty":"medium","tags":["complexity","pitfall"],"question":"Two engineers claim union-find with both path compression and union by rank/size runs at different complexities per operation. Which statement is the accurate one from the reviewer?","code":"","codeLang":"","options":["O(log n) amortized, dominated by the depth of the union-by-rank tree","O(1) worst case per operation, because path compression flattens the tree to a single level permanently","O(n) worst case, because Find may still walk a chain of length n after a bad sequence of unions","O(alpha(n)) amortized, where alpha is the inverse Ackermann function (\u003c= 4 in practice) — near constant, not literally O(1) and not O(log n)"],"answer":3,"explanation":"The reviewer states that with BOTH optimizations, Find/Union run in O(alpha(n)) amortized, where alpha is the inverse Ackermann function (\u003c= 4 for any practical n) — explicitly 'near O(1), not literally O(1), and not O(log n).' Option B overstates: it is amortized near-constant, not worst-case O(1), and compression does not guarantee a permanent single level. Option C describes the bound with only ONE optimization (union by rank alone gives O(log n)); both together beat that. Option D describes the naive structure with no optimizations."},{"id":"graphs-m05","topic":"Graphs","slug":"graphs","difficulty":"medium","tags":["when-to-apply","template"],"question":"A grid has `0` = empty, `1` = fresh orange, `2` = rotten orange. Each minute, every fresh orange 4-directionally adjacent to a rotten one becomes rotten. You must return the minutes until no fresh orange remains, or `-1` if some fresh orange can never rot. Which approach matches the problem, and why?","code":"","codeLang":"","options":["Single-source BFS from the first rotten orange found, since BFS distance from one source equals the minute every cell rots","DFS flood fill from each rotten orange, where the recursion depth equals the minute the deepest orange rots","Dijkstra with each spread step as a weight-1 edge, since the heap finds the minimum rot time per cell","Multi-source BFS: enqueue every initially-rotten orange at minute 0, expand one layer per minute, and the layer count is the answer (return -1 if any fresh orange is never reached)"],"answer":3,"explanation":"The reviewer presents LC 994 Rotting Oranges as the canonical multi-source BFS: seed the queue with ALL rotten oranges at minute 0, expand simultaneously, and count layers until no fresh orange remains, returning -1 if a fresh orange is unreachable. Option B fails because rot spreads from all rotten oranges at once; a single source gives wrong (too-large) times when multiple sources exist. Option C is wrong because DFS recursion depth does not model simultaneous level-by-level spreading — it would compute path length down one branch, not the minute of rotting. Option D is overkill: all edges have weight 1, so plain BFS suffices and Dijkstra adds an unnecessary log factor."},{"id":"graphs-m06","topic":"Graphs","slug":"graphs","difficulty":"medium","tags":["comparison","invariant"],"question":"Both Prim's MST and Dijkstra pop the cheapest item from a min-heap and skip stale entries. A described problem asks for the cheapest set of edges connecting all vertices of a connected, undirected, weighted graph. Which key must the min-heap use, and what distinguishes it from Dijkstra?","code":"","codeLang":"","options":["Key each candidate vertex by its in-degree, popping the most-constrained vertex first like Kahn's algorithm","Key each candidate vertex by `dist[u] + w` exactly as Dijkstra; the two algorithms are identical for undirected graphs","Key each candidate vertex by the weight of the single edge attaching it to the tree (`w` alone); Dijkstra instead keys by total distance from the source (`dist[u] + w`)","Key each candidate vertex by `dist[u] - w`, subtracting the edge weight so the heaviest edges are added last"],"answer":2,"explanation":"The reviewer's MST section states Prim keys a vertex by the weight of the single edge attaching it to the tree (`w` alone), building a minimum-weight tree, whereas Dijkstra keys by total distance from the source (`dist[u] + w`), building a shortest-path tree — same scaffold, different priority. Option B is wrong: using `dist[u]+w` would build a shortest-path tree, not an MST, and the two are not identical. Option C invents a `dist[u]-w` key that has no basis and would not produce a minimum tree. Option D confuses Prim's heap with Kahn's in-degree queue for topological sort, which is a different problem entirely."},{"id":"graphs-m07","topic":"Graphs","slug":"graphs","difficulty":"medium","tags":["trace","pitfall"],"question":"This Kruskal MST helper returns the total weight. Edges arrive as `[u, v, w]`. For the input shown, what does `KruskalMst` return?","code":"// n = 4, edges = [[0,1,1],[1,2,2],[2,3,3],[0,2,4],[1,3,5]]\nArray.Sort(edges, (a, b) => a[2] - b[2]); // by weight asc\nvar dsu = new DSU(n);\nint total = 0, used = 0;\nforeach (int[] e in edges)\n{\n    if (dsu.Union(e[0], e[1]))\n    {\n        total += e[2];\n        if (++used == n - 1) break;\n    }\n}\nreturn total;","codeLang":"csharp","options":["9 — edges (0,1):1, (2,3):3, (1,3):5 are added, skipping (1,2) and (0,2) as cycles","6 — edges (0,1):1, (1,2):2, (2,3):3 are added; (0,2) and (1,3) are never reached because used hits n-1=3 and the loop breaks","15 — every edge weight is summed because Union always returns true","10 — edges (0,1):1, (1,2):2, (0,2):4, (2,3):3 are added in sorted order"],"answer":1,"explanation":"Sorted by weight: (0,1):1, (1,2):2, (2,3):3, (0,2):4, (1,3):5. Add (0,1) -> {0,1}; add (1,2) -> {0,1,2}; add (2,3) -> {0,1,2,3}. That is used == 3 == n-1, so the loop breaks before (0,2) and (1,3); total = 1+2+3 = 6, matching the reviewer's exam answer. Option B forgets that Union returns false for endpoints already in the same set, so not every edge is counted. Option C wrongly includes (0,2):4, which would close a cycle and be skipped, and ignores the early break at n-1 edges. Option D adds (1,3):5 even though (1,3)'s endpoints are already connected, so Union would return false and skip it."},{"id":"graphs-h01","topic":"Graphs","slug":"graphs","difficulty":"hard","tags":["comparisons","invariant"],"question":"Both Dijkstra and Prim repeatedly pop the cheapest element from a min-heap and use the same duplicate-and-skip-stale-pops idiom. A candidate claims you can run Prim on a graph with one negative-weight edge but cannot run Dijkstra. Which statement correctly explains the difference in the priority key that makes this claim true?","code":"","codeLang":"","options":["Prim keys a vertex by cumulative distance from the start vertex, which tolerates negatives because the tree is undirected; Dijkstra keys by single-edge weight, which requires non-negativity to stay sorted.","Prim works with one negative edge only because MSTs ignore edge direction; with two or more negative edges Prim also fails, while Dijkstra fails with even one.","Both key by `dist[u] + w`, but Prim re-sorts the heap after each pop so negative edges are absorbed, whereas Dijkstra's heap is built once and cannot be corrected.","Prim keys a vertex by the weight `w` of the single edge attaching it to the tree, so a popped vertex is final regardless of edge sign; Dijkstra keys by cumulative distance `dist[u] + w` from the source, and a negative edge can later reduce an already-settled vertex's distance."],"answer":3,"explanation":"The source states Dijkstra keys a vertex by its total distance from the source (`dist[u] + w`) and finalizes a vertex the moment it is popped, so a later negative edge could reduce that settled distance and break the invariant. Prim keys a vertex by the weight of the single edge attaching it (`w` alone) to build a minimum-weight tree, so the cut property holds for any edge weights including negatives. Option 1 swaps the two keys, the exact inversion of the truth. Option 2 invents per-pop re-sorting that neither algorithm does and misattributes the keys. Option 3 invents a one-negative-edge threshold; Prim's correctness via the cut property does not depend on how many edges are negative."},{"id":"graphs-h02","topic":"Graphs","slug":"graphs","difficulty":"hard","tags":["pitfall","invariant"],"question":"A student replaces the white/gray/black directed-cycle check with a single boolean `visited[]` array: mark a vertex visited on entry, and report a cycle if DFS ever reaches an already-visited vertex. On which directed graph does this two-state version FALSELY report a cycle that does not exist?","code":"edges: 0->1, 0->2, 1->2","codeLang":"text","options":["The cyclic graph `0->1, 1->2, 2->0`, where the two-state check misses the back edge entirely.","A disconnected graph with two components, because `visited[]` is shared across DFS roots and conflates them.","Any graph with a self-loop `v->v`, because a boolean array cannot represent self-loops at all.","The DAG `0->1, 0->2, 1->2`: DFS visits 0, then 1, then 2 (now visited); back at 0 it follows `0->2`, sees 2 already visited, and wrongly declares a cycle though the graph is acyclic."],"answer":3,"explanation":"The source warns a two-state visited check cannot tell a back edge (into a vertex still on the recursion stack, a real cycle) from a cross/forward edge (into an already-finished vertex, not a cycle). In `0->1, 0->2, 1->2`, vertex 2 finishes before 0 follows its edge `0->2`; that forward/cross edge into a finished-but-visited vertex triggers a false positive. Option 2 is wrong: a self-loop is a genuine cycle, so flagging it is correct, not a false positive. Option 3 describes a graph that truly has a cycle, so reporting one is correct, not false. Option 4 is wrong: components are handled by only starting DFS from unvisited roots, and sharing `visited[]` across roots does not invent edges between components."},{"id":"graphs-h03","topic":"Graphs","slug":"graphs","difficulty":"hard","tags":["template","pitfall"],"question":"In the Rotting Oranges multi-source BFS, the inner loop drains exactly one layer with `for (int i = q.Count; i > 0; i--)` before incrementing `minutes`, and the outer loop condition is `q.Count > 0 && fresh > 0`. A teammate rewrites the layer drain as `for (int i = 0; i \u003c q.Count; i++)`. Why is this rewrite incorrect?","code":"while (q.Count > 0 && fresh > 0)\n{\n    minutes++;\n    for (int i = 0; i \u003c q.Count; i++)   // rewritten line\n    {\n        var (r, c) = q.Dequeue();\n        // ... enqueue freshly-rotted neighbors into q ...\n    }\n}","codeLang":"csharp","options":["The rewrite throws an exception because `q.Count` cannot be read while iterating a `Queue\u003cT>` in C#.","`q.Count` is re-evaluated every iteration, and because the loop enqueues newly-rotted neighbors into the same queue, the bound grows mid-loop and the pass no longer drains exactly one BFS layer, corrupting the minute count.","The rewrite under-drains by one element every layer due to the `\u003c` versus `>` comparison, so it terminates one minute early.","The rewrite is correct and equivalent; capturing `q.Count` up front versus re-reading it each iteration makes no difference because dequeues and enqueues cancel out."],"answer":1,"explanation":"The original caches the frontier size in `i = q.Count` so it dequeues exactly the current layer; the source notes the loop must 'drain exactly one layer.' The rewrite re-evaluates `q.Count` each iteration while the body enqueues newly-rotted cells, so the moving upper bound lets the same `minutes++` pass consume cells from later layers, breaking the layer-by-layer distance count. Option 2 is wrong because enqueues happen inside the loop, so dequeues and enqueues do not cancel and `q.Count` is not stable. Option 3 invents an off-by-one from the comparison direction, which is not the issue. Option 4 is wrong: reading `Count` during dequeues is perfectly legal on `Queue\u003cT>`."},{"id":"graphs-h04","topic":"Graphs","slug":"graphs","difficulty":"hard","tags":["complexity","comparisons"],"question":"A reviewer says a union-find with path compression and union by size answers `m` connectivity queries on `n` elements in `O(m·α(n))` amortized time, which is asymptotically faster than the `O(m·log n)` of a version that uses union by size but omits path compression. Which justification for the difference is correct?","code":"","codeLang":"","options":["With BOTH optimizations, operations are `O(α(n))` amortized (inverse Ackermann, ≤ 4 in practice); with only ONE optimization, the bound is `O(log n)` per operation, so combining both is strictly better than either alone.","Both versions are `O(m·log n)`; the `α(n)` bound is a heuristic average for random inputs, not an amortized worst-case guarantee.","Union by size alone already gives `O(α(n))`; path compression only reduces the constant factor and does not change the asymptotic class.","Path compression alone gives `O(1)` worst-case per operation, so it dominates and union by size becomes irrelevant."],"answer":0,"explanation":"The source states that with both path compression and union by rank/size, operations run in `O(α(n))` amortized (α is inverse Ackermann, ≤ 4 for any practical n), and explicitly that this is near-O(1) but NOT O(log n), which is what a single optimization gives. Option 2 is wrong: path compression alone is not O(1) worst-case, and the source ties the near-constant bound to having both optimizations. Option 3 inverts the claim: one optimization alone yields O(log n), not O(α(n)). Option 4 is wrong: α(n) is a proven amortized worst-case bound, not a random-input heuristic."},{"id":"graphs-h05","topic":"Graphs","slug":"graphs","difficulty":"hard","tags":["template","pitfall"],"question":"In Kahn's algorithm for Course Schedule II, prerequisites are given as `p = [course, prereq]`. The code builds edges with `adj[p[1]].Add(p[0]); indeg[p[0]]++;`. A student instead writes `adj[p[0]].Add(p[1]); indeg[p[1]]++;`. On the input below, what does the student's reversed-edge version produce, and why?","code":"numCourses = 3\nprerequisites = [[1,0],[2,1]]   // take 0 before 1, take 1 before 2","codeLang":"text","options":["It outputs `[0, 1, 2]`, identical to the correct version, because Kahn's algorithm is direction-agnostic.","It outputs `[2, 1, 0]` — a full ordering of all 3 vertices, but it is the REVERSE of a valid course order, so it violates the prerequisites even though no cycle is detected.","It throws an index-out-of-range exception because `indeg[p[1]]` accesses an uninitialized prerequisite slot.","It outputs an empty array because reversing the edges introduces a cycle that Kahn's algorithm rejects."],"answer":1,"explanation":"The correct edges are prereq->course (`0->1, 1->2`), giving in-degrees `0:0,1:1,2:1` and order `[0,1,2]`. The student's reversed edges are `1->0, 2->1`, giving in-degrees `0:1,1:1,2:0`; Kahn seeds with the only in-degree-0 vertex, 2, then 1 (after `2->1` decrements it), then 0, emitting `[2,1,0]`. That is all 3 vertices (still acyclic, so no empty result) but it is the reverse of a legal order and would have you take course 2 before its prerequisites. Option 2 is wrong: reversing every edge of a DAG yields another DAG, never a cycle. Option 3 is wrong: Kahn's depends entirely on edge direction via in-degrees, so the output differs. Option 4 is wrong: all indices `0..numCourses-1` are valid array slots, so no exception occurs."},{"id":"greedy-e01","topic":"Greedy","slug":"greedy","difficulty":"easy","tags":["definition","invariant"],"question":"What characterizes a greedy algorithm's choice at each step?","code":"","codeLang":"","options":["It picks a random valid choice to avoid worst-case inputs","It backtracks whenever a chosen path later turns out worse","It explores every possible choice and memoizes overlapping subproblems","It makes an irrevocable, locally optimal choice and never reconsiders it"],"answer":3,"explanation":"The source defines a greedy algorithm as one that builds a solution by making the choice that looks best right now -- the locally optimal, irrevocable move -- without ever reconsidering. The second option (explore every choice + memoize overlap) describes dynamic programming, which the reviewer explicitly contrasts with greedy. The third option (backtracks) describes backtracking/brute force, which greedy specifically does NOT do. The fourth option (random choice) is not greedy at all; greedy is deterministic and driven by a local optimality criterion, not randomization."},{"id":"greedy-e02","topic":"Greedy","slug":"greedy","difficulty":"easy","tags":["complexity","kadane"],"question":"What are the time and space complexities of Kadane's algorithm (LC 53, maximum subarray)?","code":"","codeLang":"","options":["`O(n log n)` time, `O(1)` space","`O(n)` time, `O(1)` space","`O(n)` time, `O(n)` space","`O(n^2)` time, `O(n)` space"],"answer":1,"explanation":"The reviewer states Kadane runs in `O(n)` time and `O(1)` space: a single pass maintaining just `cur` and `best`, with no extra structure. The `O(n log n)` option wrongly assumes a sort step, but Kadane never sorts. The `O(n^2)`/`O(n)` option describes a naive all-pairs subarray scan, which Kadane avoids. The `O(n)` space option is wrong because the DP table is collapsed to a single running variable, leaving constant extra space."},{"id":"greedy-e04","topic":"Greedy","slug":"greedy","difficulty":"easy","tags":["template","when-to-apply"],"question":"For interval scheduling (LC 435, keep the maximum number of non-overlapping intervals), which sort key makes the greedy sweep provably optimal?","code":"","codeLang":"","options":["Sort by start time ascending, then keep each interval whose start is at or after the last kept end","Sort by interval length ascending, keeping the shortest intervals first","Sort by start time descending, keeping the latest-starting intervals first","Sort by end time ascending, then keep each interval whose start is at or after the last kept end"],"answer":3,"explanation":"The reviewer's safe greedy is to sort by end time ascending and keep each interval with `start >= lastEnd`; the earliest-finishing interval leaves the most room, certified by an exchange argument. Sorting by start time is explicitly called out as defeatable by a single long interval that starts early and blocks many others. Sorting by length is not the documented key and can keep a short interval that overlaps two others that could both have fit. Start time descending reverses the relevant ordering entirely and has no correctness argument behind it."},{"id":"greedy-m01","topic":"Greedy","slug":"greedy","difficulty":"medium","tags":["when-to-apply","pitfall"],"question":"You must make amount `6` using coins `{1, 3, 4}` with the fewest coins. A teammate proposes the standard greedy: repeatedly take the largest coin that fits. What does greedy return, and is it correct here?","code":"","codeLang":"","options":["Greedy returns 3 coins (`4 + 1 + 1`), but the optimum is 2 coins (`3 + 3`), so greedy is wrong; this denomination set needs DP.","Greedy returns 3 coins and that is optimal, because no combination of these coins can make 6 in fewer than 3 coins.","Greedy returns 2 coins (`3 + 3`), matching the optimum, because taking the largest coin is always optimal for any denomination set.","Greedy returns `-1` because after taking the `4` the remaining `2` cannot be formed without revisiting earlier choices."],"answer":0,"explanation":"Largest-first greedy takes `4`, then is stranded with remaining `2`, which it pays as `1 + 1`, giving 3 coins; but `3 + 3` makes 6 in only 2 coins, so greedy is suboptimal. Greedy coin change is optimal only for canonical coin systems, and arbitrary sets like `{1,3,4}` break it, requiring DP (`dp[a] = 1 + min over c of dp[a-c]`). The second option is wrong: largest-first does NOT yield `3+3` and is not always optimal. The third option is wrong: `3+3` is a valid 2-coin solution, so 3 is not the minimum. The fourth option is wrong: remaining `2` is reachable as `1+1`, so greedy returns a (suboptimal) answer, never `-1`."},{"id":"greedy-m02","topic":"Greedy","slug":"greedy","difficulty":"medium","tags":["template","invariant"],"question":"For LC 435 (Non-overlapping Intervals) on `intervals = [[1,2], [2,3], [3,4], [1,3]]`, you sort by end time ascending and keep each interval whose `start >= lastEnd`. Treating touching endpoints as compatible, how many intervals must be removed?","code":"","codeLang":"","options":["2 — keep only `[1,2]` and `[3,4]`, since any interval starting before the previous one ended must be removed.","1 — sorted order is `[1,2] [1,3] [2,3] [3,4]`; keep `[1,2]`, skip `[1,3]`, keep `[2,3]` and `[3,4]`, so 3 of 4 are kept.","1 — sort by start time, keep `[1,2]`, then skip `[2,3]` and `[3,4]`, keeping `[1,3]` instead.","0 — all four intervals are mutually compatible once sorted by end time, so nothing needs removing."],"answer":1,"explanation":"Sorting by end gives `[1,2] [1,3] [2,3] [3,4]`. Keep `[1,2]` (lastEnd=2); `[1,3]` has start `1 \u003c 2` so it overlaps and is dropped; `[2,3]` has start `2 >= 2` so keep (lastEnd=3); `[3,4]` has start `3 >= 3` so keep. Kept=3 of 4, so removals = 1. The '2 removals' option wrongly drops `[2,3]`: with the `start >= lastEnd` touching-compatible rule, `[2,3]` is kept. The '0 removals' option is wrong: `[1,3]` genuinely overlaps `[1,2]`, so at least one removal is required. The start-time-sort option is wrong: that key is explicitly warned against in the source as defeatable by the long `[1,3]` and is not the correct greedy key."},{"id":"greedy-m03","topic":"Greedy","slug":"greedy","difficulty":"medium","tags":["invariant","pitfall"],"question":"In the Gas Station single-pass greedy (LC 134), when the running `tank` drops below 0 at station `i`, the code sets `start = i + 1` and resets `tank = 0`. Why is it safe to skip every candidate start in `[start..i]` all at once rather than just incrementing `start` by one?","code":"","codeLang":"","options":["Because if you ran dry from `start` to `i`, every intermediate station `j` in that range arrived with even less accumulated surplus, so none of them can complete the loop either.","Because resetting `tank` to 0 discards the deficit, and a fresh tank is only valid from an index whose own `gas[i] - cost[i]` is non-negative.","Because stations in `[start..i]` are guaranteed to have `gas[j] \u003c cost[j]` individually, so they can never be a valid starting point.","Because the circular array means any start in `[start..i]` is equivalent to start `i+1` after one full rotation, so they are interchangeable."],"answer":0,"explanation":"The exchange/greedy-choice justification is that any intermediate start `j` in `[start..i]` is reached with a surplus no larger than what `start` accumulated, so if `start` couldn't survive to `i`, neither can `j` — the whole prefix can be abandoned in one jump. The second option is wrong: individual stations can have positive `gas[j]-cost[j]`; the range is skipped due to cumulative deficit, not per-station deficit. The third option is wrong and incoherent: starts in `[start..i]` are not interchangeable with `i+1`; that is precisely why they are eliminated. The fourth option is wrong: the algorithm does not require the new start's own diff to be non-negative — feasibility is guaranteed only by the separate `sum(gas) >= sum(cost)` check."},{"id":"greedy-m04","topic":"Greedy","slug":"greedy","difficulty":"medium","tags":["template","complexity"],"question":"Consider the Jump Game II greedy below for `nums = [2, 3, 1, 1, 4]`. What does it return, and why does the loop stop at `i \u003c nums.Length - 1` instead of `i \u003c nums.Length`?","code":"int jumps = 0, curEnd = 0, farthest = 0;\nfor (int i = 0; i \u003c nums.Length - 1; i++)\n{\n    farthest = Math.Max(farthest, i + nums[i]);\n    if (i == curEnd)\n    {\n        jumps++;\n        curEnd = farthest;\n    }\n}\nreturn jumps;","codeLang":"csharp","options":["Returns 2; the bound `n-1` exists purely to prevent an out-of-bounds read of `nums[i]`, not to affect the jump count.","Returns 2; the last index needs no jump from it, so looping to `n-1` avoids a phantom extra increment when `i` would land exactly on the goal.","Returns 1; standing on the last index counts as already arrived, so only the first boundary expansion is ever charged a jump.","Returns 3; looping to `n-1` is an off-by-one bug that undercounts, but the correct answer for this input happens to be 3."],"answer":1,"explanation":"Tracing: i=0 sets farthest=2 and (i==curEnd=0) jumps=1, curEnd=2; i=1 farthest=4; i=2 (i==curEnd=2) jumps=2, curEnd=4; i=3 nothing; loop ends, return 2. The bound `i \u003c n-1` is correct because once you can reach the last index no further jump is needed; iterating to the last index could trigger an extra `i == curEnd` and over-count. The 'returns 3' option is wrong: the answer is 2, not 3, and `n-1` is intentional, not a bug. The 'bounds safety' option is wrong: with `i \u003c n-1` the access `nums[i]` is never out of bounds anyway; the bound's purpose is avoiding the phantom jump, not bounds safety. The 'returns 1' option is wrong: the boundary is reached twice (at i=0 and i=2), charging two jumps, so it returns 2 not 1."},{"id":"greedy-m05","topic":"Greedy","slug":"greedy","difficulty":"medium","tags":["pitfall","invariant"],"question":"A candidate writes Kadane for LC 53 but initializes `int best = 0` instead of `best = nums[0]`. On the all-negative input `nums = [-3, -1, -2]`, what does this buggy version return, and what is the correct answer?","code":"int best = 0, cur = nums[0];\nfor (int i = 1; i \u003c nums.Length; i++)\n{\n    cur = Math.Max(nums[i], cur + nums[i]);\n    best = Math.Max(best, cur);\n}\nreturn best;","codeLang":"csharp","options":["It returns `-6`, the sum of the whole array, because every prefix stays negative and is never reset.","It returns `-1`, the correct answer, because `cur` is still seeded to `nums[0]` so the bug is harmless here.","It returns `0` (an empty subarray), but the correct answer is `-1`, the largest single element.","It throws an exception because `best` can never become non-negative on an all-negative array."],"answer":2,"explanation":"Maximum Subarray requires a non-empty subarray, so for `[-3,-1,-2]` the answer is the largest single element `-1`. Tracing the buggy code: `cur` starts at `-3`; i=1 `cur = max(-1, -4) = -1`, `best = max(0, -1) = 0`; i=2 `cur = max(-2, -3) = -2`, `best = max(0, -2) = 0`; it returns `0`, wrongly claiming an empty subarray. That is exactly why the source insists on `best = cur = nums[0]`. The '-1, harmless' option is wrong: seeding `best = 0` clamps the result to at least 0, so the bug is NOT harmless on all-negative input. The '-6' option is wrong: Kadane resets `cur` whenever extending hurts, so it never sums the whole array here. The 'throws' option is wrong: nothing in the code can throw; it simply returns the clamped `0`."},{"id":"greedy-h01","topic":"Greedy","slug":"greedy","difficulty":"hard","tags":["pitfall","invariant"],"question":"A candidate solving LC 134 (Gas Station) replaces the final check `return total >= 0 ? start : -1;` with `return tank >= 0 ? start : -1;`, reasoning that if the tank is non-negative at the end, the chosen `start` must complete the loop. Why is this change incorrect?","code":"","codeLang":"","options":["The trip is feasible iff `tank == 0` exactly at the end; using `>=` would accept starts that leave leftover fuel, which violates the circular constraint.","`tank` is reset to `0` every iteration regardless of sign, so at the end it always equals exactly `gas[n-1] - cost[n-1]`, making the comparison meaningless.","After the last reset, `tank` only accumulates surplus from `start` to the end of the array; it never measures the wrap-around from index `0` to `start`, so `tank >= 0` can hold even when total fuel is insufficient to complete the full circle.","`tank` can overflow `int` on large inputs while `total` cannot, so only `total` gives a safe comparison."],"answer":2,"explanation":"The source states feasibility is decided by the GLOBAL accumulator: the trip is possible iff `sum(gas) >= sum(cost)`, tracked by `total`. After the last reset, `tank` only sums surpluses from the surviving `start` through the final index — it never includes the segment from `0` up to `start`, so a non-negative `tank` does not prove the whole circle is fuel-feasible. The second option is false: `tank` is reset to `0` only when it goes negative, not every iteration, so it is not simply the last diff. The third option invents a constraint — feasibility needs total surplus `>= 0`, not exactly `0`; leftover fuel is fine. The fourth option is a red herring: both accumulators sum the same diffs and have the same overflow profile, and overflow is not why the substitution fails."},{"id":"greedy-h02","topic":"Greedy","slug":"greedy","difficulty":"hard","tags":["template","trace"],"question":"This is the LC 45 (Jump Game II) greedy from the reviewer, but the loop bound was changed from `i \u003c nums.Length - 1` to `i \u003c nums.Length`. For the input shown, what does the function return, and why does the off-by-one matter here?","code":"static int Jump(int[] nums) {\n    int jumps = 0, curEnd = 0, farthest = 0;\n    for (int i = 0; i \u003c nums.Length; i++) {   // BUG: should be nums.Length - 1\n        farthest = Math.Max(farthest, i + nums[i]);\n        if (i == curEnd) { jumps++; curEnd = farthest; }\n    }\n    return jumps;\n}\n// nums = [2, 3, 1, 1, 4]   (correct answer is 2)","codeLang":"csharp","options":["Returns `3`: when `i` reaches the last index it equals `curEnd` (4) and triggers one extra phantom `jumps++`, overcounting by one.","Throws `IndexOutOfRangeException`: `i + nums[i]` reads past the array on the final iteration.","Returns `2`: the guard `i == curEnd` is false at the last index, so the extra iteration changes nothing.","Returns `4`: every index satisfies `i == curEnd` once `curEnd` saturates, so each iteration increments `jumps`."],"answer":0,"explanation":"The reviewer explains the loop must run to `i \u003c n - 1` because standing on the last index needs no further jump; running to `i \u003c n` lets `i` reach the last index where `i == curEnd` is true again, adding a phantom increment. Tracing `[2,3,1,1,4]`: at i=0 jumps=1 curEnd=2; at i=2 jumps=2 curEnd=4; the buggy extra iteration at i=4 sees i==curEnd==4 and does jumps=3 — so it returns 3. The 'returns 2' option is wrong because the guard IS satisfied at the last index (curEnd became 4). The 'returns 4' option misreads the mechanic: `i == curEnd` fires only when `i` hits the boundary, not on every saturated iteration. The 'throws' option is wrong: `i + nums[i]` indexes into `nums[i]` which is in-bounds for all valid `i`; there is no out-of-bounds read."},{"id":"greedy-h03","topic":"Greedy","slug":"greedy","difficulty":"hard","tags":["when-to-apply","complexity"],"question":"You must choose between a greedy sweep and a DP table for four problems. Using the reviewer's greedy-vs-DP litmus test (can a hand-built counter-example beat the locally optimal choice?), which problem genuinely REQUIRES DP rather than a correct greedy?","code":"","codeLang":"","options":["Jump Game II (LC 45), minimizing the number of jumps to reach the last index.","Non-overlapping Intervals (LC 435), removing the fewest intervals so the rest are compatible.","Maximum Subarray (LC 53), finding the largest contiguous sum.","Coin Change (LC 322) with denominations `[1, 3, 4]` for amount `6`, minimizing coin count."],"answer":3,"explanation":"The reviewer presents Coin Change with arbitrary denominations as THE canonical greedy failure: for `[1,3,4]` and `6`, greedy takes `4+1+1=3` coins but the optimum is `3+3=2`, and the irrevocable first choice strands it — so DP (`dp[a]=1+min over coins of dp[a-c]`) is required. Non-overlapping Intervals is a valid greedy: sort by end time and keep compatible intervals, justified by an exchange argument, `O(n log n)`. Jump Game II is a valid greedy: BFS-like levels with `curEnd`/`farthest`, justified by stays-ahead, `O(n)`. Maximum Subarray (Kadane) is a one-variable DP that runs as a correct `O(n)` greedy keep-or-reset sweep. Only Coin Change with arbitrary denominations can be beaten by a counter-example, making DP mandatory."},{"id":"greedy-h04","topic":"Greedy","slug":"greedy","difficulty":"hard","tags":["complexity","when-to-apply"],"question":"For LC 846 (Hand of Straights), the reviewer's greedy anchors each run at the smallest remaining card using a `SortedDictionary\u003cint,int>` of counts, giving `O(n log k)` time with `k` distinct cards. Which statement about WHY this complexity holds and why the greedy choice is safe is correct?","code":"","codeLang":"","options":["The smallest remaining card cannot be preceded by anything smaller, so it must begin some run; each distinct card is inserted and removed once from the ordered map at `O(log k)` per operation, yielding `O(n log k)`.","The greedy needs the largest remaining card as each run's anchor; the `log k` factor is the cost of a binary search over the `k` group positions for every one of the `n` cards.","Because each of the `n` cards may be probed against all `k` distinct keys, the true time is `O(n·k)`, and `O(n log k)` only holds when `groupSize` is `1`.","Anchoring at the smallest card is a heuristic with no correctness guarantee; the `O(n log k)` bound comes from sorting the entire hand first before sweeping."],"answer":0,"explanation":"The reviewer's greedy-choice justification is exactly that nothing smaller can precede the smallest remaining card, so it must start a run — committing it is always safe. The complexity is `O(n log k)` because each distinct card is inserted once and removed once from the ordered count map, each operation `O(log k)`. The 'heuristic' option is wrong on both counts: the choice is provably safe (not a mere heuristic), and the `log k` comes from ordered-map operations, not a separate full sort. The 'largest card' option inverts the anchor — runs start at the SMALLEST card (consuming card, card+1, ...), not the largest. The 'O(n·k)' option confuses the bound: consuming `groupSize` consecutive cards is `O(groupSize log k)` map work amortized across removals, and the total is `O(n log k)` for any `groupSize`, not `O(n·k)`."},{"id":"hash-tables-e01","topic":"Hash Tables","slug":"hash-tables","difficulty":"easy","tags":["complexity"],"question":"For a hash table with a uniform hash function and a bounded fill factor, what is the average-case time complexity of Find, and what is the worst-case time complexity?","code":"","codeLang":"","options":["Average `O(1)`, worst case `O(n)`","Average `O(n)`, worst case `O(n log n)`","Average `O(1)`, worst case `O(1)`","Average `O(log n)`, worst case `O(n)`"],"answer":0,"explanation":"The reviewer's complexity summary states Find is O(1) average and O(n) worst case: average O(1) holds when a uniform hash spreads keys and short chains keep each lookup touching about one entry, while the worst case is when all keys collide into a single chain of length n. Option 2 (O(log n) average) describes a balanced tree map, not a hash table. Option 3 (O(1) worst case) ignores the adversarial all-keys-collide case the reviewer stresses is real. Option 4 (O(n) average) confuses the degenerate worst case with the typical case."},{"id":"hash-tables-e02","topic":"Hash Tables","slug":"hash-tables","difficulty":"easy","tags":["when-to-apply","collisions"],"question":"In separate chaining, what does each slot of the backing array hold to resolve collisions?","code":"","codeLang":"","options":["The head of a linked list of entries that hashed to that index","A balanced binary search tree of all keys in the table","A sorted array of every key, searched by binary search","A single key/value pair, with extra keys probed into nearby slots"],"answer":0,"explanation":"The reviewer defines separate chaining as storing, at each array slot, the head of a linked list of entries that hashed there; each node is a HashTableEntry holding Key, Value, and Next. Option 2 describes open addressing (probing into nearby slots), the contrasting strategy, not chaining. Option 3 (a BST per bucket) is a different scheme not used here. Option 4 (a sorted array searched by binary search) is neither chaining nor how buckets work; chains are walked linearly comparing keys with Equals."},{"id":"hash-tables-e03","topic":"Hash Tables","slug":"hash-tables","difficulty":"easy","tags":["invariant","pitfall"],"question":"Which property of a hash function does seeding it with `DateTime.Now` violate, and what is the consequence?","code":"","codeLang":"","options":["Stability: the same key hashes differently each call, so stored entries become unfindable","Security: an attacker can invert the hash to recover the input","Uniformity: keys clump into a few slots, lengthening chains","Amortization: resizes stop spreading their cost over many inserts"],"answer":0,"explanation":"Seeding with DateTime.Now makes Hash(\"foo\") return a different value over time, breaking stability (same input must always produce the same output); the entry is stored under one index and searched for under another, so it becomes permanently unreachable. Option 2 (uniformity) is about even spread across slots, a separate property unaffected by clock seeding. Option 3 (security) concerns non-invertibility for password hashing, not findability in a lookup table. Option 4 (amortization) describes geometric resizing cost and has nothing to do with the hash function's determinism."},{"id":"hash-tables-m01","topic":"Hash Tables","slug":"hash-tables","difficulty":"medium","tags":["resizing","complexity"],"question":"A hash table has capacity 10, fill factor 0.80, and growth factor 1.50. It currently holds 8 entries, and you insert a 9th. Which statement correctly describes what happens and the cost of this specific insert?","code":"","codeLang":"","options":["It resizes to capacity 15 and rehashes every entry, so this insert is O(n); inserts still amortize to O(1)","It does not resize because 9 is still below capacity 10; the insert is O(1)","It resizes to capacity 15 but only the new entry is hashed into the new array, so the insert stays O(1)","It resizes to capacity 20 by doubling and copies the array with a memcpy, so the insert is O(1)"],"answer":0,"explanation":"The growth threshold is capacity x fill factor = 10 x 0.80 = 8; inserting the 9th makes count 9, which exceeds 8, so the table resizes. New capacity = oldCapacity x growthFactor = 10 x 1.50 = 15. Because the index is Hash(key) % length and length changed, every existing entry must be re-indexed, making this insert O(n), though geometric growth amortizes inserts to O(1). Option 2 is wrong because resize cannot just place the new entry; all old entries' indices change with the new length. Option 3 is wrong because the trigger is the fill-factor threshold (8), not reaching full capacity. Option 4 is wrong because this table uses a 1.50 growth factor (giving 15), not doubling, and a rehash is not a memcpy since indices must be recomputed."},{"id":"hash-tables-m02","topic":"Hash Tables","slug":"hash-tables","difficulty":"medium","tags":["pitfall","invariant"],"question":"A team stores objects in a `Dictionary\u003cMyKey, V>` where `MyKey` overrides `GetHashCode`/`Equals` over a `Name` field. After inserting an entry, code mutates `key.Name`, then calls `ContainsKey(key)` with that same object and gets `false`, even though the entry is still in the table. What is the root cause?","code":"","codeLang":"","options":["Mutating `Name` changed the key's hash, so `ContainsKey` probes the new bucket while the entry still sits in the old one, making it unreachable","`GetHashCode` is only consulted on insertion, so a mutated key has no effect and the false result must be a comparer bug","`ContainsKey` requires the key to also override `==`, and without it the lookup always returns false","The dictionary silently removed the entry when the key's field changed, so it is genuinely gone"],"answer":0,"explanation":"The entry was placed in the bucket for the original hash of Name. Mutating Name changes GetHashCode, so ContainsKey computes a new index and looks in a different bucket, never visiting the old slot where the entry still lives; the entry is stranded and unreachable. This is the mutable-key trap and the runtime echo of the stability requirement. Option 2 is wrong: Dictionary uses GetHashCode/Equals (or the comparer), not operator ==. Option 3 is wrong: the dictionary does not observe or react to field mutations, so it removes nothing. Option 4 is wrong: GetHashCode is recomputed on lookup too, which is exactly why the mutated key routes to the wrong bucket."},{"id":"hash-tables-m03","topic":"Hash Tables","slug":"hash-tables","difficulty":"medium","tags":["open-addressing","pitfall"],"question":"An open-addressing table using linear probing deletes entries by setting the slot to empty (null). After a sequence of inserts and deletes, `Find` begins reporting some present keys as missing. Why does deleting to empty break correctness, and what is the standard fix?","code":"","codeLang":"","options":["Setting a slot to null corrupts the backing array length, so the modulo produces out-of-range indices; fix by recomputing capacity on every delete","A `Find` probing through the now-empty slot stops early and concludes the key is absent, even though a colliding key was inserted further along the probe sequence; fix with tombstones that say 'deleted, keep probing'","Linear probing cannot support deletion at all, so the table must switch to separate chaining; fix by migrating every bucket to a linked list","Emptying a slot lowers the load factor below the minimum, forcing an immediate shrink that loses entries; fix by disabling shrinking"],"answer":1,"explanation":"In open addressing, Find walks the probe sequence until it hits an empty slot, which it interprets as 'key not present.' If a deletion empties a slot that lies on the probe path of a key inserted after that deletion, Find stops early at the empty slot and misses the still-present key. The fix is a tombstone: mark the slot 'deleted, keep probing' so Find continues past it while Insert may reuse it; accumulated tombstones are cleared by an occasional rehash. Option 2 is wrong: nulling a slot does not change the array length or the modulo range. Option 3 is wrong: open addressing supports deletion fine via tombstones, with no need to switch to chaining. Option 4 is wrong: the bug is the early-stopping probe, not any load-factor-driven shrink."},{"id":"hash-tables-m04","topic":"Hash Tables","slug":"hash-tables","difficulty":"medium","tags":["trace","collision"],"question":"Using the separate-chaining `Add` below (which prepends new entries as the chain head), the keys `\"foo\"`, `\"oof\"`, and `\"ofo\"` all have an additive hash of 324, and 324 % 4 = 0. After `Add(\"foo\",1)`, `Add(\"oof\",2)`, `Add(\"ofo\",3)` run in that order, what does the chain at slot 0 look like from head to tail?","code":"uint i = Index(key);\nfor (var e = _table[i]; e != null; e = e.Next)\n    if (Equals(e.Key, key)) { e.Value = value; return; }\n// not found: prepend as new head\n_table[i] = new Entry { Key = key, Value = value, Next = _table[i] };","codeLang":"csharp","options":["ofo -> foo -> oof","foo -> ofo -> oof","ofo -> oof -> foo","foo -> oof -> ofo"],"answer":2,"explanation":"All three keys collide at slot 0, and each distinct key is not found in the chain, so Add prepends it as the new head, pointing Next at the previous head. After Add(\"foo\") the chain is foo. After Add(\"oof\") it is oof -> foo. After Add(\"ofo\") it is ofo -> oof -> foo. Option 2 reverses the order, which would be the result of appending to the tail rather than prepending. Options 3 and 4 scramble the order in ways that no single-direction insertion produces; prepending strictly reverses insertion order, giving the most-recently-added key at the head."},{"id":"hash-tables-m05","topic":"Hash Tables","slug":"hash-tables","difficulty":"medium","tags":["hash-function","uniformity"],"question":"You must hash short strings for an in-memory `Dictionary` and want good uniformity so chains stay short, with no need for cryptographic security. Among an additive sum-of-bytes hash, djb2 (`hash = hash*33 + c` from 5381), and SHA-256, which choice is best and why?","code":"","codeLang":"","options":["djb2, because it gives good uniformity with very little work, while the additive hash collides anagrams and SHA-256 adds cryptographic cost the table does not need","The additive hash, because summing bytes is the fastest and uniformity does not affect chain length","SHA-256, because only a cryptographic hash can keep buckets short in a lookup table","The additive hash, because its 32-bit output guarantees a unique slot for each distinct string"],"answer":0,"explanation":"djb2 mixes bits via the odd multiplier 33, achieving good uniformity with minimal work, which keeps chains short and the O(1) average real; it is stable and fast but not secure, which is fine for an in-memory table. The additive hash has poor uniformity, anagrams like \"foo\"/\"oof\"/\"ofo\" all sum to the same value and collide, so option 2 is wrong since uniformity directly drives chain length. Option 3 is wrong because security is irrelevant to bucket length and SHA-256 just adds needless cost. Option 4 is wrong because no fixed-size hash guarantees unique slots; the modulo step forces pigeonhole collisions once entries exceed slots, and a poor hash collides even before that."},{"id":"hash-tables-h01","topic":"Hash Tables","slug":"hash-tables","difficulty":"hard","tags":["complexity","template","amortized"],"question":"A from-scratch chaining table uses `FillFactor = 0.75` and `GrowthFactor = 2.0`, with capacity always a power of two. It currently has capacity 8 and holds 5 entries. A caller does `Add` of a brand-new key, then immediately a second `Add` of another brand-new key. Using the source's growth rule `_count + 1 > capacity * fillFactor` (a strict `>`, checked before each insert), what happens on each insert, and what is the cost of the SECOND `Add`?","code":"private void AddWithGrowth(TKey key, TValue value)\n{\n    if (_count + 1 > _table.Length * FillFactor) // 0.75\n        Resize((int)(_table.Length * GrowthFactor)); // x2\n    Add(key, value);\n    _count++;\n}","codeLang":"csharp","options":["Both `Add`s resize because each crosses the 0.75 threshold, so the second `Add` rehashes to capacity 32 and costs O(n).","The first `Add` resizes to capacity 16 because 6 > 6.0, so the second `Add` runs against capacity 16 with no resize and costs O(1).","Neither `Add` resizes because count never reaches full capacity 8, so both inserts cost O(1) and capacity stays 8.","The first `Add` does not resize (6 > 6.0 is false); the second `Add` does resize to capacity 16 (7 > 6.0 is true), so the second `Add` itself costs O(n) for the rehash, though it amortizes to O(1)."],"answer":3,"explanation":"Before the first Add, `_count` is 5, so `5 + 1 = 6 > 8*0.75 = 6.0` is FALSE (6 is not strictly greater than 6.0), so no resize; the entry inserts and count becomes 6. Before the second Add, `_count` is 6, so `6 + 1 = 7 > 6.0` is TRUE, triggering a resize to `8*2.0 = 16` before the chaining insert; rehashing every entry makes that second Add O(n), which amortizes to O(1) over many inserts. Option 2 is wrong because it treats `6 > 6.0` as true, ignoring the strict inequality. Option 3 is wrong because it ignores the fill-factor threshold entirely and assumes resize happens only at full capacity. Option 4 is wrong because only the second insert crosses the threshold and the growth factor is 2.0, giving capacity 16, not 32."},{"id":"hash-tables-h02","topic":"Hash Tables","slug":"hash-tables","difficulty":"hard","tags":["open-addressing","pitfall","invariant"],"question":"In a linear-probing table, keys `A`, `B`, `C` all hash to index 3 and were inserted in that order, occupying slots 3, 4, 5. A program deletes `B` by marking slot 4 as a tombstone (not Free), then inserts a new key `D` that also hashes to index 3. Per the source's open-addressing rules, where does `D` go, and why does a tombstone (rather than setting slot 4 to Free) keep a later `Find(C)` correct?","code":"// State before inserting D (all hash to index 3):\n// slot 3: Occupied(A)\n// slot 4: Tombstone   \u003c- B was deleted\n// slot 5: Occupied(C)\nAddOpen(D); // Hash(D) % len == 3","codeLang":"text","options":["`D` is placed in slot 4, reusing the first tombstone seen after confirming `D` is absent; a tombstone tells `Find(C)` to keep probing past slot 4, whereas a Free slot there would make `Find(C)` stop early and miss `C` at slot 5.","`D` is placed in slot 4 only if the table has no Free slot anywhere; otherwise `D` takes the first Free slot and tombstones have no effect on `Find(C)`.","`D` is placed in slot 3, overwriting `A`, because a tombstone earlier in the probe sequence marks the whole run as reclaimable.","`D` is placed in slot 6, the first Free slot after the run; `Find(C)` works only because `Find` treats tombstones the same as Free slots."],"answer":0,"explanation":"Per the source's AddOpen sketch, the loop remembers the first tombstone but keeps probing until it reaches a Free slot (to be sure D is not already present), then writes D to the remembered tombstone, slot 4. For Find(C): if slot 4 were Free instead of a tombstone, a probe from index 3 would hit Free at slot 4 and stop, wrongly reporting C absent even though C sits at slot 5; the tombstone means 'keep probing,' so Find continues and finds C. Option 2 is wrong because D reuses the tombstone slot, not the trailing Free slot, and Find must NOT treat a tombstone as Free (that is exactly the bug tombstones prevent). Option 3 is wrong because the algorithm prefers a seen tombstone over a Free slot, and tombstones are precisely what keep Find(C) correct. Option 4 is wrong because probing never overwrites an occupied, non-matching slot such as A."},{"id":"hash-tables-h03","topic":"Hash Tables","slug":"hash-tables","difficulty":"hard","tags":["contract","pitfall","invariant"],"question":"A `.NET` `Dictionary\u003cPoint,string>` uses a custom mutable `Point` key whose `GetHashCode` returns `X * 31 + Y` and whose `Equals` compares both `X` and `Y`. After `dict[p] = \"v\"`, a later `dict.ContainsKey(p)` on the SAME object reference returns false. Which single root cause matches the source's contract discussion, and what is the correct fix?","code":"var p = new Point { X = 1, Y = 2 };\ndict[p] = \"v\";\np.Y = 9;                 // some code path mutates Y\nbool found = dict.ContainsKey(p); // false","codeLang":"csharp","options":["An internal resize changed enumeration order, so `ContainsKey` searches the wrong slot; fix by pre-sizing the dictionary to the expected capacity.","The key was mutated after insertion, so it now hashes to a different bucket than the one holding its entry, stranding the entry; fix by making `Point` immutable (readonly fields / a record) and never mutating a key while it lives in the table.","`GetHashCode` and `Equals` disagree because one uses both fields and the other does not, violating the equal-keys-equal-hash rule; fix by making `Equals` compare only `X`.","`X * 31 + Y` overflows to a negative `int`, yielding a negative bucket index; fix by masking the hash with `& 0x7FFFFFFF` inside `GetHashCode`."],"answer":1,"explanation":"The trace mutates `p.Y` AFTER insertion. The entry was stored in the bucket for hash(1,2), but ContainsKey now computes hash(1,9), which maps to a different bucket, so the lookup never visits the slot holding the entry, making it unreachable; the source's mutable-key section names exactly this trap and prescribes effectively immutable keys. Option 2 is wrong because both methods consistently use X and Y, so there is no contract violation; weakening Equals to X-only would corrupt lookups for distinct Y values. Option 3 is wrong because .NET masks the signed hash to a non-negative index for any key, and the symptom is a stable key found-then-lost, not a crash or misindex. Option 4 is wrong because resizing re-indexes all entries consistently and never loses a stable key, and enumeration order is irrelevant to ContainsKey."},{"id":"heaps-e01","topic":"Heaps & Priority Queues","slug":"heaps","difficulty":"easy","tags":["complexity"],"question":"For a binary heap,
