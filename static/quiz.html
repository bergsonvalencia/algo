Index=1 the window 'abab' matches fully -> match at 1; last char text[4]='b' -> table['b']=2 -> startIndex=3. At startIndex=3 the window 'abab' matches -> match at 3; last char text[6]='b' -> shift 2 -> startIndex=5. The condition startIndex \u003c= length - m = 8 - 4 = 4 now fails, so the loop exits. Matches are at 1 and 3. Option 1 invents a phantom match at 5 where the window runs off the end. Option 2 applies wrong table values. Option 3 reflects the misconception that an in-pattern final character forces a shift of one, ignoring that table['b']=2."},{"id":"string-searching-h03","topic":"String Searching","slug":"string-searching","difficulty":"hard","tags":["complexity","comparison","when-to-apply"],"question":"A DNA pipeline repeatedly searches the 4-letter alphabet {A,C,G,T} for a fixed pattern inside extremely long, highly repetitive reads, and must hold a hard worst-case per-character bound regardless of input. Which algorithm choice and justification is correct?","code":"","codeLang":"","options":["Rabin-Karp: its rolling hash guarantees O(n + m) worst case, and a small alphabet drives the collision probability to zero","KMP: it scans left-to-right with a prefix/failure table, never re-examines a text character, and guarantees O(n + m) worst case even on repetitive small-alphabet input","Boyer-Moore-Horspool: the repetitive pattern yields a larger bad-match table, which guarantees sublinear ~O(n/m) behavior on exactly this kind of input","Naive search: with only 4 distinct characters most alignments mismatch on the first comparison, guaranteeing an O(n) worst case"],"answer":1,"explanation":"Only KMP guarantees an O(n + m) worst case, and the reviewer explicitly recommends it for small alphabets (DNA: A/C/G/T) and highly repetitive or adversarial input where a hard bound is required. BMH is wrong because on repetitive small-alphabet text its skips collapse to 1 (the window's last character is almost always in the pattern), degrading to O(n.m); a bigger table does not rescue this. Rabin-Karp is wrong because its worst case is O(n.m) when windows collide, and a small alphabet does not eliminate collisions. Naive is wrong because repetitive text is its O(n.m) pathological case; a tiny alphabet makes long matching prefixes more likely, not less."},{"id":"trees-bst-e01","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"easy","tags":["when-to-apply","bst"],"question":"You run an inorder traversal (Left, Node, Right) on a valid binary search tree. In what order are the keys emitted?","code":"","codeLang":"","options":["Sorted ascending order","Sorted descending order","The same order the keys were inserted","Level-by-level from the root down"],"answer":0,"explanation":"The single most important BST fact in the reviewer is that an inorder traversal of a BST visits keys in sorted ascending order, because Left-Node-Right always yields all smaller keys, then the node, then all larger keys. Descending order would come from a reversed (Right-Node-Left) traversal, not standard inorder. Level-by-level output describes BFS/level-order, a different traversal entirely. Insertion order is not preserved by a BST's structure; the ordering invariant, not insertion history, determines inorder output."},{"id":"trees-bst-e02","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"easy","tags":["complexity"],"question":"A standard recursive DFS traversal (preorder, inorder, or postorder) visits every node of a binary tree with `n` nodes exactly once. What is its time complexity?","code":"","codeLang":"","options":["`O(log n)`","`O(h)` where `h` is the tree height","`O(n log n)`","`O(n)`"],"answer":3,"explanation":"Each of the three DFS traversals does constant work per node and visits every node once, so the time is `O(n)`; the reviewer's complexity table lists all DFS traversals as `O(n)` time. `O(log n)` confuses traversal with a single balanced BST search, which only walks one root-to-leaf path. `O(n log n)` is the cost of comparison sorting, not tree traversal. `O(h)` is the traversal's space complexity (the recursion/stack depth), not its time complexity."},{"id":"trees-bst-e03","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"easy","tags":["template","bfs"],"question":"Which data structure does breadth-first (level-order) traversal of a binary tree use to visit nodes level by level, top to bottom, left to right?","code":"","codeLang":"","options":["A FIFO queue","A min-heap (priority queue)","A hash set","A LIFO stack"],"answer":0,"explanation":"Level-order BFS uses a FIFO `Queue\u003cTreeNode>`: you enqueue the root, then repeatedly dequeue a node and enqueue its non-null children, which processes nearer nodes before farther ones. A LIFO stack produces depth-first order, the opposite of level-by-level. A min-heap orders by key value rather than insertion order, so it would not preserve left-to-right level order. A hash set has no ordering at all and cannot drive a traversal sequence."},{"id":"trees-bst-e04","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"easy","tags":["base-case","template"],"question":"In the canonical `MaxDepth` tree-DP function shown below, what is the correct base-case return value for an empty subtree (a `null` node)?","code":"public int MaxDepth(TreeNode? root)\n{\n    if (root is null) return ___;\n    int left = MaxDepth(root.left);\n    int right = MaxDepth(root.right);\n    return 1 + Math.Max(left, right);\n}","codeLang":"csharp","options":["1","-1","the node's value","0"],"answer":3,"explanation":"An empty subtree has depth 0, so the `null` base case returns 0; the reviewer's MaxDepth implementation returns 0 for a null root and each real node adds 1 via `1 + Math.Max(left, right)`. Returning 1 would over-count by treating a missing child as if it were a real node, inflating every depth. The `-1` sentinel belongs to the balanced-check trick, not to MaxDepth. Returning the node's value is meaningless for a null node, which has no value, and depth does not depend on stored values."},{"id":"trees-bst-e05","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"easy","tags":["pitfall","validation"],"question":"When validating that a binary tree is a BST, why is it insufficient to check only that each node's left child is smaller and its right child is larger than the node itself?","code":"","codeLang":"","options":["Duplicate values are always allowed, so comparisons must use `\u003c=`","A node must be compared against its sibling, not its children","A node must satisfy the bounds inherited from all of its ancestors, not just its immediate parent","The check must be performed in postorder, and parent-only checks run in preorder"],"answer":2,"explanation":"Validation must thread a `(low, high)` range down from all ancestors: a node deep in the right subtree of `5` must be greater than `5` even if it is the left child of `8`, so a parent-only comparison can wrongly accept it. Sibling comparisons are irrelevant; the BST invariant constrains subtrees relative to ancestors, not nodes relative to their siblings. Standard BST validation assumes strictly increasing keys (no duplicates), so `\u003c=` is not the fix. The failure is about inherited bounds, not about traversal order; both correct approaches (bounds or strictly increasing inorder) work regardless of being framed as preorder or inorder."},{"id":"trees-bst-m01","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"medium","tags":["pitfall","invariant"],"question":"You are validating whether a binary tree is a BST. A candidate's code checks, at every node, only that `node.left.val \u003c node.val` and `node.right.val > node.val` (the immediate-children comparison). On which of the following trees does this naive check WRONGLY report a valid BST when the tree is actually NOT a valid BST?","code":"","codeLang":"","options":["Root 5 with right child 8, where 8 has a right child 2","Root 5 with left child 6 and right child 8","Root 5 with left child 3 and right child 8, where 3 has a left child 1","Root 5 with left child 3 and right child 8, where 8 has a left child 4"],"answer":3,"explanation":"The correct answer is the tree where 8 (in 5's right subtree) has a left child 4: the parent-only check sees `4 \u003c 8` and accepts it, but 4 lies in 5's right subtree so it inherits `low = 5` and must exceed 5, making the tree invalid -- exactly the trap the source describes. The option with left child 6 fails the immediate-children check itself (`6 > 5` violates left \u003c node), so the naive code already rejects it and never wrongly accepts. The option where 3 has a left child 1 is a fully valid BST (1 \u003c 3 \u003c 5 \u003c 8), so both the naive and the correct check accept it -- there is no wrong report. The last option (8 has right child 2) fails the immediate-children check at node 8 directly (`2 \u003c 8` violates right > node), so the naive code already rejects it."},{"id":"trees-bst-m02","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"medium","tags":["complexity","when-to-apply"],"question":"You must repeatedly answer 'k-th smallest element' queries on a BST. For a SINGLE query using the early-stopping iterative inorder traversal (push-left, pop, count to k, then break), what is the time complexity, where `h` is the tree height and `k` is the query parameter?","code":"","codeLang":"","options":["`O(k log n)`, one logarithmic descent per emitted value","`O(log n)` always, because the BST property guides the descent","`O(n)` always, because inorder must visit every node","`O(h + k)`, worst case `O(n)`"],"answer":3,"explanation":"Inorder emits keys in sorted order, so the k-th popped value is the answer; the iterative version dives left (`O(h)` to reach the smallest) and then emits k values before breaking, giving `O(h + k)` -- worst case `O(n)` on a skewed tree or large k. 'Always `O(log n)`' is wrong: descent alone is `O(h)` and emitting k values adds k, and h is not even guaranteed logarithmic for a plain BST. 'Always `O(n)`' is wrong because early stopping means you never visit nodes after the k-th. '`O(k log n)`' wrongly assumes each successor step costs a full descent; inorder steps amortize to `O(1)` each across the walk, so the total is additive `O(h + k)`, not multiplicative."},{"id":"trees-bst-m03","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"medium","tags":["template","diameter"],"question":"In the diameter-of-binary-tree solution, the helper returns the subtree height while a captured `best` variable tracks the diameter. What is the correct expression to combine at the current `node` for updating `best`, given `l = Height(node.left)` and `r = Height(node.right)` (heights counted so a null subtree returns 0)?","code":"int Height(TreeNode? node)\n{\n    if (node is null) return 0;\n    int l = Height(node.left);\n    int r = Height(node.right);\n    best = Math.Max(best, /* ??? */);\n    return 1 + Math.Max(l, r);\n}","codeLang":"csharp","options":["`2 + l + r`","`Math.Max(l, r)`","`l + r`","`1 + l + r`"],"answer":2,"explanation":"The diameter is measured in edges, and the longest path passing through a node has `l + r` edges (the left subtree height plus the right subtree height), which the source states directly. `1 + l + r` overcounts by one edge -- it would be the count in nodes minus one mismatch, not the edge count for a path bending at the node. `Math.Max(l, r)` is the height returned upward (the straight path for the parent), not the path bending through this node. `2 + l + r` overcounts by two and corresponds to no correct quantity for a path that bends exactly once at this node."},{"id":"trees-bst-m04","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"medium","tags":["bst-ops","invariant"],"question":"You delete a node that has TWO children from a BST. To preserve the BST invariant, what value replaces the deleted node, and what happens next?","code":"","codeLang":"","options":["The right child directly, discarding the entire left subtree","The inorder successor (minimum of the right subtree); that successor is then deleted from the right subtree","The larger of the two children, then both original children are re-inserted from scratch","The inorder predecessor (maximum of the right subtree); that predecessor is then deleted from the right subtree"],"answer":1,"explanation":"The source specifies replacing a two-child node with its inorder successor -- the smallest key in the right subtree -- then deleting that successor from the right subtree; the successor is greater than everything on the left and smaller than everything else on the right, so the ordering holds. 'Inorder predecessor (maximum of the right subtree)' is self-contradictory: the predecessor is the maximum of the LEFT subtree, not the right. Replacing with the right child directly and discarding the left subtree destroys all left-subtree keys, breaking correctness. Re-inserting both children from scratch is unnecessary work and is not the standard `O(h)` algorithm; it also mishandles where the subtrees attach."},{"id":"trees-bst-m05","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"medium","tags":["template","trace"],"question":"In the iterative PREORDER traversal that uses an explicit `Stack\u003cTreeNode>`, you pop a node, emit it, and push its children. In what order must you push the children so the output matches recursive preorder (Node, Left, Right)?","code":"TreeNode node = stack.Pop();\noutput.Add(node.val);\n// push children here\nwhile (stack.Count > 0) { ... }","codeLang":"csharp","options":["Push right first, then left, so left is popped (processed) before right","Push left first, then right, so right is popped before left","Push only the left child; the right child is reached by following the chain later","Push left first, then right, so left is popped before right"],"answer":0,"explanation":"A stack is LIFO, so the last item pushed is popped first; to process the left child before the right (preorder is Node, Left, Right), you push right first and then left so left sits on top and pops next -- exactly as the source states ('push right then left so left is processed first'). 'Push left first, then right, so left is popped before right' is impossible: with LIFO, pushing left first makes right pop first. 'Push left first... so right is popped before left' produces Node, Right, Left order, which is wrong. Pushing only the left child loses the right subtree entirely, since there is no parent back-reference to recover it."},{"id":"trees-bst-m06","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"medium","tags":["when-to-apply","construction"],"question":"A problem gives you two traversal orderings of a binary tree containing distinct values and asks you to reconstruct the unique tree. Which pair of traversals is guaranteed to determine the tree uniquely?","code":"","codeLang":"","options":["Preorder + postorder","Preorder + inorder","Inorder alone","Postorder alone"],"answer":1,"explanation":"The source states you need two traversals and one of them must be inorder: preorder (or postorder) names the root, and inorder splits the remaining nodes into the left and right subtrees around that root, so preorder + inorder reconstructs uniquely. Preorder + postorder is ambiguous in general -- trees with single-child nodes cannot be disambiguated because neither ordering reveals the left/right split. Inorder alone cannot fix the structure: many distinct tree shapes share the same inorder sequence. Postorder alone has the same deficiency -- it identifies the root (last element) but gives no way to partition nodes into left versus right subtrees without inorder."},{"id":"trees-bst-h01","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"hard","tags":["pitfall","invariant"],"question":"You are validating a BST. A candidate validator returns `true` for a node only when `node.left.val \u003c node.val` and `node.right.val > node.val` for the node's immediate children (checked recursively at every node). For which of the following trees does this parent-only check return `true` while a correct `IsValidBST` returns `false`?","code":"Tree A:        Tree B:        Tree C:        Tree D:\n     5             5              2              5\n    / \\           / \\            / \\            / \\\n   3   8         1   8          1   3          6   8\n        \\           / \\\n         9         4   9","codeLang":"text","options":["Tree C: root 2 with children 1 and 3","Tree B: root 5 with left child 1, right child 8 whose children are 4 and 9","Tree A: root 5 with left child 3, right child 8 whose only child is right child 9","Tree D: root 5 with left child 6, right child 8"],"answer":1,"explanation":"The parent-only check fails to enforce ancestor bounds. In Tree B, node 4 is the left child of 8, so `4 \u003c 8` passes the local check, but 4 lies in the RIGHT subtree of root 5 and must therefore be greater than 5 -- a correct validator threads `low = 5` down and rejects it. This is exactly the trap the source describes (node 4 in 5's right subtree). Tree A is a valid BST (3 \u003c 5 \u003c 8 \u003c 9, and 8 has no left child to violate anything), so both checks agree on `true` -- no disagreement. Tree C is a valid BST (1 \u003c 2 \u003c 3), again no disagreement. Tree D has left child 6 > root 5, which violates even the local parent-only check, so the parent-only validator itself returns `false` -- it is not a case where parent-only passes but the correct check fails."},{"id":"trees-bst-h02","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"hard","tags":["template","invariant"],"question":"In the diameter solution, the helper returns `1 + Math.Max(l, r)` (a height) while the diameter is tracked as a separate global `best = Math.Max(best, l + r)`. A student rewrites the helper to instead RETURN the best diameter seen so far (i.e. return `Math.Max(l + r, Math.Max(l, r))`) and reports the root's return value as the answer, dropping the global. Why is this rewrite wrong?","code":"","codeLang":"","options":["Diameter must be measured in nodes, not edges, so any version returning `l + r` is off by one regardless of what is returned","The rewrite is actually correct and equivalent; both compute the diameter in a single postorder pass","Returning a value instead of mutating a global changes the time complexity from O(n) to O(n log n)","The parent needs the subtree's HEIGHT to compute the path through itself; returning a diameter instead breaks the parent's `l + r` combination, so heights -- and thus diameters -- are miscomputed up the tree"],"answer":3,"explanation":"The tree-DP template returns ONE quantity the parent can combine (here the height) while tracking a SEPARATE global best. The longest path through a node is `height(left) + height(right)`, so the parent fundamentally needs each child's height; if the child returns a diameter instead, the parent's `l + r` no longer adds heights and every height (and therefore every diameter) computed above is garbage. Option 2 is wrong: returning versus mutating a global is still a single O(n) postorder pass -- complexity is unchanged. Option 3 is wrong precisely because the returned value is conflated with the wrong quantity, so it is not equivalent. Option 4 is wrong: the source defines diameter in edges and `height(left) + height(right)` with leaf height 0 already counts edges correctly."},{"id":"trees-bst-h03","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"hard","tags":["pitfall","when-to-apply"],"question":"When deleting a node with two children from a BST, the reviewer's code copies the inorder successor's value into the node, then calls `DeleteNode(root.right, succ.val)` to remove the successor from the right subtree. Why does it recursively delete the successor rather than simply unlinking it directly, and what property of the successor makes that recursive delete safe?","code":"TreeNode succ = root.right;\nwhile (succ.left is not null) succ = succ.left;\nroot.val = succ.val;\nroot.right = DeleteNode(root.right, succ.val);\nreturn root;","codeLang":"csharp","options":["Direct unlinking would violate the BST invariant, whereas the recursive call re-sorts the entire right subtree in O(h)","The successor always has two children itself, so only a full recursive delete can rebalance the subtree afterward","Recursing is required because the successor may appear multiple times in the right subtree, and the recursion removes every duplicate","The successor is the leftmost node of the right subtree, so it has no left child and falls into the 0-or-1-child case; the recursive call cleanly reattaches its right child in its place"],"answer":3,"explanation":"The inorder successor is the minimum of the right subtree, reached by walking left until `succ.left is null` -- so by construction it has NO left child. That places it in the easy 0-or-1-child deletion case, where the node is replaced by its (possibly null) right child; the recursive `DeleteNode` call performs exactly that reattachment without special-casing. Option 2 is false: the successor has no left child, so it is never a two-child node. Option 3 is false: a valid BST has no duplicate keys, so the successor value occurs once. Option 4 is false: a correct direct unlink would also preserve the invariant -- recursion is used for code reuse and correct reattachment, not because it 're-sorts' anything (it does not, and could not, in O(h))."},{"id":"trees-bst-h04","topic":"Trees & BSTs","slug":"trees-bst","difficulty":"hard","tags":["complexity"],"question":"A balanced binary tree with `n` nodes is traversed two ways: (1) recursive DFS preorder, and (2) BFS level-order with a queue. Comparing only the AUXILIARY space (excluding the output) of the two on this balanced tree, which statement is exactly right?","code":"","codeLang":"","options":["DFS uses O(n) stack space and BFS uses O(log n) queue space, because the queue only ever holds one level at a time","Both use O(log n) auxiliary space, since a balanced tree has height O(log n)","Both use O(n) auxiliary space, since every node must be enqueued or pushed at some point during the traversal","DFS uses O(log n) stack space; BFS uses O(n) queue space because the last level alone holds about n/2 nodes"],"answer":3,"explanation":"On a balanced tree the height is O(log n), so recursive DFS holds at most O(log n) frames on the call stack at once. BFS space is O(w) where w is the maximum level width; for a (near-)complete balanced tree the last level holds about n/2 nodes, so the queue peaks at O(n). Option 2 wrongly assumes BFS is height-bound -- it is width-bound. Option 3 inverts the two and falsely claims the queue holds only one level's worth at a time; in BFS the queue straddles the boundary of two adjacent levels, peaking at the widest level (~n/2). Option 4 conflates total nodes touched with simultaneous occupancy: DFS never holds more than O(h) = O(log n) frames at once even though all n nodes are visited."},{"id":"tries-e01","topic":"Tries","slug":"tries","difficulty":"easy","tags":["when-to-apply","complexity"],"question":"You store 1,000,000 words in a data structure and must repeatedly answer \"how many stored words start with the prefix `ca`?\". Which structure makes each such prefix query cost `O(L)` in the length of the prefix, independent of the number of stored words?","code":"","codeLang":"","options":["An unsorted array, because a single linear pass is O(L)","A trie (prefix tree), because reaching the prefix node walks exactly L edges and the node (with a stored subtree count) answers the prefix question in O(L)","A `HashSet\u003cstring>`, because hashing the prefix gives all matching words directly","A `HashSet\u003cstring>`, because `Contains(\"ca\")` answers the prefix question in O(1)"],"answer":1,"explanation":"The trie reaches the prefix node by walking L edges, and that node (augmented with a stored subtree count) answers the prefix query in O(L), independent of N — this is the whole reason a trie exists. A `HashSet\u003cstring>` stores whole words by hash and has no notion of prefixes: `Contains(\"ca\")` tests membership of the literal string \"ca\", not \"words starting with ca\", so option 2 is a core misconception. Hashing a prefix cannot retrieve matching words; answering a prefix query with a hash set requires scanning all N words with `StartsWith`, an O(N·L) sweep, so option 3 is wrong. An unsorted array scan is O(N·L), not O(L), so option 4 misstates the cost."},{"id":"tries-e02","topic":"Tries","slug":"tries","difficulty":"easy","tags":["invariant","pitfall"],"question":"Both `Search(word)` and `StartsWith(prefix)` walk the trie edge by edge from the root and fail identically when an edge is missing. What is the ONLY difference between them at the final node?","code":"","codeLang":"","options":["`Search` is `O(L)` while `StartsWith` is `O(1)` because it stops at the prefix","`StartsWith` returns the final node's `isEnd`; `Search` returns true as soon as it arrives at the node","`Search` allocates new nodes along the way while `StartsWith` does not","`Search` returns the final node's `isEnd`; `StartsWith` returns true as soon as it arrives at the node, regardless of `isEnd`"],"answer":3,"explanation":"Per the source, the only semantic difference is the final check: `Search` returns the final node's `isEnd` (it must be a real stored word), while `StartsWith` returns true the instant it reaches the node, with `isEnd` irrelevant. Option 2 reverses these roles, which would make `Search(\"ca\")` wrongly succeed after inserting only `cat`. Option 3 is wrong because neither read-only operation allocates nodes — only `Insert` creates missing edges. Option 4 is wrong because both operations walk the full query and are O(L); `StartsWith` is not O(1)."},{"id":"tries-e03","topic":"Tries","slug":"tries","difficulty":"easy","tags":["trace","invariant"],"question":"A fresh trie has only `apple` inserted (no other words). Reading the standard LC 208 trie, what does `Search(\"app\")` return and why?","code":"var t = new Trie();\nt.Insert(\"apple\");\nConsole.WriteLine(t.Search(\"app\"));","codeLang":"csharp","options":["`False`, because the edge for the second `p` is missing","`False`, because the `app` node exists only as a prefix of `apple` and its `isEnd` flag is not set","`True`, because the `app` node was created while inserting `apple`","`True`, because `app` is a prefix of a stored word"],"answer":1,"explanation":"Inserting `apple` creates the `a → p → p` path, but `isEnd` is set only on the final `e` node, so the `app` node exists as a mere prefix with `isEnd == false`; `Search` returns that flag, hence `False`. Options 2 and 3 confuse `Search` with `StartsWith`: the node existing (or `app` being a prefix) is exactly what `StartsWith` checks, not `Search`. Option 4 is factually wrong — the second `p` edge does exist (it was created by inserting `apple`); the search fails on the `isEnd` check, not a missing edge."},{"id":"tries-m02","topic":"Tries","slug":"tries","difficulty":"medium","tags":["complexity","when-to-apply"],"question":"You store `N` words in a `HashSet\u003cstring>` and need to repeatedly answer \"how many stored words start with this `L`-character prefix?\". A trie answers each such query in O(L). What is the cost of answering one such query with the hash set, and why?","options":["O(L · log N), because the hash set keeps keys in sorted order and you binary-search the prefix range","O(1), because a hash set caches prefix counts as words are inserted","O(N · L), because the hash set has no prefix notion, so you must scan all N words and run `StartsWith` on each","O(L) average, because hashing the prefix string directly yields the count of matching words"],"answer":2,"explanation":"A hash set stores whole words by hash and has no concept of prefixes; `Contains(\"ca\")` tests the literal string `\"ca\"`, not \"any word starts with ca\". Counting prefix matches therefore requires scanning all N words and testing `StartsWith`, each test up to O(L), giving O(N · L). Option 1 describes a sorted array, not a hash set, which has no order. Option 2 confuses exact membership of the literal prefix string with a prefix query. Option 4 invents caching the structure does not maintain.","code":"","codeLang":""},{"id":"tries-m03","topic":"Tries","slug":"tries","difficulty":"medium","tags":["template","complexity"],"question":"In LC 211, `Search` may contain `.` wildcards each matching any single character. Consider the snippet that handles a literal (non-dot) character at `word[idx]`. Which line correctly continues the search, and what is the worst-case time of a full search containing `d` dots?","options":["Recurse into every existing child and OR the results; worst case O(L) regardless of d","Take the single matching edge and recurse, failing if that edge is absent; worst case O(26^d · L)","Set `node.IsEnd = true` then recurse into the matching edge; worst case O(26^d · L)","Take the single matching edge and recurse, failing if that edge is absent; worst case O(L^d)"],"answer":1,"explanation":"A literal character is deterministic: follow the one matching edge and recurse, returning `false` for that branch if the edge is missing. Only a `.` branches into every existing child, so each dot multiplies the work by up to the alphabet size, giving the O(26^d · L) worst-case bound. Option 1 wrongly applies dot-branching behavior to a literal and drops the 26^d factor. Option 3 has the right line but mis-states the bound as O(L^d); the branching factor is the alphabet (26), not L. Option 4 mutates `isEnd` during a read-only search, corrupting the trie.","code":"if (c == '.') { /* branch into every child */ }\nelse {\n    TrieNode? next = node.Children[c - 'a'];\n    // which line here?\n}","codeLang":"csharp"},{"id":"tries-m04","topic":"Tries","slug":"tries","difficulty":"medium","tags":["pitfall","template"],"question":"This Word Search II inner step compiles and produces correct words, but the result list sometimes contains the same word more than once. Which single change fixes the duplication?","options":["Add a `visited` boolean array instead of overwriting the cell with `'#'`, so cells are never reused","After `results.Add(next.Word)`, also set `next.Word = null` so the word is collected at most once","Restore the cell with `board[r][c] = '#';` instead of `board[r][c] = ch;` at the end","Move the `if (next is null) return;` prune check to after the four recursive calls"],"answer":1,"explanation":"The same word can be reachable through multiple board paths, so after collecting it at its end node you must null out `next.Word` (or collect into a set) to prevent re-adding it. The snippet collects but never nulls, which is the exact de-dupe defect. Option 1 addresses path-reuse, which is already handled correctly by the `'#'` sentinel and is unrelated to duplicates. Option 3 would break pruning entirely, causing out-of-bounds and dead-prefix exploration, not fix duplicates. Option 4 restores the cell to `'#'` instead of its letter, corrupting the board for sibling branches rather than de-duping.","code":"Node? next = node.Children[ch - 'a'];\nif (next is null) return;\nif (next.Word is not null) results.Add(next.Word); // collect\nboard[r][c] = '#';\nDfs(board, r + 1, c, next, results);\nDfs(board, r - 1, c, next, results);\nDfs(board, r, c + 1, next, results);\nDfs(board, r, c - 1, next, results);\nboard[r][c] = ch;","codeLang":"csharp"},{"id":"tries-h01","topic":"Tries","slug":"tries","difficulty":"hard","tags":["complexity","wildcard"],"question":"A `WordDictionary` (LC 211) stores words over the lowercase alphabet using `TrieNode[26]` nodes and a DFS `Search` that, on a `.`, recurses into every present child. A learner claims the worst-case time for `Search` on a pattern of length `L` containing `d` dots is `O(L)` because the trie walk is always linear in the pattern length. Which statement correctly characterizes the worst case and why the learner is wrong?","code":"","codeLang":"","options":["The worst case is `O(L)`: the learner is right, because the DFS only ever descends into edges that actually exist, so it can never visit more than `L` nodes total.","The worst case is `O(26^d · L)`: each `.` can fork the DFS into up to 26 children, and those forks compound multiplicatively across the `d` wildcards, so the linear-walk reasoning only holds when `d == 0`.","The worst case is `O(N · L)` where `N` is the number of stored words: a `.` must be compared against all `N` words to find matches, reintroducing the hash-set scan cost.","The worst case is `O(26^L)`: every one of the `L` positions branches into 26 children regardless of whether it is a literal or a dot, so the dot count `d` is irrelevant to the bound."],"answer":1,"explanation":"The source gives dot search as `O(26^d · L)` worst case: a literal keeps the DFS on one edge, but each `.` branches into up to 26 children, and these branchings compound over the `d` dots, so it is not linear unless `d == 0`. Option 2 is the learner's own mistaken claim; the \"only existing edges\" note explains why practice is below the bound, not that the worst case is `O(L)`. Option 3 (`O(26^L)`) wrongly branches at literals too — a literal follows exactly one edge, so only `d`, not `L`, drives the exponent. Option 4 (`O(N·L)`) imports the hash-set full-scan cost; a trie never iterates over the `N` stored words, so `N` appears in no per-query trie operation."},{"id":"tries-h02","topic":"Tries","slug":"tries","difficulty":"hard","tags":["pitfall","trace"],"question":"This is the inner step of a Word Search II (LC 212) board DFS. The board is `[['a','a'],['a','a']]` and the only word inserted is `\"aa\"` (its end node has `Word == \"aa\"`). Assuming the outer loop calls `Dfs` once per starting cell, what does `results` contain after the full run, and which single defect is responsible?","code":"char ch = board[r][c];\nNode? next = node.Children[ch - 'a'];\nif (next is null) return;\nif (next.Word is not null) results.Add(next.Word);  // collect, but never nulled\nboard[r][c] = '#';\nDfs(board, r + 1, c, next, results);\nDfs(board, r - 1, c, next, results);\nDfs(board, r, c + 1, next, results);\nDfs(board, r, c - 1, next, results);\nboard[r][c] = ch;","codeLang":"csharp","options":["`results` contains `\"aa\"` exactly once, because nulling out the board cell to `'#'` and restoring it already prevents any word from being collected twice.","`results` contains `\"aa\"` exactly once, because `next.Word` is read before the recursion, so the word is collected on the very first path and the later identical paths see the same already-collected node.","`results` contains `\"aa\"` multiple times, because the collect step never sets `next.Word = null`, so each distinct board path that spells `aa` re-adds the word.","`results` is empty, because overwriting the cell with `'#'` before recursing makes `board[r][c] - 'a'` compute a negative index on the next visit, so no word is ever collected."],"answer":2,"explanation":"The source flags exactly this bug: the same word is reachable by multiple board paths, and without nulling `next.Word` after collecting, the result list accumulates duplicates. With a 2x2 all-`a` board and word `aa`, several distinct adjacent-cell paths spell `aa`, so `\"aa\"` is added more than once. Option 2 confuses the visited-cell restore (which prevents reusing a cell within one path) with de-duping across paths — they are independent concerns. Option 3 is false: the cell is restored to its original letter before any sibling/other-start path reads it, and the `'#'` guard would simply `return` on a stale visit, never indexing negatively in this flow. Option 4 is wrong because `next.Word` stays non-null (it is never cleared), so every later identical path re-passes the `if (next.Word is not null)` check and adds the word again."},{"id":"tries-h03","topic":"Tries","slug":"tries","difficulty":"hard","tags":["comparison","complexity"],"question":"You must support a single repeated operation on `N` stored lowercase words: count how many stored words start with a given prefix of length `L`, issued millions of times, with occasional incremental insertions of new words between queries. Considering a trie, a `HashSet\u003cstring>`, and a sorted `string[]` searched by binary search, which choice is best and for the correct reason?","code":"","codeLang":"","options":["A trie augmented with per-node counts, because each count query is `O(L)` independent of `N`, and an insert is `O(L)` — neither cost grows with the number of stored words, unlike the alternatives.","A `HashSet\u003cstring>`, because `Contains` is `O(L)` average, so checking the prefix string against the set answers the count query directly in `O(L)` with the smallest constant factor.","A `HashSet\u003cstring>`, because its lack of ordering is irrelevant to counting and it supports `O(1)` incremental insertion, which the trie cannot match for inserts.","A sorted `string[]`, because binary search makes every prefix-count query `O(log N)` total, which beats the trie's `O(L)` whenever `L` exceeds `log N`."],"answer":0,"explanation":"The comparison table and prose show the trie answers prefix-based queries in `O(L)` flat — reaching the prefix node is `O(L)`, and with per-node counts the count is `O(L)` total, independent of `N`; inserts are also `O(L)`. That makes it strictly best for a hot prefix-count workload with incremental inserts. Option 2 is the \"hash set as a prefix engine\" misconception the source explicitly warns against: `Contains(prefix)` tests membership of the literal string, not how many words start with it, so it cannot count completions. Option 3 miscounts the sorted-array cost: a prefix-range query is `O(L · log N)` (each comparison touches up to `L` chars) and insertion shifts elements in `O(N)`, both worse than the trie under frequent inserts. Option 4 ignores that the sorted array, not the hash set, is the ordered structure, and a hash set still cannot answer prefix counts at all regardless of its insert speed."},{"id":"two-pointers-e01","topic":"Two Pointers","slug":"two-pointers","difficulty":"easy","tags":["complexity"],"question":"Compared to the brute-force `O(n^2)` nested-loop approach for finding a pair that sums to a target, what time and space does the converging two-pointer pattern typically achieve?","code":"","codeLang":"","options":["`O(n^2)` time and `O(1)` extra space","`O(n)` time and `O(1)` extra space","`O(n log n)` time and `O(n)` extra space","`O(log n)` time and `O(log n)` extra space"],"answer":1,"explanation":"The reviewer's headline claim is that two pointers turns a quadratic double-loop into a single `O(n)` pass using only `O(1)` extra space (a couple of indices and maybe a running best). Option 1 is correct. `O(n log n)` time is the cost of a sort, not the scan itself, and the pattern does not need `O(n)` extra space -- that is the hash-set alternative's space cost. `O(n^2)` is exactly the brute-force time the pattern eliminates. `O(log n)` time is impossible because every element must be visited at least once in a single linear sweep."},{"id":"two-pointers-e02","topic":"Two Pointers","slug":"two-pointers","difficulty":"easy","tags":["template","invariant"],"question":"In the converging two-pointer solution for Two Sum on a sorted ascending array, when `nums[left] + nums[right]` is greater than the target, which move is correct?","code":"","codeLang":"","options":["Decrement both `left` and `right`","Decrement `right` to bring in a smaller value","Increment `left` to bring in a larger value","Reset `left` to 0 and rescan from the start"],"answer":1,"explanation":"On a sorted ascending array, when the sum overshoots the target the only way to shrink it is to move `right` left to a smaller value, so option 1 is correct. Incrementing `left` brings in a larger value and increases the sum further, which is the right move only when the sum is too small. Moving both pointers can skip the matching pair entirely. Rescanning from the start abandons the linear invariant and reintroduces quadratic work, defeating the entire purpose of the pattern."},{"id":"two-pointers-e03","topic":"Two Pointers","slug":"two-pointers","difficulty":"easy","tags":["when-to-apply"],"question":"A problem asks you to remove all occurrences of a given value from an array in place, keeping the remaining elements compacted to the front. Which two-pointer variant is the canonical fit?","code":"","codeLang":"","options":["A converging scan that requires sorting the array first","Same-direction (slow/fast) pointers, with `slow` as the write head","Floyd's tortoise and hare with `fast` moving two steps per `slow` step","Converging pointers starting from opposite ends"],"answer":1,"explanation":"In-place removal, dedup, and move problems are the canonical use of same-direction slow/fast pointers, where `fast` reads every element and `slow` marks the next write slot for kept elements; option 1 is correct. Converging pointers from opposite ends are for sorted pair/area problems, not compaction. Floyd's tortoise and hare uses a two-to-one step ratio over linked-list nodes to detect cycles or find midpoints -- a different technique with a different goal. Sorting is neither required nor desirable here, since removal preserves the existing order of kept elements."},{"id":"two-pointers-e04","topic":"Two Pointers","slug":"two-pointers","difficulty":"easy","tags":["pitfall","template"],"question":"What is the standard loop guard for a converging two-pointer scan, and why?","code":"","codeLang":"","options":["`left \u003c= right`, so the middle element is always processed twice","`left != right`, which is equivalent and never risks an infinite loop","`left \u003c right`, so the loop stops when the pointers meet and no element is paired with itself","`left \u003c nums.Length`, so `right` is free to wrap past the end"],"answer":2,"explanation":"The reviewer specifies `left \u003c right` as the converging guard: the loop stops the moment the pointers meet or cross, ensuring each element is examined once and, for Two Sum, no element is paired with itself. Option 1 is correct. Using `left \u003c= right` can double-process the middle element or pair an element with itself, which the reviewer flags as a pitfall, so option 2 describes a bug, not the intended behavior. `left != right` is unsafe because if both pointers jump past each other in one step the condition can stay true and loop forever. `left \u003c nums.Length` ignores `right` entirely and lets `right` run off the array."},{"id":"two-pointers-m01","topic":"Two Pointers","slug":"two-pointers","difficulty":"medium","tags":["when-to-apply","comparison"],"question":"You are given an UNSORTED array and must return the original indices of two numbers that sum to a target. Which approach is appropriate, and why?","code":"","codeLang":"","options":["Use a hash map of value to original index in one pass; converging two pointers would require sorting, which destroys the original indices","Sort the array, then run converging two pointers from both ends; the sort makes the sum logic valid","Use slow/fast same-direction pointers, treating slow as the write head for the matching pair","Run converging two pointers directly on the unsorted array, moving the right pointer whenever the sum is too big"],"answer":0,"explanation":"Converging two pointers needs sorted input for its sum logic, but sorting reorders elements and loses the original indices the problem asks for, so a hash map of value to index in one `O(n)` pass (`O(n)` space) is the right tool. Sorting first (option 1) does make the sum comparison valid but throws away the original positions you must return. Slow/fast compaction (option 3) is for in-place removal/dedup, not pair-sum search. Running converging pointers on unsorted data (option 4) is invalid because moving `right` when the sum is too big assumes sorted order, which does not hold."},{"id":"two-pointers-m02","topic":"Two Pointers","slug":"two-pointers","difficulty":"medium","tags":["template","trace"],"question":"Using the sorted two-sum converging template (`sum > target` moves `right` left, `sum \u003c target` moves `left` right), what does this return for `numbers = [2, 3, 4, 8, 11]` and `target = 12`?","code":"int left = 0, right = numbers.Length - 1;\nwhile (left \u003c right)\n{\n    int sum = numbers[left] + numbers[right];\n    if (sum == target) return new[] { left + 1, right + 1 };\n    if (sum > target) right--; else left++;\n}\nreturn Array.Empty\u003cint>();","codeLang":"csharp","options":["[2, 4]","[2, 5]","[3, 4]","[1, 4]"],"answer":2,"explanation":"Trace over 0-based indices (0=2, 1=3, 2=4, 3=8, 4=11): (2,11)=13>12 so R--; (2,8)=10\u003c12 so L++; (3,8)=11\u003c12 so L++; (4,8)=12 matches at left index 2 and right index 3, returning 1-indexed [left+1, right+1] = [3, 4] (the positions of 4 and 8). Option 2 [1,4] is the 0-indexed pair (2 and 8) summing to 10, not the match. Option 3 [2,5] pairs 3 and 11 = 14, never the matched pair. Option 4 [2,4] would mean left landed on index 1 (value 3), but the loop advances left twice past index 1 before the match, so it lands on index 2."},{"id":"two-pointers-m03","topic":"Two Pointers","slug":"two-pointers","difficulty":"medium","tags":["invariant","greedy"],"question":"In Container With Most Water the array is NOT sorted, yet converging pointers still work by always moving the pointer at the shorter wall. What invariant justifies discarding the shorter wall when you move it?","code":"","codeLang":"","options":["Moving the shorter wall guarantees the sum of the two heights strictly increases, which raises the area","Width shrinks every step, so any container still reachable using the shorter wall would be narrower and capped by that same short height, so none can beat the current best","The heights are effectively sorted once you start at the ends, so the shorter wall is always the smaller value overall","The shorter wall holds less water, so removing it lets the running maximum reset to zero and recompute cleanly"],"answer":1,"explanation":"Area = width * min(height[L], height[R]); since width only shrinks as pointers converge, any remaining container that still uses the shorter wall is both narrower and still limited by that short height, so it cannot exceed the current best, making it safe to discard. Option 1 is false: the data is not sorted and the invariant is about shrinking width, not value order. Option 3 is wrong because area depends on the min of the two heights, not their sum. Option 4 is wrong: the running maximum is never reset, and the discarded containers are provably non-improving, not recomputed."},{"id":"two-pointers-m04","topic":"Two Pointers","slug":"two-pointers","difficulty":"medium","tags":["template","pitfall"],"question":"LC 26 (Remove Duplicates) returns `slow + 1` while LC 27 (Remove Element) returns `slow`. Why do these otherwise-similar slow/fast templates return different expressions?","code":"","codeLang":"","options":["In LC 26 `slow` is the index of the last kept element so the length is `slow + 1`; in LC 27 `slow` is a next-write counter incremented after each write, so it already equals the kept count","LC 26 is on sorted input which adds one extra unique value, while LC 27 works on unsorted input and so counts one fewer","Both should actually return `slow`; the `+ 1` in LC 26 is an off-by-one bug in the reviewer","LC 26 starts `fast` at 1 and LC 27 starts it at 0, so LC 26 always processes one extra element that must be added back"],"answer":0,"explanation":"In LC 26 `slow` tracks the index of the last element of the unique prefix, so its length is `slow + 1`; in LC 27 `slow` is a write position bumped after every kept write, so it already holds the count. Option 1 confuses the loop start with the return semantics: the start index does not create an off-by-one in the returned length. Option 3 invents a sorted-vs-unsorted length difference that does not exist. Option 4 is wrong: `slow + 1` is correct for LC 26 precisely because `slow` is an index there, not a counter."},{"id":"two-pointers-m05","topic":"Two Pointers","slug":"two-pointers","difficulty":"medium","tags":["pitfall","trace"],"question":"This 3Sum-style inner scan records a match but does not advance after recording. For a sorted segment where a matching pair is found, what is the consequence?","code":"int left = i + 1, right = n - 1;\nwhile (left \u003c right)\n{\n    int sum = nums[i] + nums[left] + nums[right];\n    if (sum \u003c 0) left++;\n    else if (sum > 0) right--;\n    else result.Add(new List\u003cint> { nums[i], nums[left], nums[right] });\n}","codeLang":"csharp","options":["It correctly finds all triplets but emits duplicates that must be filtered later","It terminates early, missing later triplets, but does not loop forever","It infinite-loops once a match is found, because neither `left` nor `right` advances on the `sum == 0` branch","It skips the matching triplet entirely because the equal branch never writes to the result"],"answer":2,"explanation":"Every branch of a two-pointer loop body must advance at least one pointer; here the `sum == 0` branch only adds to the result and leaves `left` and `right` unchanged, so the loop re-evaluates the same pair forever, an infinite loop. Option 2 describes the duplicate problem, which is a different bug and cannot occur here because the loop never progresses past the first match. Option 3 is wrong: the equal branch does write to the result. Option 4 is wrong: the loop does not terminate at all once a match is hit, rather than ending early."},{"id":"two-pointers-m06","topic":"Two Pointers","slug":"two-pointers","difficulty":"medium","tags":["trace","complexity"],"question":"Running the standard two-pointer Trapping Rain Water (advance the shorter side, add `runningMax - height` there) on `height = [4, 2, 0, 3, 2, 5]`, how much water is trapped?","code":"int left = 0, right = height.Length - 1, leftMax = 0, rightMax = 0, water = 0;\nwhile (left \u003c right)\n{\n    if (height[left] \u003c height[right])\n    { leftMax = Math.Max(leftMax, height[left]); water += leftMax - height[left]; left++; }\n    else\n    { rightMax = Math.Max(rightMax, height[right]); water += rightMax - height[right]; right--; }\n}","codeLang":"csharp","options":["6","7","9","11"],"answer":2,"explanation":"The right wall height[5]=5 is the tallest, so height[left] \u003c height[right] holds every step and left advances with leftMax=4: index0(4)+0, index1(2)+2 (total 2), index2(0)+4 (total 6), index3(3)+1 (total 7), index4(2)+2 (total 9), then left meets right and stops, giving 9. Option 1 (7) stops one step early, omitting the +2 at index 4. Option 3 (11) over-counts by misapplying rightMax to a left column. Option 4 (6) corresponds to a different input from the reviewer example and ignores indices 3 and 4 here."},{"id":"two-pointers-m07","topic":"Two Pointers","slug":"two-pointers","difficulty":"medium","tags":["comparison","complexity"],"question":"Both the sorted converging two-sum and a hash-set two-sum run in `O(n)` time. On ALREADY-sorted input, what is the concrete reason to prefer the converging two-pointer version?","code":"","codeLang":"","options":["Converging uses `O(1)` extra space, while the hash set uses `O(n)`; on sorted input you get the space win for free","Converging avoids the sort, but the hash-set version would first need an `O(n log n)` sort to function","The hash set cannot find a pair on sorted data because hashing requires unsorted keys","Converging is faster asymptotically, running in `O(log n)` versus the hash set's `O(n)`"],"answer":0,"explanation":"On sorted input converging two pointers needs only a couple of indices, giving `O(1)` extra space, whereas the hash-set approach stores up to n keys for `O(n)` space; both are `O(n)` time so the differentiator is space. Option 1 is wrong: converging is `O(n)` time, not `O(log n)`. Option 3 is false: a hash set works regardless of input order. Option 4 is wrong: the hash-set two-sum needs no sort to function, so the contrast is space, not an extra sort cost."},{"id":"two-pointers-h01","topic":"Two Pointers","slug":"two-pointers","difficulty":"hard","tags":["when-to-apply","pitfall"],"question":"You are given an UNSORTED array and must return the original 0-based indices of the two elements that sum to `target`. A candidate proposes: sort the array, run the converging two-pointer Two Sum, and return the two indices where `L` and `R` land. Why is this approach incorrect for this problem?","code":"","codeLang":"","options":["The approach is actually correct and runs in `O(n)` time overall, because `Array.Sort` plus one converging pass is linear in the array length.","Sorting reorders the elements, so the `L` and `R` positions found refer to the sorted array, not the original indices the problem asks for; the correct tool is a hash map giving `O(n)` time and `O(n)` space.","Converging two pointers cannot find a pair that sums to a target value at all; it only works for palindrome and reverse-style comparisons, so a nested loop is required.","After sorting, the array is sorted, so converging two pointers is invalid because converging requires the input to be unsorted to retire a row or column each step."],"answer":1,"explanation":"The reviewer's Pitfalls section states explicitly that if the array is unsorted and you must return ORIGINAL indices, sorting destroys them, so you must use a hash map (`O(n)` time, `O(n)` space). That makes option 1 correct. Option 2 is wrong: converging two pointers is precisely the canonical sorted-two-sum technique (LC 167), so it certainly can find a target-summing pair. Option 3 inverts the requirement -- converging needs SORTED input for sum problems, not unsorted. Option 4 is wrong because the sort itself is `O(n log n)`, so the overall approach is not linear, and it is incorrect regardless of speed because indices are lost."},{"id":"two-pointers-h02","topic":"Two Pointers","slug":"two-pointers","difficulty":"hard","tags":["trace","invariant"],"question":"This is the LC 11 Container With Most Water solution. For the input shown, what value does it return, and which single move rule guarantees no wider better container is skipped?","code":"int left = 0, right = height.Length - 1, best = 0;\nwhile (left \u003c right)\n{\n    int area = (right - left) * Math.Min(height[left], height[right]);\n    best = Math.Max(best, area);\n    if (height[left] \u003c height[right]) left++;\n    else right--;\n}\nreturn best;\n// height = [1, 8, 6, 2, 5, 4, 8, 3, 7]","codeLang":"csharp","options":["Returns 49; always advancing the pointer at the shorter wall is safe because every container using that shorter wall is narrower and capped in height by it, so none can beat the current best.","Returns 56; the area uses `max(height[left], height[right])` times width, so the tallest pair of walls dominates the result.","Returns 16; the loop must move both pointers each iteration, so width drops by two per step and the maximum area is found at the midpoint pair.","Returns 49; always advancing the pointer at the taller wall is safe because the taller wall fixes the maximum possible height for all remaining containers."],"answer":0,"explanation":"Tracing per the reviewer's own table, the best area is 49 (from `L=1(8)`, `R=8(7)`: width 7 times min(8,7) = 49). The reviewer states the correct greedy rule is to move the pointer at the SHORTER wall, because every container that used the shorter wall is both narrower and height-capped by it, so discarding them loses nothing. Option 2 names the taller wall, which the Pitfalls section explicitly calls wrong (moving the taller wall can only lose area). Option 3 is wrong on both the value and the mechanics: only one pointer moves per iteration. Option 4 misstates the area formula -- it uses `min`, not `max`, of the two heights, so 56 is impossible."},{"id":"two-pointers-h03","topic":"Two Pointers","slug":"two-pointers","difficulty":"hard","tags":["complexity","comparison"],"question":"For sorted Two Sum (LC 167), the converging two-pointer solution and a hash-set solution both run in `O(n)` time. The reviewer highlights that two pointers achieves `O(1)` extra space while the hash approach uses `O(n)`. Which statement most precisely explains WHY the converging method can drop to `O(1)` space here?","code":"","codeLang":"","options":["Because the hash set in Two Sum is asymptotically slower than two pointers, the `O(1)` space is a direct consequence of the faster `O(n)` runtime of the converging scan.","Because the converging scan reuses the input array as a hash table, storing complements in unused slots so no separate structure is allocated.","Because the input is already sorted, the order itself tells you which pointer to move, so you never need to store previously seen values to look up a complement; you only carry two indices.","Because converging two pointers sorts the array in place using `O(1)` space, eliminating the auxiliary array that the hash approach needs to sort first."],"answer":2,"explanation":"The reviewer states plainly: the hash-set Two Sum is also `O(n)` time but `O(n)` space, and here we pay only `O(1)` BECAUSE the input is sorted -- the sort order tells you which pointer to move, so no seen-values structure is needed. That is option 1. Option 2 is a non sequitur: both methods are `O(n)` time, so runtime does not 'cause' the space difference. Option 3 is wrong because the converging scan does not sort anything (LC 167 input arrives sorted); sorting it would itself add cost. Option 4 invents an in-place-hashing scheme that the algorithm never does -- it stores no complements at all."}];</script>
