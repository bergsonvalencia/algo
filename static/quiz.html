tacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"hard","tags":["complexity","amortized"],"question":"A candidate claims the Daily Temperatures monotonic-stack solution is O(n^2) because it has a `while` loop nested inside a `for` loop, and points to an input like a strictly decreasing array `[5,4,3,2,1]` followed by a single large value `6`. What is the correct assessment of the time complexity and why?","code":"","codeLang":"","options":["It is genuinely O(n^2): the trailing `6` triggers the inner `while` to pop all n-1 prior indices in one iteration, which is the quadratic worst case.","It is O(n) amortized: each index is pushed exactly once and popped at most once, so the total number of inner-loop pops across the whole run is bounded by n, regardless of how they cluster.","It is O(n^2) on average but O(n) in the best case, so the tight bound stated for the pattern only holds when the input is already increasing.","It is O(n log n), because maintaining the monotonic ordering on the stack costs a logarithmic insertion per element."],"answer":1,"explanation":"The total work is O(n) amortized. The inner `while` can pop many elements in one outer iteration, but every index is pushed exactly once and popped at most once over the entire scan, so summed across all iterations the inner loop runs at most n times total — the heavy `6` iteration is 'charged' to the n-1 light pushes that preceded it. Option 0 confuses a single expensive iteration with quadratic total work; clustering pops into one step does not change the n total. Option 1 is wrong because the bound is O(n) for all inputs, not just increasing ones — amortized analysis covers the worst case. Option 3 is wrong because the stack is maintained by simple push/pop, not an ordered insertion; there is no log factor."},{"id":"monotonic-stack-h03","topic":"Stacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"hard","tags":["pitfall","template"],"code":"string[] tokens = { \"6\", \"3\", \"-\", \"4\", \"/\" };\nvar st = new Stack\u003cint>();\nforeach (string tok in tokens) {\n    if (tok is \"+\" or \"-\" or \"*\" or \"/\") {\n        int a = st.Pop();   // \u003c-- first pop\n        int b = st.Pop();   // \u003c-- second pop\n        st.Push(tok switch {\n            \"+\" => a + b, \"-\" => a - b,\n            \"*\" => a * b, _ => a / b });\n    } else st.Push(int.Parse(tok));\n}\nint result = st.Pop();","codeLang":"csharp","question":"This Reverse Polish Notation evaluator swaps the conventional operand naming: it computes `a - b` and `a / b` where `a` is the FIRST value popped. For the postfix tokens `[\"6\", \"3\", \"-\", \"4\", \"/\"]` (which should evaluate to `(6 - 3) / 4 = 0`), what does this code actually return, and why?","options":["It throws `InvalidOperationException`, because reversing the operand order leaves the stack with an extra unconsumed value at the end.","It returns `0`, because subtraction and division of the same two operands are unaffected by which one is labeled first.","It returns `0` correctly, because the `switch` evaluates `a / b` as `3 / 4` which truncates to `0` just like the intended `(6-3)/4`.","It returns `-1`: the first pop is treated as the left operand, so `-` computes `3 - 6 = -3`, then `4 / -3` truncates toward zero to `-1`."],"answer":3,"explanation":"The first value popped is the RIGHT operand and the second is the left, so correct code computes `left OP right` = `second - first`. Here the code wrongly uses `a` (first pop) as the left operand, computing `a - b` = `3 - 6 = -3`, pushing `-3`. Then `/` pops `4` (first, now wrongly the left) and `-3` (second), computing `4 / -3`, which truncates toward zero in C# to `-1`. So it returns `-1`, not `0`. Option 0 is wrong because subtraction and division are non-commutative, so operand order absolutely matters. Option 2 invents a `3 / 4` that never happens given the swapped order. Option 3 is wrong: the operand count is balanced regardless of order, so exactly one value remains and no exception occurs."},{"id":"monotonic-stack-h04","topic":"Stacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"hard","tags":["when-to-apply","comparison"],"question":"You must, for each element of an array, find the nearest STRICTLY GREATER element to its LEFT (the 'previous greater element'). Which single combination of stack direction and scan correctly resolves this with one linear pass, and what plays the role of the answer?","code":"","codeLang":"","options":["Scan left-to-right with an increasing stack; pop while the top is greater than the current element, and the previous-greater is the last value popped.","A monotonic stack cannot answer 'previous greater'; only a sliding-window monotonic deque can resolve left-side boundaries in linear time.","Scan left-to-right with a decreasing stack; the previous-greater of the current element is whatever remains on top of the stack after popping all elements that are less than or equal to it, before pushing the current element.","Scan right-to-left with an increasing stack; the previous-greater is the current incoming element at the moment it pops a smaller element off the stack."],"answer":2,"explanation":"For 'previous greater to the left', scan left-to-right and maintain a decreasing stack. Before pushing element i, pop every top that is \u003c= the current value; the element left on top is the nearest strictly greater element to the left (or none if the stack empties). The source notes the element left on top after processing is the nearest unresolved boundary, which is exactly the previous greater/smaller. Option 2 is wrong: an increasing stack and 'last popped' logic resolves a different relationship, and the popped element is smaller, not the boundary. Option 3 inverts the scan direction; a right-to-left scan resolves NEXT (to the right), not previous. Option 4 is false — a plain monotonic stack handles previous-greater for free; no deque is required."},{"id":"pattern-selection-e01","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"easy","tags":["pattern-recognition","sliding-window"],"question":"A problem asks for the length of the longest CONTIGUOUS substring that contains no repeating characters. Reading just that one cue, which pattern fits best?","code":"","codeLang":"","options":["Two pointers converging from both ends","Backtracking over all substrings","Sliding window","Binary search on the answer"],"answer":2,"explanation":"The phrase 'longest contiguous substring with a property' is the textbook sliding-window tell: you grow the right edge while the window stays valid and shrink the left edge when it breaks, tracking the best length in one O(n) pass. Two pointers converging from both ends is for sorted input where you pair or partition elements, not for growing/shrinking a contiguous range. Binary search needs a sorted/monotonic search space and a single boundary to find, which this prompt does not give. Backtracking enumerates every configuration in exponential time, which is wildly over budget when a linear window suffices."},{"id":"pattern-selection-e02","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"easy","tags":["complexity","input-size"],"question":"A problem says `1 \u003c= n \u003c= 20` and asks you to list every possible arrangement of the items. What does the tiny constraint signal about the intended approach?","code":"","codeLang":"","options":["An O(n) single-pass hashing solution is intended","An exponential/factorial backtracking enumeration is intended","An O(n log n) sort-based solution is intended","An O(log n) binary search is intended"],"answer":1,"explanation":"A bound as small as `n \u003c= 20` is itself the cue that an exponential or factorial enumeration is acceptable; the input-size table maps tiny `n` to O(2^n) / O(n!) patterns like backtracking, and 'list all arrangements' confirms backtracking specifically. An O(n log n) sort budget is what you reach for at `n \u003c= 1e5`, not at tiny n where enumerating everything is feasible. An O(n) hashing pass cannot produce every arrangement; it only counts or detects membership. O(log n) binary search applies to sorted/monotonic search spaces, which has nothing to do with enumerating all arrangements."},{"id":"pattern-selection-e03","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"easy","tags":["data-structure-choice","heap"],"question":"You must repeatedly extract the smallest pending task by priority from a set that keeps growing as new tasks arrive. Which data structure makes that hot operation cheapest?","code":"","codeLang":"","options":["A binary heap (priority queue)","A stack (LIFO)","A hash set","A plain dynamic array scanned each time"],"answer":0,"explanation":"The repeated operation is 'take the min (or max) repeatedly' from a changing collection, which the data-structure table answers with a binary heap / priority queue at O(log n) push and pop. A hash set gives O(1) membership and dedupe but has no notion of ordering, so it cannot surface the smallest element. A stack returns the most-recently-added item, not the minimum, so it answers a different access pattern. Scanning a plain array for the min each time is O(n) per extraction, strictly worse than the heap's O(log n)."},{"id":"pattern-selection-e04","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"easy","tags":["pattern-recognition","graph"],"question":"Given an unweighted graph, you need the shortest path (fewest edges) from a start node to a target node. Which algorithm is the right first choice?","code":"","codeLang":"","options":["Breadth-first search (BFS)","Topological sort","Dijkstra's algorithm","Depth-first search (DFS)"],"answer":0,"explanation":"On an unweighted graph, BFS explores level by level and therefore reaches each node by the fewest edges first, making it the standard shortest-path tool here. Dijkstra's algorithm is for graphs with non-negative edge weights; on a uniform-cost graph it is unnecessary overhead since BFS already gives the right answer. DFS dives down one branch before exploring others and does not visit nodes in increasing distance order, so it does not yield shortest paths. Topological sort orders the vertices of a DAG and answers ordering/dependency questions, not shortest-path distance."},{"id":"pattern-selection-e05","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"easy","tags":["pattern-recognition","monotonic-stack"],"question":"For each element of an array you must find the NEXT GREATER element to its right. Which pattern does this cue point to?","code":"","codeLang":"","options":["Sliding window","Prefix sums","Monotonic stack","Min-heap"],"answer":2,"explanation":"'Next greater (or smaller) element' is the signature cue for a monotonic stack, which keeps candidates in sorted order and resolves every element's answer in a single O(n) pass. A min-heap repeatedly serves the global min/max but has no efficient notion of 'next greater to the right' positionally, so it does not fit. A sliding window tracks a property over a contiguous range, not the nearest larger neighbor of each index. Prefix sums answer range-sum queries in O(1) and are unrelated to comparing each element against later ones."},{"id":"pattern-selection-e06","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"easy","tags":["pattern-recognition","two-pointers"],"question":"Given a SORTED array, you must find two numbers that add up to a target, using O(1) extra space. Which pattern is the natural fit?","code":"","codeLang":"","options":["A hash map storing complements","Two pointers converging from both ends","Backtracking over all pairs","Sliding window over the array"],"answer":1,"explanation":"A sorted array plus 'find a pair summing to target' with O(1) extra space is the classic converging two-pointers cue: start one pointer at each end and move them inward based on whether the sum is too big or too small, all in O(n) and no extra memory. A hash map storing complements also solves the pair-sum problem in O(n) time, but it uses O(n) extra space, violating the in-place O(1) requirement and ignoring that the array is already sorted. A sliding window maintains a contiguous range for subarray/substring properties, not an arbitrary pair drawn from both ends. Backtracking over all pairs is O(n^2) or worse and is unjustified when the sorted order enables a linear scan."},{"id":"pattern-selection-m01","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"medium","tags":["pattern-recognition","data-structure-choice"],"question":"You are given an array of `n \u003c= 1e5` integers and must return the length of the longest *contiguous* subarray whose sum is at most `k`, where all values are positive. Two ideas come to mind: sort then converge two pointers, or grow/shrink a running range. Which pattern fits best, and why?","code":"","codeLang":"","options":["Prefix sums alone, because any range sum is an O(1) subtraction once you precompute running totals","Sliding window, because the answer is a contiguous range whose property (sum \u003c= k) you maintain by expanding the right edge and shrinking the left","Binary search on the answer, because the longest-length property is monotonic over a sorted input","Two pointers on the sorted array, because converging from both ends finds the longest valid pair in O(n log n)"],"answer":1,"explanation":"The cue is a *contiguous* subarray with a maintained property ('longest ... with sum \u003c= k') and all-positive values, which the cue sheet maps directly to sliding window: expand the right edge while valid and shrink the left when the sum exceeds k, in O(n). Sorting plus two pointers is wrong because sorting destroys contiguity, and two pointers needs sorted input for pairing, not for contiguous-range problems. Prefix sums alone give O(1) range sums but do not by themselves locate the longest valid window; you would still scan all O(n^2) ranges. Binary search on the answer fails because the array is not sorted and there is no single monotonic boundary to bisect here without an inner window check anyway."},{"id":"pattern-selection-m02","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"medium","tags":["complexity","pattern-recognition"],"question":"A problem asks you to place `n` queens on an `n x n` board so none attack each other and to return *every* distinct valid arrangement. The constraint is `n \u003c= 12`. Which pattern is intended, and what tells you?","code":"","codeLang":"","options":["Dynamic programming, because the board has overlapping subproblems you can memoize into a number of arrangements","Backtracking, because you must enumerate all valid configurations and the tiny `n \u003c= 12` constraint signals an exponential search is acceptable","Bitmask DP, because `n \u003c= 12` always means you compress the state into an integer and count in O(2^n)","Greedy, because you can place each queen in the locally safest column and never reconsider"],"answer":1,"explanation":"Two cues converge on backtracking: you must produce *every* valid arrangement (the output is the set of solutions, the backtracking signature), and `n \u003c= 12` invites an O(n!)/O(2^n) search per the input-size table. DP is wrong because the ask is to list all arrangements, not count or optimize a single number; backtracking outputs the set, DP outputs a number or one optimum. Greedy fails because a locally safe placement can lead to a dead end that must be undone, so no exchange argument holds. The bitmask-DP option is a distractor: small `n` permits bitmasks as a speedup for the conflict columns, but you must still enumerate and print every arrangement, which is backtracking, not a counting DP."},{"id":"pattern-selection-m03","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"medium","tags":["data-structure-choice","pattern-recognition"],"question":"You process a stream of incoming numbers and, after each insertion, must report the `k`-th largest value seen so far. Which data structure makes the repeated 'k-th largest' query cheapest?","code":"","codeLang":"","options":["A sorted array you re-sort after each insertion, giving O(n log n) per query but always-correct order","A monotonic stack, since it keeps elements in order and exposes the next greater element in O(n)","A hash map of value-to-count, so you can look up any value in O(1) average and read off the k-th largest","A min-heap of size `k`, so its root is always the k-th largest and each insertion is O(log k)"],"answer":3,"explanation":"Repeated 'k-th largest / streaming top-K' is the heap cue: a size-k min-heap keeps the k largest seen, its root is exactly the k-th largest, and each insertion costs O(log k). A hash map gives O(1) membership and counts but no notion of rank, so it cannot answer 'k-th largest' without an extra sorted structure. Re-sorting an array each insertion is correct but wastefully O(n log n) per query, where the streaming cue specifically rewards the O(log k) heap. A monotonic stack solves next-greater-element problems, an unrelated cue; it does not maintain order statistics over a stream."},{"id":"pattern-selection-m04","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"medium","tags":["graph-traversal","pattern-recognition"],"question":"Given an unweighted grid where each cell is open or blocked, you must find the *minimum number of steps* from the start cell to the target cell, moving up/down/left/right. Which traversal is correct and why?","code":"","codeLang":"","options":["BFS, because in an unweighted graph the first time you reach the target by level-order expansion gives the fewest edges","Dynamic programming over the grid, because each cell's distance is the min of its neighbors plus one","DFS, because exploring one path fully to the target returns a valid route in O(V + E)","Dijkstra's algorithm, because shortest path always requires a priority queue over candidate distances"],"answer":0,"explanation":"The grid is an unweighted graph and the ask is the shortest path in edges, which the rapid-fire list maps to BFS: level-order expansion reaches the target first by the fewest steps. Dijkstra is overkill and a misconception here; it is for *weighted* graphs, and on uniform unit weights it degenerates to BFS with extra heap overhead. DFS finds *a* path but not necessarily the shortest, since it commits down one branch before exploring nearer cells. Grid DP fails because the movement graph has cycles (you can revisit cells), so there is no acyclic dependency order to fill a DP table over."},{"id":"pattern-selection-m05","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"medium","tags":["pattern-recognition","intervals"],"question":"You are given a list of meeting time ranges `[start, end]` and must return the minimum number of rooms needed so no two overlapping meetings share a room. Which approach fits the cue best?","code":"","codeLang":"","options":["Use a sliding window over the meetings, expanding while they overlap and shrinking when they do not","Sort the intervals and sweep, using a min-heap of end times to track concurrent meetings","Apply two pointers from both ends of the unsorted list to pair the earliest with the latest meeting","Build a prefix-sum array over start indices and read off the maximum running total"],"answer":1,"explanation":"Intervals `[start, end]` with overlap counting is the classic sort-and-sweep cue; sorting by start and sweeping while a min-heap holds active end times yields the peak concurrency (rooms needed). Sliding window is for *contiguous* subarrays/substrings of a sequence, not for overlap among unordered intervals, so its grow/shrink invariant does not apply. A prefix sum over raw start *indices* is meaningless here; you would need a difference array over the time axis, not the index axis, and even then it answers a different framing. Two pointers from both ends needs sorted input and a pairing semantics; pairing earliest with latest does not count maximum simultaneous overlap."},{"id":"pattern-selection-m06","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"medium","tags":["pattern-recognition","complexity"],"question":"A problem gives `n \u003c= 2000` and asks for the length of the longest strictly increasing subsequence (not necessarily contiguous). Which approach is the most natural fit given the constraints?","code":"","codeLang":"","options":["Backtracking that enumerates every subsequence and keeps the longest increasing one","An O(n^2) dynamic-programming scan where `dp[i]` is the best subsequence ending at `i`, affordable because `n \u003c= 2000`","Two pointers converging from both ends after sorting the array","A sliding window that grows while values increase and resets on a decrease"],"answer":1,"explanation":"Longest increasing *subsequence* has optimal substructure and overlapping subproblems, the DP cue; with `n \u003c= 2000` the input-size table explicitly permits an O(n^2) pairwise DP. A sliding window only finds the longest increasing *contiguous* run, a different and easier problem, because a window cannot skip elements while a subsequence may. Backtracking enumerates all 2^n subsequences, which is astronomically over budget even at n=2000 and is reserved for tiny `n`. Two pointers after sorting destroys the original order that a subsequence must respect, so it cannot reconstruct the increasing-subsequence length."},{"id":"pattern-selection-m07","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"medium","tags":["data-structure-choice","pattern-recognition"],"question":"For each element of an array you must find the *next greater element to its right* (or -1 if none), in O(n) total. Which structure and pattern is the standard fit?","code":"","codeLang":"","options":["A hash map from each value to its index, then an O(1) lookup of the next greater value","A monotonic stack, popping smaller pending elements as each new value resolves their next greater element","Binary search over the array for each element's first larger value to the right","A max-heap, repeatedly extracting the largest remaining element to assign answers"],"answer":1,"explanation":"'Next greater/smaller element' is the monotonic-stack cue: you keep a stack of indices awaiting a larger value, and each new element pops everything it exceeds, giving amortized O(n). A max-heap ignores positional 'to its right' ordering; the largest overall element is not the answer to any specific position's next-greater query. Binary search requires sorted data, and 'next greater to the right' is a positional, not value-sorted, relationship, so per-element search is both incorrect and O(n log n). A hash map gives O(1) lookup by key but stores no ordering information about which value is the next greater one scanning rightward."},{"id":"pattern-selection-m08","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"medium","tags":["pattern-recognition","binary-search"],"question":"You must split an array of `n \u003c= 1e5` positive integers into exactly `m` contiguous parts so as to minimize the largest part-sum. The answer (a candidate maximum sum) has the property that if a value `x` is feasible, every value above `x` is too. Which pattern does this signal?","code":"","codeLang":"","options":["Sliding window over the array tuned to the target sum per part","Dynamic programming partitioning, which is the only correct way to split an array into m parts","Binary search on the answer, because feasibility is monotonic in the candidate maximum sum","Greedy that always extends the current part until adding the next element would exceed the average"],"answer":2,"explanation":"The tell is an explicitly *monotonic* feasibility predicate over a numeric answer ('if x works, everything larger works'), which the cue sheet calls 'search on the answer', solved by binary search plus an O(n) greedy feasibility check. DP partitioning does solve this but at O(n^2 m), heavier than the O(n log(sum)) binary-search-on-answer and not the *only* way, so claiming exclusivity is the misconception. A bare greedy on the average has no exchange-argument guarantee and produces wrong splits. Sliding window maintains a contiguous-range property in one pass but cannot enforce 'exactly m parts minimizing the max'; there is no single window invariant capturing the global minimax objective."},{"id":"pattern-selection-m09","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"medium","tags":["pattern-recognition","data-structure-choice"],"question":"Given an array and many offline queries of the form 'sum of elements from index l to r' on a *static* (never-modified) array, which pattern answers each query in O(1)?","code":"","codeLang":"","options":["A segment tree with lazy propagation to batch the range queries","Prefix sums, precomputing running totals so each range sum is `P[r+1] - P[l]`","A sliding window recomputed from l to r for each query","A Fenwick (binary indexed) tree, the only structure that supports range-sum queries efficiently"],"answer":1,"explanation":"Many range-sum queries on a *static* array is the prefix-sums cue: an O(n) precomputation makes every query an O(1) subtraction `P[r+1] - P[l]`. A Fenwick tree is for ranges *with updates between queries*; calling it the only efficient option ignores that prefix sums are strictly simpler and faster (O(1) vs O(log n)) when the array never changes. A sliding window recomputed per query is O(n) each, defeating the purpose. A segment tree with lazy propagation targets dynamic range *updates*; for a static array it is overengineering with O(log n) queries instead of O(1)."},{"id":"pattern-selection-m10","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"medium","tags":["pattern-recognition","two-pointers"],"question":"Given a *sorted* array of `n \u003c= 1e5` integers, you must return all unique triplets that sum to zero. Which approach is the intended fit and why?","code":"","codeLang":"","options":["Fix one element, then converge two pointers over the remaining sorted range to find each pair, in O(n^2)","Slide a fixed-size window of three across the sorted array, advancing when the sum is too small","Binary search for the third element after picking each pair, giving O(n^2 log n)","Use a hash set of seen values and check membership for each pair, accepting O(n^2) time and O(n) extra space as the only viable plan"],"answer":0,"explanation":"Sorted input plus 'triplet summing to a target' is the two-pointers cue: fix the first element and converge a left/right pair over the sorted remainder, skipping duplicates, for O(n^2) time and O(1) extra space. The hash-set framing works but is not 'the only viable plan' and wastes O(n) space that the sorted two-pointer scan avoids; the false-exclusivity claim is the flaw. Binary searching for the third element adds an unnecessary log factor over the linear two-pointer inner scan on already-sorted data. A fixed-size window of three is wrong because the triplet elements need not be contiguous; sliding window maintains contiguous ranges, not arbitrary index combinations."},{"id":"pattern-selection-h01","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"hard","tags":["pattern-recognition","two-pointers","sliding-window"],"question":"You are asked for the length of the longest **contiguous** subarray of a **sorted** array whose elements all lie within a value range of at most `k` (i.e. `max - min \u003c= k` inside the window). The array is sorted ascending and `n \u003c= 1e5`. Which approach fits best?","code":"","codeLang":"","options":["Build a prefix-sum array and query ranges to find where the spread first exceeds k","Binary search on the answer length, checking feasibility of each candidate length","Two converging pointers, one from each end, moving the end with the larger value inward","Sliding window: grow the right edge, and since the array is sorted, shrink the left edge while nums[right] - nums[left] > k, tracking the max width"],"answer":3,"explanation":"The tell is 'longest **contiguous** subarray ... maintaining a property', which the cue sheet maps to Sliding Window; sortedness only makes the window monotonic (the min is at left, max at right) so a single expand/shrink pass is O(n). Converging two pointers from both ends is wrong because the answer is a contiguous run defined by a window property, not a pair found by meeting in the middle, and moving the larger end inward would skip valid windows. Binary search on the answer is unnecessary overkill: the window already finds the maximum directly in O(n) without a feasibility oracle, and feasibility here would itself need a scan. Prefix sums answer range-*sum* queries, but the property here is range *spread* (max - min), which prefix sums cannot compute."},{"id":"pattern-selection-h02","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"hard","tags":["complexity","pattern-recognition"],"question":"A problem gives `n \u003c= 18` cities and asks for the minimum-cost route that visits **every** city exactly once and returns to the start (classic TSP). Reading the constraint first, which pattern does `n \u003c= 18` point to?","code":"","codeLang":"","options":["Plain backtracking that enumerates all n! route orderings with pruning","Bitmask DP over subsets of visited cities, with state (subset, current city)","Greedy nearest-neighbor: always travel to the closest unvisited city","Dijkstra's algorithm from the start city to find the shortest path"],"answer":1,"explanation":"The input table says `n \u003c= 20` affords `O(2^n)` / `O(n^2 * 2^n)`, whose typical pattern is subset/bitmask DP; TSP's `O(n^2 * 2^n)` Held-Karp fits exactly in that budget for n = 18, and the subset-state cue ('visit every city, track which are used') is the bitmask-DP signature. Plain n! backtracking is `O(n!)`, which the ladder caps near n \u003c= 12, so 18! is astronomically over budget even with pruning. Dijkstra solves single-source shortest *path* on a weighted graph, not the visit-all-and-return optimization, so it answers the wrong question. Greedy nearest-neighbor has no exchange argument backing it for TSP and is a classic counterexample where the locally cheapest hop is not globally optimal."},{"id":"pattern-selection-h03","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"hard","tags":["pattern-recognition","prefix-sum","data-structure-choice"],"question":"Given an array that may contain negative numbers, count how many **contiguous** subarrays sum exactly to a target `k`. `n \u003c= 1e5`. The obvious idea is a sliding window. Why is the window wrong here, and what fits?","code":"","codeLang":"","options":["Prefix sums plus a hash map of seen prefix-sum counts; for each prefix P, add the count of P - k seen so far","Sort the array, then use two converging pointers to find pairs that sum to k","Binary search on the answer for the number of qualifying subarrays","Sliding window: expand right while the sum is below k and shrink left while it exceeds k"],"answer":0,"explanation":"This is the 'subarray sums to K' cue, which the cue sheet routes to Prefix Sums; storing prefix-sum frequencies in a hash map lets each position count subarrays ending there in O(1), giving O(n) overall. Sliding window is the trap: it relies on the sum changing monotonically as the window grows/shrinks, but with negative numbers expanding the window can *decrease* the sum, so the window invariant breaks and the technique is invalid. Sorting then two-pointering destroys contiguity; the subarrays must be contiguous, and sorting scrambles adjacency, so it answers a pair-existence question instead. Binary search on the answer needs a monotonic feasibility predicate, which counting subarrays does not provide."},{"id":"pattern-selection-h05","topic":"Pattern Selection","slug":"pattern-selection","difficulty":"hard","tags":["data-structure-choice","pattern-recognition"],"question":"You process a stream of integers and must answer, after each insertion, the **current median** of all values seen so far. There is no fixed array to preprocess. Which data-structure design fits the access pattern best?","code":"","codeLang":"","options":["A hash map counting occurrences of each value, scanned for the middle on each query","Two heaps: a max-heap for the lower half and a min-heap for the upper half, rebalanced so the median is read from the tops","Binary search over the value range, recomputed from scratch after each insertion","A single sorted array, inserting each new value in its correct position to keep it sorted"],"answer":1,"explanation":"'Streaming median' is listed in the cue sheet under Heaps & Priority Queues; the two-heap design keeps the smaller half in a max-heap and the larger half in a min-heap so each insert is O(log n) and the median is read in O(1) from the two roots. A single sorted array makes each insertion O(n) because shifting elements to keep order dominates, far worse for a long stream. A frequency hash map gives O(1) counting but offers no order, so finding the middle element requires an O(range) or O(n) scan per query. Binary search over the value range needs sorted/monotonic structure to exploit, and recomputing from scratch each insert abandons the incremental nature of a stream, so it is both slower and a mismatch for the cue."},{"id":"prefix-sums-e01","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"easy","tags":["complexity","when-to-apply"],"question":"Using the length-`(n+1)` prefix-sum convention, after the prefix array is built, what is the time cost of answering a single range-sum query `sum of nums[i..j]`?","code":"","codeLang":"","options":["`O(1)` — a single subtraction `prefix[j+1] - prefix[i]`","`O(n)` — you must still loop over the range each time","`O(log n)` — a binary search into the prefix array","`O(j - i)` — proportional to the length of the queried slice"],"answer":0,"explanation":"The whole point of prefix sums is 'precompute once, query many': after the `O(n)` build, any range sum is the single subtraction `prefix[j+1] - prefix[i]`, which is `O(1)` regardless of how wide the range is. `O(n)` describes the naive re-summing the prefix array eliminates. `O(log n)` would be a binary search, which is not used here — the index is computed directly. `O(j - i)` is the cost of summing the slice element by element, exactly what prefix sums avoid."},{"id":"prefix-sums-e02","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"easy","tags":["template","invariant"],"question":"In the standard length-`(n+1)` convention with `prefix[0] = 0`, what does the entry `prefix[k]` hold?","code":"","codeLang":"","options":["The sum of the last `k` elements, indices `n-k..n-1`","The value `nums[k]` itself, copied unchanged","The sum of elements at indices `0..k` (inclusive of index `k`)","The sum of the first `k` elements, indices `0..k-1` (everything strictly before index `k`)"],"answer":3,"explanation":"By the convention in the reviewer, `prefix[k] = nums[0] + ... + nums[k-1]` — the running total of the first `k` elements, everything strictly before index `k`, which is why `prefix[0] = 0` (nothing precedes index 0). The second option describes the alternative length-`n` inclusive convention (`prefix[i]` includes `i`), which forces a special case at `i == 0` and a different query formula. The third option confuses the prefix array with the original array. The fourth option describes a suffix sum, not a prefix sum."},{"id":"prefix-sums-e03","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"easy","tags":["when-to-apply","pitfall"],"question":"You must count contiguous subarrays whose sum equals `k`, and the array contains negative numbers. Which approach is sound?","code":"","codeLang":"","options":["Sorting the array first, then using two pointers","A plain length-`(n+1)` prefix array with no hash map, scanning pairs in `O(1)` total","A sliding window that grows then shrinks based on the running sum","Prefix sums combined with a hash map of prefix counts"],"answer":3,"explanation":"With negatives present the running sum is no longer monotone, so a sliding window has no valid shrink direction; the sound tool is prefix sums plus a hash map, which compares prefix values by equality (`prefix[i] == sum - k`) and is sign-agnostic. The sliding-window option is exactly the approach that fails with negatives. Sorting destroys the contiguity the problem requires — reordering elements makes subarrays meaningless. The last option misstates the cost: even with a prefix array you would need `O(n)` work and a hash map to count matches; there is no `O(1)`-total pair scan."},{"id":"prefix-sums-e04","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"easy","tags":["template","difference-array"],"question":"To add `val` to every element of `nums[l..r]` using a difference array, which two `O(1)` edits do you record?","code":"","codeLang":"","options":["`diff[l] += val` and `diff[r+1] -= val`","`diff[l] += val` and `diff[r] += val`","`diff[l] -= val` and `diff[r+1] += val`","`diff[l] += val` and `diff[r] -= val`"],"answer":0,"explanation":"The difference-array update turns the increment on at the start of the range with `diff[l] += val` and turns it off just past the end with `diff[r+1] -= val`; a later prefix-sum pass replays these markers into the final array. Stopping at `r` instead of `r+1` drops `val` from index `r`. Reversing the signs subtracts instead of adds across the range. Adding at both ends keeps the increment running off the end of the range instead of stopping it."},{"id":"prefix-sums-m01","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"medium","tags":["when-to-apply","pitfall"],"question":"You must answer many `sumRange(i, j)` queries on an array, but between some queries a single element of the array gets updated to a new value. Which approach is correct and efficient for this workload?","code":"","codeLang":"","options":["A Fenwick tree (BIT) or segment tree, which supports point updates and range queries in `O(log n)`","An immutable 1D prefix-sum array, rebuilt from scratch after each update","A plain prefix-sum array built once in the constructor; updates do not affect it","A difference array, applying each point update as two `O(1)` edits and reading after each query"],"answer":0,"explanation":"The reviewer states repeatedly that prefix sums assume an immutable array; once updates are interleaved with queries the prefix approach is invalidated and you should switch to a Fenwick/BIT or segment tree (which give `O(log n)` point update and range query). Rebuilding the whole prefix array after every update is `O(n)` per update, defeating the point. A difference array is built for batched range updates read once at the end, not interleaved point-update/query traffic. A static prefix array becomes stale the moment the underlying value changes, so its query answers go wrong."},{"id":"prefix-sums-m02","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"medium","tags":["template","invariant"],"question":"In the LC 560 prefix-sum + hash map solution for counting subarrays summing to `k`, a developer reorders the loop body so the current prefix is recorded in the map BEFORE the lookup of `sum - k`. With `k = 0`, what is the specific consequence of this reordering?","code":"sum += x;\ncount[sum] = count.GetValueOrDefault(sum) + 1;   // record first\nif (count.TryGetValue(sum - k, out int seen))\n    result += seen;                                // then look up","codeLang":"csharp","options":["It over-counts by pairing the current prefix with itself, falsely counting a zero-length subarray when `sum - k == sum`","It under-counts because the seed `count[0] = 1` is now ignored","It throws a key-not-found exception because `sum` was just inserted","It has no effect on correctness; only the running time changes"],"answer":0,"explanation":"The reviewer explicitly warns to look up `sum - k` BEFORE recording `sum`, precisely to avoid pairing the current prefix with itself; when `k == 0`, `sum - k == sum`, so recording first means the just-inserted prefix is found and a spurious zero-length subarray is counted, inflating the result. The `count[0] = 1` seed is still present and still used, so under-counting is not the failure mode. The reordering does change correctness, not just speed. And a `Dictionary` lookup of a missing key does not throw — `TryGetValue` returns false — and here the key was inserted, so no exception arises either way."},{"id":"prefix-sums-m03","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"medium","tags":["complexity","comparison"],"question":"You must apply `m` range-increment updates of the form \"add `val` to `nums[l..r]`\" to an array of length `n`, and you only need to read the final array once, after all updates are applied. What is the total time complexity using a difference array versus the naive approach of looping over each range?","code":"","codeLang":"","options":["Difference array `O(n + m)`; naive `O(n·m)`","Difference array `O(n·m)`; naive `O(n + m)`","Difference array `O(m log n)`; naive `O(n·m)`","Both `O(n + m)`, since each update touches only two indices in either approach"],"answer":0,"explanation":"The reviewer states that with a difference array each of the `m` updates is two `O(1)` edits (`O(m)` total) and one final prefix-sum pass materializes the array in `O(n)`, giving `O(n + m)`; the naive approach re-touches every element of every range, costing `O(n·m)`. The second option swaps the two. The third invents a logarithmic factor that belongs to Fenwick/segment trees, not to a difference array. The fourth is wrong about the naive approach: a naive range loop touches up to `n` elements per update, not two, so it is not `O(n + m)`."},{"id":"prefix-sums-m04","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"medium","tags":["template","invariant"],"question":"Using the 2D integral image below (a `(R+1)×(C+1)` array with a zero border), what is the sum of the rectangle with inclusive corners `(1,1)` (top-left) to `(2,2)` (bottom-right)?","code":"matrix (3x3):            cumulative P (4x4, zero border):\n        c0 c1 c2              0   0   0   0\n r0 [  1   2   3 ]           0   1   3   6\n r1 [  4   5   6 ]           0   5  12  21\n r2 [  7   8   9 ]           0  12  27  45\n\nformula: P[r2+1][c2+1] - P[r1][c2+1] - P[r2+1][c1] + P[r1][c1]","codeLang":"text","options":["45 (= P[3][3], the whole corner-rectangle)","32 (= 45 - 6 - 12, omitting the add-back corner)","26 (= 45 - 6 - 12 - 1, subtracting the corner instead of adding it)","28 (= 45 - 6 - 12 + 1)"],"answer":3,"explanation":"Applying the inclusion–exclusion formula with `r1=1, c1=1, r2=2, c2=2`: `P[3][3] - P[1][3] - P[3][1] + P[1][1] = 45 - 6 - 12 + 1 = 28`, which equals `5+6+8+9`. Taking only the whole corner-rectangle (45) skips removing the top and left strips. The value 32 forgets the add-back term, leaving the double-subtracted top-left corner uncorrected. The value 26 subtracts the corner instead of adding it, doubling the very error inclusion–exclusion exists to fix."},{"id":"prefix-sums-m05","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"medium","tags":["pitfall","overflow"],"question":"An interviewer gives an array of up to `10^5` integers, each near `int.MaxValue`, and asks you to answer many range-sum queries with a prefix-sum array. The candidate's prefix array is declared as `int[]`. What is the principal correctness risk, and the standard fix?","code":"","codeLang":"","options":["An out-of-bounds read at `prefix[j+1]`; declare the array with length `n` instead of `n + 1`","A null-reference error on the first query; initialize `prefix[0]` to the first element instead of 0","Loss of precision from floating-point rounding; switch the accumulator to `double`","Silent integer overflow as the running total exceeds `int` range; accumulate the prefix in `long` (or use `checked` arithmetic)"],"answer":3,"explanation":"The reviewer warns that a prefix sum accumulates the whole array, so with up to `10^5` elements near `int.MaxValue` the total overflows `int` and silently wraps; the fix is a `long` accumulator (or `checked` to throw instead of wrapping). The correct length is `n + 1` with a sentinel zero, and shrinking it to `n` would itself cause out-of-bounds reads at `prefix[j+1]`. The values are integers — there is no floating-point rounding, and `double` would lose integer precision at large magnitudes. And `prefix[0]` must be 0 (the empty-prefix sentinel); overflow, not a null reference, is the actual hazard."},{"id":"prefix-sums-h01","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"hard","tags":["invariant","pitfall","template"],"question":"A candidate writes a variant of the LC 560 counter. For each element they FIRST record the current prefix in the map (`count[sum]++`) and THEN add `count[sum - k]` to the result, keeping the seed `count[0] = 1`. What is the fundamental bug introduced by swapping the lookup and the record?","code":"long sum = 0; int result = 0;\nvar count = new Dictionary\u003clong,int> { [0] = 1 };\nforeach (int x in nums) {\n    sum += x;\n    count[sum] = count.GetValueOrDefault(sum) + 1; // record FIRST\n    if (count.TryGetValue(sum - k, out int seen))\n        result += seen;                            // then look up\n}","codeLang":"csharp","options":["Recording first makes the seed `count[0] = 1` redundant, so subarrays starting at index 0 are now double-counted","The bug only affects arrays containing negative numbers; for all-non-negative input the swapped order produces the identical count","Recording before the lookup lets the current prefix match itself, so a zero-length subarray is counted whenever `k == 0`, overcounting the result","The swap changes the time complexity from `O(n)` to `O(n^2)` because each lookup must now rescan the map"],"answer":2,"explanation":"The source states the lookup must happen BEFORE recording the current prefix so the map holds only strictly-earlier prefixes; otherwise the current prefix can pair with itself, falsely counting a zero-length subarray when `k == 0`. The overcount is triggered by `k == 0` making `sum - k == sum`, independent of whether negatives are present. The seed represents the empty prefix and is still needed; recording-first does not make it redundant, it adds a spurious self-match. And dictionary lookups remain `O(1)` average, so complexity stays `O(n)` regardless of order."},{"id":"prefix-sums-h02","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"hard","tags":["complexity","when-to-apply","template"],"question":"You must support a long stream of operations on an initially-zero array of size `n`: a batch of `m` range-increment updates `[l, r, +v]`, followed by `q` arbitrary range-sum queries `sumRange(i, j)`, with NO update interleaved after the first query begins. Which single approach achieves the best asymptotic total time, and why is it sound here?","code":"","codeLang":"","options":["Re-apply every update by looping over its range (`O(m·n)`) and answer each query by re-summing its range (`O(q·n)`), since the array is small enough that constants dominate","Build a 2D integral image so both updates and queries become `O(1)`, for `O(n + m + q)` total","Apply all updates into a difference array (`O(m)` total), prefix-sum it once to materialize the final array (`O(n)`), then build a prefix-sum array over that and answer each query in `O(1)` — total `O(n + m + q)`","Use a Fenwick/BIT because range updates are present, giving `O((n + m + q) log n)`, since difference arrays cannot coexist with range-sum queries"],"answer":2,"explanation":"The workload is batched range updates followed by a read-only query phase, which the source identifies as exactly the difference-array sweet spot: record two `O(1)` edits per update (`O(m)`), one prefix-sum pass materializes the array (`O(n)`), and since the array is then immutable a prefix-sum array answers each query in `O(1)` (`O(q)`) — total `O(n + m + q)`. A Fenwick is only required when updates and queries INTERLEAVE; here they do not, so the `log n` factor is unnecessary, and difference arrays compose fine with a follow-on prefix sum. The naive re-loop is the `O((m + q)·n)` baseline the pattern is designed to beat. A 2D integral image addresses matrix range-sum queries, not 1D batched increments, and does not give `O(1)` range updates."},{"id":"prefix-sums-h03","topic":"Prefix Sums & Difference Arrays","slug":"prefix-sums","difficulty":"hard","tags":["pitfall","template","invariant"],"question":"In the 2D integral-image build, a candidate writes the recurrence as `P[r][c] = matrix[r-1][c-1] + P[r-1][c] + P[r][c-1]`, omitting the final `- P[r-1][c-1]` term. They keep the correct zero border and the correct four-lookup query formula. On a non-trivial matrix, what is the precise consequence?","code":"P[r,c] = matrix[r-1][c-1]\n       + P[r-1, c]\n       + P[r, c-1];\n       // missing: - P[r-1, c-1]","codeLang":"csharp","options":["The build still works but each query now costs `O(R·C)` instead of `O(1)` because the missing term must be recomputed at query time","Only the first row and first column become incorrect; all fully-interior cells `P[r][c]` with `r,c >= 2` are unaffected","It is harmless: the missing term cancels against the `+ P[r1][c1]` add-back in the query formula, so all rectangle sums remain correct","The overlapping top-left submatrix region `P[r-1][c-1]` is added twice into every interior cell, so cumulative sums are inflated and grow increasingly wrong toward the bottom-right"],"answer":3,"explanation":"The source's build recurrence includes `- P[r-1][c-1]` specifically to correct the double-counted overlap: `P[r-1][c]` and `P[r][c-1]` both already include the top-left submatrix `P[r-1][c-1]`, so without subtracting it once that region is counted twice. The error compounds through the recurrence, inflating cells more toward the bottom-right. The query's `+ P[r1][c1]` is inclusion-exclusion over a DIFFERENT (correctly-built) table and cannot repair a corrupted build. The corruption appears in the very first interior cell `P[2][2]` and propagates, not just row/column 1. And the query is still four lookups and `O(1)`; the values are simply wrong, complexity is unchanged."},{"id":"quick-dsa-e01","topic":"Quick DSA Review","slug":"quick-dsa","difficulty":"easy","tags":["complexity","when-to-apply"],"question":"Reading `arr[1000]` from a plain array takes exactly the same time as reading `arr[0]`. What is the time complexity of array index access, and why is it constant regardless of position?","code":"","codeLang":"","options":["`O(n)` — the array must be scanned from the start until position `i` is reached","`O(log n)` — the array is searched by repeatedly halving the range to the target index","`O(1)` — element `i` lives at `base_address + i * element_size`, found with one calculation","`O(n)` — every later element is shifted to expose the element at position `i`"],"answer":2,"explanation":"An array is a contiguous block of equal-size elements, so the address of element `i` is computed directly as `base_address + i * element_size` — one multiply and add, independent of `i` or `n`, which is the definition of `O(1)` random access. `O(log n)` describes binary search over a sorted range, not a direct index read — no halving happens. `O(n)` scanning from the start is how a linked list reaches the `i`-th element, not an array. Shifting later elements is the cost of inserting or deleting in the middle, not of reading by index."},{"id":"quick-dsa-e02","topic":"Quick DSA Review","slug":"quick-dsa","difficulty":"easy","tags":["when-to-apply","template"],"question":"A text editor needs an \"undo\" feature: the most recently performed action must be the first one reverted. Which data structure naturally models this \"most recent first\" behavior?","code":"","codeLang":"","options":["A stack (LIFO) — push each action, and pop the most recent one to undo it","A min-heap — push each action and pop the smallest-valued one to undo it","A queue (FIFO) — enqueue each action, and dequeue the oldest one to undo it","A hash map — store each action by key and look it up in `O(1)` to undo it"],"answer":0,"explanation":"A stack is Last-In-First-Out, so pushing each action and popping returns the most recently added one first — exactly the \"most recent first\" semantics of undo, which the source names as the classic stack use case. A queue is FIFO, so dequeuing would revert the oldest action first, the opposite of undo. A hash map gives fast lookup by key but has no notion of recency order, so it cannot tell you which action was most recent. A min-heap serves the smallest priority value, not the most recently inserted item, so it does not model recency either."},{"id":"quick-dsa-e03","topic":"Quick DSA Review","slug":"quick-dsa","difficulty":"easy","tags":["complexity"],"question":"On average, what is the time complexity of looking up a value by its key in a hash map, and what makes that possible?","code":"","codeLang":"","options":["`O(1)` average — a hash function maps the key straight to its bucket in constant time","`O(n log n)` — the table is re-sorted on each lookup to locate the key","`O(n)` — every key-value pair must be scanned until the matching key is found","`O(log n)` — the keys are kept sorted, so lookup halves the range each step"],"answer":0,"explanation":"A hash map computes `hash(key) % size` to jump directly to the bucket holding the value, so an average lookup is `O(1)` — the source calls this \"the holy grail\" of constant-time key lookup. `O(log n)` halving applies to sorted/tree-based maps like a balanced BST, but a hash map keeps no order. `O(n)` full scanning is what you avoid by hashing; it only approaches `O(n)` in the worst case when many keys collide into one bucket. `O(n log n)` re-sorting never occurs on lookup — a hash map does not sort its keys at all."},{"id":"quick-dsa-m01","topic":"Quick DSA Review","slug":"quick-dsa","difficulty":"medium","tags":["complexity","amortized"],"question":"A teammate writes a custom dynamic array that, instead of doubling, grows its backing array by a fixed `+1` slot every time it fills up. Starting from capacity 0, they append `n` elements. What is the total cost of all `n` appends, and why does this differ from the standard `List\u003cT>`?","code":"","codeLang":"","options":["`O(n log n)` total — the copies form a logarithmic series because the array still grows on every insert","`O(n)` total, amortized `O(1)` per append — any growth strategy that copies on resize averages out to constant time","`O(n^2)` total — each resize copies all current elements, and `1 + 2 + ... + n` sums to `O(n^2)`, so growing by a constant *factor* (doubling) is what buys the amortized `O(1)`","`O(n)` total but `O(log n)` per append — fixed-increment growth makes each individual append logarithmic"],"answer":2,"explanation":"Growing by a fixed amount forces a resize on essentially every append, and each resize copies all current elements; the copy costs sum as `1 + 2 + ... + n`, which is `O(n^2)` total. The reviewer states explicitly that growing by a *fixed* amount (e.g. +10) makes appends `O(n)` overall, while growing by a *factor* (doubling) is what buys the amortized `O(1)`. Option 0 is wrong because not every resize strategy amortizes to constant — that property depends on geometric (factor) growth. Option 2 invents a logarithmic series that does not arise here. Option 3 misstates the cost as per-append logarithmic, which no simple-append growth scheme produces."},{"id":"quick-dsa-m02","topic":"Quick DSA Review","slug":"quick-dsa","difficulty":"medium","tags":["when-to-apply","pitfall"],"question":"You need a structure that supports fast lookup by key AND can return all keys in sorted order for periodic range reports. A colleague suggests a `Dictionary\u003cK,V>` (hash map) because its lookups are `O(1)` average. Why is this the wrong choice, and what should you use instead?","code":"","codeLang":"","options":["A hash map's lookups are actually `O(n)`, so it fails the fast-lookup requirement and a plain array should be used","The hash map is correct; you can simply iterate its buckets in index order to get sorted keys for free","A hash map cannot store more than one key, so it physically cannot support a range report","A hash map gives no ordering — keys are scattered across buckets by hash, so producing sorted output needs an extra `O(n log n)` sort each time; a `SortedDictionary` (balanced BST) keeps keys sorted at `O(log n)` per operation"],"answer":3,"explanation":"The reviewer states a hash map gives fast lookup but *no* sorted iteration, and that if you need keys in order you should use a sorted/tree-based map; bucket order reflects hash values, not key order. A `SortedDictionary`/`SortedSet` is a balanced BST that keeps keys sorted at `O(log n)`, supporting both lookup and ordered/range output. Option 0 is the exact misconception the source warns against — bucket order is not sorted order. Option 2 is false; a hash map stores many keys. Option 3 misstates hash-map lookup as worst-case rather than `O(1)` average, and a plain array does not give fast key lookup either."},{"id":"quick-dsa-m03","topic":"Quick DSA Review","slug":"quick-dsa","difficulty":"medium","tags":["heap","invariant"],"question":"An array is claimed to be a valid min-heap. Using the index relations `left = 2i+1` and `right = 2i+2`, decide whether the array below satisfies the min-heap property, and if not, identify a violating parent-child pair.","code":"index:  0   1   2   3   4   5\nvalue:  2   3   9   5   4   6","codeLang":"text","options":["Invalid — the parent at index 1 (value `3`) has a child at index 4 (value `4`), and `3 \u003c 4` is not allowed because a min-heap parent must be strictly greater than its children","Valid — every parent is `≤` both of its children, so the minimum `2` correctly sits at the root","Invalid — the parent at index 2 (value `9`) has a child at index 5 (value `6`), and `9 > 6` breaks the rule that each parent must be `≤` its children","Invalid — the array is not sorted ascending, and a min-heap's array must always be in sorted order"],"answer":2,"explanation":"The min-heap rule constrains only each parent against its own children. Checking by index: root 2 has children 3 and 9 (both larger, OK); index 1 (value 3) has children at index 3 (value 5) and index 4 (value 4), both `≥ 3`, OK; but index 2 (value 9) has a child at index 5 (value 6), and `9 > 6` violates parent `≤` child, so the heap is invalid. Option 0 is wrong because it overlooks that single violation. Option 2 reflects the common misconception that a heap array must be fully sorted — it only needs the partial parent/child order. Option 3 inverts the rule (claiming parent must exceed children) and flags a pair (`3 \u003c 4`) that is actually correct for a min-heap."},{"id":"quick-dsa-h01","topic":"Quick DSA Review","slug":"quick-dsa","difficulty":"hard","tags":["complexity","amortized","pitfall"],"question":"A teammate claims that because a dynamic array (`List\u003cT>`) appends in amortized `O(1)`, building a list of `n` items by calling `Add` in a loop is `O(n)` total, and that this would still hold if the implementation grew the backing array by a fixed `+1` slot on every resize instead of doubling. Which single statement is correct about this claim?","code":"","codeLang":"","options":["The first part is right and the second is wrong: doubling makes the loop `O(n)` total, but growing by a fixed `+1` each time forces a full copy on every append, making the loop `O(n^2)`.","Both parts are wrong: any single append that triggers a resize is `O(n)`, so the worst-case loop is always `O(n^2)` even with doubling.","The first part is wrong: doubling makes each append `O(log n)`, so building the list is `O(n log n)` total.","Both parts are right: amortized `O(1)` per append means `O(n)` total regardless of the growth strategy, since each append is constant on average either way."],"answer":0,"explanation":"The reviewer states append is amortized `O(1)` *because the capacity doubles*, so expensive `O(n)` copies are rare and the `n` appends sum to `O(n)` total. It explicitly warns that growing by a *fixed* amount instead of a *factor* would make appends `O(n)` overall — with `+1` growth, every append copies all prior elements, summing to 1+2+...+n = `O(n^2)`. Option 1 captures both facts. Option 2 is wrong because amortized `O(1)` is exactly what the doubling buys; fixed-increment growth does not give it. Option 3 confuses the worst-case cost of one resize with the amortized total over the whole sequence — averaging the rare copies keeps the total `O(n)`. Option 4 invents an `O(log n)` per-append cost that has no basis; indexing and amortized append are constant, not logarithmic."},{"id":"quick-dsa-h02","topic":"Quick DSA Review","slug":"quick-dsa","difficulty":"hard","tags":["heap","invariant","trace"],"question":"An engineer pops the minimum from this valid min-heap by replacing the root with the last array element and then sifting it down. After one pop of the array `[1, 4, 5, 8, 7]`, which resulting array is the correct, still-valid min-heap?","code":"min-heap as array:  [1, 4, 5, 8, 7]\n\n        (1)            index:  0  1  2  3  4\n       /   \\           value:  1  4  5  8  7\n     (4)    (5)\n     / \\\n   (8) (7)\n\npop-min: move last element (7) to the root, remove it\nfrom the end, then sift the new root down.","codeLang":"text","options":["[4, 7, 5, 8] — move 7 to the root, then sift down by swapping with its smaller child 4, leaving 7 above 8.","[5, 4, 7, 8] — move 7 to the root and swap it down the right branch with child 5.","[7, 4, 5, 8] — move 7 to the root and stop, since the heap only needs to track the new minimum at the end.","[4, 8, 5, 7] — move 7 to the root and swap it with child 8 because 8 sits in the slot the removed element vacated."],"answer":0,"explanation":"Pop-min moves the last element (`7`) to the root and sinks it: the root's children are `4` (index 1) and `5` (index 2); sift-down swaps with the *smaller* child, `4`, giving `[4, 7, 5, 8]`. Now `7` at index 1 has child `8` at index 3 and `7 \u003c= 8`, so it stops — every parent is `\u003c=` its children, a valid heap with the new min `4` at the root. Option 1 is correct. Option 2 leaves `7` above `4` and `5`, violating the parent-`\u003c=`-child invariant; the root must hold the minimum. Option 3 swaps with `8` instead of the smaller child `4`, which both breaks the invariant and ignores the rule that sift-down compares against the smaller child. Option 4 swaps with `5` rather than the smaller child `4`, again the wrong child."},{"id":"recursion-e01","topic":"Recursion & Divide-and-Conquer","slug":"recursion","difficulty":"easy","tags":["template","when-to-apply"],"question":"Which three parts must every correct recursive function have?","code":"","codeLang":"","options":["A pivot, a partition, and a one-sided recursive call","A memoization cache, a loop, and a return statement","A base case, a recursive case, and guaranteed progress toward the base case on every call","A divide step, a conquer step, and a combine step"],"answer":2,"explanation":"The reviewer states every correct recursion needs a base case (a smallest input solved without recursing), a recursive case (the answer expressed via a strictly smaller subproblem), and guaranteed progress so every path reaches a base case; missing any one loops forever, overflows the stack, or returns garbage. 'Divide / conquer / combine' is the divide-and-conquer template specifically, not the general requirement for any recursion. A memoization cache plus a loop describes optimization/iteration techniques, not the mandatory anatomy of a recursive function. Pivot/partition/one-sided recursion is the quickselect pattern, one particular algorithm, not the universal three parts."},{"id":"recursion-e02","topic":"Recursion & Divide-and-Conquer","slug":"recursion","difficulty":"easy","tags":["complexity"],"question":"What is the time complexity of merge sort in the worst case?","code":"","codeLang":"","options":["O(n log n)","O(n)","O(log n)","O(n^2)"],"answer":0,"explanation":"Merge sort is O(n log n) in best, average, AND worst cases: it always splits exactly in half (log n levels) and each level does O(n) total merge work, which is its headline advantage over quicksort. O(n^2) is quicksort's worst case (caused by bad pivots), not merge sort's, which never degrades. O(n) is too fast for any comparison sort and is instead quickselect's expected time. O(log n) is the cost of halving-based searches like binary search or fast exponentiation, not of sorting n elements."},{"id":"recursion-e03","topic":"Recursion & Divide-and-Conquer","slug":"recursion","difficulty":"easy","tags":["pitfall","complexity"],"question":"Why is naive recursive Fibonacci, `Fib(n) = Fib(n-1) + Fib(n-2)`, exponential in time?","code":"","codeLang":"","options":["Integer overflow forces the recursion to restart from the top repeatedly","Each call allocates a new array, so memory grows exponentially","It makes two recursive calls per invocation and recomputes the same overlapping subproblems many times","It lacks a base case, so the recursion never terminates"],"answer":2,"explanation":"The reviewer explains naive Fibonacci is tree recursion (two calls per node) over overlapping subproblems, so the same Fib(k) is recomputed many times (Fib(3) twice, Fib(2) three times for Fib(5)), giving O(phi^n) ~ O(2^n) calls; memoization collapses it to O(n). The blow-up is from repeated computation, not array allocation, and the naive version allocates no arrays. Integer overflow does not restart recursion; it would just produce a wrong value, not change the call count. The function does have a base case (n \u003c 2 returns n) and terminates correctly; it is merely slow, not infinite."},{"id":"recursion-m01","topic":"Recursion & Divide-and-Conquer","slug":"recursion","difficulty":"medium","tags":["complexity","when-to-apply"],"question":"You must find the contiguous subarray with the largest sum in `nums` (LC 53). A colleague proposes the divide-and-conquer approach (recurse on left half, right half, and the best crossing subarray). Compared to Kadane's algorithm, what is the correct characterization of the D&C approach's complexity here?","code":"","codeLang":"","options":["D&C runs in O(n log n) time and O(n) auxiliary space for the crossing-sum buffers","D&C runs in O(n log n) time and O(log n) stack space; Kadane's is strictly better at O(n) time and O(1) space","D&C runs in O(n²) time because the crossing scan re-examines the whole array at every node","D&C runs in O(n) time and O(1) space, matching Kadane's exactly"],"answer":1,"explanation":"The D&C max-subarray recurrence is `T(n) = 2·T(n/2) + O(n)` (the O(n) is the cross-boundary scan), which solves to O(n log n) time, with O(log n) recursion-stack space; Kadane's one-pass DP is strictly better at O(n)/O(1). Option 1 (O(n)/O(1)) is wrong because that describes Kadane's, not the D&C variant, which recurses into both halves. Option 2 invents O(n) buffers — the crossing sum is computed with two running-sum scalars, not an array. Option 3's O(n²) is wrong because the crossing scan at each level touches O(n) total across that level (not the whole array per node), and there are only log n levels."},{"id":"recursion-m02","topic":"Recursion & Divide-and-Conquer","slug":"recursion","difficulty":"medium","tags":["pitfall","template"],"question":"This recursive binary search compiles and returns the right answer on many inputs but hangs (then crashes) on others. What is the precise reason it can recurse forever?","code":"static int Search(int[] a, int lo, int hi, int target)\n{\n    int mid = (lo + hi) / 2;\n    if (a[mid] == target) return mid;\n    if (a[mid] \u003c target) return Search(a, mid, hi, target);\n    return Search(a, lo, mid, target);\n}","codeLang":"csharp","options":["The midpoint `(lo + hi) / 2` always rounds toward zero, so for odd-length ranges it skips the true middle element and loops","Passing `mid` instead of `mid + 1` only causes an off-by-one in the returned index, not infinite recursion","The recursion is fine; it crashes only because `a[mid]` reads out of bounds when `target` is absent","When `hi - lo == 1`, `mid == lo`, so the `a[mid] \u003c target` branch recurses on the identical `[lo, hi]` range and never shrinks it; there is also no `lo > hi` base case"],"answer":3,"explanation":"The right-half recursion passes `mid` (not `mid + 1`), so when the range has size 2 (`hi - lo == 1`), `mid` equals `lo` and the call recurses on the exact same `[lo, hi]`, making no progress; combined with the absent `lo > hi` 'not found' base case, that is unbounded recursion. Option 1 (rounding) is a red herring — integer division toward zero is the normal, correct midpoint behavior and does not cause looping. Option 2 understates the defect: it is not a mere off-by-one in the result; it fails to terminate. Option 3 is wrong because the loop is genuine, and out-of-bounds is not the cause — `mid` always stays in `[lo, hi]`."},{"id":"recursion-m03","topic":"Recursion & Divide-and-Conquer","slug":"recursion","difficulty":"medium","tags":["complexity","comparison"],"question":"Quickselect (LC 215) and merge sort both partition/split an array of size `n` and do O(n) work to split or combine at each level. Why is quickselect's expected time O(n) while merge sort is O(n log n)?","code":"","codeLang":"","options":["Quickselect partitions in place while merge sort allocates buffers, and avoiding allocation is what drops the log n factor","Quickselect recurses into only the one side holding the target, so per-level work forms the geometric series n + n/2 + n/4 + … = 2n; merge sort recurses into both halves, giving O(n) work across log n levels","Quickselect uses a random pivot, which mathematically removes a log n factor that merge sort's deterministic split cannot avoid","Quickselect's base case is reached in O(1) recursion depth, whereas merge sort always recurses to depth log n"],"answer":1,"explanation":"Quickselect recurses into just one side (the one containing the target index), so its recurrence is `T(n/2) + O(n)`, whose per-level partition costs form a geometric series summing to 2n = O(n); merge sort recurses into both halves (`2·T(n/2) + O(n)`), so every one of its log n levels does O(n) work, giving O(n log n). Option 1 is wrong: random pivoting only makes the O(n²) worst case improbable; it does not by itself remove a log n factor — recursing one side does. Option 2 confuses memory allocation with asymptotic time; in-place partitioning affects space, not the time class. Option 3 is false: quickselect's expected recursion depth is O(log n), not O(1) — the savings come from one-sided recursion, not shallower depth."},{"id":"recursion-m04","topic":"Recursion & Divide-and-Conquer","slug":"recursion","difficulty":"medium","tags":["trace","template"],"question":"This is the standard iterative pre-order DFS using an explicit stack. For the tree with root 1, children 2 (left) and 3 (right), and 2's children 4 (left) and 5 (right), what sequence does it output, and what one change would break pre-order ordering?","code":"var stack = new Stack\u003cTreeNode>();\nstack.Push(root);\nwhile (stack.Count > 0)\n{\n    TreeNode node = stack.Pop();\n    result.Add(node.Val);\n    if (node.Right is not null) stack.Push(node.Right); // push right first\n    if (node.Left  is not null) stack.Push(node.Left);  // then left\n}","codeLang":"csharp","options":["Output is 1 3 5 4 2; the code as written already visits the right subtree first","Output is 1 2 3 4 5; the stack produces a level-by-level (breadth-first) order regardless of push order","Output is 1 2 4 5 3; swapping the two pushes so left is pushed before right would make the left subtree pop last and break pre-order","Output is 4 5 2 3 1; popping happens after both children are pushed, yielding post-order"],"answer":2,"explanation":"Pushing right-then-left means left is on top and pops first, so the traversal matches recursive pre-order: visit 1, then descend left to 2, then 4, then 5, then back to 3 — output 1 2 4 5 3. If you swapped the pushes (left before right), the right child would sit on top and pop first, reversing subtree order and breaking pre-order. Option 1 reverses the order by misreading which child pops first. Option 2 is wrong because a stack (LIFO) yields depth-first, not breadth-first; that order would require a queue. Option 3 describes post-order, but this code visits each node immediately on pop (before its children), which is pre-order, not post-order."},{"id":"recursion-m05","topic":"Recursion & Divide-and-Conquer","slug":"recursion","difficulty":"medium","tags":["pitfall","complexity"],"question":"A candidate writes naive recursive Fibonacci, `Fib(n) = Fib(n-1) + Fib(n-2)`, and it times out for `n = 45`. Which statement correctly diagnoses the blow-up and the right fix?","code":"","codeLang":"","options":["It is tree recursion over overlapping subproblems, making O(φ^n) ≈ O(2^n) calls because the same Fib(k) is recomputed many times; memoization fixes it to O(n) time, O(n) space","It is exponential because each call does O(n) work internally; caching the loop bound, not the results, brings it to O(n)","Tail-call optimization would make it O(n); rewriting it in tail-recursive form is the standard fix in C#","The blow-up is from O(n) stack depth exhausting memory; converting to an explicit Stack\u003cT> makes it fast"],"answer":0,"explanation":"Naive Fibonacci makes two recursive calls per invocation (tree recursion) over overlapping subproblems, so identical values like Fib(3) and Fib(2) are recomputed repeatedly, giving O(φ^n) ≈ O(2^n) calls; memoizing each result collapses it to O(n) time and O(n) space. Option 1 misidentifies the cost: stack depth is only O(n) and is not the bottleneck — an explicit stack changes depth-safety, not the exponential call count. Option 2 is wrong because each call does O(1) work, not O(n); the explosion is the number of calls, and the fix is caching the results, not a loop bound. Option 3 is wrong because the problem is repeated subproblems, not missing TCO; moreover C# does not guarantee tail-call optimization, so that is not a reliable fix."},{"id":"recursion-h01","topic":"Recursion & Divide-and-Conquer","slug":"recursion","difficulty":"hard","tags":["complexity","when-to-apply"],"question":"Merge sort and quickselect both partition or split an array of size `n` and do O(n) work per split, yet merge sort is O(n log n) while quickselect is expected O(n). Which single fact explains why quickselect's expected cost collapses to O(n)?","code":"","codeLang":"","options":["Quickselect's partition step is O(log n) rather than O(n), removing one factor from the recurrence","Quickselect recurses into only the one side that contains the target, so the per-level work forms the geometric series `n + n/2 + n/4 + ... = 2n`","Quickselect avoids the O(log n) recursion levels because a random pivot lands the target on the first partition every time","Quickselect never recurses at all; it finds the target in a single in-place partition pass"],"answer":1,"explanation":"The source's master-theorem table and Q&A state quickselect's recurrence is `T(n) = T(n/2) + O(n)` because it recurses into only ONE side; that one-sided recursion makes the work a geometric series summing to 2n = O(n), versus merge sort's `2·T(n/2) + O(n)` = O(n log n). Option 1 is correct. Option 2 is wrong: partition is O(n), not O(log n) — the source explicitly lists partition as the O(n) divide cost. Option 3 is wrong: quickselect does recurse (or loop) until the pivot index equals the target; a single partition almost never lands the pivot on the target. Option 4 is wrong: a random pivot only makes the O(n²) worst case improbable; it does not place the target on the first partition, and expected O(n) comes from the geometric sum, not from skipping recursion levels."},{"id":"recursion-h02","topic":"Recursion & Divide-and-Conquer","slug":"recursion","difficulty":"hard","tags":["pitfall","template"],"question":"This divide-and-conquer helper is meant to recurse on two halves of `[lo, hi]`. For which inputs does it fail at runtime, and why?","code":"static int Solve(int[] a, int lo, int hi)\n{\n    if (lo == hi) return a[lo];\n    int mid = lo + (hi - lo) / 2;\n    int left  = Solve(a, lo, mid);\n    int right = Solve(a, mid, hi);   // note: mid, not mid + 1\n    return Math.Max(left, right);\n}","codeLang":"csharp","options":["It overflows only when `lo > hi` on entry, because the `lo == hi` base case cannot catch an inverted range","It overflows the stack whenever `hi - lo == 1`, because then `mid == lo` and the right call `Solve(a, mid, hi)` recurses on the identical `[lo, hi]` range forever","It overflows for all inputs of size greater than one, because `lo + (hi - lo) / 2` is not an overflow-safe midpoint","It returns a wrong maximum but always terminates, because the overlap at `mid` double-counts `a[mid]`"],"answer":1,"explanation":"The source's 'Common recursion bugs' section warns that recursing on `[lo, mid]` and `[mid, hi]` (overlapping at `mid`) causes infinite recursion when the range has size 2: with `hi - lo == 1`, `mid = lo + 0 = lo`, so `Solve(a, mid, hi)` is `Solve(a, lo, hi)` — the same range, never shrinking, until `StackOverflowException`. Option 1 is correct. Option 2 names a real missing guard but the wrong trigger: the failure happens on ordinary size-2 ranges, not only inverted ones. Option 3 is wrong: the bug is non-termination, not a wrong-but-finite answer. Option 4 is wrong: `lo + (hi - lo) / 2` is precisely the overflow-SAFE midpoint the source recommends; the defect is the `mid` vs `mid + 1` split, not the midpoint formula."},{"id":"recursion-h03","topic":"Recursion & Divide-and-Conquer","slug":"recursion","difficulty":"hard","tags":["pitfall","invariant"],"question":"In the `MyPow` implementation, the exponent is first widened with `long e = n;` before the line `if (e \u003c 0) { x = 1 / x; e = -e; }`. What specifically breaks if you instead keep `int e = n;` and negate the `int` directly?","code":"long e = n;                       // widen first\nif (e \u003c 0) { x = 1 / x; e = -e; } // x^-n = (1/x)^n\ndouble result = 1.0, baseVal = x;\nwhile (e > 0)\n{\n    if ((e & 1) == 1) result *= baseVal;\n    baseVal *= baseVal;\n    e >>= 1;\n}\nreturn result;","codeLang":"csharp","options":["Comparing `(e & 1) == 1` would always be false for an `int`, so no bits are ever folded into the result","The squaring `baseVal *= baseVal` would overflow for any large positive `n`, since `int` cannot hold intermediate powers","The right shift `e >>= 1` would sign-extend and loop forever for every negative exponent, regardless of magnitude","When `n == int.MinValue`, `-e` overflows because `int.MinValue` has no positive `int` counterpart, so `e` stays negative and the `while (e > 0)` loop is skipped, returning the wrong result"],"answer":3,"explanation":"The source explicitly says to widen the exponent to `long` before negating because `-int.MinValue` overflows: `int.MinValue` is -2147483648 but the largest positive `int` is 2147483647, so negating it wraps back to a negative value. With `int e`, `e = -e` leaves `e` negative, `while (e > 0)` never executes, and `result` stay
