 what is the time complexity of reading the extreme element (peek) versus inserting a new element (push)?","code":"","codeLang":"","options":["Both peek and push are `O(log n)`","Peek is `O(1)`; push is `O(log n)`","Both peek and push are `O(1)`","Peek is `O(log n)`; push is `O(1)`"],"answer":1,"explanation":"The heap property keeps the extreme element at the root, so peek just reads index 0 in `O(1)`; push appends a leaf and sifts it up along one root-to-leaf path of height `floor(log2 n)`, so it is `O(log n)`. Option 2 swaps the two costs. Option 3 wrongly inflates peek to logarithmic, ignoring that the root is always directly available. Option 4 wrongly claims push is constant, ignoring the sift-up that maintains the invariant."},{"id":"heaps-e02","topic":"Heaps & Priority Queues","slug":"heaps","difficulty":"easy","tags":["template","csharp"],"question":"In C#, `PriorityQueue\u003cTElement,TPriority>` from `System.Collections.Generic` orders its queue in which direction by default, and how do you flip it?","code":"","codeLang":"","options":["Max-heap by default; pass `Comparer\u003cint>.Create((a, b) => a.CompareTo(b))` to get a min-heap","Min-heap by default; invert the comparer with `Comparer\u003cint>.Create((a, b) => b.CompareTo(a))` to get a max-heap","Min-heap by default; call `heap.Reverse()` to get a max-heap","Insertion order (FIFO) by default; pass any comparer to make it a heap"],"answer":1,"explanation":"The reviewer states `PriorityQueue` is a min-heap by default (smallest priority dequeues first), and the idiomatic max-heap is an inverted comparer `Comparer\u003cint>.Create((a, b) => b.CompareTo(a))`. Option 1 reverses the default direction. Option 3 invents a nonexistent `Reverse()` method; you cannot flip an existing heap that way. Option 4 confuses it with a plain `Queue` — `PriorityQueue` is not FIFO and is not even stable among equal priorities."},{"id":"heaps-e03","topic":"Heaps & Priority Queues","slug":"heaps","difficulty":"easy","tags":["when-to-apply"],"question":"You must continuously report the `k` LARGEST elements seen in a stream of `n` numbers (with `k` much smaller than `n`). Which structure is the canonical fit, and at what time cost?","code":"","codeLang":"","options":["A size-k MAX-heap, evicting the largest when a bigger value arrives, in `O(n log k)`","A hash set of size `k` in `O(n)`","A size-k MIN-heap, evicting the smallest when a bigger value arrives, in `O(n log k)`","A full sort of all `n` elements in `O(n log n)`, taking the last `k`"],"answer":2,"explanation":"For the k largest you keep a size-k MIN-heap: its root is the smallest of the current top-k, so when a larger value arrives you evict that root, costing `O(n log k)` time and `O(k)` space, and it streams. Option 1 picks the wrong heap type — a max-heap would evict the largest, throwing away exactly the elements you want to keep; the reviewer flags this as the #1 top-k mistake. Option 3 works but needs all `n` in memory and is `O(n log n)`, defeating the streaming, k-much-smaller-than-n scenario. Option 4 cannot answer largest-k queries — a hash set tracks membership, not order."},{"id":"heaps-e04","topic":"Heaps & Priority Queues","slug":"heaps","difficulty":"easy","tags":["template","index-arithmetic"],"question":"In a 0-indexed array-backed binary heap, what are the indices of the left and right children of the node at index `i`?","code":"","codeLang":"","options":["Left `2*i`, right `2*i + 1`","Left `i - 1`, right `i + 1`","Left `i/2`, right `i/2 + 1`","Left `2*i + 1`, right `2*i + 2`"],"answer":3,"explanation":"For a 0-indexed heap the fixed formulas are left child `2*i + 1` and right child `2*i + 2` (with parent `(i - 1) / 2`). Option 1 (`2*i`, `2*i + 1`) is the 1-indexed convention, which is off-by-one for the 0-indexed arrays C# uses. Option 3 (`i/2`) is a parent-style formula pointing upward, not toward children. Option 4 treats the array as a flat sequence of neighbors, ignoring the implied complete-tree shape that encodes parent/child links by index."},{"id":"heaps-m01","topic":"Heaps & Priority Queues","slug":"heaps","difficulty":"medium","tags":["when-to-apply","pitfall"],"question":"You are streaming millions of integers and must report the 100 smallest values seen so far at any moment, using bounded memory. Which heap configuration is correct?","code":"","codeLang":"","options":["A size-100 max-heap: the smallest of the current 100 smallest sits at the root, so it is evicted when a larger value arrives","A full max-heap holding all values seen so far, reading the bottom 100 levels on each query","A size-100 max-heap: the largest of the current 100 smallest sits at the root, so it is evicted when a smaller value arrives","A size-100 min-heap: the smallest value sits at the root, so it is evicted when a smaller value arrives"],"answer":2,"explanation":"For k smallest you use a size-k MAX-heap: the root is the largest of your current k smallest, so when a new value is smaller than the root you evict the root, keeping memory at O(k) and each op at O(log k). The reviewer stresses that top-k uses the OPPOSITE heap of what you keep. Option 2 (min-heap) is the classic backwards mistake — a min-heap's root is the smallest, so you would wrongly evict the value you most want to keep. Option 3 names the right heap but describes the root and eviction rule incorrectly (a max-heap root is the largest, evicted when a smaller value arrives). Option 4 defeats the purpose: a heap is not searchable by level and holding all n values abandons the bounded-memory streaming requirement."},{"id":"heaps-m02","topic":"Heaps & Priority Queues","slug":"heaps","difficulty":"medium","tags":["complexity","build-heap"],"question":"Given a single static array of `n` items where `k` is much smaller than `n`, you build a heap from all `n` items in one shot (Floyd's bottom-up heapify) and then pop `k` times. What is the total time complexity?","code":"","codeLang":"","options":["O(n log k)","O(n log n)","O(n + k log n)","O(k log k)"],"answer":2,"explanation":"Floyd's bottom-up build-heap is O(n) (most nodes are near the leaves and do little sift-down work; the series converges to 2n), and each of the k pops costs O(log n) on a heap holding all n elements, giving O(n + k log n) total — exactly the figure the reviewer's exam answer (c) gives. Option 2 (O(n log n)) is the cost of n SEPARATE pushes, not a one-shot build, which the reviewer explicitly warns against. Option 3 (O(n log k)) is the size-k heap pattern, where the heap is capped at k, not built from all n. Option 4 (O(k log k)) ignores the O(n) build entirely and assumes the heap only ever holds k items."},{"id":"heaps-m04","topic":"Heaps & Priority Queues","slug":"heaps","difficulty":"medium","tags":["invariant","two-heaps"],"question":"In the two-heaps running-median structure, `low` is a max-heap (smaller half) and `high` is a min-heap (larger half), kept so that `low.Count == high.Count` or `low.Count == high.Count + 1`. After processing the stream `5, 2, 8, 1`, what is the current median?","code":"","codeLang":"","options":["3.5, the average of low.Peek() (2) and high.Peek() (5)","1, the value of high.Peek()","4.5, the average of the overall min and max","5, the value of low.Peek()"],"answer":0,"explanation":"After inserting 5,2,8,1 the structure holds low={1,2} (max-root 2) and high={5,8} (min-root 5) with equal sizes 2 and 2, so the total count is even and the median is the average of the two roots: (2+5)/2 = 3.5, matching the reviewer's trace. Option 2 (5) applies the odd-count rule (low.Peek()), but the count here is even, so the average rule applies. Option 3 (4.5) invents an average of the global min and max, which is not how the two-heaps median is computed. Option 4 (1) is low's smallest element, not a root, and high.Peek() is 5, not 1 — it confuses which heap holds which half."},{"id":"heaps-m05","topic":"Heaps & Priority Queues","slug":"heaps","difficulty":"medium","tags":["comparison","complexity"],"question":"You must merge `k` sorted linked lists containing `N` elements in total into one sorted list. Comparing the heap-of-heads approach against concatenating everything and sorting, which statement is correct?","code":"","codeLang":"","options":["Both approaches are O(N log N); the heap offers no asymptotic advantage because log k and log N are interchangeable","The heap approach is O(N log N) because it must hold all N elements at once, while concat-and-sort is O(N log k)","The heap holds one head per list (size at most k), so each of the N elements costs O(log k), giving O(N log k); concat-and-sort is O(N log N) and ignores that the inputs are already sorted","The heap approach is O(k log N) because there are k lists, each contributing one O(log N) pop"],"answer":2,"explanation":"The heap holds only the current head of each of the k lists, so it never exceeds size k; each of the N total elements is pushed and popped once at O(log k), giving O(N log k) time and O(k) space, which beats concat-and-sort's O(N log N) since log k \u003c= log N and the sort discards the inputs' existing order. Option 2 is wrong because log k and log N are not interchangeable when k is much smaller than N — that is precisely the advantage. Option 3 inverts the space claim: the heap holds at most k items, not all N. Option 4 miscounts work: there are N pops total (one per element), not k, and each is O(log k), not O(log N)."},{"id":"heaps-h01","topic":"Heaps & Priority Queues","slug":"heaps","difficulty":"hard","tags":["complexity","comparisons"],"question":"You must return the SET of `k` smallest elements of a single static in-memory array of `n` integers (k \u003c\u003c n), already loaded — no streaming, and you do NOT need them sorted. A teammate proposes: seed `new PriorityQueue\u003cint,int>(all n items)`, then pop `k` times. You counter with a size-k heap scan. Which statement gives the correct tightest worst-case time bounds and conclusion?","code":"","codeLang":"","options":["The size-k heap scan is O(k log k) because it only ever touches k elements, strictly beating build-then-pop's O(n)","Build-then-pop is O(n log n) because constructing a heap from n items costs O(n log n)","Both approaches are O(n log n), so the choice is purely stylistic","Build-then-pop is O(n + k log n) (linear bulk build plus k pops); the size-k scan is O(n log k); for k \u003c\u003c n both must read all n elements and build-then-pop's k log n term is smaller than n log k, so it is at least as good asymptotically"],"answer":3,"explanation":"Floyd / seeding-constructor build-heap is O(n), not O(n log n), and k pops cost O(k log n), giving O(n + k log n); the size-k scan does n heap ops each O(log k), i.e. O(n log k). For k \u003c\u003c n both must read all n elements, and build-then-pop's k log n term is smaller than the scan's n log k (since k log n \u003c n log k when k \u003c\u003c n), so it is at least as good. Option 2 is wrong because it repeats the misconception that bulk construction is O(n log n); the seeding constructor and EnqueueRange build in O(n). Option 3 is wrong: the size-k scan still examines all n elements (each compared against the root), so it is O(n log k), never O(k log k). Option 4 is wrong because seeding-constructor / Floyd build-heap is O(n), not O(n log n)."},{"id":"heaps-h02","topic":"Heaps & Priority Queues","slug":"heaps","difficulty":"hard","tags":["pitfall","template"],"question":"This loop is meant to keep the 3 LARGEST values seen and print the largest of them. Predict the printed value, then identify the single conceptual error in what the code actually reports versus its stated goal.","code":"var pq = new PriorityQueue\u003cint, int>();   // default = min-heap\nforeach (int x in new[] { 4, 1, 7, 3, 9, 2 })\n{\n    pq.Enqueue(x, x);\n    if (pq.Count > 3) pq.Dequeue();\n}\nConsole.WriteLine(pq.Peek());","codeLang":"csharp","options":["Prints 2; the size-3 min-heap retains the 3 smallest values, so its root is the smallest seen","Prints 7; the median of the retained window is reported because the heap holds {4,7,9}","Prints 4; the heap correctly retains the 3 largest {4,7,9}, but Peek() on a min-heap returns their smallest (the 3rd largest), so it reports the 3rd largest, not the largest","Prints 9; Peek() on the default heap returns the largest retained element directly"],"answer":2,"explanation":"A size-3 min-heap evicts its root (the current minimum) whenever Count exceeds 3, so it keeps the 3 LARGEST values {4,7,9} — that is the correct mechanism for top-k largest (k largest uses a MIN-heap). But Peek() returns the root, which on a min-heap is the smallest of those three, i.e. the 3rd largest = 4, not the largest. Option 2 is wrong: Peek() never returns the maximum of a min-heap; the root is the minimum. Option 3 is wrong because a min-heap that evicts its root keeps the LARGEST elements, not the smallest, so it would not print 2. Option 4 is wrong: a heap maintains no notion of median, and the root is the minimum of the retained set, which is 4, not 7."},{"id":"heaps-h03","topic":"Heaps & Priority Queues","slug":"heaps","difficulty":"hard","tags":["invariant","pitfall"],"question":"In the two-heaps running-median design, `low` is a max-heap (smaller half) and `high` is a min-heap (larger half). A candidate writes `AddNum` as: push `num` straight into `low`, then rebalance by COUNT ONLY (if `low.Count - high.Count > 1`, move `low`'s root to `high`). FindMedian reads the roots in the standard way. Why can this produce a wrong median even when the size invariant `|low.Count - high.Count| \u003c= 1` is perfectly maintained?","code":"","codeLang":"","options":["A max-heap cannot store the smaller half; `low` must be a min-heap for the roots to bracket the median","FindMedian must average the two roots for an odd total, so reading a single root is the actual bug regardless of insertion order","The rebalance threshold should be `> 0` rather than `> 1`, otherwise the heaps can never hold equal counts","Pushing directly into `low` without first routing the value through `high` can leave a `low`-half element larger than a `high`-half element, violating the required ordering invariant that every element of `low` is \u003c= every element of `high`"],"answer":3,"explanation":"Correctness needs TWO invariants: balanced sizes AND the ordering rule that every element of `low` is \u003c= every element of `high`. Size-only rebalancing satisfies the first but not the second — a large value pushed into `low` can exceed values already in `high`, so the two roots no longer straddle the true middle. The reviewer's trick avoids this by always pushing into `low`, moving `low`'s max into `high`, then moving back if needed, which enforces the ordering. Option 2 is wrong: `low` is correctly a max-heap (its root is the largest of the small half); making it a min-heap breaks the design. Option 3 is wrong because `> 1` is the correct threshold (sizes may differ by 1); `> 0` would over-correct and is not the cause. Option 4 is wrong: for an odd total the median IS a single root (the larger heap's root), so reading one root there is correct, not a bug."},{"id":"intervals-e01","topic":"Intervals","slug":"intervals","difficulty":"easy","tags":["overlap","invariant"],"question":"For two closed (inclusive) intervals `[a, b]` and `[c, d]` with `a \u003c= b` and `c \u003c= d`, which condition correctly tests whether they overlap?","code":"","codeLang":"","options":["`a \u003c c && b \u003c d`","`a \u003c= d && c \u003c= b`","`b \u003c c || d \u003c a`","`a == c && b == d`"],"answer":1,"explanation":"The source defines overlap for closed intervals as `a \u003c= d && c \u003c= b` — each interval starts at or before the other ends; the test is symmetric, so which interval you call 'first' does not matter. `a \u003c c && b \u003c d` describes one interval being shifted strictly right of the other, which is neither necessary nor sufficient for overlap. `b \u003c c || d \u003c a` is the *disjoint* (non-overlapping) test — exactly the negation of the answer. `a == c && b == d` only detects identical intervals, missing every partial or containment overlap."},{"id":"intervals-e02","topic":"Intervals","slug":"intervals","difficulty":"easy","tags":["when-to-apply","template"],"question":"For Merge Intervals (LC 56), which sort key does the standard algorithm use before sweeping?","code":"","codeLang":"","options":["Sort by end ascending","Sort by interval length ascending","Sort by start ascending","No sort is needed"],"answer":2,"explanation":"Merge Intervals sorts by start ascending, so any interval overlapping the running `current` must start within or at `current.end`, reducing the overlap check to the single comparison `next.start \u003c= current.end`. Sorting by end ascending is the key for the minimum-removals greedy (LC 435), not merging. Sorting by length has no bearing on the timeline walk and breaks the single-comparison invariant. A sort *is* needed — only Insert Interval (LC 57) skips it because its input is already pre-sorted and disjoint."},{"id":"intervals-e03","topic":"Intervals","slug":"intervals","difficulty":"easy","tags":["complexity"],"question":"What is the time complexity of the Merge Intervals algorithm on `n` intervals?","code":"","codeLang":"","options":["`O(n^2)`","`O(n log n)`","`O(n)`","`O(log n)`"],"answer":1,"explanation":"The merge sweep itself is a single linear pass, but it is preceded by sorting the intervals by start, so the sort's `O(n log n)` dominates the overall time. `O(n)` would only be correct if the input were already sorted (that is Insert Interval, LC 57). `O(n^2)` reflects a naive all-pairs comparison, which the sort-then-sweep approach avoids. `O(log n)` is far too small — every interval must be examined at least once, so the algorithm is at least linear."},{"id":"intervals-e04","topic":"Intervals","slug":"intervals","difficulty":"easy","tags":["when-to-apply","heap"],"question":"Meeting Rooms II (LC 253) asks for the minimum number of rooms needed. That number is exactly equal to which quantity?","code":"","codeLang":"","options":["The maximum number of meetings that are ever concurrent at any instant","The number of distinct start times","The length of the longest single meeting","The total number of meetings in the input"],"answer":0,"explanation":"The minimum number of rooms equals the peak concurrency — the maximum number of meetings overlapping at any single instant — which is what both the min-heap-of-end-times and the sweep-line +1/-1 solutions compute. The total number of meetings overcounts because non-overlapping meetings can reuse the same room. The number of distinct start times is unrelated to how many overlap simultaneously. The length of the longest meeting measures duration, not concurrency, so it does not determine room count."},{"id":"intervals-h01","topic":"Intervals","slug":"intervals","difficulty":"hard","tags":["pitfall","invariant"],"question":"A candidate solves LC 435 (minimum removals to make intervals disjoint) by sorting by `start` ascending, then on each overlap removing the interval with the larger end. Their code returns 3 for the input `[[1,100],[2,3],[3,4],[4,5]]`, but the correct answer is 1. Which single change makes the greedy provably optimal, and why?","code":"","codeLang":"","options":["Sort by `start` ascending and break ties by larger `end` first, so the widest interval is examined before the narrow ones it contains.","Sort by interval length (`end - start`) descending and remove the longest interval on each overlap, since long intervals cause the most conflicts.","Keep the sort by `start` but on overlap remove the interval with the smaller end instead; dropping shorter intervals frees the timeline faster.","Sort by `end` ascending and remove any interval whose `start` is less than the last kept end; keeping the earliest finisher leaves the most room for later intervals."],"answer":3,"explanation":"The activity-selection greedy is optimal only when you sort by end and keep the earliest finisher: by an exchange argument, the earliest-ending interval can replace the first kept interval of any optimum without adding conflicts, so it is always safe to keep. On `[[1,100],[2,3],[3,4],[4,5]]` the end-sort keeps the three short disjoint intervals and removes only `[1,100]`, giving 1. Option 2 (remove the larger end while start-sorted) is exactly the failing strategy reworded - `[1,100]` is examined first and forces three removals. Option 3 still relies on start order, which lets a long early interval block many short ones, so it is not optimal. Option 4 sorts by length, which has no monotonic sweep invariant and is not the proven greedy; removing the longest can drop an interval that did not need removing."},{"id":"intervals-h02","topic":"Intervals","slug":"intervals","difficulty":"hard","tags":["pitfall","template"],"question":"You are solving Meeting Rooms II (LC 253) with the two-sorted-arrays sweep below. The meetings are `[[1,5],[5,9],[2,6]]` and back-to-back meetings (one ends exactly when the next begins) are allowed to share a room. The blank comparison decides whether a start consumes a room or an end frees one. Which comparison is correct, and what is the resulting minimum room count?","code":"Array.Sort(starts);  // 1 2 5\nArray.Sort(ends);    // 5 6 9\nint rooms = 0, maxRooms = 0, s = 0, e = 0;\nwhile (s \u003c n) {\n    if ( /* BLANK */ ) { rooms++; maxRooms = Max(maxRooms, rooms); s++; }\n    else               { rooms--; e++; }\n}","codeLang":"csharp","options":["`starts[s] \u003c= ends[e]` gives 2 rooms; using `\u003c=` is needed so the start at 5 is processed before the end at 5.","`starts[s] \u003c= ends[e]` gives 3 rooms; counting a tie as a fresh room is required so no two meetings are ever forced to share.","`starts[s] \u003c ends[e]` gives 2 rooms; when a start equals an end the room is freed first, so the meeting starting at 5 reuses the room freed at 5.","`starts[s] \u003c ends[e]` gives 3 rooms; the meeting starting at 5 always needs its own room regardless of the tie."],"answer":2,"explanation":"With back-to-back sharing allowed, an end at the same coordinate must be processed before a start so the freed room is reused - that means the start advances only on a strict `starts[s] \u003c ends[e]`, and a tie (`start == end`) falls to the else branch which frees a room. Tracing `starts=[1,2,5]`, `ends=[5,6,9]`: rooms go 1 (start 1), 2 (start 2, peak), then at 5 we have `5 \u003c 5` false so we free a room down to 1, then start 5 takes it back to 2; max is 2. Option 2 uses `\u003c=`, which counts the tie as a new room and over-reports 3. Option 3 keeps the correct `\u003c` but miscounts the trace as 3, ignoring that the start at 5 reuses the just-freed room. Option 4 uses `\u003c=` (wrong operator) yet claims 2; the operator and the tie-break rationale contradict each other, and `\u003c=` would actually yield 3."},{"id":"intervals-h03","topic":"Intervals","slug":"intervals","difficulty":"hard","tags":["when-to-apply","pitfall"],"question":"Two closed intervals `[a,b]` and `[c,d]` are given with no guarantee about their order (neither is known to start first), and `a \u003c= b`, `c \u003c= d`. You must return `true` exactly when they share at least one point, treating touching at a single endpoint as sharing. A reviewer claims that because nothing is sorted, you must compare both `a \u003c= d` and `c \u003c= b`. Which statement is correct?","code":"","codeLang":"","options":["Only `c \u003c= b` is needed; `a \u003c= d` is always implied by the constraints `a \u003c= b` and `c \u003c= d`, so the second check is redundant even without sorting.","Sorting the two intervals by start first lets you replace the test with the single check `a \u003c= d`, so doing the sort is required for correctness.","The correct test is `a \u003c d && c \u003c b` with strict inequalities, because closed intervals that merely touch at one point do not actually share that point.","Both comparisons are required: `a \u003c= d && c \u003c= b` is the symmetric closed-interval overlap test, and dropping either side wrongly reports overlap when one interval lies entirely past the other."],"answer":3,"explanation":"For closed intervals the overlap condition is the symmetric `a \u003c= d && c \u003c= b`, and both halves are load-bearing when order is unknown: if `[a,b]` sits entirely after `[c,d]` then `a > d` while `c \u003c= b` may still hold, so dropping `a \u003c= d` would falsely report overlap. Option 2 claims `a \u003c= d` is implied by the given constraints, but `a \u003c= b` and `c \u003c= d` say nothing about how `a` relates to `d`, so the check is not redundant. Option 3 uses strict `\u003c`, which is the half-open rule - it would return false for `[1,3]` and `[3,5]`, but the problem explicitly counts touching as sharing. Option 4 calls the sort required, but for a single pair of intervals the two-comparison test is already correct and O(1); sorting is unnecessary, not mandatory, so the claim of required-for-correctness is false."},{"id":"linked-lists-e01","topic":"Linked Lists","slug":"linked-lists","difficulty":"easy","tags":["complexity","when-to-apply"],"question":"Reaching the element at position `k` in a singly linked list takes what time, and why?","code":"","codeLang":"","options":["O(1), because you can index directly into the node just like an array","O(log k), because the list is internally kept sorted and you binary-search it","O(k), because a linked list has no index and you must follow `next` pointers one node at a time from the head","O(n), because reaching any node always requires walking the entire list to the tail first"],"answer":2,"explanation":"A linked list has no contiguous backing array and no index, so reaching position k means following next from the head k times — O(k). This is the deliberate trade: you lose O(1) random access to gain O(1) splicing once you hold a node. Option 2 (O(1) index) describes an array/List\u003cT>, not a linked list. Option 3 (O(log k) binary search) is wrong because a list isn't randomly addressable and isn't necessarily sorted, so binary search can't apply. Option 4 wrongly claims you must always reach the tail; you stop as soon as you reach position k, which is O(k), not a forced full traversal."},{"id":"linked-lists-e02","topic":"Linked Lists","slug":"linked-lists","difficulty":"easy","tags":["template","invariant"],"question":"In the standard iterative reversal (`prev`/`curr`/`next`), why must you execute `next = curr.next` before `curr.next = prev`?","code":"ListNode prev = null, curr = head;\nwhile (curr != null)\n{\n    ListNode next = curr.next; // line A\n    curr.next = prev;          // line B\n    prev = curr;\n    curr = next;\n}\nreturn prev;","codeLang":"csharp","options":["Because `prev` must be advanced before `curr` is read, otherwise the new head is wrong","Because reading `curr.next` twice in one iteration throws a NullReferenceException","Because the loop would otherwise run in O(n^2) time instead of O(n)","Because `curr.next = prev` overwrites the only reference to the rest of the list, so you must save it first or lose the remaining nodes"],"answer":3,"explanation":"Once you execute curr.next = prev, the link to the remainder of the list (the old curr.next) is gone forever, so you must capture it in next first — this is the topic's #1 pitfall. Option 2 misattributes the reason to pointer advancement order; the issue is data loss, not the order of prev. Option 3 is false: reading curr.next is harmless and the loop guard (curr != null) already protects against null curr. Option 4 is false: saving next or not, the algorithm is still a single O(n) pass — skipping the save doesn't change asymptotic time, it produces a broken list."},{"id":"linked-lists-e03","topic":"Linked Lists","slug":"linked-lists","difficulty":"easy","tags":["when-to-apply","template"],"question":"You must detect whether a singly linked list contains a cycle, using only O(1) extra space. Which technique is the canonical fit?","code":"","codeLang":"","options":["Binary search over node positions to locate the repeated node","Reverse the list in place; if you return to the original head, there is a cycle","Floyd's fast/slow (tortoise-and-hare) pointers, moving `slow` one node and `fast` two nodes per step until they meet or `fast` falls off the end","Store every visited node in a hash set and check for a repeat, which the source recommends as the O(1)-space choice"],"answer":2,"explanation":"Floyd's tortoise-and-hare runs slow at +1 and fast at +2; if a cycle exists the fast pointer laps the slow one and they meet, otherwise fast reaches null — all in O(n) time and O(1) space. Option 2 does detect cycles but uses O(n) space for the hash set, so it is not the O(1)-space technique the source names. Option 3 is incorrect: reversing a list that contains a cycle has undefined/broken behavior and is not a cycle-detection method. Option 4 is nonsense for linked lists, which have no random access or sorted ordering to binary-search."},{"id":"linked-lists-e04","topic":"Linked Lists","slug":"linked-lists","difficulty":"easy","tags":["when-to-apply","pitfall"],"question":"What is the purpose of a dummy (sentinel) head node, and what do you return at the end of an operation that uses one?","code":"","codeLang":"","options":["It stores the length of the list so traversal can stop early; you return `dummy` itself","It caches the most-recently-used node for O(1) eviction; you return `dummy.next.next`","It is a stable predecessor placed before the real head so head insertion/deletion needs no special case; you return `dummy.next`","It marks the end of the list in place of `null`; you return `dummy.prev`"],"answer":2,"explanation":"A dummy node sits before the real head as an always-valid, non-null predecessor, turning 'is this the head?' branches into ordinary cases; the real list is dummy.next, which is what you return (the head may itself have been removed or replaced). Option 2 is wrong: a sentinel stores no length and you never return dummy itself. Option 3 confuses the sentinel with the list terminator — the list still ends at null, and a singly linked sentinel has no prev. Option 4 describes an unrelated LRU-cache concept and an incorrect return value."},{"id":"linked-lists-m01","topic":"Linked Lists","slug":"linked-lists","difficulty":"medium","tags":["pitfall","invariant"],"code":"ListNode prev = null, curr = head;\nwhile (curr != null)\n{\n    curr.next = prev;          // line A\n    ListNode next = curr.next; // line B\n    prev = curr;\n    curr = next;\n}\nreturn prev;","codeLang":"csharp","question":"A candidate writes the iterative reverse below but swaps two lines so that line A runs before line B. Given input `1 -> 2 -> 3`, what actually happens?","options":["It still returns `3 -> 2 -> 1` correctly, since the three pointers are reassigned in the same order either way","It stops after one node, returning just `1`, because `next` now reads the already-overwritten `curr.next` instead of the rest of the original list","It throws a `NullReferenceException` on the first iteration when `prev` is `null`","It returns `1 -> 2 -> 3` unchanged, because flipping `curr.next` before saving has no effect on the final list"],"answer":1,"explanation":"The reviewer's #1 reversal pitfall is that you must save curr.next into a temp BEFORE overwriting it; here curr.next = prev runs first, so next = curr.next reads the destroyed link rather than the remainder of the list. On the first node (curr = 1), curr.next becomes null (prev is null), so next reads null, the loop terminates after one node, and it returns just 1 — the link to 2 -> 3 is lost. Option 2 (returns 3->2->1 correctly) is wrong because the order of the save versus the flip is exactly what matters. Option 3 (unchanged list) is wrong because the link IS mutated. Option 4 (NRE on null prev) is wrong because assigning curr.next = null is legal and never dereferences prev."},{"id":"linked-lists-m03","topic":"Linked Lists","slug":"linked-lists","difficulty":"medium","tags":["complexity","comparison"],"code":"","codeLang":"","question":"You must merge `k` sorted linked lists holding `N` total nodes. A teammate proposes folding them one at a time into an accumulator (merge list 0 with list 1, then that result with list 2, and so on). Compared to the min-heap approach, what is the trade-off?","options":["The min-heap approach is O(N·k) because each enqueue must scan all k lists, while the accumulator is the optimal O(N log k)","The accumulate approach is O(N log N) and the heap is O(N log k), so the accumulator is faster whenever k is larger than log N","The accumulate-one-at-a-time approach is O(N·k); the min-heap is O(N log k) because the heap holds at most one frontier node per list, so each of N pops/pushes costs O(log k)","Both approaches are O(N log k); the accumulator just uses more memory, so they are interchangeable in an interview"],"answer":2,"explanation":"The reviewer explicitly flags the naive accumulate-one-at-a-time merge as O(N·k) and the trap, while the min-heap is O(N log k): the heap holds at most k frontier nodes (one per list), so each of the N enqueue/dequeue operations is O(log k). Option 1 is correct. Option 2 is wrong because the accumulator repeatedly re-walks the growing prefix, giving O(N·k), not O(N log k). Option 3 is wrong on the accumulator's complexity and inverts which is faster. Option 4 inverts the two approaches' costs; the heap's O(log k) comes from its bounded size k, not from scanning lists."},{"id":"linked-lists-m04","topic":"Linked Lists","slug":"linked-lists","difficulty":"medium","tags":["template","pitfall"],"code":"var dummy = new ListNode();\nListNode tail = dummy;\nint carry = 0;\nwhile (l1 != null || l2 != null)        // \u003c-- condition\n{\n    int a = l1?.val ?? 0;\n    int b = l2?.val ?? 0;\n    int sum = a + b + carry;\n    carry = sum / 10;\n    tail.next = new ListNode(sum % 10);\n    tail = tail.next;\n    l1 = l1?.next; l2 = l2?.next;\n}\nreturn dummy.next;","codeLang":"csharp","question":"For Add Two Numbers (digits stored least-significant first), the loop above uses the condition `while (l1 != null || l2 != null)`. For the input `l1 = 5`, `l2 = 5`, what does it return, and what is the bug?","options":["It throws a `NullReferenceException` when `l1` and `l2` both become `null` on the second iteration","It returns `0` instead of `0 -> 1`; the loop exits before emitting the final carry, so the condition should also include `|| carry != 0`","It returns `1 -> 0`; the digits are stored most-significant first, so no extra carry node is needed","It returns `0 -> 1` correctly, because the final carry is appended automatically when both lists are exhausted"],"answer":1,"explanation":"The reviewer warns that Add Two Numbers must keep looping while a final carry exists, or 5 + 5 loses its leading 1; the correct condition is while (l1 != null || l2 != null || carry != 0). With the carry term omitted, the single iteration emits 5 + 5 = 10 -> digit 0, carry 1, then both lists are null so the loop exits leaving the 1 unwritten, returning just 0. Option 1 is correct. Option 2 is wrong because nothing appends the leftover carry once the lists are exhausted. Option 3 is wrong: the digits are reversed (least-significant first), so the correct answer reads 0 -> 1 = 10. Option 4 (NRE) is wrong because the ?. null-conditional access safely yields 0 and never dereferences null."},{"id":"linked-lists-m05","topic":"Linked Lists","slug":"linked-lists","difficulty":"medium","tags":["when-to-apply","comparison"],"code":"","codeLang":"","question":"An LRU cache must support `get` and `put` in O(1), evicting the least-recently-used entry on overflow. Why is a singly linked list insufficient, forcing the use of a doubly linked list paired with a hash map?","options":["Unlinking the evicted or touched node in O(1) requires its predecessor, and only a doubly linked node carries a `prev` pointer; a singly linked list would need an O(n) scan to find the predecessor","A singly linked list cannot store key-value pairs, so the hash map has nothing to point at during eviction","A singly linked list cannot be combined with a hash map because the map keys must be node references, which singly linked nodes lack","The hash map already gives O(1) lookup, so the list only needs forward traversal, which a singly linked list provides — a doubly linked list is merely a stylistic preference"],"answer":0,"explanation":"The reviewer states that LRU eviction and move-to-front require unlinking a node in O(1), which needs the node's predecessor; only a doubly linked node carries a prev pointer, so the splice is O(1), whereas a singly linked list would need an O(n) scan to locate the predecessor. Option 1 is correct. Option 2 is wrong because nodes do store key-value pairs and the map points to nodes regardless of direction. Option 3 is wrong because the deciding factor is O(1) unlink, not traversal, so the choice is not stylistic. Option 4 is wrong because a hash map can hold references to singly linked nodes too; the real limitation is the missing prev pointer for O(1) removal."},{"id":"linked-lists-h01","topic":"Linked Lists","slug":"linked-lists","difficulty":"hard","tags":["pitfall","invariant"],"question":"You are implementing \"Remove Nth Node From End\" with two pointers but WITHOUT a dummy node, as shown. For the input `head = [1]` and `n = 1` (delete the only node), what is the precise defect?","code":"ListNode fast = head, slow = head;          // no dummy\nfor (int i = 0; i \u003c n; i++) fast = fast.next;\nwhile (fast.next != null) { fast = fast.next; slow = slow.next; }\nslow.next = slow.next.next;\nreturn head;","codeLang":"csharp","options":["It returns `[1]` unchanged because the `while` loop never executes when the list has one node, so no deletion happens","After the `for` loop `fast` becomes `null`, so evaluating `fast.next` in the `while` condition throws a `NullReferenceException`; a dummy node is what makes deleting the head expressible","The `for` loop leaves `fast` on node 1 and `slow` on node 1, so `slow.next.next` reads past the end and corrupts the heap","The code runs without error and correctly returns an empty list, because `slow.next = slow.next.next` collapses the single node to `null`"],"answer":1,"explanation":"With no dummy and n equal to the list length, the for loop advances fast n=1 times from node 1 to null; the very next while test evaluates fast.next, dereferencing null and throwing. The source explicitly states the fix is to start both pointers at a dummy and return dummy.next, since deleting the original head cannot be written as slow.next = slow.next.next. Option 2 is wrong because the code crashes before any deletion and the return value would be the stale head, not an empty list. Option 3 is wrong: fast is null, not on node 1, so the heap-corruption story is fabricated. Option 4 is wrong because the crash occurs in the loop guard, not by skipping the loop."},{"id":"linked-lists-h02","topic":"Linked Lists","slug":"linked-lists","difficulty":"hard","tags":["template","pitfall"],"question":"This is the canonical \"Add Two Numbers\" loop (digits stored least-significant first). For `l1 = [9,9]` (representing 99) and `l2 = [1]` (representing 1), what list does it return, and which clause of the `while` condition produces the leading digit?","code":"int carry = 0;\nwhile (l1 != null || l2 != null || carry != 0)\n{\n    int a = l1?.val ?? 0;\n    int b = l2?.val ?? 0;\n    int sum = a + b + carry;\n    carry = sum / 10;\n    tail.next = new ListNode(sum % 10);\n    tail = tail.next; l1 = l1?.next; l2 = l2?.next;\n}","codeLang":"csharp","options":["Returns `[1,0,0]`; the result is stored most-significant first so the carry becomes the head","Returns `[0,0]` (= 0 reversed); the `carry != 0` clause is never reached because the loop exits once both lists are `null`","Returns `[0,0,1]` (= 100); the final `1` node is produced by the `carry != 0` clause after both lists are exhausted","Returns `[0,0,1]` (= 100); the final `1` node is produced by the `l1 != null` clause on the third iteration"],"answer":2,"explanation":"Iteration 1: 9+1+0=10 -> digit 0, carry 1; iter 2: 9+0+1=10 -> digit 0, carry 1; now both lists are null but carry != 0, so a third iteration runs producing digit 1 (sum=0+0+1=1, carry 0). Result reads [0,0,1] = 100 in reversed storage, matching 99+1. The source stresses looping while either list nonempty OR carry != 0 precisely so a final carry is not lost. Option 2 is wrong: dropping the carry != 0 clause is the exact pitfall the source warns against (5+5 would lose its leading 1). Option 3 misattributes the third iteration to l1 != null, but l1 is already null then — only carry != 0 is true. Option 4 is wrong because digits are stored least-significant first, so the carry digit is appended at the tail, not made the head."},{"id":"linked-lists-h03","topic":"Linked Lists","slug":"linked-lists","difficulty":"hard","tags":["complexity","when-to-apply"],"question":"Across the merge-k-lists and LRU-cache sections, which single statement is correct about the data-structure choices and their costs?","code":"","codeLang":"","options":["Pairwise divide-and-conquer merge of k lists is O(N·k) because each of the k merge rounds re-walks all N nodes once","Merging k sorted lists with a min-heap is O(N log k) because the heap holds at most one frontier node per list, while the naive accumulate-one-at-a-time approach is O(N·k)","An LRU cache can achieve O(1) `get`/`put` with a singly linked list plus a hash map, since the hash map already gives O(1) access to any node to be moved","Merging k sorted lists with a min-heap is O(N log N) because every one of the N nodes is pushed and the heap can grow to size N before any pops occur"],"answer":1,"explanation":"The source states the heap holds at most k frontier nodes (one per list), so each of the N enqueue/dequeue ops is O(log k), giving O(N log k); it explicitly flags the naive one-at-a-time accumulator as the O(N·k) trap. Option 2 is wrong: the heap is bounded by k, not N, so it is O(N log k), not O(N log N). Option 3 is the key LRU misconception — O(1) eviction/move-to-front needs the predecessor to unlink, which requires a prev pointer, so the list must be doubly linked; a singly linked list would need an O(n) scan. Option 4 is wrong because divide-and-conquer halves the list count each round, giving log k rounds (not k), so it is O(N log k), not O(N·k)."},{"id":"math-basics-e01","topic":"Math Basics","slug":"math-basics","difficulty":"easy","tags":["subsets","complexity"],"question":"A set has `n` distinct elements. How many subsets does it have, including the empty set and the full set?","options":["`n²`, because every element can pair with every other element","`2ⁿ`, because each element is an independent in-or-out choice","`n!`, because each subset is an ordering of the elements","`2ⁿ − 2`, because the empty set and the full set do not count"],"answer":1,"explanation":"The source states a set of `n` elements has exactly `2ⁿ` subsets: building a subset, each element is an independent yes/no (include or exclude) choice, and `n` independent two-way choices multiply to `2 × 2 × … × 2 = 2ⁿ`. Option 0 confuses subsets (order-independent selections) with permutations (orderings), which are counted by `n!`. Option 2 invents a pairing argument that does not describe subset construction. Option 3 wrongly excludes the empty set and the full set, but the source explicitly notes the `2ⁿ` count includes both extremes.","code":"","codeLang":""},{"id":"math-basics-e02","topic":"Math Basics","slug":"math-basics","difficulty":"easy","tags":["logarithms","definition"],"question":"In interview math, `log₂(n)` is most usefully read as which of the following?","options":["The remainder left after dividing `n` by 2","The number of times you can divide `n` by 2 before reaching 1","The number of digits `n` has when written in base 10","The number of times you can multiply `n` by 2 before overflowing"],"answer":1,"explanation":"The source defines `log₂(n)` as the power you raise 2 to in order to get `n`, equivalently the number of times you can halve `n` before reaching 1 (e.g. 16/2/2/2/2 = 1 is four halvings, so `log₂(16) = 4`). This halving reading is exactly what binary search does, which is why halving algorithms are `O(log n)`. Option 1 reverses the direction (multiplying up rather than halving down) and ties it to overflow, which is unrelated. Option 2 describes the base-10 digit count, not `log₂`. Option 3 describes `n % 2`, the parity remainder, not a logarithm.","code":"","codeLang":""},{"id":"math-basics-e03","topic":"Math Basics","slug":"math-basics","difficulty":"easy","tags":["modular-arithmetic","template"],"question":"In C#, the `%` operator follows the sign of the dividend, so `-7 % 3` is `-1`. Which expression normalizes `x % m` into the range `[0, m)` for every integer `x` and positive `m`?","options":["`((x % m) + m) % m`","`x % m + m`","`m % (x + m)`","`(x + m) % x`"],"answer":0,"explanation":"The source gives `((x % m) + m) % m` as the fix for negative remainders: adding `m` lifts a negative result into positive territory, and the final `% m` brings it back below `m`, landing in `[0, m)` (e.g. `((-7 % 3) + 3) % 3 = ((-1) + 3) % 3 = 2`). Option 1 omits the final `% m`, so a non-negative remainder becomes a value in `[m, 2m)` — out of range in general. Option 2 swaps operands incorrectly, reducing `m` rather than `x`. Option 3 also has the wrong structure and reduces modulo `x` instead of `m`.","code":"","codeLang":""},{"id":"math-basics-m01","topic":"Math Basics","slug":"math-basics","difficulty":"medium","tags":["pitfall","complexity"],"question":"You must return a running total of subset counts under `MOD = 1_000_000_007`. A teammate writes `total = (total + (1L \u003c\u003c n)) % MOD;` to add the `2ⁿ` subsets of a size-`n` set. For what reason does this line become incorrect once `n` is large (say `n = 64`), even though `2ⁿ` is mathematically well-defined?","code":"","codeLang":"","options":["`1L \u003c\u003c n` cannot represent `2ⁿ` once `n` reaches the `long`'s bit width, so the value fed into the modulo is already wrong; you must compute `2ⁿ` under the modulus (modular exponentiation) instead","Big-O treats `O(2ⁿ)` and `O(n)` as the same class, so the count is meaningless and should be computed with a logarithm instead","The modulo distributive law `(a + b) % c = ((a % c) + (b % c)) % c` does not hold for shift operations, so `% MOD` silently corrupts the sum","`1L \u003c\u003c n` only counts non-empty subsets, so the result is always off by one and must be written `(1L \u003c\u003c n) + 1`"],"answer":0,"explanation":"The reviewer notes powers of two explode and that subset/bitmask feasibility caps near `n = 20`; a `long` holds only 63 value bits, so a shift by 64 cannot produce `2⁶⁴` — in C# the shift count is masked mod 64, so `1L \u003c\u003c 64` yields `1`, garbage relative to the true `2⁶⁴`. The bad value is produced before `% MOD` ever runs, so you must compute `2ⁿ` itself under the modulus with modular exponentiation. Option 2 is wrong: `O(2ⁿ)` and `O(n)` are entirely different complexity classes, and a logarithm does not produce the count. Option 3 is wrong: the failure is the shift producing a wrong value, not the distributive law, which the reviewer states does hold for `+`. Option 4 is wrong: `2ⁿ` already counts both the empty and full subset, as the source explicitly states."},{"id":"math-basics-m02","topic":"Math Basics","slug":"math-basics","difficulty":"medium","tags":["complexity","when-to-apply"],"question":"A function runs its innermost statement `1, 2, 3, …, n` times across the outer iterations (a triangular nested loop). Separately, a second function recurses over a perfect binary tree of height `h`, doing O(1) work per node. Which pairing of total-work formula to structure is correct?","code":"","codeLang":"","options":["Triangular loop: `(1+n)·n/2` → O(n log n); perfect tree: `h²` nodes → O(h²)","Triangular loop: `2^(h+1) − 1` → O(2ⁿ); perfect tree: `(1+n)·n/2` → O(n²)","Triangular loop: `n·(n−1)` → O(n log n); perfect tree: `h·log h` nodes → O(h log h)","Triangular loop: `(1+n)·n/2` → O(n²); perfect tree: `2^(h+1) − 1` nodes → O(2^h)"],"answer":3,"explanation":"The reviewer gives the arithmetic sum `1 + 2 + … + n = (1 + n)·n/2 = (n² + n)/2`, which drops to O(n²), and the geometric sum `1 + 2 + 4 + … + 2^h = 2^(h+1) − 1` as the node count of a perfect binary tree, which is O(2^h). Option 1 pairs both correctly. Option 2 swaps the two formulas. Option 3 invents `n·(n−1)` and `h·log h` with an unjustified O(n log n)/O(h log h); neither is the source's formula. Option 4 keeps the right arithmetic sum but mislabels a quadratic as O(n log n) and replaces the tree's geometric node count with `h²`."},{"id":"math-basics-m03","topic":"Math Basics","slug":"math-basics","difficulty":"medium","tags":["pitfall","invariant"],"question":"In C#, `%` follows the sign of the dividend. You maintain a circular index and compute the previous slot as `(i - step) % m`, where `i - step` can be any integer (including very negative values). Which expression always lands in the valid index range `[0, m)`?","code":"// C# semantics:  -7 % 3 == -1   (sign follows dividend)\n// want a remainder in [0, m)\nint prev = /* ??? */ ;","codeLang":"csharp","options":["`(i - step + m) % m`","`(i - step) % m + m`","`((i - step) % m + m) % m`","`Math.Abs((i - step) % m)`"],"answer":2,"explanation":"The source's fix for negative remainders is exactly `((x % m) + m) % m`: take the (possibly negative) remainder, add `m` to lift it non-negative, then take `% m` again to pull it back below `m`. Option 2 stops after `+ m`, so a non-negative remainder becomes a value in `[m, 2m)` — out of range. Option 3 (`Math.Abs`) gives the wrong index: for `-7 % 3 == -1`, `Abs` yields `1`, but the correct normalized value is `2`. Option 4 adds `m` only once, so if `i - step` is more negative than `-m` the dividend `i - step + m` is still negative and the single `% m` again follows the dividend's sign, leaving a negative result."},{"id":"math-basics-h02","topic":"Math Basics","slug":"math-basics","difficulty":"hard","tags":["complexity","when-to-apply"],"question":"An interviewer poses a problem on an array of `n` distinct integers (`n` up to about 1,000,000): 'count how many index pairs `(i, j)` with `i \u003c j` exist.' A candidate proposes a double loop where the inner loop over `j` runs `n-1, n-2, …, 1, 0` times as `i` advances. Using the math-basics tools, which statement most accurately characterizes this approach for the given `n`?","code":"","codeLang":"","options":["The total number of pairs is `n!` because order between `i` and `j` matters, so the count grows factorially and is only feasible for `n` up to about 10","The inner-loop work sums to the arithmetic series `n(n-1)/2`, making it `O(n²)`, which is infeasible for `n = 1,000,000`; the count itself is also `n(n-1)/2`, computable in `O(1)`","The inner-loop work is a geometric series summing to `2ⁿ - 1`, making it `O(2ⁿ)` and the dominant cost for large `n`","The inner-loop work sums to `n(n-1)/2`, but because Big-O drops constants this simplifies to `O(n)`, so the double loop is feasible for `n = 1,000,000`"],"answer":1,"explanation":"The inner loop runs `(n-1) + (n-2) + ... + 1 + 0`, an arithmetic series equal to `(first+last)·count/2 = n(n-1)/2`, which after dropping the lower-order term and the constant is `O(n²)` — infeasible at `n = 1,000,000` (about `5 × 10¹¹` operations). Crucially, the value being counted, `n(n-1)/2`, is the same closed form and can be returned directly in `O(1)`, so the loop is unnecessary. Option 2 confuses the arithmetic (triangular) sum with a geometric/doubling sum `2ⁿ - 1`; the work here grows quadratically, not exponentially. Option 3 misapplies Big-O: dropping the constant `1/2` from `n²/2` still leaves `O(n²)`, not `O(n)`. Option 4 misuses factorial: choosing an unordered pair with `i \u003c j` is a combination count `n(n-1)/2`, not the `n!` ordering count, so it does not grow factorially."},{"id":"math-number-theory-e01","topic":"Math & Number Theory","slug":"math-number-theory","difficulty":"easy","tags":["template","when-to-apply"],"question":"Which recurrence is the basis of the Euclidean algorithm for computing `gcd(a, b)`, with the correct base case?","code":"","codeLang":"","options":["`gcd(a, b) = gcd(b, a / b)`, with base case `gcd(a, 1) = 1`","`gcd(a, b) = gcd(a mod b, a)`, with base case `gcd(0, b) = 0`","`gcd(a, b) = gcd(b, a mod b)`, with base case `gcd(a, 0) = a`","`gcd(a, b) = gcd(a - b, b)`, with base case `gcd(a, a) = 0`"],"answer":2,"explanation":"Euclid's insight is that any common divisor of `a` and `b` also divides `a mod b`, so `gcd(a, b) = gcd(b, a mod b)`; the remainder strictly shrinks toward 0 and the last non-zero value is the answer, giving the base case `gcd(a, 0) = a`. The subtraction option is wrong because its base case `gcd(a, a)` is `a`, not 0 (it is the slow subtraction variant with a broken base case). The `a / b` option uses integer division instead of the remainder `a mod b`, which does not preserve the GCD. The reversed-argument option never shrinks the pair correctly and claims `gcd(0, b) = 0`, but in fact `gcd(0, b) = b`."},{"id":"math-number-theory-e02","topic":"Math & Number Theory","slug":"math-number-theory","difficulty":"easy","tags":["complexity"],"question":"What are the time and space complexities of the Sieve of Eratosthenes when finding all primes up to `n`?","code":"","codeLang":"","options":["O(n sqrt(n)) time, O(n) space","O(sqrt(n)) time, O(1) space","O(n log log n) time, O(n) space","O(n log n) time, O(1) space"],"answer":2,"explanation":"The sieve runs in O(n log log n) time — the `log log n` factor comes from summing `n/p` over primes `p` (the sum of reciprocals of primes) — and uses O(n) space for the boolean array marking composites. The `O(n log n)` / `O(1)` option misstates both the time factor and the space (the array is required, so it is not O(1)). The `O(n sqrt(n))` option is the cost of testing each number separately with trial division, which the sieve specifically beats. The `O(sqrt(n))` option is the cost of a single-number trial-division primality test, not the sieve over all numbers up to `n`."},{"id":"math-number-theory-e03","topic":"Math & Number Theory","slug":"math-number-theory","difficulty":"easy","tags":["pitfall","overflow"],"question":"With `int a = 100000, b = 100000`, which expression correctly computes the 64-bit product `10_000_000_000` without overflow in C#?","code":"int a = 100000, b = 100000;\n// which expression is correct?\n// (1) (long)a * b\n// (2) (long)(a * b)\n// (3) a * b\n// (4) all three give the same result","codeLang":"csharp","options":["`(long)(a * b)` — the parentheses force 64-bit multiplication","`(long)a * b` — the cast promotes the multiply to 64-bit before it happens","All three expressions give the same correct result","`a * b` — C# automatically widens products that exceed `int.MaxValue`"],"answer":1,"explanation":"`(long)a * b` promotes `a` to `long` first, so the multiplication is performed in 64-bit arithmetic and yields the correct `10_000_000_000`. The `(long)(a * b)` option is wrong because `a * b` evaluates in `int` first, overflows and wraps to `1_410_065_408`, and the cast only widens the already-wrong value. The bare `a * b` option is wrong because C# integer arithmetic is unchecked by default and silently wraps rather than auto-widening. The final option is wrong because the expressions do not all agree — only the cast-before-multiply form is correct."},{"id":"math-number-theory-m01","topic":"Math & Number Theory","slug":"math-number-theory","difficulty":"medium","tags":["pitfall","overflow"],"question":"You must compute `lcm(a, b)` for two positive `long` values where the true LCM is guaranteed to fit in a `long`, but the product `a * b` may not. Which expression is the safe, exact way to do it, and why?","code":"","codeLang":"","options":["`a * b / Gcd(a, b)` — computing the product first then dividing always gives the correct result because the final LCM fits in a `long`","`a / b * Gcd(a, b)` — dividing the larger operand by the smaller one and scaling by the GCD","`a / Gcd(a, b) * b` — `Gcd(a, b)` divides `a` exactly, so `a / Gcd(a, b)` is an integer and multiplying by `b` keeps the intermediate from overflowing","`a * b / Gcd(a, b)` — but only if you cast to `double` first, since floating point avoids overflow"],"answer":2,"explanation":"The reviewer states LCM = `a / gcd(a, b) * b` and to divide before multiplying: `a / gcd` is exact because the GCD divides `a`, which keeps the intermediate small and avoids the overflow that `a * b` would cause even when the LCM itself fits. The `a * b / gcd` option is wrong because it forms the full product first, which can overflow before the divide. The `double` option is wrong because casting to `double` introduces precision loss for large integers and is not the recommended fix. The `a / b * gcd` option is wrong because `a / b` is not generally exact and that formula is not the LCM at all."},{"id":"math-number-theory-m02","topic":"Math & Number Theory","slug":"math-number-theory","difficulty":"medium","tags":["template","pitfall"],"question":"In C#, `(a - b) % m` can be negative because `%` follows the sign of the dividend. For `m = 5`, `a = 1`, `b = 4`, which expression correctly normalizes `(a - b) mod m` into the range `[0, m)` and what value does it produce?","code":"","codeLang":"","options":["`(a - b) % m` -> `-3`, which is already a valid modular result","`((a - b) + m) % m` -> `2`, which works for every possible `a` and `b`","`Math.Abs((a - b) % m)` -> `3`","`(((a - b) % m) + m) % m` -> `2`"],"answer":3,"explanation":"The reviewer's idiom is `((x % m) + m) % m`; here `(1 - 4) % 5 = -3`, then `(-3 + 5) % 5 = 2`, the correct representative in `[0, 5)`. The raw `-3` option is wrong: that is the C# remainder, but the convention requires a non-negative result in `[0, m)`. The `Math.Abs` option is wrong because the absolute value of a negative remainder gives the wrong residue (it should map `-3` to `2`, not `3`). The `((a - b) + m) % m` option happens to give `2` here but its claim of working for every `a` and `b` is false — if `(a - b)` is smaller than `-m`, adding `m` only once still leaves a negative value, so you must take `% m` first as in the correct idiom."},{"id":"math-number-theory-m03","topic":"Math & Number Theory","slug":"math-number-theory","difficulty":"medium","tags":["template","invariant"],"question":"This iterative modular fast-power loop computes `b^e mod m`. The exponent `e` is read bit by bit. For the call `PowMod(2, 6, 1000)`, how many times does the body `result = result * b % m` actually execute (i.e. how many times is the running result multiplied in), and what is the final return value?","code":"long PowMod(long b, long e, long m)\n{\n    long result = 1 % m;\n    b %= m;\n    while (e > 0)\n    {\n        if ((e & 1) == 1) result = result * b % m;\n        b = b * b % m;\n        e >>= 1;\n    }\n    return result;\n}","codeLang":"csharp","options":["The multiply runs 3 times, once per loop iteration; the return value is `64`","The multiply runs 6 times, once per unit of the exponent; the return value is `64`","The multiply runs 2 times (the two set bits of `6 = 110`); the return value is `64`","The multiply runs 2 times; the return value is `4`, because only the squared base is folded in"],"answer":2,"explanation":"The `result *=` line executes only when the current low bit of `e` is 1. Since `6 = 110` in binary, two bits are set, so the multiply runs exactly twice; `2^6 = 64`, and `64 % 1000 = 64`. The \"6 times\" option is wrong because fast power is O(log e), not O(e) — it does not run once per unit. The \"3 times\" option is wrong because the multiply is guarded by the bit test, not the iteration count (the loop runs 3 times, but the result-multiply fires only on set bits). The last option has the right count but the wrong value: the folded-in powers are `2^2` (bit 1) and `2^4` (bit 2), giving `4 * 16 = 64`, not `4`."},{"id":"math-number-theory-m04","topic":"Math & Number Theory","slug":"math-number-theory","difficulty":"medium","tags":["pitfall","overflow"],"question":"A candidate writes integer `sqrt` with binary search but uses `if (mid * mid \u003c= x)` (both `mid` and `x` are `int`). For `x = int.MaxValue` the search probes `mid` values around `46341`. Why does this version produce a wrong answer, and what is the minimal fix?","code":"int lo = 1, hi = x / 2, ans = 1;\nwhile (lo \u003c= hi)\n{\n    int mid = lo + (hi - lo) / 2;\n    if (mid * mid \u003c= x) { ans = mid; lo = mid + 1; }\n    else hi = mid - 1;\n}\nreturn ans;","codeLang":"csharp","options":["`mid * mid` overflows `int` for `mid` like `46341` and wraps to a negative value, making the `\u003c= x` test pass when it should fail; fix with `(long)mid * mid \u003c= x`","`ans` starts at `1` instead of `0`, so the answer is always off by one; fix by initializing `ans = 0`","The initial `hi = x / 2` is too small to ever reach the true root; fix by setting `hi = x`","The midpoint `lo + (hi - lo) / 2` overflows; fix by writing `(lo + hi) / 2`"],"answer":0,"explanation":"For `mid = 46341`, `mid * mid = 2_147_488_281` exceeds `int.MaxValue` and wraps (silently, since C# arithmetic is unchecked), so the comparison `mid * mid \u003c= x` misbehaves and the search accepts a too-large root. The reviewer's fix is exactly `(long)mid * mid \u003c= x`, casting before the multiply so it happens in 64-bit. The midpoint option is wrong: `lo + (hi - lo) / 2` is already the overflow-safe form; switching to `(lo + hi) / 2` would reintroduce overflow. The `hi = x / 2` option is wrong because `x / 2` is a valid upper bound for `x >= 2` (sqrt(x) \u003c= x/2), so the true root is reachable. The `ans = 0` option is wrong because `ans` initialized to `1` is fine for `x >= 2` (the `x \u003c 2` case is handled separately) and the search overwrites it correctly."},{"id":"math-number-theory-h02","topic":"Math & Number Theory","slug":"math-number-theory","difficulty":"hard","tags":["pitfall","invariant"],"question":"You need `(a - b) mod m` to land in `[0, m)` for the standard modulus `m = 1_000_000_007`, with `a` and `b` already reduced into `[0, m)`. A teammate writes `return (a - b) % m;` and it sometimes returns a negative number in C#. Which single expression always returns the correct value in `[0, m)`, and why does the naive version fail?","code":"","codeLang":"","options":["`return ((a - b) % m + m) % m;` — C#'s `%` follows the sign of the dividend, so `a - b` can be negative; adding `m` once and reducing again maps it back into `[0, m)`.","`return (a - b + m) % m;` only when `a >= b`; otherwise no fix exists and you must use `BigInteger`.","`return (a % m - b % m);` — reducing each operand separately before subtracting guarantees a non-negative result without any further adjustment.","`return Math.Abs((a - b) % m);` — taking the absolute value of the remainder is the canonical fix and always yields a value in `[0, m)`."],"answer":0,"explanation":"The source gives the negative-remainder fix explicitly: C# `%` follows the sign of the dividend, so `(a - b) mod m` can come out negative, and you normalize with `((x % m) + m) % m` to land in `[0, m)`. The `Math.Abs` option is wrong: it flips the sign of a negative remainder, which gives the wrong residue (e.g. for `a - b = -1`, `Abs` yields 1 but the correct residue is `m - 1`). The `BigInteger` option is wrong: `(a - b + m) % m` actually works fine when `a, b` are reduced into `[0, m)` because `a - b > -m`, so the claim that it needs `a >= b` or `BigInteger` is false. The last option is wrong: reducing each operand and subtracting still produces a negative value when `b > a` (e.g. `0 - 5 = -5`)."},{"id":"math-number-theory-h03","topic":"Math & Number Theory","slug":"math-number-theory","difficulty":"hard","tags":["template","pitfall"],"question":"In the Sieve of Eratosthenes for LC 204 (Count Primes), the inner crossing-out loop starts at `j = (long)i * i` rather than `j = 2 * i`, and uses a `long` for `j` before casting back to `int`. Which statement correctly explains BOTH design choices?","code":"for (int i = 2; i \u003c n; i++)\n{\n    if (composite[i]) continue;\n    count++;\n    for (long j = (long)i * i; j \u003c n; j += i)\n        composite[(int)j] = true;\n}","codeLang":"csharp","options":["Starting at `i*i` reduces the time complexity from O(n log n) to O(n log log n); the `long` is needed because the sieve array index can exceed `int.MaxValue`.","Starting at `i*i` is required for correctness because `2i` would mark `i` itself as composite; the `long` is only stylistic and could safely be `int`.","Starting at `i*i` ensures only odd multiples are crossed out; the `long` prevents the `j += i` step from overflowing on every iteration regardless of `i`.","Starting at `i*i` skips smaller multiples (`2i, 3i, ...`) already crossed out by smaller primes; the `long` for `i*i` prevents the start index from overflowing `int` when `i` is large (e.g. `i` near 46341)."],"answer":3,"explanation":"The source states to start crossing out at `p * p`, not `2 * p`, because every smaller multiple of `p` (like `2p, 3p`) was already crossed out by a smaller prime, and to use `(long)p * p` to form the start index safely. The correct option captures both reasons: redundancy avoidance plus an overflow-safe start index (`i*i` for `i` near sqrt(int.MaxValue) ~= 46341 would overflow `int`). The `2i marks i` option is wrong: `2i` marks `2i`, not `i`; starting at `i*i` is an efficiency optimization, not a correctness requirement, and the `long` is genuinely needed. The complexity option is wrong: the start point is a constant-factor optimization, not the source of the O(n log log n) bound, and the array index `j` stays below `n`, never exceeding `int.MaxValue` — it is the unbounded intermediate `i*i` that needs `long`. The odd-multiples option is wrong: the sieve crosses out all multiples of `i` (not only odd ones), and per-iteration `j` values are bounded by `n`."},{"id":"monotonic-stack-e01","topic":"Stacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"easy","tags":["complexity","stack-basics"],"question":"On a .NET `Stack\u003cT>`, what are the time complexities of `Pop()` and `Peek()`?","code":"","codeLang":"","options":["Both are O(1)","Both are O(log n) due to the backing tree structure","`Pop()` is O(1) but `Peek()` is O(n)","Both are O(n) because the stack must scan to find the top"],"answer":0,"explanation":"A `Stack\u003cT>` only ever touches the top element, so `Pop()` (remove the top) and `Peek()` (read the top) are both O(1). Option 2 is wrong: a stack never scans to reach the top — the top index is tracked directly. Option 3 is wrong because `Peek()` is a constant-time read of the same top slot `Pop()` uses. Option 4 is wrong because `Stack\u003cT>` is array-backed, not tree-backed, so there is no log factor. (`Push` is O(1) amortized because the array doubles, but that is a separate operation.)"},{"id":"monotonic-stack-e02","topic":"Stacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"easy","tags":["when-to-apply","pattern-recognition"],"question":"You scan an array left to right and, for each element, must find the first element to its RIGHT that is strictly larger (\"next greater element\"). Which structure resolves this in one linear pass?","code":"","codeLang":"","options":["A decreasing monotonic stack","A FIFO queue","An increasing monotonic stack","A min-heap keyed by value"],"answer":0,"explanation":"A decreasing monotonic stack (top is the smallest) holds elements still waiting for a greater value to their right; when an incoming value exceeds the top, that incoming value is precisely the top's next-greater, so it pops and records. An increasing stack answers the opposite question (next smaller), so option 2 is wrong. A FIFO queue is for oldest-first processing and does not maintain the order needed to resolve nearest-greater, so option 3 is wrong. A heap gives global min/max, not the nearest greater element to the right, and would cost O(n log n) rather than O(n), so option 4 is wrong."},{"id":"monotonic-stack-e03","topic":"Stacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"easy","tags":["complexity","amortized"],"question":"Despite a nested `while` loop inside a `for` loop, the standard monotonic-stack scan over `n` elements runs in what total time?","code":"","codeLang":"","options":["O(n) amortized, because each index is pushed once and popped at most once","O(n^2), because the inner `while` can run on every outer iteration","O(n log n), because the stack must stay sorted","O(log n), because each push halves the remaining work"],"answer":0,"explanation":"Each index is pushed exactly once and popped at most once across the whole run, so total pops summed over all iterations are at most n — the inner `while`'s work is charged to the pushes, giving amortized O(n). Option 2 reflects the naive misreading that the inner loop's worst case applies independently to every outer iteration; the amortized accounting shows that is impossible. Option 3 wrongly assumes a per-push sorting cost, but the invariant is maintained by popping, not by sorting. Option 4 is unrelated — nothing about the scan halves the work."},{"id":"monotonic-stack-e04","topic":"Stacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"easy","tags":["template","edge-case"],"question":"In the Reverse Polish Notation (postfix) evaluator, when you read the operator `-`, you pop two values: first `b`, then `a`. Which expression must you compute?","code":"var st = new Stack\u003cint>();\n// ... numbers pushed ...\nint b = st.Pop();   // popped first\nint a = st.Pop();   // popped second\nst.Push( /* ? */ );","codeLang":"csharp","options":["Math.Abs(a - b), to avoid negative intermediate results","Either order, since subtraction order does not affect the result","b - a, because the first value popped is the left operand","a - b, because the first value popped is the right operand and the second is the left"],"answer":3,"explanation":"In RPN evaluation the first value popped is the right operand and the second popped is the left, so you must compute `a - b` (left OP right). Option 2 reverses the operands, which would compute `b - a` and give the wrong sign. Option 3 is wrong because subtraction is not commutative — `13 - 5` differs from `5 - 13`, so order matters. Option 4 is wrong because negative intermediate results are valid and expected; forcing absolute value would corrupt the computation."},{"id":"monotonic-stack-m01","topic":"Stacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"medium","tags":["when-to-apply","complexity"],"question":"You are given a large array of distinct integers and, for each element, must report the first element strictly greater than it that appears to its right (or -1 if none). The array is too large for an O(n^2) double loop. Which approach gives O(n) time, and why?","code":"","codeLang":"","options":["A sliding window of fixed size that tracks the maximum, reporting that maximum as each element's next-greater.","Sort the array first, then binary-search each element's successor in O(n log n).","A single left-to-right scan with a decreasing monotonic stack; an incoming value larger than the top is that top's next-greater, so each element is pushed and popped at most once.","A single left-to-right scan with an increasing monotonic stack; the top is always the largest seen, so it directly holds each element's next-greater."],"answer":2,"explanation":"A decreasing monotonic stack holds elements still waiting for a greater value to their right; when an incoming value exceeds the top, that value is the top's next-greater, so you pop and record, with each element pushed once and popped at most once (amortized O(n)). The increasing-stack option is wrong because an increasing stack answers 'next smaller', not 'next greater'. Sorting destroys the positional 'to its right' relationship that the problem requires, so binary search over sorted values cannot answer it. A fixed-size sliding-window max is unrelated: 'next greater to the right' is not a windowed maximum and the boundary is data-dependent, not a fixed span."},{"id":"monotonic-stack-m02","topic":"Stacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"medium","tags":["template","pitfall"],"question":"In the Largest Rectangle in Histogram solution, when a bar is popped, the width is computed as `i - left - 1` where `left` is the index now on top of the stack (or -1 if empty). Why is the naive `i - poppedIndex` wrong?","code":"while (st.Count > 0 && heights[st.Peek()] >= cur)\n{\n    int h = heights[st.Pop()];\n    int left = st.Count == 0 ? -1 : st.Peek();\n    int width = i - left - 1;\n    best = Math.Max(best, h * width);\n}","codeLang":"csharp","options":["`i - poppedIndex` double-counts the sentinel bar, so subtracting 1 removes it.","The current bar at `i` is included in the rectangle, so `i - poppedIndex` overcounts by exactly one bar on the right.","`poppedIndex` is always equal to `left + 1`, so `i - poppedIndex` and `i - left - 1` only differ when the stack is empty.","The popped bar's rectangle extends left past `poppedIndex` over every bar that is at least as tall, so the true span is the open interval between the nearest shorter bar on the left (`left`) and `i`, giving `i - left - 1`."],"answer":3,"explanation":"Because the stack is increasing, every bar between `left` and the popped bar is at least as tall as the popped bar, so the popped bar's maximal rectangle stretches across that whole open interval `(left, i)`, whose width is `i - left - 1` — not just `i - poppedIndex`. The sentinel explanation is false: the sentinel is the trigger at `i`, not something double-counted. The claim that `poppedIndex` always equals `left + 1` is false whenever multiple bars taller than the popped one were already popped this iteration, leaving a gap. The 'overcounts by one on the right' option misdescribes the formula: the width uses `i` as an exclusive right boundary already, and the undercount comes from the left side, not an off-by-one on the right."},{"id":"monotonic-stack-m04","topic":"Stacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"medium","tags":["trace","invariant"],"question":"Tracing Daily Temperatures on `temperatures = [73, 74, 75, 71, 69, 72, 76, 73]` with a decreasing stack of indices, what is the output answer array?","code":"for (int i = 0; i \u003c n; i++)\n{\n    while (st.Count > 0 && temperatures[i] > temperatures[st.Peek()])\n    {\n        int j = st.Pop();\n        ans[j] = i - j;\n    }\n    st.Push(i);\n}","codeLang":"csharp","options":["[1, 1, 4, 2, 1, 1, 0, 0]","[1, 1, 4, 2, 1, 1, 1, 0]","[0, 0, 4, 2, 1, 1, 0, 0]","[1, 1, 2, 1, 1, 1, 0, 0]"],"answer":0,"explanation":"Day 0 (73) is popped by day 1 (74): ans[0]=1; day 1 popped by day 2 (75): ans[1]=1; days 3 (71) and 4 (69) sit on the stack until day 5 (72) pops index 4 (ans[4]=1) and index 3 (ans[3]=2); day 6 (76) pops index 5 (ans[5]=1) and index 2 (ans[2]=6-2=4); days 6 and 7 never see a warmer day and stay 0, giving [1,1,4,2,1,1,0,0]. Option [1,1,2,1,1,1,...] wrongly gives index 2 a distance of 2, ignoring that 75 waits until day 6. The third option wrongly assigns day 6 a nonzero value even though no later day is warmer. The fourth wrongly leaves days 0 and 1 at 0 despite each being popped by the immediately following warmer day."},{"id":"monotonic-stack-m06","topic":"Stacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"medium","tags":["template","trace"],"question":"This iterative pre-order DFS pushes children in a specific order. For a binary tree with root A, A.left = B, A.right = C, what visit order does it produce, and what would happen if the two push lines were swapped?","code":"st.Push(root);\nwhile (st.Count > 0)\n{\n    TreeNode node = st.Pop();\n    result.Add(node.val);\n    if (node.right is not null) st.Push(node.right);\n    if (node.left  is not null) st.Push(node.left);\n}","codeLang":"csharp","options":["As written it produces a breadth-first order A, B, C; swapping the pushes converts it to depth-first.","As written it visits A, B, C (left before right); swapping the pushes would visit A, C, B because the last pushed child is popped first.","As written it visits A, C, B; swapping the pushes would fix it to A, B, C.","As written it visits A, B, C; swapping the pushes still yields A, B, C because a stack preserves push order."],"answer":1,"explanation":"Because a stack is LIFO, pushing right then left makes left pop first, so the code visits A, then B (left), then C (right) — correct pre-order. Swapping to push left then right would make right pop first, yielding A, C, B. The second option reverses the as-written behavior. The third option is wrong because a stack does not preserve push order — it reverses it, so swapping the pushes does change the result. The fourth option is wrong because an explicit stack produces depth-first order, not breadth-first; a queue would be needed for BFS."},{"id":"monotonic-stack-h01","topic":"Stacks & Monotonic Stacks","slug":"monotonic-stack","difficulty":"hard","tags":["template","pitfall"],"code":"for (int i = 0; i \u003c= n; i++)\n{\n    int cur = (i == n) ? 0 : heights[i];\n    while (st.Count > 0 && heights[st.Peek()] >= cur)\n    {\n        int h = heights[st.Pop()];\n        int left = st.Count == 0 ? -1 : st.Peek();\n        int width = i - left - 1;\n        best = Math.Max(best, h * width);\n    }\n    st.Push(i);\n}","codeLang":"csharp","question":"In this Largest Rectangle in Histogram solution, the pop condition uses `>=` (`heights[st.Peek()] >= cur`). Suppose someone changes it to a strict `>` (`heights[st.Peek()] > cur`). For an input with equal-height bars such as `[3, 3, 3]`, what is the effect of this single change on correctness?","options":["The answer becomes wrong: equal bars are never popped against each other, so each bar's width is computed only up to its immediate equal neighbor and the full-width rectangle is undercounted.","The answer becomes wrong: using `>` causes the same bar to be popped twice, double-counting its area and overestimating the result.","The answer is still correct, because when equal-height bars are involved the bar with the larger right boundary is the one that eventually pops and computes the full maximal width.","The code throws an exception, because leaving equal bars on the stack means the height-0 sentinel finds the stack already empty when it tries to peek the left boundary."],"answer":2,"explanation":"Both `>=` and `>` produce the correct final answer for equal-height bars, because the width formula uses the element *below* the popped one as the left boundary. With strict `>`, equal bars are simply not popped by each other, so they stay stacked; whichever equal bar is popped last (when a strictly shorter bar or the sentinel arrives) sees the earliest equal bar as its left boundary and computes the full span `i - left - 1`. For `[3,3,3]` the height-0 sentinel pops index 0 last with left = -1, width = 3, giving the full 3x3 = 9. Option 2 is wrong because the full-width rectangle is NOT undercounted — the last-popped equal bar recovers it. Option 3 is wrong: the height-0 sentinel forces every remaining bar to pop and the left-boundary peek is always guarded by `st.Count == 0 ? -1`, so no exception occurs. Option 4 is wrong: no index is ever popped more than once, so nothing is double-counted."},{"id":"monotonic-stack-h02","topic":"S
