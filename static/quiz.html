ight at \u003c= 2 log2(n+1) — slightly taller than AVL's ~1.44 log2(n) — so for a read-heavy workload that wants the shallowest tree, a custom AVL is the better fit, though both remain O(log n). Option B is wrong: the .NET BCL ships no AVL tree; `SortedDictionary` is red-black. Option C confuses `SortedDictionary` with `SortedList`, which is the sorted-array structure with O(n) inserts; `SortedDictionary` already has O(log n) inserts. Option D is wrong: red-black trees can be taller than AVL for the same n, so the structure choice does affect height and hence read latency."},{"id":"balanced-trees-h01","topic":"Balanced Trees & AVL","slug":"balanced-trees","difficulty":"hard","tags":["invariant","pitfall"],"question":"You are tracing the `Rebalance` routine on a node `N` that came back heavy with `BalanceFactor(N) = +2`. You read its left child's balance factor and find it is exactly `0`. Following the decision procedure in the reviewer, which single rotation is applied, and why is the child's `0` decisive?","code":"","codeLang":"","options":["A single right rotation (LL case), because the LL branch is taken whenever `BalanceFactor(left) >= 0`, and `0` satisfies that condition.","A left-right double rotation (LR case), because a child balance factor of `0` is ambiguous and the double rotation is the safe default.","No rotation, because a child with balance factor `0` means the subtree is already balanced and `N` was misdiagnosed.","A single left rotation (RR case), because a left child leaning `0` mirrors a right-heavy parent."],"answer":0,"explanation":"The reviewer's `Rebalance` code takes the LR branch only when `BalanceFactor(node.Left) \u003c 0`; otherwise (`>= 0`, which includes `0`) it falls through to `FixLeftLeft`, a single right rotation. A child balance factor of `0` therefore selects the straight LL fix, not the double rotation. Option B is wrong because `0` is not ambiguous — the condition is strictly `\u003c 0` for LR, so `0` is unambiguously LL. Option C confuses the sides: a `+2` parent is left-heavy and needs a right rotation, never a left rotation. Option D is wrong because `N` itself is genuinely heavy at `+2`; the child being balanced does not undo the parent's `+2` imbalance (this can occur during deletion), and a rotation is still required."},{"id":"balanced-trees-h02","topic":"Balanced Trees & AVL","slug":"balanced-trees","difficulty":"hard","tags":["complexity","comparison"],"question":"A teammate claims: \"Since both insertion and deletion in an AVL tree are `O(log n)`, the maximum number of rotations performed by a single operation is `O(1)` for both, just like a red-black tree.\" Which correction is accurate per the reviewer?","code":"","codeLang":"","options":["Both AVL insert and delete may rotate at every level (`O(log n)` rotations each), and only red-black trees achieve `O(1)` rotations on insert.","AVL insertion may rotate `O(log n)` times while deletion fires at most one rotation, because deletion only ever shrinks a single leaf.","Correct as stated: AVL insert and delete each perform at most a constant number of rotations, identical to red-black guarantees.","A single AVL insertion fires at most one rotation case, but a single AVL deletion may rotate at up to `O(log n)` ancestors; red-black trees keep rotations to a constant number per write."],"answer":3,"explanation":"The reviewer states that fixing the first heavy ancestor after an insertion restores the subtree's pre-insert height, so at most one rotation case fires per insert; a deletion shrinks a subtree and the imbalance can propagate, so rebalancing may rotate all the way to the root (`O(log n)` ancestors). It separately notes red-black trees do at most a constant number of rotations per write. Option A is wrong because AVL delete is not `O(1)` rotations. Option C is wrong because AVL insert is bounded to one rotation case, not `O(log n)`. Option D inverts the truth — insertion is the bounded-to-one case and deletion is the propagating case — and the claim that deletion only removes a leaf ignores the two-child inorder-successor case."},{"id":"balanced-trees-h03","topic":"Balanced Trees & AVL","slug":"balanced-trees","difficulty":"hard","tags":["template","pitfall"],"question":"Consider the LR fix below from the reviewer. Suppose an engineer 'optimizes' it by deleting the call on line 3 (`node.Left = RotateLeft(node.Left!);`) and keeping only line 4, applied to a genuine LR-shaped imbalance (heavy node `bf = +2`, left child `bf = -1`). What is the consequence?","code":"private static AvlNode FixLeftRight(AvlNode node)\n{\n    node.Left = RotateLeft(node.Left!);   // step 1: child -> LL shape\n    return RotateRight(node);             // step 2: finish\n}","codeLang":"csharp","options":["The BST ordering invariant is violated, producing keys out of sorted order even though the heights become balanced.","The tree stays balanced; the inner left rotation is redundant because a single right rotation already handles every left-heavy node.","The code throws a null-reference exception because `RotateRight` requires the left child to already be left-heavy.","A right rotation alone leaves the subtree still unbalanced — it merely bends the zig-zag the other way without restoring the AVL invariant."],"answer":3,"explanation":"The reviewer explicitly warns that for a 'bent' LR imbalance, a plain right rotation 'just bends the tree the other way without balancing it' — the inner left rotation first converts the LR shape into a clean LL shape so the subsequent right rotation can finish. Removing step 1 therefore leaves the subtree unbalanced. Option A is wrong: a single right rotation does NOT fix a zig-zag, which is the entire reason the double rotation exists. Option C is wrong because rotations always preserve BST ordering — the failure here is balance, not ordering. Option D is wrong because `RotateRight` only dereferences `root.Left`, which exists for a `+2` node, so no null-reference occurs; it simply produces a still-unbalanced result."},{"id":"binary-search-e01","topic":"Binary Search","slug":"binary-search","difficulty":"easy","tags":["complexity"],"question":"What is the time complexity of a standard binary search over a sorted array of `n` elements, where each comparison costs `O(1)`?","code":"","codeLang":"","options":["`O(1)`","`O(n log n)`","`O(log n)`","`O(n)`"],"answer":2,"explanation":"Each comparison discards half of the remaining candidates, so the number of probes is the log of n, giving `O(log n)` time. `O(n)` is the cost of a linear scan, which is what you fall back to when no monotone predicate exists. `O(n log n)` is typical of a comparison sort, not a single search. `O(1)` would mean constant work independent of input size, which is false since larger arrays require more probes."},{"id":"binary-search-e02","topic":"Binary Search","slug":"binary-search","difficulty":"easy","tags":["template","pitfall"],"question":"Which midpoint formula does the reviewer require to avoid integer overflow on large indices?","code":"","codeLang":"","options":["`mid = left + (right + left) / 2`","`mid = left + (right - left) / 2`","`mid = (left + right) / 2`","`mid = (left + right) >> 1`"],"answer":1,"explanation":"`left + (right - left) / 2` never overflows because `right - left` is always non-negative and stays within range, while still computing the same midpoint. `(left + right) / 2` is the classic bug: `left + right` can exceed `int.MaxValue` and wrap negative (a real defect latent in library code for years). `(left + right) >> 1` has the identical overflow problem since it also sums the two endpoints first. `left + (right + left) / 2` is not even the correct midpoint and still adds the two endpoints."},{"id":"binary-search-e03","topic":"Binary Search","slug":"binary-search","difficulty":"easy","tags":["when-to-apply"],"question":"Which condition is the real precondition for applying binary search, according to the reviewer?","code":"","codeLang":"","options":["A monotone yes/no predicate over an ordered domain","The values must all be non-negative integers","The input must be a physically sorted array stored contiguously","The array must contain no duplicate values"],"answer":0,"explanation":"The reviewer stresses that the requirement is monotonicity over an ordered domain, not literally a sorted array; any `isFeasible(x)` that flips from false to true exactly once qualifies (the basis of 'binary search the answer'). A physically sorted array is just the special case where the predicate is `nums[i] >= target`, so it is sufficient but not necessary. Duplicates are perfectly fine and are exactly what lower/upper bound handle (LC 34). Non-negativity is irrelevant to whether binary search applies."},{"id":"binary-search-e04","topic":"Binary Search","slug":"binary-search","difficulty":"easy","tags":["invariant","template"],"question":"In the closed-interval template `[left, right]`, which loop condition is correct and why?","code":"","codeLang":"","options":["`left >= right`, because the interval is processed from the right end inward","`left != right`, because equality means the target was already found","`left \u003c= right`, because when `left == right` the one-element interval still must be examined","`left \u003c right`, because the two endpoints can never be equal"],"answer":2,"explanation":"With a closed interval both ends are live candidates, so `left == right` describes a valid one-element interval that must still be probed; that requires `\u003c=`. `left \u003c right` belongs to the half-open template and would skip the final one-element check, missing matches. `left != right` is not the closed-interval form and misstates the meaning of equality. `left >= right` would never enter the loop for a normal `left \u003c= right` interval and does not describe how the search proceeds."},{"id":"binary-search-e05","topic":"Binary Search","slug":"binary-search","difficulty":"easy","tags":["lower-bound","definition"],"question":"How does the reviewer define the lower bound of `target` in a sorted array?","code":"","codeLang":"","options":["The first index `i` with `nums[i] > target`","The last index `i` with `nums[i] \u003c= target`","The first index `i` with `nums[i] == target`, or `-1` if absent","The first index `i` with `nums[i] >= target`"],"answer":3,"explanation":"Lower bound is defined as the first index whose value is `>= target` (the leftmost position where target could be inserted to keep order). The first index with `nums[i] > target` is the upper bound, which differs only by `\u003c` vs `\u003c=` in the probe. 'The last index with `nums[i] \u003c= target`' is a different boundary altogether and is not how lower bound is defined. Requiring `nums[i] == target` with a `-1` sentinel is the exact-match search, not lower bound, which returns an insertion point even when the target is absent."},{"id":"binary-search-m01","topic":"Binary Search","slug":"binary-search","difficulty":"medium","tags":["when-to-apply","complexity"],"question":"You must find whether a specific value exists in an array of 1,000,000 distinct integers that is NOT sorted and that you are not allowed to sort or copy. Which approach is correct, and why?","code":"","codeLang":"","options":["A linear scan in `O(log n)`, because checking each element is logarithmic in the array size","A linear scan in `O(n)`, because with no monotone predicate over the indices, binary search cannot reliably discard half the space","Binary search in `O(log n)`, because binary search works on any array regardless of order","Binary search in `O(log n)`, because distinct values guarantee a usable ordering"],"answer":1,"explanation":"Binary search requires a monotone predicate over an ordered domain; an unsorted array of distinct values has no usable ordering, so `nums[mid] vs target` tells you nothing about which side the value is on, forcing an `O(n)` linear scan. Option B is wrong: binary search emphatically does NOT work on arbitrary order. Option C confuses distinctness with sortedness; distinct values are still unordered here. Option D misstates complexity: a linear scan is `O(n)`, not `O(log n)`."},{"id":"binary-search-m03","topic":"Binary Search","slug":"binary-search","difficulty":"medium","tags":["lower-upper-bound","duplicates"],"question":"For a sorted array with duplicates, you want the first and last index of `target`. Using `LowerBound` (first `i` with `nums[i] >= target`) and `UpperBound` (first `i` with `nums[i] > target`), which computation and absence-guard is correct?","code":"","codeLang":"","options":["first = `LowerBound(target)`; last = `UpperBound(target)`; return `[-1,-1]` if `UpperBound == LowerBound`","first = `LowerBound(target) + 1`; last = `UpperBound(target)`; no absence guard needed","first = `LowerBound(target)`; last = `UpperBound(target) - 1`; return `[-1,-1]` if `LowerBound == n` or `nums[LowerBound] != target`","first = `UpperBound(target)`; last = `LowerBound(target) - 1`; return `[-1,-1]` if `nums` is empty"],"answer":2,"explanation":"The run of equal elements occupies the half-open range `[LowerBound, UpperBound)`, so the first index is `LowerBound` and the last is `UpperBound - 1`; because lower bound returns an insertion point even when the target is absent, you must guard by checking `LowerBound == n` or `nums[LowerBound] != target` and return `[-1,-1]`. Option B forgets the `-1`, returning one-past-the-last instead of the last index. Option C shifts the first index up by one and omits the required absence check, so it both mislocates the start and returns garbage for missing targets. Option D swaps the roles of lower and upper bound entirely."},{"id":"binary-search-m04","topic":"Binary Search","slug":"binary-search","difficulty":"medium","tags":["answer-search","when-to-apply"],"question":"In LC 875 (Koko Eating Bananas) you binary-search the minimum speed `k` with the predicate `isFeasible(k) = hoursNeeded(k) \u003c= h`. What property of `hoursNeeded(k)` makes this a valid binary search, and what is the time complexity?","code":"","codeLang":"","options":["`hoursNeeded(k)` decreases monotonically as `k` grows, so the predicate is `false...false,true...true`; complexity is `O(n log(max(piles)))`","`hoursNeeded(k)` increases monotonically as `k` grows, so upper bound finds the answer; complexity is `O(n)`","`hoursNeeded(k)` is sorted in the input array, so a closed-interval search applies; complexity is `O(log n)`","`hoursNeeded(k)` is monotone only if the piles are pre-sorted, so you must sort first; complexity is `O(n log n + log(max(piles)))`"],"answer":0,"explanation":"As speed `k` increases, hours needed can only stay the same or fall, so `hoursNeeded(k)` decreases monotonically and `isFeasible(k)` flips from false to true exactly once, letting lower bound over `[1, max(piles)]` find the minimum feasible speed; each feasibility scan is `O(n)` and there are `O(log(max(piles)))` probes, giving `O(n log(max(piles)))`. Option B invents a sorted input array; there is none, the predicate over the answer range is what is monotone. Option C is wrong: monotonicity holds regardless of pile order, so no sort is needed. Option D inverts the direction (more speed means fewer, not more, hours) and understates the complexity by dropping the log factor."},{"id":"binary-search-m07","topic":"Binary Search","slug":"binary-search","difficulty":"medium","tags":["bcl","duplicates"],"question":"You call `Array.BinarySearch` on the sorted array `{2, 4, 4, 4, 8}`. Which statement about its behavior is correct?","code":"int[] a = { 2, 4, 4, 4, 8 };\nint r1 = Array.BinarySearch(a, 6);\nint r2 = Array.BinarySearch(a, 4);","codeLang":"csharp","options":["`r1` is `4` (the insertion point directly) and `r2` is `3` (the last matching index)","`r1` is `~4 == -5` (insertion-point complement) and `r2` is some index of a matching `4` but not guaranteed to be the first, so for LC 34 you should roll your own lower/upper bound","`r1` is `-1` and `r2` is `1`, because the BCL always returns the first matching index on a hit and `-1` on a miss","`r1` throws an exception because `6` is absent, and `r2` returns the count of `4`s in the array"],"answer":1,"explanation":"On a miss, `Array.BinarySearch` returns the bitwise complement of the insertion point: `6` would insert at index `4`, so the result is `~4 == -5`; on a hit with duplicates it returns the index of SOME matching element, not necessarily the first, which is exactly why the source advises rolling your own lower/upper bound for LC 34. Option B is wrong on both counts: misses return `~insertionIndex` (negative), not `-1`, and the matched index for duplicates is not guaranteed to be the first. Option C is wrong: a miss returns the complement of the insertion point, not the raw insertion point, and a duplicate hit is not guaranteed to be the last. Option D is wrong: a miss does not throw, and a hit returns an index, not a count."},{"id":"binary-search-h01","topic":"Binary Search","slug":"binary-search","difficulty":"hard","tags":["template","pitfall","invariant"],"question":"A candidate wants `LowerBound` (first index `i` with `nums[i] >= target`, returning a value in `[0, n]`). They write the loop below. Treating the source's two-template rule (`\u003c=` pairs with `mid ± 1`, `\u003c` pairs with `hi = mid`), which single statement correctly describes what is wrong?","code":"int LowerBound(int[] nums, int target) {\n    int lo = 0, hi = nums.Length;   // half-open: hi exclusive\n    while (lo \u003c= hi) {\n        int mid = lo + (hi - lo) / 2;\n        if (nums[mid] \u003c target) lo = mid + 1;\n        else hi = mid;\n    }\n    return lo;\n}","codeLang":"csharp","options":["The midpoint `lo + (hi - lo) / 2` floors toward `lo`, which skips the boundary element; it should be `lo + (hi - lo + 1) / 2` to round up.","It pairs `lo \u003c= hi` with the converging branch `hi = mid`; once `lo == hi`, `mid == lo` and the `else` branch sets `hi = mid = lo`, so nothing moves and the loop never terminates (and the first iteration at `lo == hi == n` also indexes `nums[n]` out of range).","Initializing `hi = nums.Length` is the bug; for a lower bound `hi` must start at `nums.Length - 1`, otherwise the returned insertion point can never equal `n`.","It uses `nums[mid] \u003c target` instead of `nums[mid] \u003c= target`, so it computes an upper bound rather than a lower bound; the loop itself terminates correctly."],"answer":1,"explanation":"Per the source's 'mixing the two shapes is the bug factory' rule, `lo \u003c= hi` paired with `hi = mid` loops forever: when `lo == hi`, `mid == lo`, and `else` sets `hi = mid = lo`, making no progress; with `hi = nums.Length` the very first probe at `lo == hi == n` also reads `nums[n]` out of range. The fix is `while (lo \u003c hi)`. Option 2 is wrong: `nums[mid] \u003c target` is the correct lower-bound test, and the defect is non-termination, not an upper/lower mix-up. Option 3 is wrong: the half-open lower-bound template deliberately floors toward `lo`; rounding up would break the `hi = mid` convergence, not fix it. Option 4 is wrong: `hi = nums.Length` is required so the insertion point can be `n` (insert at end); shrinking it to `n - 1` loses that answer."},{"id":"binary-search-h02","topic":"Binary Search","slug":"binary-search","difficulty":"hard","tags":["complexity","when-to-apply"],"question":"In LC 875 (Koko), `piles` has `n` elements with maximum pile value `M`, and Koko must finish within `h` hours. Using the source's binary-search-on-the-answer template over the speed range `[1, M]`, what is the tight time and extra-space complexity?","code":"","codeLang":"","options":["`O(n log n)` time and `O(1)` extra space, because the binary search runs over the `n` piles.","`O(n M)` time and `O(n)` extra space, since every candidate speed from `1` to `M` is tested against all piles.","`O(n log M)` time and `O(1)` extra space.","`O(log M)` time and `O(1)` extra space, because each feasibility check is `O(1)`."],"answer":2,"explanation":"The source states Koko is `O(n log(max(piles)))` time and `O(1)` space: the binary search makes `O(log M)` probes over the speed range `[1, M]`, and each `CanFinish` feasibility scan sums `ceil(p/k)` over all piles in `O(n)`. Option 2 confuses the search domain — the `log` is over the answer range `M`, not the array length `n`; the array is never sorted or searched by index. Option 3 wrongly treats feasibility as `O(1)`; each test is an `O(n)` pass over the piles. Option 4 describes a linear scan of every candidate speed (`O(nM)`), which is exactly what binary search avoids by halving the speed range each step."},{"id":"binary-search-h03","topic":"Binary Search","slug":"binary-search","difficulty":"hard","tags":["invariant","when-to-apply"],"question":"For LC 153 (find the minimum of a rotated sorted array of distinct values), the source compares `nums[mid]` to `nums[hi]` rather than to `nums[lo]`. Which statement correctly justifies this choice and the resulting branch logic?","code":"","codeLang":"","options":["Comparing to `nums[lo]` would be equally correct; the source uses `nums[hi]` only to match the LC 33 search template, not for any correctness reason.","Comparing to `nums[hi]` is unambiguous: `nums[mid] > nums[hi]` means the minimum is strictly right of `mid` (so `lo = mid + 1`), otherwise the minimum is `mid` or left of it (so `hi = mid`); comparing to `nums[lo]` is ambiguous when the window is already sorted.","`nums[mid] > nums[hi]` means the minimum is at `mid` itself, so the branch should be `hi = mid - 1`; comparing to `nums[lo]` would instead point left.","Either comparison works only because the array has duplicates; with strictly distinct values neither `nums[lo]` nor `nums[hi]` reliably indicates which half contains the minimum."],"answer":1,"explanation":"The source explains that comparing `nums[mid]` to `nums[hi]` cleanly separates the two cases: `nums[mid] > nums[hi]` puts the rotation pivot (the minimum) strictly right of `mid`, so `lo = mid + 1`; otherwise the minimum is at `mid` or to its left, so `hi = mid`. It explicitly notes comparing to `nums[lo]` is ambiguous when the window is already sorted. Option 2 is wrong: the choice is for correctness, not stylistic alignment. Option 3 misstates the branch — when `nums[mid] > nums[hi]` the minimum is to the right of `mid`, not at `mid`, and using `hi = mid - 1` could discard the minimum. Option 4 inverts the truth: distinct values are exactly what makes the comparison reliable; duplicates are the harder case the source warns can degrade to `O(n)`."},{"id":"binary-search-h04","topic":"Binary Search","slug":"binary-search","difficulty":"hard","tags":["pitfall","template"],"question":"In LC 69 (`MySqrt`), the predicate `mid * mid \u003c= x` is monotone in `mid`. For `x = int.MaxValue` the correct answer is `46340`. The source flags one specific defect that silently breaks the comparison. What is it, and why does the rest of the template stay safe?","code":"int lo = 1, hi = x / 2, ans = 1;\nwhile (lo \u003c= hi) {\n    int mid = lo + (hi - lo) / 2;\n    if (mid * mid \u003c= x) { ans = mid; lo = mid + 1; }\n    else hi = mid - 1;\n}\nreturn ans;","codeLang":"csharp","options":["`lo + (hi - lo) / 2` overflows when `hi = x / 2` is near `int.MaxValue`; the fix is to compute the midpoint as `(lo + hi) / 2` with a `long` cast.","`mid * mid` overflows `int` (e.g. `46340 * 46340 = 2,147,395,600 > int.MaxValue`), wrapping negative so the test wrongly reads as true; cast one operand to `long` (`(long)mid * mid \u003c= x`). The midpoint `lo + (hi - lo) / 2` itself never overflows, so it needs no change.","`hi = x / 2` is too small an upper bound for large `x`, so the true square root `46340` is never reached; `hi` must be initialized to `x`.","The loop condition `lo \u003c= hi` is wrong for an answer search and causes an infinite loop; it must be `lo \u003c hi` with `hi = mid`."],"answer":1,"explanation":"The source names `mid * mid` overflow as 'the single most common bug' here: at `mid = 46340`, `mid * mid = 2,147,395,600` exceeds `int.MaxValue` and wraps negative, making the `\u003c= x` test falsely succeed; casting one operand to `long` fixes it. The midpoint `lo + (hi - lo) / 2` is already overflow-safe because `hi - lo >= 0`, so it stays unchanged. Option 2 is wrong on both counts — the safe midpoint form does not overflow, and `(lo + hi) / 2` is the form the source says to avoid. Option 3 is wrong: this is the closed template (`lo \u003c= hi` with `mid ± 1`, tracking `ans`), which terminates correctly; it is not a `hi = mid` half-open loop. Option 4 is wrong: the source proves `sqrt(x) \u003c= x/2` for `x >= 2`, so `hi = x / 2` safely covers `46340` (well under `int.MaxValue / 2`)."},{"id":"bit-manipulation-e01","topic":"Bit Manipulation","slug":"bit-manipulation","difficulty":"easy","tags":["when-to-apply","xor"],"question":"You are given an array where every element appears exactly twice except for one element that appears once, and you must find that unique element in `O(n)` time and `O(1)` space (LC 136 — Single Number). Which single operation, folded across the whole array, solves this?","code":"","codeLang":"","options":["OR (`|`) all elements together; the result is the unique value","NOT (`~`) each element and sum the results; the unique value is left over","AND (`&`) all elements together; only the unique value's bits survive","XOR (`^`) all elements together; the paired values cancel and the unique value remains"],"answer":3,"explanation":"XOR is self-inverse (`a ^ a == 0`) and has identity 0 (`a ^ 0 == a`), and it is commutative/associative, so folding `^` over the array cancels every value that appears twice and leaves the lone value — in `O(n)` time and `O(1)` space, beating the `O(n)`-space hash-set approach. AND is wrong because `&` only keeps bits set in every element and quickly drives shared bits to 0; it does not isolate a value that appears once. OR is wrong because `|` accumulates set bits from all elements and never cancels duplicates, so it does not recover the unique value. NOT plus summation is wrong because `~` flips bits per element and has no cancellation property, and the problem forbids relying on arithmetic sums that can overflow and do not isolate the unique element."},{"id":"bit-manipulation-e02","topic":"Bit Manipulation","slug":"bit-manipulation","difficulty":"easy","tags":["idiom","template"],"question":"In Brian Kernighan's popcount loop, which expression clears the lowest set bit of `x` on each iteration (so the loop runs once per 1-bit)?","code":"","codeLang":"","options":["`x & -x`","`x & (x - 1)`","`x ^ (x - 1)`","`x | (x - 1)`"],"answer":1,"explanation":"`x & (x - 1)` clears the lowest set bit: subtracting 1 turns the lowest 1 into 0 and sets all bits below it to 1, so AND-ing wipes that whole low run and keeps everything above; repeating it runs once per set bit, giving `O(popcount)`. `x & -x` is the related-but-different idiom that *isolates* (keeps only) the lowest set bit rather than clearing it. `x | (x - 1)` sets the trailing zero bits to 1 instead of clearing anything, so the loop would not converge to 0. `x ^ (x - 1)` produces a mask of the lowest set bit and all bits below it, which does not clear a single bit from `x` and would not give a per-bit loop count."},{"id":"bit-manipulation-e03","topic":"Bit Manipulation","slug":"bit-manipulation","difficulty":"easy","tags":["pitfall"],"question":"In C#, why does `if (x & 1 == 0)` fail to compile, and what is the correct fix?","code":"","codeLang":"","options":["`==` binds tighter than `&`, so it parses as `x & (1 == 0)` (an `int & bool`); fix it by writing `if ((x & 1) == 0)`","`&` binds tighter than `==`, so it parses as `(x & 1) == 0`; fix it by writing `if (x & (1 == 0))`","`&` is not a valid operator on `int`; fix it by using `&&` as in `if (x && 1 == 0)`","`x & 1` always returns a `bool`, so it cannot be compared to `0`; fix it by writing `if (x & 1)`"],"answer":0,"explanation":"Equality `==` has higher precedence than bitwise `&`, so `x & 1 == 0` parses as `x & (1 == 0)`, i.e. `int & bool`, which is invalid (`CS0019`); parenthesizing as `(x & 1) == 0` forces the AND first. The second option inverts the precedence (it is `==` that binds tighter, not `&`) and its 'fix' reproduces the original compile error. The third option is wrong because `&` is a valid bitwise operator on `int`; `&&` is the logical-AND on `bool` and does not apply to two ints here. The fourth option is wrong because `x & 1` yields an `int` (0 or 1), not a `bool`, so it must be compared to `0` and cannot stand alone as a condition in C#."},{"id":"bit-manipulation-m01","topic":"Bit Manipulation","slug":"bit-manipulation","difficulty":"medium","tags":["pitfall","complexity"],"question":"You are given an array of `2k+1` integers where every value appears exactly twice except one, which appears once, and you must return that unique value in `O(1)` extra space. A teammate proposes XOR-folding the whole array. A second problem hands you an array where every value appears exactly three times except one, which appears once. Which statement correctly describes whether the plain XOR fold works on each, and why?","code":"","codeLang":"","options":["It works on the thrice array but NOT on the twice-pairs array; XOR only cancels groups whose size is a multiple of three.","It fails on both arrays unless the input is first sorted, because XOR is not commutative and the cancellation depends on duplicate values being adjacent.","It works on the twice-pairs array but NOT on the thrice array; XOR cancels values that appear an even number of times, and three is odd so the duplicates do not cancel.","It works on both arrays; XOR is self-inverse, so any number of identical copies eventually cancels to 0 regardless of how many times a value repeats."],"answer":2,"explanation":"XOR is self-inverse (`a ^ a == 0`), so a value cancels only when it appears an even number of times; the twice-pairs case collapses to the lone value in `O(n)` time and `O(1)` space, but three copies leave one copy uncancelled, so the source explicitly says you need bit-count-mod-3 logic instead. The 'works on both' option is wrong: identical copies cancel only in even counts, not 'eventually' for any count. The 'must sort first' option is wrong: XOR is both commutative and associative, so order does not matter and sorting is unnecessary. The 'works on thrice only' option inverts reality: pairs (even) cancel, triples (odd) do not."},{"id":"bit-manipulation-m02","topic":"Bit Manipulation","slug":"bit-manipulation","difficulty":"medium","tags":["pitfall","invariant"],"question":"This shift-and-mask popcount is intended to count set bits but hangs on some inputs. For which inputs does it loop forever, and what is the underlying cause?","code":"public int HammingWeight(int n)\n{\n    int count = 0;\n    while (n != 0)\n    {\n        count += n & 1;\n        n >>= 1;\n    }\n    return count;\n}","codeLang":"csharp","options":["It loops forever on any odd `n`; `n & 1` leaves the low bit set, so `n` can never become even and the shift stalls.","It loops forever on `n == 0`; the `while` condition is checked before the body, so the count is never incremented for the zero case.","It loops forever on any negative `n`; `n` is a signed `int`, so `n >>= 1` is an arithmetic shift that keeps copying the sign bit, and a negative value never reaches 0.","It loops forever on `int.MaxValue`; the 31 set bits overflow `count` before the shift can drain them all."],"answer":2,"explanation":"For a negative `int`, `>>` is an arithmetic shift that sign-extends, so a negative `n` keeps refilling the high bits with 1, never becomes 0, and the loop spins; the source identifies this exact bug and prescribes casting to `uint`, using `>>>`, or switching to `n &= n - 1`. The `n == 0` option is wrong: when `n == 0` the loop body is simply skipped and the method correctly returns 0. The `int.MaxValue` option is wrong: `count` is a separate variable that is only incremented, never shifted, and 31 fits easily in an `int`. The 'odd `n`' option is wrong: `n & 1` only reads the low bit and does not modify `n`, and `n >>= 1` steadily removes low bits regardless of parity, so odd positive values terminate fine."},{"id":"bit-manipulation-m03","topic":"Bit Manipulation","slug":"bit-manipulation","difficulty":"medium","tags":["template","complexity"],"question":"For LC 338 (Counting Bits), you must return `result[i]` = popcount of `i` for all `i` in `0..n` in `O(n)` time. Why is the recurrence `dp[i] = dp[i >> 1] + (i & 1)` correct, and why does building the table left to right guarantee it runs in `O(n)`?","code":"","codeLang":"","options":["Dropping the low bit with `i >> 1` yields a smaller index whose popcount is already computed; adding back `i & 1` accounts for the bit that was dropped, so each entry is `O(1)` and the full sweep is `O(n)`.","The recurrence sums `dp[i-1] + dp[i-2]` like Fibonacci, so each entry reuses the two preceding ones and the table fills in linear time.","Each `dp[i]` recomputes the popcount of `i` from scratch with a 32-iteration loop, but since 32 is constant the total is `O(32n) = O(n)`.","It relies on `dp[i] = dp[2*i] + 1`; doubling the index never exceeds `n` during a left-to-right sweep, keeping every lookup in bounds."],"answer":0,"explanation":"The popcount of `i` equals the popcount of `i` with its lowest bit removed (`i >> 1`, a strictly smaller, already-filled index) plus 1 if that dropped bit was set (`i & 1`), so each entry costs `O(1)` and the left-to-right build is `O(n)`. The 'recompute from scratch' option describes the naive per-element popcount that the DP exists to avoid, not the recurrence shown. The Fibonacci option is a different recurrence (`dp[i-1] + dp[i-2]`) with no relation to bit counts. The `dp[2*i]` option is wrong: the DP reads `dp[i >> 1]` (a smaller index), not `dp[2*i]`, which would point at an unfilled or out-of-range slot."},{"id":"bit-manipulation-m04","topic":"Bit Manipulation","slug":"bit-manipulation","difficulty":"medium","tags":["trace","idiom"],"question":"Given `x = 0b0101_1000`, you compute `x & (x - 1)` and separately `x & -x`. What are the two results, in that order?","code":"int x = 0b0101_1000; // 88\nint a = x & (x - 1);\nint b = x & -x;","codeLang":"csharp","options":["a = 0b0100_0000 (64) and b = 0b0001_0000 (16): `x & (x - 1)` clears the highest set bit, and `x & -x` isolates the second-lowest set bit.","a = 0b0101_1000 (88) and b = 0b0101_1000 (88): both expressions leave `x` unchanged because it has more than one set bit.","a = 0b0000_1000 (8) and b = 0b0101_0000 (80): `x & (x - 1)` isolates the lowest set bit, and `x & -x` clears it.","a = 0b0101_0000 (80) and b = 0b0000_1000 (8): `x & (x - 1)` clears the lowest set bit, and `x & -x` isolates it."],"answer":3,"explanation":"The lowest set bit of `0101_1000` is at position 3 (value 8); `x & (x - 1)` clears exactly that bit, leaving `0101_0000` = 80, while `x & -x` isolates exactly that bit, giving `0000_1000` = 8, matching the source's two memorized expressions. The second option swaps the two operations' roles. The third option is wrong: neither expression is a no-op here; both act on the lowest set bit regardless of how many bits are set. The fourth option invents a 'highest bit' / 'second-lowest bit' behavior that neither idiom has."},{"id":"bit-manipulation-h01","topic":"Bit Manipulation","slug":"bit-manipulation","difficulty":"hard","tags":["pitfall","complexity"],"question":"You are asked to count the set bits of a 32-bit `int` that may be negative. A colleague proposes the shift-and-mask routine below, claiming it is `O(32)` per call. For the input `n = -1`, what actually happens?","code":"public int Popcount(int n)\n{\n    int count = 0;\n    while (n != 0)\n    {\n        count += n & 1;\n        n >>= 1;\n    }\n    return count;\n}","codeLang":"csharp","options":["It throws an overflow exception, because shifting a negative value is undefined under `checked` arithmetic in C#","It loops forever, because `n` is signed so `n >>= 1` is an arithmetic shift that keeps copying the sign bit and `n` never reaches 0","It returns 32 correctly, because the right shift eventually pushes the sign bit out and zero-fills from the top","It returns 1, because `n & 1` is computed once before the loop body and the shift then clears `n` in a single pass"],"answer":1,"explanation":"On a signed `int`, `>>` is an arithmetic shift that sign-extends, so a negative `n` (all-ones at the top) keeps regenerating the sign bit and never becomes 0 — the loop spins forever, exactly the bug the reviewer flags in its exam section. The 'returns 32' option is the misconception that signed `>>` zero-fills (it does not; only `uint` `>>` or `>>>` does), so it would not naturally terminate. The 'returns 1' option misreads control flow: `n & 1` runs every iteration, and the loop never completes a clean pass for negatives. The 'overflow exception' option is wrong because shifts do not raise overflow exceptions under `checked` — `checked` governs arithmetic overflow, not shift behavior."},{"id":"bit-manipulation-h02","topic":"Bit Manipulation","slug":"bit-manipulation","difficulty":"hard","tags":["when-to-apply","pitfall"],"question":"An array has every element appearing exactly three times except one element that appears exactly once; you must find the unique element in `O(n)` time and `O(1)` space. A candidate writes `acc = 0; foreach (v in nums) acc ^= v; return acc;`. Why is this the WRONG approach, and what is the correct fix?","code":"","codeLang":"","options":["It is wrong because XOR is not `O(1)` space; you must add a hash map counting occurrences, accepting `O(n)` space to handle the threefold case","It is wrong because plain XOR only cancels elements that appear an EVEN number of times; triples leave a residual bit pattern, so you must instead count each bit position mod 3 (or use a two-mask ones/twos method)","It is wrong only for negative inputs; casting every element to `uint` before XOR-ing makes the threefold cancellation work correctly","It is correct as written, because XOR is associative and commutative, so any repeated element cancels regardless of how many times it repeats"],"answer":1,"explanation":"The reviewer states explicitly that the plain XOR fold relies on every other element appearing exactly twice — `a ^ a == 0` cancels pairs, but XOR-ing a value three times leaves one copy (`a ^ a ^ a == a`), so triples do not vanish; the documented fix is counting each bit position mod 3 (or the ones/twos two-mask method). The 'negative inputs' option wrongly blames sign: the failure is the cancellation algebra, not signedness, and casting to `uint` changes nothing here. The 'correct as written' option is the core misconception — XOR cancels only even counts, not arbitrary repetition. The 'hash map' option needlessly abandons the `O(1)`-space goal that the mod-3 bit-count method actually preserves."},{"id":"bit-manipulation-h03","topic":"Bit Manipulation","slug":"bit-manipulation","difficulty":"hard","tags":["template","pitfall"],"question":"In the bitwise adder for LC 371 below, the carry is computed as `(int)((uint)(a & b) \u003c\u003c 1)` rather than simply `(a & b) \u003c\u003c 1`. What specific problem does casting through `uint` prevent, and why does the final result still equal `a + b` for negative operands?","code":"public int GetSum(int a, int b)\n{\n    while (b != 0)\n    {\n        int carry = (int)((uint)(a & b) \u003c\u003c 1);\n        a = a ^ b;\n        b = carry;\n    }\n    return a;\n}","codeLang":"csharp","options":["The cast converts the negative inputs to their magnitudes so the addition proceeds as unsigned, after which `(int)` restores the sign of whichever operand was larger","Left-shifting a negative `a & b` can overflow a signed `int` and throw under `checked` arithmetic; computing the carry in `uint` wraps it cleanly in two's complement, which is exactly the behavior real addition relies on, so the loop still converges to `a + b`","The `uint` cast forces a logical right shift inside the loop, preventing the sign bit from propagating during the XOR step and keeping `b` positive until the carry clears","Without the cast the loop would never terminate, because a signed left shift wraps the shift count mod 32 and reintroduces a carry bit every iteration"],"answer":1,"explanation":"The reviewer's pitfall note says left-shifting a negative `a & b` can overflow a signed `int` (throwing under `checked`), so the carry is computed in `uint` where it wraps cleanly in two's complement — and since real two's-complement addition is exactly that wrapping bit operation, the loop still converges to `a + b` for all sign combinations. The 'logical right shift' option confuses the carry's LEFT shift with a right shift and invents sign-propagation that the XOR step does not involve. The 'never terminate' option misattributes termination to shift-count wraparound; the loop terminates because carries march left until they fall off the top, not because of `\u003c\u003c 1`. The 'magnitudes' option wrongly claims the algorithm works on magnitudes — it operates directly on the two's-complement bit patterns, which is precisely why it handles negatives without sign-magnitude conversion."},{"id":"complexity-e01","topic":"Complexity & Big-O","slug":"complexity","difficulty":"easy","tags":["asymptotics","complexity"],"question":"What is the tight Big-O time complexity of the expression `3n^2 + 100n + 7`?","code":"","codeLang":"","options":["O(n^2)","O(n)","O(n^2 + n)","O(3n^2)"],"answer":0,"explanation":"Big-O describes scaling: you drop constant factors and lower-order terms and keep only the dominant term, so `3n^2 + 100n + 7` is O(n^2). Option 'O(n)' is wrong because it discards the dominant quadratic term, badly underestimating growth. 'O(3n^2)' keeps the constant factor 3, which Big-O explicitly drops since constants depend on hardware/coding style, not scaling. 'O(n^2 + n)' keeps the lower-order `n` term, which is negligible relative to `n^2` as n grows and should be dropped."},{"id":"complexity-e02","topic":"Complexity & Big-O","slug":"complexity","difficulty":"easy","tags":["complexity","loop-counting"],"question":"A loop runs `for (int i = 1; i \u003c n; i *= 2)`, doubling the counter each iteration. What is its time complexity?","code":"","codeLang":"","options":["O(log n)","O(n^2)","O(n)","O(n log n)"],"answer":0,"explanation":"A loop whose counter multiplies (or divides) by a constant factor each step reaches n after about log2 n iterations, so it is O(log n). 'O(n)' would be correct only if the counter advanced by a constant additive step (`i++`), giving n iterations. 'O(n log n)' is the linearithmic class of divide-and-conquer with a linear merge, not a single multiplying loop. 'O(n^2)' is the nested-same-n-loop class and has nothing to do with a single counter that multiplies."},{"id":"complexity-e03","topic":"Complexity & Big-O","slug":"complexity","difficulty":"easy","tags":["complexity","comparison"],"question":"What is the worst-case time complexity of a single hash-table (hash map) lookup?","code":"","codeLang":"","options":["O(n), when all keys collide into one bucket","O(log n), like a balanced-tree lookup","O(1), guaranteed for every input","O(n log n), because it must rehash"],"answer":0,"explanation":"Hash lookups are O(1) average but O(n) worst case: if every key collides into a single bucket, the lookup degrades to scanning all n entries in that bucket. 'O(1) guaranteed' is the classic inaccuracy the reviewer warns against — you should say 'average O(1)' because the worst case is not constant. 'O(log n)' is the bound for a balanced BST, not a hash table; hashing does not maintain sorted order. 'O(n log n)' is the comparison-sort class and is unrelated to a single lookup."},{"id":"complexity-e04","topic":"Complexity & Big-O","slug":"complexity","difficulty":"easy","tags":["constraints","when-to-apply"],"question":"A problem states `1 \u003c= n \u003c= 100000` with a 1-second time limit (about 10^8 operations). Which target complexity should you aim for?","code":"","codeLang":"","options":["O(n!)","O(2^n)","O(n log n) or O(n)","O(n^2)"],"answer":2,"explanation":"At n = 10^5, an O(n) or O(n log n) solution is about 10^5 to ~1.7 * 10^6 operations, comfortably within the ~10^8 budget, so a linear or linearithmic algorithm is the intended target. 'O(n^2)' is (10^5)^2 = 10^10 operations, roughly 100x over budget, so it times out. 'O(2^n)' is feasible only for n up to about 20 (subset/backtracking sizes), nowhere near 10^5. 'O(n!)' is feasible only up to about n = 12 (permutation sizes) and is astronomically too slow here."},{"id":"complexity-m01","topic":"Complexity & Big-O","slug":"complexity","difficulty":"medium","tags":["recurrence","master-theorem"],"question":"Two divide-and-conquer routines have recurrences `T(n) = 2 T(n/2) + O(1)` and `U(n) = 2 U(n/2) + O(n)`. Both make two recursive calls on halves. What are their tight time complexities?","code":"","codeLang":"","options":["Both are Theta(n log n), since both branch into two halves","`T` is Theta(n log n) and `U` is Theta(n), since more combine work means fewer levels","`T` is Theta(n) and `U` is Theta(n log n)","`T` is Theta(log n) and `U` is Theta(n)"],"answer":2,"explanation":"The non-recursive term f(n) decides the result, not the call count. For T, the watershed is n^(log_2 2)=n and f(n)=O(1) is polynomially smaller, so the leaves dominate (Case 1): Theta(n). For U, f(n)=Theta(n) matches the watershed (Case 2): every level does O(n) total work across log n levels, giving Theta(n log n). Option 1 (correct) reflects this. Option 2 wrongly assumes two-way branching alone forces n log n. Option 3 confuses these with single-call recurrences (binary search depth) and ignores that 2^(log n)=n leaves. Option 4 inverts the relationship and invents a false 'fewer levels' rule."},{"id":"complexity-m02","topic":"Complexity & Big-O","slug":"complexity","difficulty":"medium","tags":["complexity","code-reading"],"question":"What is the tight time complexity of this snippet, where the matrix is n by n?","code":"int[][] ar = new int[n][];\nfor (int i = 0; i \u003c n; i++) ar[i] = new int[n];\nfor (int i = 0; i \u003c n; i++)\n    for (int j = 0; j \u003c n; j++)\n        ar[i][j] = Next();          // O(1) read\nfor (int i = 0; i \u003c n; i++)\n    Array.Sort(ar[i]);              // sort a length-n row","codeLang":"csharp","options":["O(n log n)","O(n^3)","O(n^2 log n)","O(n^2)"],"answer":2,"explanation":"Sequential blocks add and the dominant term wins. Filling the matrix is O(n^2). Sorting each of the n rows costs O(n log n), and doing that for all n rows is n x O(n log n) = O(n^2 log n), which dominates the O(n^2) fill. Option 1 is correct. Option 2 forgets the log n factor introduced by sorting each row. Option 3 counts only a single row's sort, ignoring the outer loop over n rows. Option 4 wrongly treats each row sort as O(n^2) (it is O(n log n), not quadratic)."},{"id":"complexity-m03","topic":"Complexity & Big-O","slug":"complexity","difficulty":"medium","tags":["amortized","pitfall"],"question":"A custom list resizes by growing its capacity by a fixed `+10` slots whenever it is full, copying all current elements on each resize. What is the amortized cost per append over `n` appends, and why?","code":"","codeLang":"","options":["O(n) amortized, because constant-increment growth makes total copies 10 + 20 + ... + n = Theta(n^2)","O(1) amortized, because each individual append still writes only one slot in the common case","O(log n) amortized, because resizes happen every 10 appends","O(1) amortized, the same as a doubling array, since the growth amount is a fixed constant"],"answer":0,"explanation":"Amortized O(1) requires growing by a constant *factor* (e.g. doubling), where total copies form a geometric series under 2n. Growing by a fixed *amount* (+10) triggers a resize roughly every 10 appends, each copying all current elements; the copies sum to 10 + 20 + 30 + ... + n = Theta(n^2), so the per-append average is O(n). Option 1 is correct. Option 2 ignores the cumulative copy cost of the rare-but-growing resizes. Option 3 invents a logarithmic bound that has no basis here. Option 4 confuses a constant growth *amount* with a constant growth *factor* — only the latter gives O(1) amortized."},{"id":"complexity-m04","topic":"Complexity & Big-O","slug":"complexity","difficulty":"medium","tags":["complexity","code-reading"],"question":"Given `len = log2(n)`, what is the tight time complexity of the call `Func(\"\", 0, len)`?","code":"static void Func(string s, int idx, int len)\n{\n    if (idx == len) { /* O(1) op */ }\n    else\n    {\n        Func(s + \"a\", idx + 1, len);\n        Func(s + \"b\", idx + 1, len);\n    }\n}","codeLang":"csharp","options":["O(n log n), because there are log n levels with n work each","O(log n), because the recursion depth is log2 n","O(n), because the binary recursion of depth log2 n has 2^(log2 n) = n leaves","O(2^n), because each call branches into two"],"answer":2,"explanation":"The recursion branches into two at each level and stops at depth len = log2 n, so the call tree has 2^(log2 n) = n leaves and O(n) nodes total; with O(1) work per node the total is O(n). Option 1 is correct and captures the key trap. Option 2 mistakes recursion *depth* for total work — depth is log n but a fully branching tree of that depth has n leaves. Option 3 applies the 2^depth formula with depth n, but the depth here is only log2 n, giving 2^(log2 n)=n, not 2^n. Option 4 invents per-level work of n; each level's total work here is bounded by the node count, summing to O(n) overall."},{"id":"complexity-m05","topic":"Complexity & Big-O","slug":"complexity","difficulty":"medium","tags":["constraints","when-to-apply"],"question":"A problem states `1 \u003c= n \u003c= 100000` with a 1-second time limit (budget roughly 10^8 simple operations). Which target complexity should you aim for, and what does it rule out?","code":"","codeLang":"","options":["Aim for O(n log n) or O(n); a plain O(n^2) double loop is about 10^10 ops and times out","Aim for O(2^n); the small upper bound on n leaves room for subset enumeration","Aim for O(n^2); at n = 10^5 a quadratic loop is about 10^7 ops and fits comfortably","Aim for O(log n) only; anything linear cannot read all 10^5 inputs in time"],"answer":0,"explanation":"At n = 10^5, an O(n^2) approach is (10^5)^2 = 10^10 operations, roughly 100x over the ~10^8 budget, so it times out; O(n log n) is about 1.7 x 10^6 ops and O(n) is 10^5 ops, both fitting easily. The constraint 'n up to 10^5' almost always signals an O(n log n) or O(n) intended solution. Option 1 is correct. Option 2 miscomputes the quadratic cost (10^10, not 10^7). Option 3 misreads the cheat sheet — O(2^n) is only viable for n around 20, far below 10^5. Option 4 is over-restrictive: an O(n) pass over 10^5 elements is trivially within budget, so linear is fine."},{"id":"complexity-h01","topic":"Complexity & Big-O","slug":"complexity","difficulty":"hard","tags":["master-theorem","complexity"],"question":"A divide-and-conquer routine has recurrence `T(n) = 4 T(n/2) + n^2`. Using the Master Theorem, what is its tight time complexity?","code":"","codeLang":"","options":["Theta(n^3)","Theta(n log n)","Theta(n^2)","Theta(n^2 log n)"],"answer":3,"explanation":"The watershed is n^(log_b a) = n^(log_2 4) = n^2. Since f(n) = n^2 = Theta(n^2) equals the watershed, this is Case 2, giving Theta(n^(c*) * log n) = Theta(n^2 log n). Option 'Theta(n^2)' is the Case 1 answer (leaves dominate) and would only hold if f(n) were polynomially smaller than n^2; here f(n) matches the watershed, so the log factor is mandatory. 'Theta(n^3)' wrongly treats f(n) as larger than the watershed (Case 3) — but n^2 is not Omega(n^(2+e)). 'Theta(n log n)' is the merge-sort result for T(n)=2T(n/2)+n and does not apply: with a=4 the leaf count grows like n^2, not n."},{"id":"complexity-h02","topic":"Complexity & Big-O","slug":"complexity","difficulty":"hard","tags":["amortized","pitfall"],"question":"A custom dynamic list resizes when full by allocating a new backing array of size `oldCapacity + sqrt(oldCapacity)` (rounded up) and copying all existing elements. Compared with the standard doubling policy, what is the amortized cost per append, and why?","code":"","codeLang":"","options":["O(n) amortized, the same as growing by a constant +1 each time","O(1) amortized, because any growth rule that increases capacity each resize gives a geometric series under 2n","O(sqrt(n)) amortized, because resizes recur every ~sqrt(n) appends and each copies up to n elements, so total copy work is Theta(n * sqrt(n))","O(log n) amortized, because the number of resizes over n appends is about log n"],"answer":2,"explanation":"Amortized O(1) requires growing by a constant *factor* (capacity * c for c > 1), which makes copy work a geometric series summing to under c/(c-1) * n. Adding sqrt(capacity) is sub-linear growth, not a constant factor: the gaps between resizes grow only like sqrt(n), so there are about sqrt(n) resizes, and the later ones each copy ~n elements, giving total copy work Theta(n * sqrt(n)) and thus O(sqrt(n)) amortized per append. Option 'O(1)' is the doubling misconception — merely increasing capacity is not enough; the increase must be multiplicative. 'O(log n)' miscounts the resizes (there are ~sqrt(n), not ~log n) and even that count alone would not give the per-op cost. 'O(n)' overstates it: the +1 constant-increment policy gives Theta(n^2) total / O(n) amortized, but sqrt growth is strictly cheaper than that."},{"id":"complexity-h03","topic":"Complexity & Big-O","slug":"complexity","difficulty":"hard","tags":["space","recursion"],"question":"For the call `Rec(0, n, ...)` below, give the tight TIME complexity and the tight AUXILIARY SPACE complexity (count the recursion call stack; ignore the output list's own storage).","code":"static void Rec(int depth, int n, List\u003cint> path, List\u003cList\u003cint>> output)\n{\n    if (depth == n) { output.Add(new List\u003cint>(path)); return; }\n    for (int choice = 0; choice \u003c 2; choice++)\n    {\n        path.Add(choice);          // O(1) amortized append\n        Rec(depth + 1, n, path, output);\n        path.RemoveAt(path.Count - 1);\n    }\n}\n// invoked as: Rec(0, n, new List\u003cint>(), output);","codeLang":"csharp","options":["Time Theta(n * 2^n), auxiliary space Theta(n)","Time Theta(n), auxiliary space Theta(log n)","Time Theta(2^n), auxiliary space Theta(2^n)","Time Theta(2^n), auxiliary space Theta(n)"],"answer":3,"explanation":"Each call branches into 2 and the tree stops at depth n, so it has 2^n leaves and Theta(2^n) nodes total; with O(1) work per node (excluding the output copy), time is Theta(2^n). Auxiliary space is the recursion DEPTH, not the node count: the algorithm explores one root-to-leaf path at a time, so at most n frames (plus the length-n `path`) are live simultaneously — Theta(n). Option 'space Theta(2^n)' is the classic error of equating stack space with total calls; only one path's frames coexist. 'Time Theta(n)' confuses this with a single binary recursion of depth log n (where 2^(log n)=n); here the stop depth is n itself, giving 2^n. 'Time Theta(n * 2^n)' would be right only if you counted the O(n) cost of copying each leaf into the output, but the prompt excludes output storage, so per-node work is O(1)."},{"id":"concurrency-e01","topic":"Collection Concurrency","slug":"concurrency","difficulty":"easy","tags":["when-to-apply"],"question":"In .NET, which standard library collections are thread-safe for concurrent writers out of the box?","code":"","codeLang":"","options":["None of them — `List\u003cT>`, `Dictionary\u003cTKey,TValue>`, `Queue\u003cT>`, and `Stack\u003cT>` assume a single writer and can be silently corrupted by concurrent writes.","Only `Dictionary\u003cTKey,TValue>`, because hashing isolates each bucket from the others.","All of them — the BCL collections internally lock every mutating method, so concurrent writes are always safe.","Only `Queue\u003cT>` and `Stack\u003cT>`, because their FIFO/LIFO ordering serializes access automatically."],"answer":0,"explanation":"The reviewer states the everyday BCL collections (`List\u003cT>`, `Dictionary\u003cTKey,TValue>`, `Queue\u003cT>`, `Stack\u003cT>`) are explicitly NOT thread-safe; they assume a single writer, and concurrent writers silently corrupt them. Option 1 is the misconception that the BCL locks internally for you — it does not; you must add synchronization or use `System.Collections.Concurrent`. Option 2 wrongly imagines hashing makes `Dictionary` safe, but a write touches bucket pointers and size fields that can tear under concurrency. Option 3 confuses logical ordering (FIFO/LIFO) with thread synchronization — ordering of elements has nothing to do with serializing concurrent threads."},{"id":"concurrency-e02","topic":"Collection Concurrency","slug":"concurrency","difficulty":"easy","tags":["when-to-apply","complexity"],"question":"Two threads each run `count = count + 1` starting from `count == 5`. Why can the final value be `6` instead of `7`?","code":"","codeLang":"","options":["Thread 2 always runs strictly after Thread 1 finishes, so only one of the two increments can ever take effect.","`count = count + 1` is a read-modify-write of three steps; both threads can read 5 before either writes, so both write 6 and one increment is lost.","Integer addition overflows at small values, so the second increment wraps back to the original number.","The C# compiler caches `count` as a constant, so the second assignment is optimized away entirely."],"answer":1,"explanation":"The reviewer's lost-update example shows `count = count + 1` is three machine steps — read, add, write — and when both threads read 5 before either writes, both compute and write 6, losing one increment. Option 1 invokes overflow, which is irrelevant at value 5 and is a different phenomenon. Option 2 invents a compiler constant-folding behavior that does not occur for a shared mutable field. Option 3 contradicts the premise of concurrency: threads interleave nondeterministically and do not run strictly sequentially, which is precisely why the race exists."},{"id":"concurrency-e03","topic":"Collection Concurrency","slug":"concurrency","difficulty":"easy","tags":["template","when-to-apply"],"question":"Which two `System.Collections.Concurrent` types does the reviewer describe as lock-free?","code":"","codeLang":"","options":["`ConcurrentDictionary\u003cTKey,TValue>` and `ConcurrentBag\u003cT>`.","`ConcurrentQueue\u003cT>` and `ConcurrentStack\u003cT>`.","`ReaderWriterLockSlim` and `Monitor`.","`List\u003cT>` and `Dictionary\u003cTKey,TValue>` once wrapped in a `lock`."],"answer":1,"explanation":"The reviewer's table and key points state `ConcurrentQueue\u003cT>` and `ConcurrentStack\u003cT>` are lock-free, so they never block a caller on a lock. Option 1 is wrong because `ConcurrentDictionary` uses fine-grained (striped) locking for writes and `ConcurrentBag` uses thread-local storage with work-stealing — neither is described as lock-free. Option 2 confuses caller synchronization (a lock-BASED strategy) with lock-free design. Option 3 lists synchronization primitives, not collections — `ReaderWriterLockSlim` and `Monitor` are locks, the opposite of lock-free."},{"id":"concurrency-m01","topic":"Collection Concurrency","slug":"concurrency","difficulty":"medium","tags":["pitfall","check-then-act"],"question":"This consumer loop, draining a plain `Queue\u003cJob>` from several threads, occasionally throws \"queue empty\" on `Dequeue`. What is the root cause?","code":"while (jobs.Count > 0)                 // jobs is a plain Queue\u003cJob>\n{\n    Job next;\n    lock (jobsLock) { next = jobs.Dequeue(); }\n    next.Process();\n}","codeLang":"csharp","options":["`next.Process()` runs inside the loop but outside the lock, so a second thread can re-process the same job and corrupt the count","The `lock` object `jobsLock` must be the queue instance itself; locking a separate object provides no mutual exclusion for the queue","`Count` is read outside the lock, so another consumer can drain the last job between the check and acquiring the lock, leaving `Dequeue` to run on an empty queue","`Queue\u003cT>.Dequeue` is itself not thread-safe, so wrapping it in a `lock` cannot prevent the exception"],"answer":2,"explanation":"This is the classic check-then-act race: the `Count > 0` test happens outside any lock, and between that test and acquiring `jobsLock`, another consumer can dequeue the last job, so this thread's `Dequeue` throws on an empty queue. The fix is to re-check the count inside the same lock as the dequeue (or use `ConcurrentQueue.TryDequeue`). Option 2 is wrong: the `lock` does serialize `Dequeue` correctly per call; the problem is the unguarded check, not `Dequeue` itself. Option 3 is wrong: a lock provides mutual exclusion as long as all parties use the *same* dedicated object; the source explicitly recommends a private lock object rather than locking the collection or `this`. Option 4 is wrong: processing outside the lock is correct practice (keep critical sections tiny); each job is dequeued exactly once, so it is not re-processed."},{"id":"concurrency-m02","topic":"Collection Concurrency","slug":"concurrency","difficulty":"medium","tags":["when-to-apply","trade-offs"],"question":"A shared lookup cache is read about 1000 times for every write. An engineer must pick a synchronization strategy. Which choice fits this workload best, and why?","code":"","codeLang":"","options":["`Interlocked.CompareExchange` on the dictionary reference, because compound dictionary operations are atomic single-variable updates","`ReaderWriterLockSlim`, because it lets the many readers proceed concurrently while only writers take an exclusive lock","A plain `lock`/`Monitor` around the dictionary, because monitors let multiple readers run at once and are lighter than a reader/writer lock","`ConcurrentBag\u003cT>`, because it is optimized for read-heavy workloads where the same threads both read and write entries"],"answer":1,"explanation":"When reads vastly outnumber writes, `ReaderWriterLockSlim` wins because it permits many concurrent readers while a write takes an exclusive lock; the thousand-to-one readers no longer serialize on each other. Option 2 is wrong: a plain monitor makes readers block other readers, so it serializes every read needlessly under this skew. Option 3 is wrong: `Interlocked` works on a single variable, not on the multi-field internal state of a dictionary; a CAS on the reference cannot make `TryGetValue`/insert sequences atomic. Option 4 is wrong: `ConcurrentBag\u003cT>` is an unordered bag for cases where the same threads add and take their own items, not a keyed cache, and it is not a read-optimized map."},{"id":"concurrency-m03","topic":"Collection Concurrency","slug":"concurrency","difficulty":"medium","tags":["template","atomicity"],"question":"Several threads must maintain a per-word occurrence count in a shared `ConcurrentDictionary\u003cstring,int>`. Which single statement increments the count atomically, creating the entry at 1 on first sight, with no lock and no lost updates?","code":"var counts = new ConcurrentDictionary\u003cstring, int>();\n// increment count for `word` ...","codeLang":"csharp","options":["`counts.AddOrUpdate(word, 1, (k, cur) => cur + 1);`","`if (counts.ContainsKey(word)) counts[word]++; else counts[word] = 1;`","`counts.TryAdd(word, counts.GetValueOrDefault(word) + 1);`","`counts[word] = counts.GetOrAdd(word, 0) + 1;`"],"answer":0,"explanation":"`AddOrUpdate` inserts the add value (1) if the key is absent or applies the update delegate (`cur + 1`) if present, and the whole insert-or-update is performed atomically by the dictionary, which is exactly the canonical concurrent-counter idiom from the source. Option 2 is a check-then-act across two separate operations: another thread can act in the gap between `ContainsKey` and the index-set, so updates are lost. Option 3 reads with `GetOrAdd` and then writes back with a separate indexer set, again two non-atomic steps with a gap, so increments are lost. Option 4 only ever succeeds on the very first call: `TryAdd` does nothing once the key exists, so all subsequent increments are silently dropped, and the read-then-add is itself racy."},{"id":"concurrency-m04","topic":"Collection Concurrency","slug":"concurrency","difficulty":"medium","tags":["pitfall","atomicity"],"question":"All threads share a single `ConcurrentQueue\u003cJob>` (a lock-free, thread-safe collection). One worker runs the code below. Is this sequence free of races, and why?","code":"if (queue.TryPeek(out var head) && head.IsReady)\n{\n    queue.TryDequeue(out var job);\n    job.Process();\n}","codeLang":"csharp","options":["Yes — because `ConcurrentQueue\u003cT>` is lock-free, any sequence of its `Try*` methods executes as one indivisible transaction","No — the bug is that `TryDequeue`'s return value is ignored, but adding `if (queue.TryDequeue(...))` would make the whole sequence atomic","No — `TryPeek` and `TryDequeue` are two atomic operations with a gap, so another thread can dequeue the head in between and this thread dequeues a different job (or gets `null`)","Yes — `TryPeek` reserves the head element for the calling thread until the matching `TryDequeue` runs, so no other thread can take it"],"answer":2,"explanation":"A thread-safe collection makes each operation atomic, not a transaction built from several operations. Between the `TryPeek` and the `TryDequeue` there is a gap in which another thread can dequeue the head, so this thread may dequeue a different job than the one it inspected, or get nothing at all. Option 2 states the core misconception the source warns against: lock-free guarantees per-operation atomicity, never that a sequence of calls composes into one transaction. Option 3 is wrong: `TryPeek` does not reserve or lock the element; it just observes the current head. Option 4 misdiagnoses the fix: checking `TryDequeue`'s return value avoids acting on a null `job`, but it does not close the check-then-act gap between peek and dequeue; the real fix is to base the decision on the single `TryDequeue` call (or lock the whole sequence)."},{"id":"concurrency-h01","topic":"Collection Concurrency","slug":"concurrency","difficulty":"hard","tags":["pitfall","check-then-act"],"question":"A read-heavy shared cache is wrapped in a `ConcurrentDictionary\u003cstring, List\u003cint>>`. A worker needs to append an item to the list stored at a key, creating the list on first use. It runs the code below from many threads. Even though the dictionary is thread-safe, this still corrupts data. What is the precise reason?","code":"var cache = new ConcurrentDictionary\u003cstring, List\u003cint>>();\n\nvoid Append(string key, int value)\n{\n    var list = cache.GetOrAdd(key, _ => new List\u003cint>());\n    list.Add(value);   // (*)\n}","codeLang":"csharp","options":["`GetOrAdd` is not atomic, so two threads can both insert a fresh list for the same absent key and one insertion is lost.","The `valueFactory` `_ => new List\u003cint>()` may run more than once, so each thread ends up appending to its own separate list and the writes are silently dropped.","`GetOrAdd` returns a thread-safe view of the list, but `List\u003cT>.Add` bypasses that view and writes to the raw backing array.","`GetOrAdd` returns a shared `List\u003cT>` reference whose `Add` at line (*) runs outside any lock, so concurrent `Add` calls on the same list tear its internal state."],"answer":3,"explanation":"`GetOrAdd` makes the get-or-insert of the *dictionary entry* atomic and hands back one shared `List\u003cint>` reference, but the subsequent `list.Add(value)` is an ordinary call on a non-thread-safe `List\u003cT>` executed with no synchronization — concurrent `Add` calls interleave their backing-array/size mutations and tear the list (the same hazard the reviewer describes for unsynchronized `List\u003cT>.Add`). The fix is a thread-safe element type (e.g. `ConcurrentBag\u003cint>`) or locking around the `Add`. Option 0 is false: `GetOrAdd` *is* atomic for the entry. Option 1 invents a non-existent 'thread-safe view'; `GetOrAdd` returns the value object itself, not a wrapper. Option 3 misreads the factory caveat: even if the factory runs more than once under contention, the dictionary stores and returns exactly one winning list, so all threads share it — the bug is the unsynchronized `Add`, not divergent lists."},{"id":"concurrency-h02","topic":"Collection Concurrency","slug":"concurrency","difficulty":"hard","tags":["when-to-apply","trade-offs"],"question":"You must build a thread-safe priority queue for a scheduler. Four producer threads enqueue jobs and several consumer threads dequeue the highest-priority job; the workload is write-heavy and there is no read/write skew. Which approach is both correct and the best fit, given what .NET ships?","code":"","codeLang":"","options":["Guard the `PriorityQueue\u003cJob>` with a `ReaderWriterLockSlim`, taking the read lock for `Enqueue` and the write lock for `Dequeue` so producers run concurrently.","Use a `ConcurrentQueue\u003cJob>`, since it is lock-free and its FIFO ordering preserves the highest-priority-first contract the scheduler needs.","Wrap `PriorityQueue\u003cJob>` in a class with an internal `lock(syncObject)` exposing an atomic `Enqueue` and a `TryDequeue` that checks count and pops under one lock.","Swap the `PriorityQueue\u003cJob>` for a `ConcurrentPriorityQueue\u003cJob>` from `System.Collections.Concurrent`, which is lock-free and ordered by priority."],"answer":2,"explanation":"The reviewer states .NET ships no `ConcurrentPriorityQueue\u003cT>`, so for a thread-safe priority queue you wrap `PriorityQueue\u003cT>` with a lock; internal monitor locking that exposes an atomic `TryDequeue` (check-count-and-pop under one lock) is correct and well-suited to a write-heavy, no-skew load where a plain monitor is the right tool. Option 0 names a type that does not exist. Option 2 is wrong because `ConcurrentQueue\u003cT>` is strictly FIFO and cannot return the highest-priority job — it breaks the contract. Option 3 misuses `ReaderWriterLockSlim`: `Enqueue` is a mutation and must take the *write* lock, not the read lock (and the RW lock only pays off when reads dominate, which this write-heavy load does not)."},{"id":"dynamic-programming-e01","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"easy","tags":["when-to-apply"],"question":"According to the reviewer, dynamic programming is the right tool only when a problem has BOTH of which two properties?","code":"","codeLang":"","options":["Disjoint subproblems and a provable greedy choice","A balanced recursion tree and constant-time merging","Sorted input and non-negative values","Optimal substructure and overlapping subproblems"],"answer":3,"explanation":"The reviewer states DP applies precisely when a problem has optimal substructure (an optimal answer is built from optimal answers to smaller pieces) and overlapping subproblems (the naive recursion revisits the same inputs). Disjoint subproblems are the hallmark of divide-and-conquer, where caching buys nothing, and a provable greedy choice points to greedy, not DP. Sorted input and non-negativity are assumptions for other patterns (e.g. two pointers, binary search), not prerequisites for DP. A balanced tree with constant-time merging describes a divide-and-conquer recurrence, not the DP criteria."},{"id":"dynamic-programming-e02","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"easy","tags":["complexity","template"],"question":"The reviewer gives one formula for the total time cost of any DP. What is it?","code":"","codeLang":"","options":["Number of states plus the number of transitions","Number of base cases multiplied by the recursion depth","2 raised to the number of states","Number of distinct states multiplied by the work done per state"],"answer":3,"explanation":"The reviewer repeatedly emphasizes \"Total cost = number of distinct states x work done per state\" as the exact, non-hand-waving way to compute any DP's complexity. Base cases times recursion depth is not a meaningful complexity expression. 2^states describes the exponential blow-up of the naive recursion that DP eliminates, not the DP cost. States plus transitions is not the formula; the cost is multiplicative (states times per-state work), not additive."},{"id":"dynamic-programming-e03","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"easy","tags":["template","knapsack"],"question":"In a 0/1 knapsack (each item usable at most once) implemented with a 1D capacity array, which direction should the capacity loop sweep?","code":"","codeLang":"","options":["Descending, from the target capacity down to the item value","Ascending, from the item value up to the target capacity","Either direction works; the result is identical","Descending, but only when the values are all even"],"answer":0,"explanation":"The reviewer states that for 0/1 items you iterate capacity descending so each item contributes at most once; ascending would let the same item be reused, which solves the unbounded problem instead. Ascending is exactly the unbounded-knapsack direction, the opposite of what 0/1 needs. The two directions do not give identical results, that distinction is named as the single most common knapsack bug. Parity of the values is irrelevant to the loop direction."},{"id":"dynamic-programming-e04","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"easy","tags":["complexity","sequence-dp"],"question":"What is the time complexity of the patience/tails method for Longest Increasing Subsequence (LC 300)?","code":"","codeLang":"","options":["O(n log n)","O(n)","O(2^n)","O(n^2)"],"answer":0,"explanation":"The reviewer describes the patience/tails method as a single linear pass where each element does a binary search into the tails array, giving O(n log n) time. O(n^2) is the complexity of the simpler ending-at-i DP, the slower of the two standard solutions. O(n) is impossible because each element pays a logarithmic binary-search cost. O(2^n) is the cost of naive brute-force enumeration of subsequences, which DP avoids entirely."},{"id":"dynamic-programming-e05","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"easy","tags":["template","invariant"],"question":"In the Longest Common Subsequence recurrence (LC 1143), when the current characters `a[i-1]` and `b[j-1]` match, how is `dp[i][j]` computed?","code":"","codeLang":"","options":["dp[i-1][j-1] + 1 (extend the diagonal)","max(dp[i-1][j], dp[i][j-1]) (best of up and left)","dp[i-1][j-1] (copy the diagonal with no change)","dp[i-1][j] + dp[i][j-1] (sum of up and left)"],"answer":0,"explanation":"The reviewer's LCS recurrence sets dp[i][j] = dp[i-1][j-1] + 1 on a character match, extending the common subsequence by one along the diagonal. max(dp[i-1][j], dp[i][j-1]) is the mismatch case (drop one character and take the better side), not the match case. Summing up and left is the Unique Paths transition, a different problem that counts paths rather than measuring a subsequence length. Copying the diagonal unchanged (dp[i-1][j-1]) is the Edit Distance match rule, where a match costs nothing; in LCS a match must add 1."},{"id":"dynamic-programming-m01","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"medium","tags":["when-to-apply","comparison"],"question":"You are asked to make change for an `amount` using coins with arbitrary denominations like `[1, 3, 4]`, minimizing the number of coins used. A teammate proposes a greedy 'always take the largest coin that fits' strategy. For `coins = [1, 3, 4]` and `amount = 6`, what is the correct verdict on this approach, and why?","code":"","codeLang":"","options":["Greedy is incorrect: it returns 4+1+1 = 3 coins, but DP finds 3+3 = 2 coins, because a locally largest choice is not provably globally optimal for arbitrary denominations.","Both greedy and DP are wrong because amount 6 cannot be formed from [1, 3, 4], so the answer is -1.","Greedy is incorrect because the coin set is unsorted; sorting it descending first would make greedy match the DP answer of 3 coins.","Greedy is correct: it returns 3+3 = 2 coins, matching the DP optimum, so DP is unnecessary here."],"answer":0,"explanation":"The source explicitly uses this exact case: greedy 'take the biggest coin' on coins [1,3,4] for amount 6 gives 4+1+1 = 3 coins, while DP finds 3+3 = 2 coins, because no greedy choice is provably globally optimal for arbitrary denominations. The 'greedy is correct' option is wrong because greedy commits to the 4 first and never reaches 3+3. The sorting option is wrong because greedy already takes the largest, and the true optimum is 2 coins, not 3. The -1 option is wrong because 6 is clearly reachable (3+3 or 4+1+1)."},{"id":"dynamic-programming-m02","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"medium","tags":["template","pitfall"],"question":"You are filling a 0/1 subset-sum table for LC 416 (Partition Equal Subset Sum) with the rolling 1D array `dp[s]`, where `dp[s]` means 'sum `s` is reachable using some subset of items seen so far'. For each item `x` you sweep the capacity axis `s`. Which sweep direction is correct, and what bug appears if you reverse it?","code":"foreach (int x in nums)\n    for (int s = ???; ???; ???)\n        dp[s] = dp[s] || dp[s - x];","codeLang":"csharp","options":["Sweep `s` from `target` down to `x` (descending); sweeping ascending would let the same item `x` be reused, turning the 0/1 problem into an unbounded one.","Either direction works for booleans because `||` is commutative, so the choice is purely stylistic.","Sweep `s` from `target` down to `x` (descending); sweeping ascending would cause an index-out-of-bounds read at `dp[s - x]`.","Sweep `s` from `x` up to `target` (ascending); sweeping descending would skip the base case `dp[0] = true` and corrupt the table."],"answer":0,"explanation":"The source states that for 0/1 items you sweep capacity descending so each item is used at most once; an ascending sweep would let the just-updated `dp[s-x]` feed back into a larger `s` within the same item, reusing `x` and wrongly solving an unbounded problem. The ascending option is exactly the bug, not the fix, and a descending sweep does not skip `dp[0]`. The index-out-of-bounds option is false because both directions keep `s >= x`, so `dp[s-x]` is always in range. The 'stylistic' option is wrong because direction is semantically load-bearing (0/1 vs unbounded), despite `||` being commutative."},{"id":"dynamic-programming-m03","topic":"Dynamic Programming","slug":"dynamic-programming","difficulty":"medium","tags":["template","ordered-vs-unordered"],"question":"Two counting DPs use the same recurrence `dp[t] += dp[t - num]` and the same base `dp[0] = 1`, but differ only in loop nesting. Version A loops `nums` on the outside and `t` on the inside; Version B loops `t` on the outside and `nums` on the inside. For `nums = [1, 2]` and `target = 3`, what do they respectively count?","code":"","codeLang":"","options":["Version A counts unordered combinations (1 way: {1,2}); Version B counts ordered permutations (2 ways: 1+2 and 2+1).","Version A counts ordered permutations (2 ways: 1+2 and 2+1); Version B counts unordered combinations (1 way: {1,2}).","Both count the same thing (2 ways) because the recurrence and base case are identical; loop order only affects runtime, not the result.","Version A counts
