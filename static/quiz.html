s 1.0 — wrong. Option 1 is correct. Option 2 is wrong: `baseVal` is a `double`, not an `int`, so the powers never overflow an integer type. Option 3 is wrong: the negation is supposed to make `e` positive first; the shift behavior is not the cited defect, and the failure is a skipped loop, not an infinite one. Option 4 is wrong: `(e & 1) == 1` correctly tests the low bit of an `int` for positive values — the bit test works fine; the overflow on negation is the actual bug."},{"id":"segment-tree-e01","topic":"Segment Tree & Fenwick","slug":"segment-tree","difficulty":"easy","tags":["when-to-apply","complexity"],"question":"You maintain an array and process a stream of operations that interleave \"add `v` to `a[k]`\" (point update) and \"sum of `a[l..r]`\" (range query), with both kinds frequent. Why is a plain prefix-sum array a poor fit, motivating a Fenwick or segment tree instead?","code":"","codeLang":"","options":["A point update forces rebuilding every later prefix, costing O(n) per update, which is too slow when updates are frequent","Prefix sums require the array values to be non-negative, which the updates can violate","A prefix-sum range query degrades to O(n) as soon as any element is updated","Prefix sums cannot answer a range sum at all once the array is allowed to change"],"answer":0,"explanation":"The reviewer states a prefix-sum array answers range sums in O(1) on a static array, but updating `a[k]` invalidates `P[k+1..n]`, an O(n) repair per update — too slow when updates and queries interleave, which is exactly why the O(log n)-update tree structures are used. Option 1 is wrong: prefix sums can still compute range sums (you just have to fix the array first); the problem is cost, not impossibility. Option 2 is wrong: it is the update that is O(n); a prefix-sum range query stays O(1) once the prefix array is current. Option 3 is a fabricated constraint — prefix sums work with negative values, since they rely only on additive subtraction, not non-negativity."},{"id":"segment-tree-e02","topic":"Segment Tree & Fenwick","slug":"segment-tree","difficulty":"easy","tags":["template","invariant"],"question":"In a Fenwick tree (BIT), what does the expression `i & -i` compute, and why does it appear in both the update and query loops?","code":"","codeLang":"","options":["The number of set bits in `i`, which equals how many blocks a query must touch","The parent index of `i`, computed by clearing all of `i`'s bits except the top one","The lowest set bit of `i`, which is the length of the block `tree[i]` covers, so adding or subtracting it jumps between the blocks that matter","The highest set bit of `i`, which gives the depth of node `i` in the tree"],"answer":2,"explanation":"The reviewer defines `lowbit(i) = i & -i` as isolating the lowest set bit (two's-complement `-i` flips all bits and adds 1, sharing only that bit), and that bit is the length of the block `tree[i]` covers — so the query subtracts it to walk down and the update adds it to walk up. Option 1 is wrong: it isolates the lowest set bit, not the highest, and the result is a bit value, not a tree depth. Option 2 is wrong: `i & -i` yields a block length, not a parent index, and it keeps only the lowest set bit, not the top one. Option 3 confuses the operation (it returns a single bit's value, not a popcount); the popcount does happen to bound the number of jumps, but that is not what the expression computes."},{"id":"segment-tree-e03","topic":"Segment Tree & Fenwick","slug":"segment-tree","difficulty":"easy","tags":["when-to-apply","comparison"],"question":"You need frequent **range-minimum** queries (`min(a[l..r])`) on an array whose elements change between queries. Which structure handles this, and what is the underlying reason the other one cannot?","code":"","codeLang":"","options":["Either one equally, since both support any associative aggregate including min and max","A Fenwick tree, because it stores a separate minimum per block and subtracts them like a prefix sum","A prefix-sum array, by storing running minima and subtracting `prefixMin(l-1)` from `prefixMin(r)`","A segment tree, because minimum has no inverse, so it cannot be expressed as `prefix(r)` combined with `prefix(l-1)` the way a Fenwick tree requires"],"answer":3,"explanation":"The reviewer pins the dividing line on invertibility: a Fenwick tree answers `range = prefix(r) − prefix(l−1)`, which needs an inverse of the aggregate; subtraction inverts addition so sums work, but minimum has no inverse, so range-min requires a segment tree that merges child values directly. Option 1 is wrong: a BIT cannot recover `min(a[l..r])` by subtracting prefix-minima, which is precisely why it fails here. Option 2 is wrong: only the segment tree handles arbitrary associative aggregates like min/max/gcd; the Fenwick tree is limited to invertible ones. Option 3 is wrong: prefix-min subtraction is meaningless (min is not invertible), and a static prefix array cannot handle elements that change between queries anyway."},{"id":"segment-tree-m01","topic":"Segment Tree & Fenwick","slug":"segment-tree","difficulty":"medium","tags":["when-to-apply"],"question":"You maintain an array of `n` integers and must repeatedly answer `min(a[l..r])` while individual elements keep changing via point updates. A teammate proposes a Fenwick tree storing prefix minimums so that `min(a[l..r]) = min(prefixMin(r), reverseStuff)`. Why does this approach fail, and what should you use instead?","code":"","codeLang":"","options":["Minimum has no inverse, so you cannot recover `min(a[l..r])` from prefix minimums by subtraction; use a segment tree, which merges child values directly","A Fenwick tree works only on 1-indexed arrays, so the fix is to shift all indices by one and keep the BIT","Prefix minimums are fine for queries, but the point update would be O(n); switching to a segment tree only changes the build cost","A Fenwick tree cannot do point updates in O(log n), so any min query is forced to O(n); use a segment tree to get O(log n) updates"],"answer":0,"explanation":"The reviewer states the dividing line is invertibility: a BIT answers `range = prefix(r) - prefix(l-1)`, which needs an inverse of the aggregate. Subtraction inverts addition (sums work), but min/max have no inverse, so `min(a[l..r])` cannot be recovered from prefix minimums; range-min therefore requires a segment tree, which combines children directly. Option A is wrong: 1-indexing is a BIT implementation detail, not why min fails. Option C is wrong: a Fenwick tree does support O(log n) point updates; the problem is the non-invertible aggregate, not update cost. Option D is wrong: a Fenwick tree's point update for sums is O(log n), and the real obstacle is that prefix-min subtraction is invalid, not the update or build cost."},{"id":"segment-tree-m02","topic":"Segment Tree & Fenwick","slug":"segment-tree","difficulty":"medium","tags":["trace","mechanics"],"question":"For the Fenwick tree over `a[1..8] = [1,2,3,4,5,6,7,8]`, the table gives `tree = [_,1,3,3,10,5,11,7,36]`. Tracing `PrefixSum(6)` with the loop `for (; i > 0; i -= i & -i) sum += tree[i];`, which indices are visited and what is the result?","code":"long PrefixSum(int i) {\n    long sum = 0;\n    for (; i > 0; i -= i & -i)\n        sum += _tree[i];\n    return sum;\n}","codeLang":"csharp","options":["Visits i = 6, 5, 3, 1, 0; result = tree[6] + tree[5] + tree[3] + tree[1] = 11 + 5 + 3 + 1 = 20","Visits i = 6, 4, 0; result = tree[6] + tree[4] = 11 + 10 = 21","Visits i = 6, 5, 4, 0; result = tree[6] + tree[5] + tree[4] = 11 + 5 + 10 = 26","Visits i = 6, 2, 0; result = tree[6] + tree[2] = 11 + 3 = 14"],"answer":1,"explanation":"The query walk subtracts `lowbit(i) = i & -i` each step until i hits 0. Start i=6 (110), lowbit=2, add tree[6]=11, then i=6-2=4; i=4 (100), lowbit=4, add tree[4]=10, then i=4-4=0; stop. Result 11+10=21, which equals 1+2+3+4+5+6. Option A subtracts 1 each step (treats lowbit as always 1), which is wrong because lowbit(6)=2 and lowbit(4)=4. Option C subtracts the wrong amount at i=6 (jumping 6->2 implies lowbit 4, but lowbit(6)=2). Option D again decrements by 1 repeatedly, ignoring that each step strips the actual lowest set bit, giving too many visited indices."},{"id":"segment-tree-m03","topic":"Segment Tree & Fenwick","slug":"segment-tree","difficulty":"medium","tags":["complexity","pitfall"],"question":"You must support both \"add `v` to every element in `a[l..r]`\" and \"sum of `a[l..r]`\", with up to `1e5` of each operation interleaved on `n = 1e5` elements. A candidate plans a plain segment tree (point update only) and implements the range add by calling the point update once per index in `[l, r]`. What is the cost of a single range-add this way, and what is the correct fix?","code":"","codeLang":"","options":["O(log^2 n) per range add; the fix is to increase the array size from 4n to 8n to avoid index overflow","O((r - l + 1) * log n) per range add, which is too slow; use a segment tree with lazy propagation to restore O(log n)","O(log n) per range add already; no fix needed since each point update is O(log n)","O(n) per range add regardless of range size; switch to a Fenwick tree, which does range updates in O(1)"],"answer":1,"explanation":"The reviewer notes that doing a range update element by element is O(range * log n), far too slow, and lazy propagation restores O(log n) by applying the update at the highest fully-covering nodes and parking a pending tag. So the candidate's per-index approach costs O((r-l+1) * log n) and the fix is lazy propagation. Option A is wrong: looping over the range multiplies the log-n point update by the range size, so it is not O(log n). Option C misstates the cost (it depends on range size, not always n) and falsely claims a Fenwick tree does range updates in O(1) - the reviewer says a BIT needs difference-array tricks or two BITs and cannot do general range-add/range-sum cleanly. Option D invents a bogus complexity and an irrelevant array-size remedy; 4n is already the safe bound and does not affect update time."},{"id":"segment-tree-m04","topic":"Segment Tree & Fenwick","slug":"segment-tree","difficulty":"medium","tags":["mechanics","invariant"],"question":"In the segment tree range query, the three-way test per node is: disjoint (`qr \u003c lo || hi \u003c ql`) returns 0, fully inside (`ql \u003c= lo && hi \u003c= qr`) returns `seg[v]`, otherwise partial overlap recurses both children. Why does this keep a range query at O(log n) rather than O(range)?","code":"long Query(int v, int lo, int hi, int ql, int qr) {\n    if (qr \u003c lo || hi \u003c ql) return 0;            // disjoint\n    if (ql \u003c= lo && hi \u003c= qr) return _seg[v];    // fully inside, stop\n    int mid = (lo + hi) / 2;\n    return Query(2*v, lo, mid, ql, qr)\n         + Query(2*v+1, mid+1, hi, ql, qr);\n}","codeLang":"csharp","options":["Because the fully-inside case returns a stored aggregate without descending, and any range decomposes into O(log n) canonical fully-inside nodes (at most two per level)","Because partial-overlap nodes are memoized after the first visit, so repeated queries amortize to O(log n)","Because the disjoint case prunes exactly half the array at every call, so the recursion depth is bounded by log of the range length only","Because each leaf is visited at most once and there are O(log n) leaves in the queried range"],"answer":0,"explanation":"The reviewer explains that any query decomposes into O(log n) canonical fully-inside nodes (at most two per level over log n levels): disjoint nodes prune in O(1) and a fully-inside node returns its stored value without descending, so the recursion stops early instead of reaching the individual leaves. Option B is wrong: disjoint pruning does not split off exactly half each call, and the bound is in terms of n (tree height), not range length alone. Option C is wrong: the whole point is that the query stops at internal canonical nodes and does NOT visit one leaf per element in the range (that would be O(range)). Option D is wrong: there is no memoization in this code, and the O(log n) bound holds per single query from the three-way test, not from caching across queries."},{"id":"segment-tree-h01","topic":"Segment Tree & Fenwick","slug":"segment-tree","difficulty":"hard","tags":["pitfall","invertibility"],"question":"You are given an array supporting frequent point updates (any value, including making an element larger or smaller), and you must answer many `min(a[l..r])` queries. A teammate proposes a Fenwick tree where `tree[i]` stores the minimum over `a[i - lowbit(i) + 1 .. i]`, and answers a range-min as `min(prefixMin(r), ...)` mirroring the sum version. Which statement correctly characterizes this design?","code":"","codeLang":"","options":["A min-Fenwick supports queries and updates in O(log n) exactly like the sum version, since min is associative just like addition","A min-Fenwick is correct for all operations because `min` has the identity `+infinity`, which plays the same role that `0` plays for sums","A Fenwick tree storing per-block minima can support O(log n) range-min queries on a general arbitrary `[l,r]`, but the point update that *decreases* a value cannot be done in O(log n), so a segment tree is required","A min-Fenwick can answer a prefix-min `min(a[1..r])` and supports increase-only updates, but cannot decompose a general `min(a[l..r])` by subtracting prefixes, and decreasing a value can force an O(n) rebuild — so a segment tree is the correct choice"],"answer":3,"explanation":"Per the source, a Fenwick range query relies on invertibility: `range = prefix(r) - prefix(l-1)`. Min has no inverse, so you cannot recover `min(a[l..r])` from prefix minima of the two endpoints, and decreasing an element can invalidate block minima that have no cheap repair (a block may need to be recomputed from its elements, up to O(n)). Hence min/max over arbitrary ranges 'require a segment tree.' Option C states exactly this. Option A is wrong because the failure is not merely the decrease-update; even with valid blocks you cannot decompose a general arbitrary `[l,r]` min by prefix subtraction. Option B is wrong because associativity alone is not enough — the Fenwick range trick needs an *inverse*, which addition has and min lacks. Option D confuses having an identity element with being invertible; an identity does not let you subtract prefixes."},{"id":"segment-tree-h02","topic":"Segment Tree & Fenwick","slug":"segment-tree","difficulty":"hard","tags":["trace","mechanics"],"question":"Using the source's Fenwick over `a[1..8] = [1,2,3,4,5,6,7,8]` with `tree = [_,1,3,3,10,5,11,7,36]`, you perform `update(5, +4)` (so `a[5]` goes 5 -> 9) and then evaluate `RangeSum(4, 6)` exactly as the .NET code computes it (`PrefixSum(6) - PrefixSum(3)`). What value is returned?","code":"// after update(5,+4): which tree[i] change?\n// update walk:  i=5 -> i+=lowbit(5)=1 -> i=6\n//               i=6 -> i+=lowbit(6)=2 -> i=8\n//               i=8 -> i+=lowbit(8)=8 -> i=16 > 8 stop\n// PrefixSum(6): i=6 (+tree[6]); i-=lowbit(6)=2 -> i=4 (+tree[4]); i-=4 -> 0\n// PrefixSum(3): i=3 (+tree[3]); i-=lowbit(3)=1 -> i=2 (+tree[2]); i-=2 -> 0","codeLang":"text","options":["21","17","15","19"],"answer":3,"explanation":"`update(5,+4)` walks 5 -> 6 -> 8, adding 4 to `tree[5]`, `tree[6]`, and `tree[8]`: tree[6] becomes 11+4=15, tree[4] is untouched (10), tree[3]=3, tree[2]=3. `PrefixSum(6) = tree[6] + tree[4] = 15 + 10 = 25`. `PrefixSum(3) = tree[3] + tree[2] = 3 + 3 = 6`. RangeSum(4,6) = 25 - 6 = 19, which checks against a[4]+a[5]+a[6] = 4+9+6 = 19. Option 17 (the pre-update answer 4+5+6) forgets to apply the +4 update. Option 15 wrongly includes only tree[6] without tree[4] in PrefixSum(6). Option 21 mistakenly adds the delta to tree[4] as well (a node that does not cover index 5), inflating the result by 4 - 2."},{"id":"segment-tree-h03","topic":"Segment Tree & Fenwick","slug":"segment-tree","difficulty":"hard","tags":["lazy","complexity"],"question":"For a problem requiring frequent 'add `v` to every element in `a[l..r]`' operations interleaved with 'sum of `a[l..r]`' queries, why does a lazy-propagation segment tree achieve O(log n) per range update instead of O(range)?","code":"","codeLang":"","options":["Because each node's lazy tag is immediately pushed all the way down to every descendant leaf, which the balanced `4n` layout makes O(log n) total","Because the update is applied at the O(log n) highest nodes that *fully cover* `[l,r]`, where it updates each node's aggregate and parks a pending tag, deferring the push-down to children until a later operation must descend through the node","Because a range add is converted into a single point update at index `l` using a difference-array trick, which any plain segment tree handles in O(log n) with no lazy tags needed","Because the update is applied directly at every leaf in `[l,r]`, but the leaves are visited in O(log n) using the `2v / 2v+1` indexing instead of a linear scan"],"answer":1,"explanation":"The source states lazy propagation 'applies the update at the highest nodes that fully cover the range and parks a pending tag, pushing it down to children only when a later operation must descend.' Because a range decomposes into O(log n) fully-covering canonical nodes (at most two per level), and each such node is updated and tagged in O(1), the range update is O(log n). Option B captures this. Option A describes touching every leaf, which is O(range), exactly what lazy propagation avoids. Option C contradicts the deferral: pushing a tag down to every descendant immediately would again cost O(range), defeating the purpose. Option D describes a difference-array / Fenwick-style trick for range-update-point-query; it does not give correct range-sum queries on a plain segment tree and is not how lazy propagation works."},{"id":"sets-e01","topic":"Sets & Set Algorithms","slug":"sets","difficulty":"easy","tags":["when-to-apply","complexity"],"question":"You need a collection that only answers \"is this value present?\" and de-duplicates as you add, with the fastest possible average membership check and no need for any ordering. Which backing structure is the canonical choice?","code":"","codeLang":"","options":["A sorted array, giving O(log n) membership via binary search","A `List\u003cT>`, giving O(n) membership by linear scan","A tree-set (`SortedSet\u003cT>`), giving O(log n) membership and sorted order","A hash-set (`HashSet\u003cT>`), giving O(1) average membership and no usable order"],"answer":3,"explanation":"The source says to reach for a hash-set when you only need membership/dedup and order is irrelevant, because it gives O(1) average Add/Remove/Contains and is faster and simpler. A tree-set is the choice when you need sorted iteration, min/max, or range queries, and it pays an O(log n) factor you don't need here. A sorted array supports O(log n) lookup but insertion is O(n) and it isn't the standard set ADT choice. A List\u003cT> gives only O(n) membership and stores duplicates, violating the set contract entirely."},{"id":"sets-e02","topic":"Sets & Set Algorithms","slug":"sets","difficulty":"easy","tags":["set-algebra","definition"],"question":"Given `galaxy = { Robbie, Landon, Ashley, Sebastian }` and `sounders = { Ashley, Sebastian, Clint, Stefan }`, which operation answers \"who played for the Galaxy AND the Sounders?\" and what is its result?","code":"","codeLang":"","options":["Intersection, giving `{ Ashley, Sebastian }`","Symmetric difference, giving `{ Robbie, Landon, Clint, Stefan }`","Difference, giving `{ Robbie, Landon }`","Union, giving `{ Robbie, Landon, Ashley, Sebastian, Clint, Stefan }`"],"answer":0,"explanation":"Intersection answers \"AND\" questions, returning items present in both sets; the only shared players are Ashley and Sebastian. Union answers \"OR\" (in either set), producing all six players. Difference (galaxy - sounders) answers \"BUT NOT,\" giving Galaxy-only players {Robbie, Landon}. Symmetric difference answers \"OR but NOT both,\" giving the players in exactly one of the two sets {Robbie, Landon, Clint, Stefan}."},{"id":"sets-e03","topic":"Sets & Set Algorithms","slug":"sets","difficulty":"easy","tags":["pitfall","dotnet"],"question":"In .NET, you call `galaxy.ExceptWith(sounders)` to compute A - B. What does this method do to the set `galaxy`?","code":"","codeLang":"","options":["It removes elements from `sounders` rather than from `galaxy`","It mutates `galaxy` in place, removing every element that is also in `sounders`","It returns a brand-new set and leaves `galaxy` unchanged","It throws if `galaxy` and `sounders` share any elements"],"answer":1,"explanation":"The source stresses that the .NET algebra methods (UnionWith, IntersectWith, ExceptWith, SymmetricExceptWith) mutate the calling set in place rather than returning a new one; ExceptWith makes galaxy become galaxy - sounders. Returning a fresh set while leaving the original intact describes the course's pure ISet\u003cT> API, not the BCL *With methods (you must copy first for that behavior). The method does not throw on shared elements - removing them is exactly its job. And it modifies the receiver (galaxy), not the argument (sounders)."},{"id":"sets-m01","topic":"Sets & Set Algorithms","slug":"sets","difficulty":"medium","tags":["when-to-apply","complexity"],"question":"You are storing a stream of `DateTime` event markers and the dominant query is repeated and time-sensitive: \"give me the earliest timestamp strictly greater than time `T`\". Which backing structure best serves this workload, and why?","code":"","codeLang":"","options":["A `SortedSet\u003cDateTime>`, because it stores duplicates in sorted order which is required to break ties between equal timestamps","A `SortedSet\u003cDateTime>` (tree-backed), because a balanced BST answers a successor/range query in `O(log n)` via its ordering","A `HashSet\u003cDateTime>` (hash-backed), because `O(1)` average membership makes the successor query `O(1)` as well","A `HashSet\u003cDateTime>`, because hash-sets keep elements in ascending order, so the successor is the next bucket"],"answer":1,"explanation":"The query is a successor/range question (\"smallest element greater than T\"), which a sorted balanced BST answers in O(log n) via a tree walk or `GetViewBetween`; a hash-set has no usable order so the same query degrades to an O(n) scan. Option B is wrong because O(1) membership only answers \"is exactly this value present?\"; it gives no way to find the next-larger value without scanning. Option C is wrong because hash-sets iterate in arbitrary bucket order, never sorted, so there is no meaningful \"next bucket\" in value order. Option D is wrong because all sets (including `SortedSet\u003cT>`) forbid duplicates, so there are no duplicate timestamps to break ties over."},{"id":"sets-m02","topic":"Sets & Set Algorithms","slug":"sets","difficulty":"medium","tags":["pitfall","set-algebra"],"question":"Given `galaxy = { Robbie, Landon, Ashley, Sebastian }` and `sounders = { Ashley, Sebastian, Clint, Stefan }`, a coworker claims `galaxy.Difference(sounders)` and `sounders.Difference(galaxy)` should produce the same set. What is the correct result and the reason their claim fails?","code":"","codeLang":"","options":["`galaxy.Difference(sounders) = { Robbie, Landon }` and `sounders.Difference(galaxy) = { Clint, Stefan }`; plain difference is asymmetric, so the two are different (and here disjoint)","`galaxy.Difference(sounders) = { Robbie, Landon, Ashley, Sebastian }`; difference ignores the second set entirely","Both produce `{ Robbie, Landon, Clint, Stefan }`; difference is symmetric, so argument order does not matter","Both produce `{ Ashley, Sebastian }`; difference returns the shared elements regardless of order"],"answer":0,"explanation":"Difference A - B keeps items in A but not in B, so `galaxy.Difference(sounders)` removes the shared `{Ashley, Sebastian}` leaving `{Robbie, Landon}`, while `sounders.Difference(galaxy)` leaves `{Clint, Stefan}` - different sets, confirming difference is asymmetric (and here the two results are disjoint). Option B describes the symmetric difference (`{Robbie, Landon, Clint, Stefan}`), and falsely claims plain difference is symmetric. Option C describes the intersection, not difference. Option D ignores B entirely, which is wrong: the whole point of difference is to subtract B's contribution from A."},{"id":"sets-m03","topic":"Sets & Set Algorithms","slug":"sets","difficulty":"medium","tags":["pitfall","template"],"question":"The author intended to compute `a - b` without altering `a`. What does the program actually print, and what is the underlying cause?","code":"var a = new HashSet\u003cint> { 1, 2, 3, 4 };\nvar b = new HashSet\u003cint> { 3, 4, 5 };\nvar diff = a;\ndiff.ExceptWith(b);\nConsole.WriteLine(string.Join(\",\", a));","codeLang":"csharp","options":["Prints `3,4` because `ExceptWith` keeps only the elements `a` and `b` share","Prints `1,2,3,4` because `diff = a` copies the set, leaving `a` untouched while `diff` becomes `1,2`","Prints `1,2,3,4,5` because `ExceptWith` adds `b`'s elements rather than removing them","Prints `1,2` because `diff = a` aliases the same set and `ExceptWith` mutates in place, so `a` is modified too"],"answer":3,"explanation":"`var diff = a` copies the reference, not the set, so `diff` and `a` name the same `HashSet\u003cint>` object; `ExceptWith` mutates the receiver in place, removing `3` and `4`, so `a` itself becomes `{1,2}` and the program prints `1,2`. Option B is the classic misconception that assignment copies a collection - it does not; to preserve `a` you must write `new HashSet\u003cint>(a)`. Option C misstates `ExceptWith`, which performs set difference (removal), not union. Option D describes `IntersectWith` (keep shared elements), not `ExceptWith`."},{"id":"sets-h01","topic":"Sets & Set Algorithms","slug":"sets","difficulty":"hard","tags":["complexity","trade-offs","when-to-apply"],"question":"You must maintain a growing collection of `long` event timestamps and repeatedly answer two query types as fast as possible: (1) \"is timestamp T already recorded?\" and (2) \"what is the earliest recorded timestamp strictly greater than T?\". You will run far more of query type 2 than type 1. Which backing choice gives the best asymptotic cost for the dominant query, and why?","code":"","codeLang":"","options":["Either backing is asymptotically equal for query 2, so pick `HashSet\u003clong>` for its smaller constant factor on membership.","A `HashSet\u003clong>` (hash-set): membership is O(1) average, and the successor query is O(log n) because the bucket array stays sorted by hash code.","A `HashSet\u003clong>` (hash-set): membership is O(1) average, and since the successor query is built on membership it is also O(1) average.","A `SortedSet\u003clong>` (tree-set): membership is O(log n) and the successor query is also O(log n) via an ordered tree walk / `GetViewBetween`, so both stay logarithmic."],"answer":3,"explanation":"The dominant query is a successor/range question (\"smallest element greater than T\"), which only an ordered structure answers efficiently: a balanced BST does it in O(log n) via a tree walk or `GetViewBetween`, while membership stays O(log n) too, so the tree-set is the right pick. Option B is wrong because a hash-set imposes no order, so finding the next-greater element forces an O(n) scan of all buckets, not O(1). Option C is wrong because hash buckets are ordered by hash code, not by value, so bucket order tells you nothing about numeric successor. Option D is wrong because the two backings are NOT equal for query 2: hash-set is O(n) per successor query versus O(log n) for the tree-set, so the constant-factor argument never applies."},{"id":"sets-h02","topic":"Sets & Set Algorithms","slug":"sets","difficulty":"hard","tags":["pitfall","trace","template"],"question":"A developer wants `result` to hold the symmetric difference of `a` and `b` while leaving `a` and `b` untouched. What does this code actually print for `result`, and what is the underlying defect?","code":"var a = new HashSet\u003cint> { 1, 2, 3, 4 };\nvar b = new HashSet\u003cint> { 3, 4, 5, 6 };\n\nvar result = a;\nresult.SymmetricExceptWith(b);\n\nConsole.WriteLine(string.Join(\",\", result.OrderBy(x => x)));","codeLang":"csharp","options":["Prints `3,4`; `SymmetricExceptWith` keeps the shared elements, and `a` is preserved because the assignment copied it.","Prints `1,2,5,6` and leaves `a` unchanged, because the `var result = a` assignment makes an independent copy of the `HashSet`.","Prints `1,2,3,4,5,6`; `SymmetricExceptWith` performs a union, so the symmetric difference is computed incorrectly.","Prints `1,2,5,6`; the result is mathematically correct, but `a` was mutated in place because `result = a` aliases the same object rather than copying it."],"answer":3,"explanation":"`SymmetricExceptWith` correctly mutates the receiver into the symmetric difference, which for these sets is {1,2,5,6}, so the printed value is right. The defect is that `var result = a` copies a reference, not the set: `result` and `a` are the same object, so the in-place mutation also destroys `a` - the developer's non-destructive intent fails (the fix is `new HashSet\u003cint>(a)`). Option B misnames the operation; `SymmetricExceptWith` yields exactly-one-set membership, not a union. Option C is wrong because symmetric difference removes the shared {3,4}, not keeps it. Option D states the correct output but the wrong reason: reference assignment never copies a `HashSet`, so `a` is in fact mutated."},{"id":"sliding-window-e01","topic":"Sliding Window","slug":"sliding-window","difficulty":"easy","tags":["when-to-apply"],"question":"A sliding window is the right tool when the answer is the best (longest, shortest, or count of) run satisfying a property. Which structural requirement must that run have for a plain sliding window to apply?","code":"","codeLang":"","options":["The input array must be sorted before the window starts","The run must contain only distinct elements","The run must be a subsequence that preserves order but may skip elements","The run must be a contiguous subarray or substring (adjacent indices)"],"answer":3,"explanation":"The reviewer states a window is always a single run of adjacent indices, so the pattern applies only to contiguous subarrays/substrings; the entering and leaving elements are tracked incrementally as the edges move. Option B describes a subsequence, which the reviewer explicitly says is NOT a window problem (use DP or hashing). Option C confuses the window with the convergent two-pointer pattern, which often needs sortedness; a window does not require a sorted input. Option D is wrong because many window problems (e.g. minimum window substring) deliberately allow duplicates inside the window."},{"id":"sliding-window-e02","topic":"Sliding Window","slug":"sliding-window","difficulty":"easy","tags":["complexity","invariant"],"question":"The variable-size window looks like a nested loop (an outer `for` advancing `right` and an inner `while` advancing `left`). Why is its total time `O(n)` rather than `O(n^2)`?","code":"","codeLang":"","options":["Because the array is sorted, which lets the inner loop stop early","Because `left` and `right` each only move forward and are each bounded by `n`, so total pointer advances are at most `2n` (amortized)","Because the window size is capped at a small constant `k`","Because the inner `while` loop runs a constant number of times for every value of `right`"],"answer":1,"explanation":"The reviewer's amortized argument is that `left` and `right` both start at 0, only ever increase, and are each bounded by `n`, so across the whole run there are at most `2n` pointer advances regardless of how the loops interleave. Option B is the classic misread: the inner `while` is NOT constant per `right` (it can run many times for one `right` and zero for another) — correctness comes from the global total, not a per-iteration bound. Option C describes a fixed-size window, not the variable case in question. Option D invents a sortedness assumption the window does not have."},{"id":"sliding-window-e03","topic":"Sliding Window","slug":"sliding-window","difficulty":"easy","tags":["template","mechanics"],"question":"In a fixed-size window of length `k` (running sum), once `right >= k` the window must drop the element that fell off the back. Which index is the leaving element?","code":"for (int right = k; right \u003c nums.Length; right++)\n{\n    sum += nums[right];     // entering element\n    sum -= nums[____];      // leaving element\n}","codeLang":"csharp","options":["nums[left]","nums[right - 1]","nums[right - k - 1]","nums[right - k]"],"answer":3,"explanation":"For a window of exactly `k` elements ending at `right`, the window spans `[right - k + 1, right]`, so the element just before the window's front — the one falling out of the back — is at `right - k`. The reviewer states this directly: 'The leaving index is `right - k`.' Option B (`right - 1`) is simply the previous element, still inside the window. Option C (`left`) belongs to the variable-window template, which has no separate `left` pointer in this fixed-size form. Option D (`right - k - 1`) is off by one and points to an index already removed in the prior step."},{"id":"sliding-window-e04","topic":"Sliding Window","slug":"sliding-window","difficulty":"easy","tags":["template"],"question":"Compare the longest and shortest variable-window templates. In the LONGEST template, when does the inner `while` loop shrink the window from the left?","code":"","codeLang":"","options":["While the window is currently INVALID (the constraint is broken)","Only after the entire array has been scanned","Exactly once per outer iteration, unconditionally","While the window is currently VALID (the goal is still met)"],"answer":0,"explanation":"The reviewer's longest template grows `right` unconditionally and then runs the inner `while` only as long as the constraint is broken — shrinking while INVALID — and records the best length after validity is restored. Option B describes the SHORTEST template, which shrinks while the window stays valid and records inside the loop. Option C describes a fixed-size slide (one add, one remove), not the variable longest template, whose inner loop may run zero or many times. Option D is nonsense: shrinking happens during the scan, interleaved with growth, not afterward."},{"id":"sliding-window-e05","topic":"Sliding Window","slug":"sliding-window","difficulty":"easy","tags":["pitfall","when-to-apply"],"question":"A plain variable window solves 'shortest subarray with sum >= target' only when all values are non-negative. Why does introducing negative numbers break it?","code":"","codeLang":"","options":["The running sum is no longer monotone as the window grows, so extending `right` can decrease the sum and shrinking `left` no longer reliably preserves validity","Hash maps cannot store negative keys, so the frequency map fails","Negative numbers cause integer overflow in the running sum","The window can no longer be contiguous when negatives are present"],"answer":0,"explanation":"The reviewer explains the variable sum-window relies on the running sum being monotone: with only non-negative values, growing the window can only increase the sum and shrinking can only decrease it, which licenses the single shrink direction. Negatives break that monotonicity — extending `right` can lower the sum and shrinking from the left can raise it — so the shrink invariant fails; the correct tool becomes prefix sums plus a monotonic deque. Option B confuses a correctness flaw with an unrelated overflow concern. Option C is false: negatives do not make a subarray non-contiguous. Option D is irrelevant — this problem uses a running sum, not a frequency map keyed on values."},{"id":"sliding-window-m02","topic":"Sliding Window","slug":"sliding-window","difficulty":"medium","tags":["template","invariant"],"question":"In the longest-window template you record `best = max(best, right - left + 1)` AFTER the inner shrink loop, but in the shortest-window template you record the best length INSIDE the shrink loop. What is the reason for this placement difference?","code":"","codeLang":"","options":["Longest measures after shrinking because in that template `left` is allowed to move backward, so the window size is not final until the loop ends","Longest wants the widest valid window, so you measure once validity is restored after shrinking; shortest wants the narrowest valid window, so you must measure each valid window before removing the element that would invalidate it","Longest measures after shrinking only to save one comparison per iteration; either placement gives the same answer in both templates","Shortest measures inside the loop because the shrink loop in the shortest template never executes more than once per `right`"],"answer":1,"explanation":"Per the source, the longest template shrinks while INVALID and the window `[left, right]` is the longest valid window ending at `right` only once the loop exits, so the best is recorded after; the shortest template shrinks while VALID and must capture each valid width before peeling the element that breaks validity, so the best is recorded inside. Option B is wrong because swapping the placement would record invalid windows in the longest case and miss smaller valid windows in the shortest case. Option C is false: the shortest shrink loop can run many times for one `right`. Option D is wrong because `left` only ever moves forward in every window template; it never moves backward."},{"id":"sliding-window-m03","topic":"Sliding Window","slug":"sliding-window","difficulty":"medium","tags":["trace","off-by-one"],"question":"This fixed-size window is supposed to return the maximum sum of any 3 consecutive elements of `nums`. Reading the trace, what does it actually return, and what is the bug?","code":"int Solve(int[] nums, int k) {\n    int sum = 0;\n    for (int i = 0; i \u003c k; i++) sum += nums[i];\n    int best = sum;\n    for (int right = k; right \u003c nums.Length; right++) {\n        sum += nums[right];\n        sum -= nums[right - k];\n        if (sum > best) best = sum;\n    }\n    return best;\n}\n// called as Solve(new[]{4, 2, 1, 7, 5}, 3)","codeLang":"csharp","options":["It returns 13 correctly; there is no bug, because the first window is seeded before the slide loop and every later window is read after the add/remove","It returns 7 because the seed loop overwrites `sum` instead of accumulating it","It overflows because `nums[right - k]` is read before the window has `k` elements","It returns 11 because the first window `[0,2]` is skipped; the answer should be read starting at `right == k - 1`"],"answer":0,"explanation":"The seed loop sums the first window [4,2,1]=7, then sliding gives [2,1,7]=10 and [1,7,5]=13, so `best` ends at 13, which is correct; this code matches the source's MaxAverageSubarray structure where seeding the first window before the slide avoids any off-by-one. Option B is wrong because `sum += nums[i]` accumulates rather than overwrites. Option C is wrong because seeding handles the first window, so it is not skipped, and the source's off-by-one warning applies to the unified single-loop form, not this seeded form. Option D is wrong because in the slide loop `right` starts at `k`, so `right - k` is always a valid index 0 or greater."},{"id":"sliding-window-m04","topic":"Sliding Window","slug":"sliding-window","difficulty":"medium","tags":["pattern-recognition","data-structure"],"question":"You must report the maximum element of every length-`k` window of an array in `O(n)` total time. Why does a plain running aggregate fail here, and what structure fixes it?","code":"","codeLang":"","options":["A running `max` works directly; you only need to store the max value and compare it to each entering element as the window slides","A bare `max` is not reversible: when the current maximum leaves on the left you cannot recover the next-largest without rescanning, so you use a monotonic deque of indices kept in decreasing value order whose front is the window max","A bare `max` is fine but too slow, so you replace it with a binary heap of values that gives `O(1)` max lookups","The window cannot be fixed-size for a max query, so you must convert it to a variable-size longest window keyed on the max"],"answer":1,"explanation":"The source identifies `max` as the one common aggregate that is not cheaply reversible: removing the current max on the left leaves no way to know the next-largest without a rescan, so a monotonic deque of indices in decreasing value order is used, with the front always being the window max and each index pushed and popped once for `O(n)` total. Option B is wrong because a binary heap gives `O(log k)` per op and removing arbitrary stale elements is awkward, not the deque solution described; it also does not give `O(1)` lookups for this use. Option C is wrong: sliding-window maximum is the canonical fixed-size deque problem, not a variable window. Option D fails precisely on the leave step: comparing only entering elements cannot recover the max once it exits the window."},{"id":"sliding-window-m05","topic":"Sliding Window","slug":"sliding-window","difficulty":"medium","tags":["trace","invariant"],"question":"For LC 3 (Longest Substring Without Repeating Characters), the window jumps `left` to one past a repeat's last index. On `s = \"abba\"`, what is the final `best`, and what bug appears if instead of guarding with `j >= left` you always set `left = lastSeen[c] + 1`?","code":"s = \"abba\"\n index 0 1 2 3\n       a b b a","codeLang":"text","options":["Correct answer is 2; without the `j >= left` guard, processing the final `a` would move `left` backward to index 1, wrongly enlarging the window and corrupting the invariant","Correct answer is 4, because all four characters can fit once duplicates are jumped past","Correct answer is 1; the window can never exceed length 1 once any character repeats","Correct answer is 3; without the guard the result is unchanged because `lastSeen` always points inside the window"],"answer":0,"explanation":"On 'abba' the longest substring without repeats is 'ab' or 'ba', length 2. The `j >= left` guard matters because at the final 'a' its last-seen index is 0, which is now behind `left` (already at 2 after the 'bb' collision); without the guard, `left = 0 + 1 = 1` would move `left` backward and re-admit already-evicted characters, violating the forward-only invariant. Option B is wrong since 'abba' obviously contains repeats and cannot reach length 4. Option C is wrong: a repeat does not cap the window at 1, as 'ab' shows length 2. Option D is wrong precisely because `lastSeen` can point behind `left` after jumps, which is the situation the guard exists to handle."},{"id":"sliding-window-m06","topic":"Sliding Window","slug":"sliding-window","difficulty":"medium","tags":["complexity","have-need"],"question":"In LC 76 (Minimum Window Substring), why is tracking integer `have`/`need` counters preferred over re-comparing the full window and target frequency maps on every pointer move, and what is the resulting per-step cost?","code":"","codeLang":"","options":["Map comparison is also `O(1)`, so the `have`/`need` counters are only a stylistic preference with no asymptotic benefit","Map comparison fails on Unicode input, so `have`/`need` integers are required for correctness rather than speed","The `have`/`need` counters reduce the overall time from `O(n^2)` to `O(n)` by eliminating the outer loop entirely","Comparing full frequency maps is `O(Σ)` per move, but `have`/`need` integers reduce the 'does the window cover t' test to an `O(1)` comparison, with each counter adjusted in `O(1)` exactly when a character crosses its target count"],"answer":3,"explanation":"The source states that comparing full frequency maps each step costs `O(Σ)` per move, while the `have`/`need` integers turn 'does the window cover t' into an `O(1)` comparison, adjusted in `O(1)` exactly when a char crosses its target count. Option B is wrong because a full map comparison scans the alphabet and is `O(Σ)`, not `O(1)`. Option C is wrong: the counters optimize the per-step constant factor, not the loop structure, and the naive version is `O(nΣ)`, not `O(n^2)`, with both single-pass. Option D is wrong because map comparison is a performance issue, not a correctness one; a `Dictionary\u003cchar,int>` handles Unicode fine."},{"id":"sliding-window-h01","topic":"Sliding Window","slug":"sliding-window","difficulty":"hard","tags":["when-to-apply","pitfall"],"question":"A candidate writes the shortest-subarray-with-sum-at-least-target variable window from the reviewer (grow `right`, then `while (sum >= target)` shrink `left`). It passes for non-negative arrays. They now run it on `nums = [2, -1, 2]`, `target = 3`. Which single statement correctly explains why the plain window is unsound here, per the reviewer?","code":"","codeLang":"","options":["The window still works, but `int.MaxValue` overflows when negatives are present, so you must use `long` for the sum accumulator","The array length is odd, so the fixed-size seeding step reads past the end of the array and corrupts the result","Negative numbers make the answer non-contiguous, so a subsequence-based DP is required instead of any window","Extending `right` to add a negative value can lower the running sum, so the sum is no longer monotone as the window grows and the shrink-while-valid invariant fails; the correct tool is prefix sums plus a monotonic deque"],"answer":3,"explanation":"The reviewer's 'When NOT to use a window' section states the variable sum-window relies on all values being non-negative so the running sum is monotone as the window grows; with a negative value, extending `right` can decrease the sum, breaking the shrink invariant, and the fix is prefix sums plus a monotonic deque. Option B invents an overflow issue unrelated to the actual failure (the bug is the broken monotonicity, not numeric overflow). Option C fabricates an array-parity/seeding error that does not exist in the variable template, which has no fixed-`k` seed. Option D is wrong because the answer is still a contiguous subarray; the issue is the aggregate's monotonicity, not contiguity, so DP over subsequences is the wrong remedy."},{"id":"sliding-window-h02","topic":"Sliding Window","slug":"sliding-window","difficulty":"hard","tags":["invariant","pitfall"],"question":"In the LC 424 (Longest Repeating Character Replacement) solution shown, `maxFreq` is kept as a high-water mark and is never decremented when `left` advances. A learner argues this is a bug because after shrinking, the window's true most-frequent count may be smaller than the stored `maxFreq`. Why does the algorithm still return the correct maximum, per the reviewer?","code":"int left = 0, maxFreq = 0, best = 0;\nfor (int right = 0; right \u003c s.Length; right++) {\n    freq[s[right]-'A']++;\n    maxFreq = Math.Max(maxFreq, freq[s[right]-'A']);\n    while (right - left + 1 - maxFreq > k) {\n        freq[s[left]-'A']--;\n        left++;\n    }\n    best = Math.Max(best, right - left + 1);\n}","codeLang":"csharp","options":["Because the inner `while` shrinks `left` by more than one when `maxFreq` is stale, exactly compensating for the overcount","Because a stale (too-high) `maxFreq` only lets the window slide rather than shrink; the window never grows wider than a genuinely valid width, so `best` records the true widest valid reach","Because uppercase-only input guarantees `maxFreq` equals the window length whenever the window is valid, making the stored value irrelevant","Because `maxFreq` is recomputed from the full `freq` array on every iteration, so a stale value can never persist past one step"],"answer":1,"explanation":"The reviewer explains that letting `maxFreq` be a high-water mark means a stale value only prevents the window from expanding until a real count catches up; the window slides at constant width instead of shrinking, so it never reports a width wider than a genuinely valid one, and the final `best` is the widest validly-reached width. Option 0 contradicts the code: `maxFreq` is updated via `Math.Max`, never recomputed by scanning all 26 counts, which is precisely why it can be stale. Option 2 is false: the `while` advances `left` by exactly one per iteration, and there is no compensating over-shrink. Option 3 is nonsense; a valid window can contain replaced (differing) characters, so `maxFreq` need not equal the window length, and the uppercase alphabet has nothing to do with correctness."},{"id":"sliding-window-h03","topic":"Sliding Window","slug":"sliding-window","difficulty":"hard","tags":["trace","template"],"question":"Below is the LC 76 Minimum Window Substring shrink loop from the reviewer, but the body that records the best window has been removed and replaced with a blank. For the algorithm to return the smallest valid window (not the first valid one), what must go at the blank?","code":"while (have == required) {        // window valid -> shrink\n    /* ___ record-best goes here ___ */\n    char d = s[left];\n    window[d]--;\n    if (need.ContainsKey(d) && window[d] \u003c need[d])\n        have--;\n    left++;\n}","codeLang":"csharp","options":["Nothing should go inside the loop; record `bestLen` once after the `while` exits, since the final `left` marks the smallest window","Record after the `have--` decrement, using `right - left + 1` with the already-incremented `left`","Record `bestLen`/`bestLeft` inside the loop, before removing `s[left]`, every iteration the window stays valid: `if (right-left+1 \u003c bestLen) { bestLen = right-left+1; bestLeft = left; }`","Record only on the first iteration where `have == required` becomes true, then break out of the `while`"],"answer":2,"explanation":"The reviewer's shortest template rule is to capture the best length INSIDE the shrink loop, before removing the element that would invalidate the window, on every iteration it stays valid; that is how the shrink squeezes each valid window to its minimal width. Option 0 is the longest-template behavior (record after shrinking); recording only once after the loop exits would measure an already-invalidated window and miss the per-step minima. Option 2 is exactly the documented bug from exam question 6: recording only on first validity returns 'ADOBEC' (len 6) instead of 'BANC' (len 4). Option 3 records after `left++`, so `right - left + 1` reflects a window whose left element has already been removed (and `have` may have dropped), giving a wrong or under-counted length."},{"id":"sliding-window-h04","topic":"Sliding Window","slug":"sliding-window","difficulty":"hard","tags":["complexity","invariant"],"question":"Consider the monotonic-deque sliding-window-maximum from the reviewer versus a naive approach that, for each of the `n - k + 1` windows, rescans all `k` elements to find the max. A reader claims the deque version is `O(n)` even though it contains a `while` loop that can pop multiple elements per step. Which justification of the deque's `O(n)` time is correct?","code":"","codeLang":"","options":["The deque is `O(n log n)` because maintaining decreasing order on insert is equivalent to a balanced-BST insertion per element","The deque is `O(n)` because each index is pushed exactly once and popped at most once across the entire scan, so total deque operations are bounded by `2n` regardless of how many pops happen in any single step (amortized)","The deque is `O(n)` because the inner `while` pops at most one element per outer step, so the work is trivially bounded by `n` like any single loop","Both approaches are `O(n)`; the naive rescan is `O(n)` because `k` is treated as a constant, so multiplying by `k` does not change the asymptotic class"],"answer":1,"explanation":"The reviewer states each index is pushed once and popped once, so a length-`n` scan totals at most about `2n` deque operations, an amortized `O(n)` bound, exactly like the pointer-advance argument for the basic window. Option 0 is false: a single step can pop many tail elements (the trace pops three at `right=4`), so the per-step bound is not one; correctness of `O(n)` comes from global amortization, not a per-step cap. Option 2 is wrong because the naive rescan does `O(k)` work for each of about `n` windows, giving `O(n*k)`; `k` is a genuine input parameter, not a fixed constant, so it cannot be dropped. Option 3 misdescribes the deque: insertion only pops smaller-or-equal tails in amortized `O(1)`, not a logarithmic balanced-tree operation."},{"id":"sorting-e01","topic":"Sorting Algorithms","slug":"sorting","difficulty":"easy","tags":["stability","definition"],"question":"A sort is called **stable** when it has which property?","code":"","codeLang":"","options":["Elements that compare equal keep their original relative order","It never moves an element more than a constant number of times","Its worst-case running time is guaranteed to be O(n log n)","It uses only O(1) auxiliary space beyond the input array"],"answer":0,"explanation":"Stability is defined as preserving the original relative order of elements that compare equal, which is exactly why a stable primary-key pass keeps a previously-established secondary-key order in multi-key sorting. Option 2 describes 'in-place' (O(1) auxiliary space), which the reviewer stresses is an orthogonal, independent property from stability. Option 3 describes a worst-case complexity guarantee (true of merge/heap sort) and has nothing to do with stability. Option 4 invents a bound on element moves that is not a definition of any standard property."},{"id":"sorting-e02","topic":"Sorting Algorithms","slug":"sorting","difficulty":"easy","tags":["complexity","when-to-apply"],"question":"You need to sort a large array with a **guaranteed** O(n log n) worst case AND a **stable** result, and you can afford extra memory. Which sort fits best?","code":"","codeLang":"","options":["Selection sort","Heapsort","Merge sort","Quicksort"],"answer":2,"explanation":"Merge sort is O(n log n) in best, average, and worst cases and is stable, at the cost of O(n) extra space, exactly matching the requirements. Quicksort degrades to O(n^2) on bad pivots and is not stable, so it fails both the guarantee and the stability requirement. Heapsort is O(n log n) worst case but is not stable. Selection sort is O(n^2) and not stable, failing both criteria."},{"id":"sorting-e03","topic":"Sorting Algorithms","slug":"sorting","difficulty":"easy","tags":["csharp","stability"],"question":"In .NET, which statement about `Array.Sort` / `List\u003cT>.Sort` versus LINQ `OrderBy` is correct?","code":"","codeLang":"","options":["Both are stable; only `OrderBy` mutates the source collection","`Array.Sort` is a stable merge sort; `OrderBy` is an unstable introsort","Both are unstable; `OrderBy` sorts the source in place","`Array.Sort` is an unstable introsort; `OrderBy` is a stable merge sort"],"answer":3,"explanation":"The reviewer states the single most important practical fact: Array.Sort and List\u003cT>.Sort use an unstable introsort (in place, O(n log n) worst case), while LINQ OrderBy performs a stable merge sort that returns a new sequence without mutating the source. Option 2 swaps the two, which is the exact misconception being tested. Option 3 wrongly calls Array.Sort stable and claims OrderBy mutates the source (it does not). Option 4 wrongly calls OrderBy unstable and in-place; OrderBy uses O(n) extra space and leaves the source unchanged."},{"id":"sorting-e04","topic":"Sorting Algorithms","slug":"sorting","difficulty":"easy","tags":["complexity","non-comparison"],"question":"What is the time complexity of **counting sort** on `n` integer keys drawn from the range `[0, k]`?","code":"","codeLang":"","options":["O(n + k)","O(n log n)","O(n * k)","O(n log k)"],"answer":0,"explanation":"Counting sort tallies occurrences and writes values out by index, giving O(n + k) time (and O(n + k) space), and it only stays practical when k = O(n). Option 2 is the comparison-sort floor, which counting sort beats precisely because it does not compare elements. Option 3 (O(n log k)) is the size-k heap selection cost, not counting sort. Option 4 (O(n * k)) is a fabricated product that no standard formulation of counting sort incurs."},{"id":"sorting-m01","topic":"Sorting Algorithms","slug":"sorting","difficulty":"medium","tags":["when-to-apply","comparison"],"question":"You must sort an array of 10 million 32-bit unsigned integers, you have abundant RAM, you do not need the result sorted in place, and you want the best practical wall-clock time. Which choice fits best and why?","code":"","codeLang":"","options":["Merge sort: O(n log n) is the information-theoretic optimum, so no sort can do better on this input","Quicksort with a fixed last-element pivot: O(n log n) average and in-place, the fastest possible here","A single plain counting sort over the full 32-bit value range: O(n + k) with k = 2^32, which is linear in n","Radix sort (LSD, base 256): the keys are fixed-width integers, so 4 stable counting-sort passes give O(d·(n + b)) ≈ O(n), beating the comparison-sort floor"],"answer":3,"explanation":"Keys are fixed-width 32-bit integers, so LSD radix in base 256 needs only d = 4 stable counting-sort passes: O(d·(n + b)) = O(4·(n + 256)) ≈ O(n), faster than any O(n log n) comparison sort here. A single counting sort is wrong because k = 2^32 forces a ~4-billion-entry count array, which is impractical even though it is technically linear in n. Fixed last-element-pivot quicksort risks O(n²) on adversarial/sorted runs and never beats radix here; the in-place property is also irrelevant since the prompt says in-place is not needed. Merge sort's O(n log n) is only the lower bound for *comparison* sorts; non-comparison sorts like radix legitimately go below it by indexing on key value."},{"id":"sorting-m02","topic":"Sorting Algorithms","slug":"sorting","difficulty":"medium","tags":["stability","template"],"question":"In the merge step below, what is the effect of changing the comparison `left[i] \u003c= right[j]` to `left[i] \u003c right[j]`?","code":"while (i \u003c left.Length && j \u003c right.Length)\n    merged[k++] = left[i] \u003c= right[j]\n        ? left[i++]\n        : right[j++];","codeLang":"csharp","options":["It has no observable effect because both halves are already sorted before merging","It makes the merge unstable: on equal keys the right element is taken first, so equal elements from the left half can be reordered after the right half's","It changes the time complexity of the merge from O(n) to O(n log n)","It introduces an off-by-one error that skips the last element of the left half"],"answer":1,"explanation":"When keys are equal, `\u003c=` takes the left element first, preserving input order across halves, which is exactly what keeps merge sort stable. Switching to `\u003c` takes the right element first on ties, so equal keys from the right half jump ahead of equal keys from the left half, breaking stability. It is not an off-by-one: the drain loops still copy every remaining element correctly. The merge remains a single linear two-pointer scan, so complexity stays O(n). And it is observable: with duplicate keys carrying secondary data (e.g. multi-key sorts), the relative order of equal elements changes."},{"id":"sorting-m04","topic":"Sorting Algorithms","slug":"sorting","difficulty":"medium","tags":["when-to-apply","comparison"],"question":"You receive an unbounded stream of integers and must always be able to report the k-th largest seen so far, with k much smaller than the total count and only O(k) memory available. Quickselect or a size-k heap — which fits, and why?","code":"","codeLang":"","options":["Quickselect: it uses O(1) space, which satisfies the O(k) memory budget better than a heap","A size-k min-heap: it processes elements one at a time in O(log k) each, needs only O(k) memory, and never requires the whole dataset in an array — quickselect needs random access to a static array","Quickselect: its O(n) average time beats the heap's O(n log k), so it is always the better choice for k-th largest","A size-k max-heap: keeping the largest k at the root lets you read off the k-th largest in O(1) after each insertion"],"answer":1,"explanation":"A streaming source with bounded O(k) memory rules out quickselect, which needs the entire dataset materialized in an array for random-access partitioning. A size-k min-heap keeps the k largest seen so far with its smallest (the current k-th largest) at the root, updates in O(log k) per element, and uses only O(k) space — the textbook streaming answer. Quickselect's O(n) average is irrelevant because you cannot store the unbounded stream, so 'always better' is false. Its O(1) space claim also fails the requirement since it must hold all n elements, not O(k). A *max*-heap of size k is wrong: a max-heap exposes the maximum at the root, not the k-th largest; you specifically want a *min*-heap so the smallest of the top k sits at the root."},{"id":"sorting-h01","topic":"Sorting Algorithms","slug":"sorting","difficulty":"hard","tags":["template","pitfall","invariant"],"question":"In the Dutch national flag solution for LC 75, the `case 2` branch swaps `nums[mid]` with `nums[high]`, decrements `high`, but deliberately does NOT advance `mid` (unlike `case 0`, which advances both `low` and `mid`). What is the precise reason `mid` must NOT advance after a 2-swap, while it is safe to advance after a 0-swap?","code":"case 0: (nums[low], nums[mid]) = (nums[mid], nums[low]); low++; mid++; break;\ncase 1: mid++; break;\ncase 2: (nums[mid], nums[high]) = (nums[high], nums[mid]); high--; break;","codeLang":"csharp","options":["After a 2-swap the value pulled in from `high` has never been examined and could be a 0, 1, or 2, so `mid` must re-inspect it; after a 0-swap the value pulled in from `low` was already scanned (everything below `mid` is settled), so it needs no re-examination.","The 2-swap can move an element into the `low` region and break its 0-only invariant, so `mid` stays to repair it, while the 0-swap never touches the `high` region.","After a 2-swap `mid` could pass `high` and read out of bounds, whereas after a 0-swap `mid` is always strictly below `high`, so advancing is safe in that case only.","Advancing `mid` after a 2-swap would make the loop condition `mid \u003c= high` false one iteration too early, dropping the last element; the 0-swap shifts `high` so this cannot happen."],"answer":0,"explanation":"The invariant is that everything between `low` and `mid` has already been scanned and placed, while everything from `high+1` onward is a known 2. When `case 0` fires, `nums[low]` holds an already-examined value (it can only be a 1, since 0s were already pushed below `low`), so after swapping it up to `mid` it is correct to advance `mid`. When `case 2` fires, the element swapped in from `nums[high]` comes from the unscanned region and could be anything, so `mid` must stay to inspect it next iteration. Option 2 is wrong: the loop guard `mid \u003c= high` already prevents out-of-bounds; bounds are not the reason. Option 3 inverts the regions: the 2-swap moves an element to the `high` end, never into the `low` region. Option 4 invents a false off-by-one; correctness comes from the unexamined-value argument, not the loop count."},{"id":"sorting-h02","topic":"Sorting Algorithms","slug":"sorting","difficulty":"hard","tags":["complexity","when-to-apply"],"question":"You must order 50 million signed 64-bit integers in RAM and want the best practical wall-clock time. A teammate argues for LSD radix sort \"because it's O(n), which always beats quicksort's O(n log n).\" Per the reviewer, why is this reasoning flawed for arbitrary 64-bit keys, even though radix sort is asymptotically O(n) here?","code":"","codeLang":"","options":["Radix sort requires the keys to fit in a counting array of size `2^64`, so it is impossible to run and the question reduces to quicksort by default.","Radix sort cannot sort signed integers at all, so it would produce a wrong order on negative values regardless of speed.","Radix sort is only O(n) when the data is already nearly sorted; on random 64-bit input it degrades to O(n²) like a single overloaded bucket.","Radix sort's cost is `O(d·(n + b))`, and for wide arbitrary keys the digit count `d` is large; combined with poor cache behavior and high constants, a tuned quicksort/introsort is often faster in practice despite its O(n log n) bound."],"answer":3,"explanation":"The reviewer explicitly names this misconception: radix is O(d·(n+b)), not a flat O(n); for arbitrary wide keys d grows, and the hidden constants plus poor cache locality often let a good quicksort win in practice. Option 2 is false: radix can handle signed integers (e.g. by biasing or flipping the sign bit), so it is not categorically wrong on negatives. Option 3 confuses radix with adaptivity/bucket sort: radix is O(d·(n+b)) in all cases and does not degrade to O(n²) on random input, nor is it sorted-input dependent. Option 4 confuses radix with counting sort: radix sorts digit by digit using a base-b count array (e.g. b=256), so it never needs a 2^64 table; counting sort directly would."},{"id":"sorting-h03","topic":"Sorting Algorithms","slug":"sorting","difficulty":"hard","tags":["pitfall","trace"],"question":"This C# comparator is intended to sort ascending but has a latent bug. Given the array shown, what is the defect and exactly when does it cause wrong output?","code":"var arr = new[] { int.MinValue, 1, -1 };\nArray.Sort(arr, (a, b) => a - b);","codeLang":"csharp","options":["Lambda comparators are not allowed by `Array.Sort`, which requires an `IComparer\u003cT>`; the code fails to compile, so it never produces output at all.","`Array.Sort` is unstable, so the two values `int.MinValue` and `-1` may be swapped nondeterministically; the bug appears on every run because the comparator returns inconsistent results for equal keys.","`a - b` returns `0` whenever `a` and `b` have opposite signs, treating positive and negative numbers as equal, so the array is left unsorted on any mixed-sign input.","`a - b` overflows when the true difference exceeds `int` range: for `a = int.MinValue, b = 1`, `a - b` wraps to a positive value, so the comparator reports `MinValue > 1` and the order is corrupted; it bites only on large or extreme-negative operands."],"answer":3,"explanation":"Integer subtraction overflows: int.MinValue - 1 wraps around to a positive value, so the comparator claims int.MinValue is greater than 1 — the wrong sign — corrupting the order; this happens precisely when the operands' difference exceeds int range, i.e. with large or extreme-negative values. The fix is a.CompareTo(b), which cannot overflow. Option 2 misattributes the failure to instability: the inputs here are all distinct, so stability is irrelevant; the defect is the overflowing comparator, not tie handling. Option 3 is false: Array.Sort accepts a Comparison\u003cT> delegate (the lambda), so it compiles fine. Option 4 invents nonexistent behavior — a - b does not return 0 for opposite signs; it returns a (possibly overflowed) difference."},{"id":"string-searching-e01","topic":"String Searching","slug":"string-searching","difficulty":"easy","tags":["complexity"],"question":"What is the worst-case time complexity of the naive (brute-force) substring search for a pattern of length `m` in a text of length `n`?","code":"","codeLang":"","options":["O(m)","O(n·m)","O(n log m)","O(n + m)"],"answer":1,"explanation":"Naive search tries each of the ~n candidate alignments and, in the worst case (e.g. text \"AAAA...AAB\" searched for \"AAAB\"), compares nearly all m pattern characters before mismatching on the last one, giving O(n·m). O(n + m) is the naive *average* case on natural text where mismatches come early, not the worst case. O(n log m) describes no step of this algorithm. O(m) is just the cost of one alignment's comparison, not the whole scan across all alignments."},{"id":"string-searching-e02","topic":"String Searching","slug":"string-searching","difficulty":"easy","tags":["template","mechanics"],"question":"In Boyer-Moore-Horspool, the bad-match table stores a shift for a character at pattern index `i`. Which formula gives that shift, and why is the pattern's last character excluded from the table?","code":"","codeLang":"","options":["`table[pattern[i]] = pattern.Length - i - 1`; the last character is excluded because including it would store a shift of 0, which makes no progress","`table[pattern[i]] = pattern.Length`; the last character is excluded because it never causes a mismatch","`table[pattern[i]] = i`; the last character is excluded because it is the one compared first","`table[pattern[i]] = pattern.Length - i`; the last character is excluded to save memory"],"answer":0,"explanation":"The safe shift is the distance from index i to the pattern's last index, `pattern.Length - i - 1`; the last character is deliberately skipped because at i = m-1 the formula yields 0, and a zero shift would stall the search. `table[pattern[i]] = i` is backwards and would not align the mismatched character with its occurrence in the pattern. `pattern.Length` is the *default* shift for absent characters, not the per-index formula. `pattern.Length - i` is off by one (it would over-shift and could skip valid matches), and excluding the last char is about avoiding a zero shift, not saving memory."},{"id":"string-searching-e03","topic":"String Searching","slug":"string-searching","difficulty":"easy","tags":["comparison","complexity"],"question":"Among naive search, Boyer-Moore-Horspool, KMP, and Rabin-Karp, which one guarantees `O(n + m)` time even in the worst case?","code":"","codeLang":"","options":["Naive search, because it does no preprocessing","Rabin-Karp, because its rolling hash compares each window in O(1)","KMP, because its prefix/failure table lets it never re-examine a text character","Boyer-Moore-Horspool, because its skips grow with the pattern length"],"answer":2,"explanation":"KMP preprocesses the pattern into a prefix/failure (LPS) table and scans left-to-right without ever re-reading a text character, which guarantees O(n + m) worst case. BMH is usually fast but degrades to O(n·m) on repetitive input where its skips collapse to 1. Rabin-Karp is O(n + m) only on average; with universal hash collisions its worst case is O(n·m). Naive search is O(n·m) worst case precisely because it has no preprocessing to avoid redundant comparisons."},{"id":"string-searching-m01","topic":"String Searching","slug":"string-searching","difficulty":"medium","tags":["template","table"],"question":"You are building the Boyer-Moore-Horspool bad-match table for `pattern = \"ABCAB\"` (length 5). After running the build loop, what shift does the table return for a window whose last character is `'B'`?","code":"","codeLang":"","options":["1 (from the rightmost `'A'`, since `'A'` and `'B'` share a shift)","3 (from `'B'` at index 1: `5 - 1 - 1 = 3`, since the rightmost stored `'B'` is at index 1)","5 (the full-length default, because `'B'` is the last character of the pattern and is never stored)","0 (because `'B'` appears at index 4, the pattern's last position)"],"answer":1,"explanation":"The build loop iterates `i` from 0 to `m - 2` (0..3 here), deliberately skipping the last character at index 4. `'B'` appears at index 1 and index 4; only index 1 is stored, giving `5 - 1 - 1 = 3`. The index-4 `'B'` is the excluded last character, so it never overwrites the index-1 value. Option with shift 5 wrongly treats `'B'` as absent — but the index-1 occurrence is stored, so the default does not apply. The shift-0 option is the value the excluded last character would have produced; excluding it is exactly what prevents a zero, non-progressing shift. The shift-1 option confuses `'B'` with `'A'`'s rightmost shift (which is 1) — each character has its own entry."},{"id":"string-searching-m03","topic":"String Searching","slug":"string-searching","difficulty":"medium","tags":["trace","invariant"],"question":"BMH searches for `pattern = \"TRUTH\"` (table: `T->1, R->3, U->2`, default 5) in `text = \"THE TRUTH IS\"`. The first alignment is at `startIndex = 0`. After comparing right-to-left and mismatching on the first comparison, what is the next `startIndex`, and what character drives the shift?","code":"text:  T H E _ T R U T H _ I S\nindex: 0 1 2 3 4 5 6 7 8 ...\n\nstartIndex = 0:  \"TRUTH\" aligned over \"THE T\"\n  compare pattern[4]='H' vs text[4]='T'  -> mismatch","codeLang":"text","options":["startIndex = 1, driven by `pattern[4] = 'H'`, since the mismatched pattern character determines the shift","startIndex = 5, driven by `text[0] = 'T'` (the window's first character), since `table['T'] = 1` is added to m","startIndex = 1, driven by `text[4] = 'T'` (the window's last character), since `table['T'] = 1`","startIndex = 5, driven by `text[4] = 'T'`, since a mismatch always shifts by the full pattern length"],"answer":2,"explanation":"The classic Horspool loop always shifts by `table[c]`, where `c` is the text character aligned with the pattern's LAST position, i.e. `text[startIndex + m - 1] = text[4] = 'T'`. Since `table['T'] = 1`, the new `startIndex` is `0 + 1 = 1`. The second option uses the mismatched pattern character; but the table is indexed by the text character at the window's end, not the pattern character. The third option mislocates the window's last position (index 4, not index 0) and incorrectly adds the shift to `m`. The last option assumes a mismatch always skips the full length; the skip is whatever the table holds, here only 1 because `'T'` is in the pattern."},{"id":"string-searching-m04","topic":"String Searching","slug":"string-searching","difficulty":"medium","tags":["pitfall","complexity"],"question":"Two candidate inputs are proposed to stress-test a BMH implementation. Which input drives BMH to its O(n·m) worst case, and what mechanism causes the degradation?","code":"","codeLang":"","options":["`pattern = \"ABCD\"`, `text` of distinct random letters: the bad-match table is large, forcing many comparisons per window","A very long pattern over a large alphabet: longer patterns always slow BMH because the table grows","`pattern = \"AAAA\"`, `text = \"AAAA...A\"`: every window's last character is in the pattern, so shifts collapse to 1 while many characters re-match each alignment","`pattern = \"ABCD\"`, `text = \"ZZZZ...Z\"`: no pattern character appears in the text, so every shift is the full length m"],"answer":2,"explanation":"BMH degrades to O(n·m) on highly repetitive small-alphabet input like `pattern = \"AAAA\"`, `text = \"AAAA...A\"`: the window's last character is always in the pattern, so the table shift is the minimal value (1), and right-to-left comparison re-matches nearly the whole pattern at every alignment — n alignments times m comparisons. The second option is BMH's BEST case: an absent character gives a full-length skip m, making it sublinear, not quadratic. The third option inverts the effect — a large, varied table produces big skips and fast searches, not slow ones. The last option contradicts the source's mantra: bigger patterns and alphabets mean bigger skips and BETTER performance, not worse."},{"id":"string-searching-m05","topic":"String Searching","slug":"string-searching","difficulty":"medium","tags":["when-to-apply","comparison"],"question":"An anti-plagiarism service must scan each submitted document against a large dictionary of known source fingerprints, comparing many fixed-width substring windows by hash. Which classic exact-match approach is the natural fit for this hashing-heavy, multi-pattern workload?","code":"","codeLang":"","options":["KMP, because its failure table is the only way to handle many patterns at once","Naive search, because hashing windows requires no preprocessing and tiny constants win","Boyer-Moore-Horspool, because its right-to-left skips make single-pattern scans fastest","Rabin-Karp, because its rolling hash compares each window in O(1) and naturally extends to multi-pattern and fingerprinting work"],"answer":3,"explanation":"Rabin-Karp computes a rolling hash for each window, comparing it to target hashes in O(1) and verifying character-by-character only on a hash hit. The source names its sweet spot precisely: multi-pattern search, fingerprinting/plagiarism detection, and 2-D matching — exactly this scenario. BMH is tuned for a single long pattern over large text, not a dictionary of fingerprints, and uses no hashing. KMP handles a single pattern with a guaranteed bound; the multi-pattern specialist named in the source is Aho-Corasick, not KMP. Naive search does no hashing and has no multi-pattern advantage; its tiny constants do not address comparing many window hashes against a dictionary."},{"id":"string-searching-h01","topic":"String Searching","slug":"string-searching","difficulty":"hard","tags":["bad-character-table","mechanics","pitfall"],"question":"Build the Horspool bad-match table for `pattern = \"GAGGAG\"` (length 6) using `table[pattern[i]] = pattern.Length - i - 1` for `i` from `0` to `m - 2`. Recall that later assignments overwrite earlier ones and the last character is excluded. What is the final table and default shift?","code":"pattern = G A G G A G\nindex   = 0 1 2 3 4 5","codeLang":"text","options":["`G -> 0, A -> 1`, default `6` (the last `G` at index 5 is stored and overwrites the earlier `G` entries with shift `0`)","`G -> 2, A -> 1`, default `6` (rightmost non-terminal `G` is index 3, rightmost `A` is index 4; the last `G` at index 5 is excluded)","`G -> 5, A -> 4`, default `6` (each character maps to the shift from its first occurrence and is never overwritten)","`G -> 1, A -> 2`, default `6` (each repeated character keeps the shift from its leftmost occurrence)"],"answer":1,"explanation":"Iterate i=0..4 (index 5, the last char, is skipped). For 'G' the non-terminal occurrences are i=0 (shift 5), i=2 (shift 3), i=3 (shift 2); later writes overwrite, so the rightmost wins -> G->2. For 'A' the occurrences are i=1 (shift 4) and i=4 (shift 6-4-1=1); rightmost wins -> A->1. Absent characters and the excluded last 'G' use default = m = 6. Option 1 inverts the values by using leftmost occurrences. Option 2 never overwrites and keeps first-occurrence shifts. Option 3 wrongly includes the last character, which would store a useless shift of 0."},{"id":"string-searching-h02","topic":"String Searching","slug":"string-searching","difficulty":"hard","tags":["trace","search-loop","shift"],"question":"Trace the classic Horspool loop (compare right-to-left; on every iteration shift by `table[text char at the window's LAST position]`) for `pattern = \"abab\"` against `text = \"zabababx\"`. The table is `a->1, b->2`, default `4`. Which sequence of `startIndex` values does the outer loop take, and how many matches does it report?","code":"table: a->1, b->2, default 4\ntext:  z a b a b a b x\nindex: 0 1 2 3 4 5 6 7","codeLang":"text","options":["startIndex goes 0 -> 1 -> 3 -> (5, loop exits); matches reported at index 1 and index 3","startIndex goes 0 -> 1 -> 3 -> 5 -> 7; matches reported at 1, 3, and 5","startIndex goes 0 -> 1 -> 2 -> 3 -> 4; matches at 1 and 3, shifting by one each step because every window character is in the pattern","startIndex goes 0 -> 2 -> 4; one match reported at index 2"],"answer":0,"explanation":"At startIndex=0 the window is text[0..3]='zaba'; pattern[3]='b' vs text[3]='a' mismatches; window's last char is text[3]='a' -> table['a']=1 -> startIndex=1. At start
