<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Algorithm Visualizer — Reviewer add-on</title>
  <link rel="stylesheet" href="src/player/player.css">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #0b0d12; color: #e6e9ef;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    .side { border-right: 1px solid #20242e; padding: 18px 14px; overflow-y: auto; }
    .brand { font-weight: 700; font-size: 15px; padding: 4px 8px 14px; letter-spacing: .2px; }
    .brand small { display: block; font-weight: 400; color: #8b93a4; font-size: 11.5px; margin-top: 3px; }
    .search-box { width: 100%; margin: 0 0 4px; padding: 8px 11px; background: #11141b; border: 1px solid #20242e;
      border-radius: 8px; color: #e6e9ef; font-size: 13px; font-family: inherit; }
    .search-box:focus { outline: none; border-color: #5b8cff; }
    .search-box::placeholder { color: #6b7384; }
    .search-box::-webkit-search-cancel-button { filter: invert(.5); cursor: pointer; }
    .no-results { color: #6b7384; font-size: 13px; padding: 10px; }
    .nav-item mark { background: rgba(91,140,255,.28); color: inherit; border-radius: 2px; }
    .group-h { font-size: 10.5px; letter-spacing: .8px; text-transform: uppercase; color: #6b7384; margin: 14px 8px 6px; }
    .nav-item { display: block; width: 100%; text-align: left; background: none; border: none; color: #c4cad6;
      padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13.5px; }
    .nav-item:hover { background: #161a22; }
    .nav-item.active { background: #1d2330; color: #fff; }
    .nav-item .meta { display: block; color: #6b7384; font-size: 11px; font-family: "JetBrains Mono", ui-monospace, monospace; margin-top: 2px; }
    .main { padding: 26px clamp(16px, 4vw, 48px); display: flex; flex-direction: column; gap: 14px; }
    .main-head { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
    .main h1 { font-size: 19px; margin: 0; }
    .home-link { display: block; color: #8b93a4; font-size: 12px; text-decoration: none; padding: 0 8px 12px; }
    .home-link:hover { color: #c4cad6; }
    .reviewer-link { color: #5b8cff; font-size: 13px; text-decoration: none; white-space: nowrap; }
    .reviewer-link:hover { text-decoration: underline; }
    .hint { color: #8b93a4; font-size: 13px; margin: 0 0 6px; }
    .player-host { max-width: 1280px; }
    @media (max-width: 760px) { .app { grid-template-columns: 1fr; } .side { border-right: none; border-bottom: 1px solid #20242e; } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <a id="home-link" class="home-link" href="../index.html" hidden>← Algorithm Patterns</a>
      <div class="brand">Algorithm Visualizer<small>Animated playback for the algorithms reviewer</small></div>
      <input id="search" class="search-box" type="search" placeholder="Search visualizations…  (press /)" aria-label="Search visualizations" autocomplete="off">
      <nav id="nav"></nav>
      <p id="no-results" class="no-results" hidden>No visualizations match your search.</p>
    </aside>
    <main class="main">
      <div class="main-head">
        <h1 id="title">Loading…</h1>
        <a id="reviewer-link" class="reviewer-link" target="_blank" rel="noopener" hidden>Read the full reviewer ↗</a>
      </div>
      <p class="hint">▶ play · ←/→ step · space play/pause · −/+ speed · drag the scrubber. This is an add-on; it never modifies the reviewer markdown.</p>
      <div class="player-host" id="host"></div>
    </main>
  </div>

  <script type="module">
    import { mountFromUrl } from './src/player/player.mjs';

    // Topic slugs + labels match the algo reviewer basenames/titles, so a visualization
    // here lines up 1:1 with its topic page on the main site.
    const TOPIC_LABELS = {
      'complexity-and-big-o': 'Algorithmic Complexity & Big-O',
      'arrays-and-hashing': 'Arrays & Hashing',
      'recursion-and-divide-and-conquer': 'Recursion & Divide and Conquer',
      'sorting-algorithms': 'Sorting Algorithms',
      'bit-manipulation': 'Bit Manipulation',
      'math-and-number-theory': 'Math & Number Theory',
      'two-pointers': 'Two Pointers',
      'sliding-window': 'Sliding Window',
      'binary-search': 'Binary Search',
      'stacks-and-monotonic-stacks': 'Stacks & Monotonic Stacks',
      'prefix-sums-and-difference-arrays': 'Prefix Sums & Difference Arrays',
      'intervals': 'Intervals',
      'greedy': 'Greedy Algorithms',
      'backtracking': 'Backtracking',
      'dynamic-programming': 'Dynamic Programming',
      'linked-lists': 'Linked Lists',
      'trees-and-binary-search-trees': 'Trees & Binary Search Trees',
      'heaps-and-priority-queues': 'Heaps & Priority Queues',
      'tries': 'Tries (Prefix Trees)',
      'graphs': 'Graphs',
    };
    // Pedagogical order matching the algo site's groups (Foundations → Core → Data structures).
    const TOPIC_ORDER = Object.keys(TOPIC_LABELS);

    const nav = document.getElementById('nav');
    const host = document.getElementById('host');
    const titleEl = document.getElementById('title');
    const reviewerLink = document.getElementById('reviewer-link');
    // When served as a sub-site of the main algo site (under /viz/), show links back to it.
    const onSite = location.pathname.includes('/viz');
    if (onSite) document.getElementById('home-link').hidden = false;

    const manifest = await fetch('data/manifest.json').then((r) => r.json());
    if (!manifest.length) { titleEl.textContent = 'No visualizations built yet — run `npm run build`.'; }

    // group by topic, ordered by the learning path (unknown topics fall to the end)
    const byTopic = {};
    for (const m of manifest) (byTopic[m.topic] ??= []).push(m);
    const orderedTopics = [...new Set([...TOPIC_ORDER, ...Object.keys(byTopic)])].filter((t) => byTopic[t]);

    const buttons = [], ordered = [], groups = [];
    for (const topic of orderedTopics) {
      const items = byTopic[topic];
      const label = TOPIC_LABELS[topic] ?? topic;
      const h = document.createElement('div'); h.className = 'group-h';
      h.textContent = label; nav.appendChild(h);
      const groupButtons = [];
      for (const m of items) {
        const b = document.createElement('button');
        b.className = 'nav-item';
        b.dataset.title = m.title;
        b.innerHTML = `<span class="nav-title">${m.title}</span><span class="meta">${m.steps} steps</span>`;
        b.dataset.q = `${m.title} ${label} ${m.topic}`.toLowerCase();
        b.addEventListener('click', () => select(m, b));
        nav.appendChild(b); buttons.push(b); ordered.push(m); groupButtons.push(b);
      }
      groups.push({ header: h, buttons: groupButtons });
    }

    // --- search/filter ---
    const searchBox = document.getElementById('search');
    const noResults = document.getElementById('no-results');
    const escapeRe = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    function applyFilter() {
      const q = searchBox.value.trim().toLowerCase();
      const rx = q ? new RegExp(`(${escapeRe(q)})`, 'ig') : null;
      let anyVisible = false;
      for (const g of groups) {
        let groupVisible = false;
        for (const b of g.buttons) {
          const show = !q || b.dataset.q.includes(q);
          b.style.display = show ? '' : 'none';
          const t = b.querySelector('.nav-title');
          t.innerHTML = rx ? b.dataset.title.replace(rx, '<mark>$1</mark>') : b.dataset.title;
          if (show) groupVisible = true;
        }
        g.header.style.display = groupVisible ? '' : 'none';
        if (groupVisible) anyVisible = true;
      }
      noResults.hidden = anyVisible;
    }
    searchBox.addEventListener('input', applyFilter);
    searchBox.addEventListener('keydown', (e) => { if (e.key === 'Escape') { searchBox.value = ''; applyFilter(); searchBox.blur(); } });
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && !/^(INPUT|TEXTAREA)$/.test(document.activeElement?.tagName || '')) { e.preventDefault(); searchBox.focus(); }
    });

    async function select(m, btn) {
      buttons.forEach((b) => b.classList.toggle('active', b === btn));
      titleEl.textContent = m.title;
      // The viz topic slug matches the reviewer basename, so the same example links 1:1.
      if (onSite) { reviewerLink.hidden = false; reviewerLink.href = `../${m.topic}-reviewer.html`; }
      else reviewerLink.hidden = true;
      await mountFromUrl(host, `data/${m.file}`);
    }

    if (ordered.length) select(ordered[0], buttons[0]);
  </script>
</body>
</html>
